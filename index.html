      play, targetPC:semis.map(x=>((x%12)+12)%12), rootSemi:((M.root+NAT_MINOR[deg-1])%12),
      explain:`${mn} 小调 ${ROMAN_MIN[deg-1]} = <b>${minChordName(mn,deg)}</b>(${names.join(" ")})，${MIN_QUAL[deg-1]}。`};
  }
  // family：C 小调借货清单专项
  if(Math.random()<0.6){
    const d=1+Math.floor(Math.random()*7), c=CM_FAM[d-1];
    return {kind:"choice",concept,qtype:"借货清单 · C 小调家族",
      prompt:`<b>C 小调</b>(C 大调的平行宇宙)的第 ${d} 级(${ROMAN_MIN[d-1]})是哪个和弦？`,
      play:()=>playSemis(c.s,60,true),
      options:uniqPick(CM_FAM.map(x=>x.n), c.n, 4).map(n=>({label:n,correct:n===c.n})),
      explain:`C 小调音阶 C D E♭ F G A♭ B♭，套口诀"小减大小小大大"：第 ${d} 级 = <b>${c.n}</b>。这张表就是离调借用的"借货清单"。`};
  }
  return {kind:"choice",concept,qtype:"借货清单 · 催泪弹溯源",
    prompt:`大调歌里那枚"催泪弹"——<b>四级小和弦 iv</b>，在 C 大调语境下借来的是哪个和弦？`,
    play:()=>playSemis([5,8,12],60,true),
    options:uniqPick(CM_FAM.map(x=>x.n), "Fm", 4).map(n=>({label:n,correct:n==="Fm"})),
    explain:`从平行宇宙 C 小调的清单里借第 4 级：<b>Fm</b>(F A♭ C)。第⑲关「离调借用」就靠它催泪。`};
}

/* ---- 第17关 小调的回家路 v/V7 ---- */
function q_minv(concept){
  const mn=rand(MKEY_LIST), M=MKEYS[mn];
  const dRoot=(M.root+7)%12, dName=sharp(NOTE_NAMES[dRoot]);
  if(concept==="raise7"){ // 第一步：升第 7 音 / 和声小调音阶
    const v=Math.random();
    if(v<0.25){
      return {kind:"choice",concept,qtype:"和声小调 · 升的是第几音",
        prompt:`"和声小调"是把自然小调的<b>第几个音升高半音</b>得到的？`,
        options:[ // 按级数从小到大固定排列
          {label:"第 3 音", correct:false},
          {label:"第 5 音", correct:false},
          {label:"第 6 音", correct:false},
          {label:"第 7 音", sub:"造出导音", correct:true},
        ],
        explain:`升<b>第 7 音</b>(如 A 小调的 G→G♯)，让它紧贴主音、成为导音——其余 6 个音一个不动。`};
    }
    if(v<0.5){ // 升完之后第 7 音是谁(避开 F♯ 小调的 E♯ 拼写)
      const m2=rand(MKEY_LIST.filter(k=>k!=="F♯")), r2=MKEYS[m2].root, ltName=sharp(NOTE_NAMES[(r2+11)%12]);
      return {kind:"choice",concept,qtype:"和声小调 · 升完是哪个音",
        prompt:`<b>${m2} 和声小调</b>的第 7 个音(也就是被升出来的<b>导音</b>)是哪个？`,
        play:()=>playSemis(fitSemis([r2+11,r2+12]),60,true,"2n",{stack:false,gap:0.6}),
        options:uniqPick(["G♯","D♯","A♯","C♯","F♯","B","E","G"], ltName, 4).map(n=>({label:n,correct:n===ltName})),
        explain:`主音 ${m2} 下方半音 = <b>${ltName}</b>。自然小调只有低一个全音的第 7 音，升半音才得到它。`};
    }
    if(v<0.75){ // 听辨 自然 vs 和声 音阶
      const isHarm=Math.random()<0.5;
      const pat=isHarm?[0,2,3,5,7,8,11]:NAT_MINOR;
      return {kind:"choice",concept,qtype:"和声小调 · 音阶听辨",
        prompt:`听这条小调音阶(${mn} 小调，8 个音)：它是<b>自然小调</b>还是<b>和声小调</b>？注意结尾那一步。`,
        play:()=>playSemis(fitSemis([...pat,12].map(x=>x+M.root)),60,true,"8n",{gap:0.4,stack:false}),
        options:[
          {label:"自然小调", sub:"结尾 全音→主音，平平地走完", correct:!isHarm},
          {label:"和声小调", sub:"结尾 半音蹭进主音，且第6→7步格外宽(异域味)", correct:isHarm},
        ],
        explain: isHarm?`结尾是<b>半音吸进主音</b>、第 6→7 步特别宽(增二度)——这是<b>和声小调</b>。`:`结尾平平地隔着全音走回主音——这是<b>自然小调</b>。`};
    }
    // 搭建和声小调音阶
    const semis8=[0,2,3,5,7,8,11,12].map(x=>x+M.root);
    return {kind:"build",concept,qtype:"和声小调 · 在键盘上搭出",
      prompt:`在键盘上搭出 <b>${mn} 和声小调</b>：从主音 ${mn} 到高八度共 <b>8 个音</b>——前 6 个和自然小调一样，<b>第 7 个音升高半音</b>(整体移八度也算对)。`,
      play:()=>playSemis(fitSemis(semis8),60,true,"8n",{gap:0.4,stack:false}),
      targetMidis:semis8.map(x=>60+x), rootSemi:M.root, flashStart:[60+M.root],
      explain:`${mn} 和声小调 = 自然小调升第 7 音：${M.notes.slice(0,6).join(" ")} <b>${sharp(NOTE_NAMES[(M.root+11)%12])}</b> ${mn}。`};
  }
  if(concept==="chord5"){ // 第二步：第 5 级和弦为什么/怎么变
    const v=Math.random();
    if(v<0.34){
      return {kind:"choice",concept,qtype:"v→V · 为什么会变",
        prompt:`只是升了音阶的<b>第 7 个音</b>，为什么第 5 级和弦就从小三和弦(v)变成了大三和弦(V)？`,
        play:()=>playChordSeq([[4,7,11],[4,8,11]]), // Em → E：只动了中间的三音
        options:[
          {label:"第 7 音恰好是第 5 级和弦的三音，升它=三音升高半音", sub:"5级和弦=第5·7·2个音叠的", correct:true},
          {label:"因为根音也跟着升了", correct:false},
          {label:"因为五音也跟着升了", correct:false},
          {label:"没有真变，只是写法不同", correct:false},
        ],
        explain:`第 5 级三和弦由第 <b>5、7、2</b> 个音叠成(A 小调=E G B)。被升的第 7 音正是中间的<b>三音</b>：G→G♯ 让小三度变大三度，Em→E。`};
    }
    if(v<0.67){ // V 的构成(避开 F♯ 小调拼写)
      const m2=rand(MKEY_LIST.filter(k=>k!=="F♯")), r2=MKEYS[m2].root, b=(r2+7)%12;
      const nm=p=>sharp(NOTE_NAMES[(b+p)%12]);
      const correct=`${nm(0)} ${nm(4)} ${nm(7)}`;
      return {kind:"choice",concept,qtype:"v→V · 构成对比",
        prompt:`<b>${m2} 和声小调</b>里，魔改后的大属和弦 <b>V</b> 由哪三个音组成？`,
        play:()=>playChordSeq(minDegChords(["V"], m2)),
        options:[
          {label:correct, sub:"三音被升了半音", correct:true},
          {label:`${nm(0)} ${nm(3)} ${nm(7)}`, sub:"这是自然的小 v", correct:false},
          {label:`${nm(0)} ${nm(4)} ${nm(7)} ${nm(10)}`, sub:"这是四个音的 V7", correct:false},
          {label:`${nm(0)} ${nm(5)} ${nm(7)}`, correct:false},
        ],
        explain:`V = 第 5 级大三和弦：<b>${correct}</b>(中间那个就是升出来的导音)。自然 v 则是 ${nm(0)} ${nm(3)} ${nm(7)}。`};
    }
    const isV=Math.random()<0.5; // 单和弦听辨 v vs V：闯关阶段播"分解+柱式"(逐音听清三音)，训练场/测验只播柱式(更难)
    return {kind:"choice",concept,qtype:"v→V · 单和弦听辨",
      prompt:`听这个 ${mn} 小调的第 5 级和弦${state.flow==="level"?"(先逐个音分解，再合奏)":""}：它是<b>自然的小 v</b>，还是<b>魔改的大 V</b>？`,
      play:()=>{ const ch=minDegChords([isV?"V":"5"], mn)[0];
        if(state.flow==="level") playSemis(ch,60,true);   // 分解后柱式，门槛友好
        else playChordSeq([ch]); },                        // 测试区：只齐奏
      options:[
        {label:"自然的小 v", sub:"柔软、暗", correct:!isV},
        {label:"魔改的大 V", sub:"明亮、紧、带劲", correct:isV},
      ],
      explain: isV?`三音是升过的——明亮带劲，这是<b>大 V</b>。`:`三音没升——柔软发暗，这是自然的<b>小 v</b>。`};
  }
  if(concept==="harmonic_resolve"){ // 原理：为什么要魔改
    return {kind:"choice",concept,qtype:"和声小调 · 为什么魔改",
      prompt:`自然小调的第 5 级是小三和弦(v)。为什么古典与流行都常把它<b>强行改成大三和弦/属七(V、V7)</b>？`,
      play:()=>playChordSeq(minDegChords(["5","1h","V7","1h"], mn)), // 软/硬两种解决都向上落到高位 i
      options:[
        {label:"为了造出导音，获得强烈的解决/回家感", sub:"升高第 7 音，紧贴主音", correct:true},
        {label:"为了让音乐更忧郁", correct:false},
        {label:"小和弦在钢琴上不好按", correct:false},
        {label:"乐理规定小调不能用小和弦", correct:false},
      ],
      explain:`自然 v 没有<b>导音</b>，拉不回家；升高第 7 音后 V/V7 里有了导音(还有三全音)，"句号感"立刻拉满——这就是<b>和声小调</b>的来历。`};
  }
  if(concept==="notation"){ // 第三步：大小写记号
    const v=Math.random();
    if(v<0.34){
      return {kind:"choice",concept,qtype:"记号 · V7 指谁",
        prompt:`<b>${mn} 小调</b>的谱子上写着 <b>V7</b>，它指哪个和弦？`,
        play:()=>playChordSeq(minDegChords(["V7","1h"], mn)),
        options:uniqPick(MKEY_LIST.map(k=>sharp(NOTE_NAMES[(MKEYS[k].root+7)%12])+"7").concat([dName+"m7"]), dName+"7", 4).map(n=>({label:n,correct:n===dName+"7"})),
        explain:`${mn} 小调第 5 级音是 ${dName}；<b>大写 V</b>+7 = 以它为根音的<b>属七</b>：${dName}7(含升出来的导音)。`};
    }
    if(v<0.67){
      const isBig=Math.random()<0.5;
      const chordName=isBig?dName:dName+"m";
      return {kind:"choice",concept,qtype:"记号 · 该写大写还是小写",
        prompt:`在 <b>${mn} 小调</b>里出现了和弦 <b>${chordName}</b>(${isBig?"大":"小"}三和弦)。按罗马数字规则它应记作？`,
        play:()=>playChordSeq(minDegChords([isBig?"V":"5"], mn)),
        options:[
          {label:"V（大写）", sub:"大写=大三和弦", correct:isBig},
          {label:"v（小写）", sub:"小写=小三和弦", correct:!isBig},
          {label:"VII", correct:false},
          {label:"5", correct:false},
        ],
        explain:`${chordName} 是${isBig?"大":"小"}三和弦，按"大写=大、小写=小"记作 <b>${isBig?"V":"v"}</b>。${isBig?"看到大写 V 就知道：这里用了和声小调的魔改。":"小写 v 说明还是自然小调的原装货。"}`};
    }
    return {kind:"choice",concept,qtype:"记号 · 大小写的含义",
      prompt:`小调谱子里把魔改后的属和弦写成<b>大写的 V</b>，为什么用大写？`,
      options:[
        {label:"罗马数字规则：大写=大三和弦", sub:"它真的从小三变成了大三", correct:true},
        {label:"因为它最重要，所以写大", correct:false},
        {label:"因为它音量更大", correct:false},
        {label:"只是排版习惯", correct:false},
      ],
      explain:`大小写忠实反映和弦性质：升第 7 音让第 5 级<b>真的变成了大三和弦</b>，所以从小写 v 改记大写 <b>V</b>(加七度则 V7)。`};
  }
  if(concept==="hear"){
    const useV7=Math.random()<0.5;
    return {kind:"choice",concept,qtype:"听辨 · 寻找最强句号",
      prompt:`听这段小调结尾(${mn} 小调)：它用的是<b>自然的 v</b>(软)，还是<b>魔改的 V7</b>(戏剧张力·强解决)？`,
      play:()=>playChordSeq(minDegChords(useV7?["1","4","V7","1h"]:["1","4","5","1h"], mn)), // 末尾 i 在高位，引力差清晰可听
      options:[
        {label:"自然的 v → i", sub:"暗淡、没有强烈结束感", correct:!useV7},
        {label:"魔改的 V7 → i", sub:"宿命感、强烈句号", correct:useV7},
      ],
      explain: useV7?`第三个和弦里有<b>导音和三全音</b>那股"扎劲"——是 <b>V7</b>，解决到 i 干脆有力。`:`第三个和弦软软的、没有刺——是自然的 <b>v</b>，结束感弱。`};
  }
  if(concept==="cad"){
    if(Math.random()<0.5){
      return {kind:"choice",concept,qtype:"小调终止 · 标准句号",
        prompt:`古典与爵士里，<b>小调的标准终止式</b>是哪一个？`,
        play:()=>playChordSeq(minDegChords(["1","4","V7","1h"], mn)),
        options:[
          {label:"i – iv – V7 – i", sub:"V7 带导音，强解决", correct:true},
          {label:"i – iv – v – i", sub:"全自然，软", correct:false},
          {label:"i – VI – III – VII", sub:"那是循环套路，不收尾", correct:false},
          {label:"I – IV – V – I", sub:"那是大调的", correct:false},
        ],
        explain:`小调标准终止 = <b>i–iv–V7–i</b>(${mn} 小调：${minChordName(mn,1)}–${minChordName(mn,4)}–${dName}7–${minChordName(mn,1)})。V7 的导音负责"句号"。`};
    }
    return {kind:"choice",concept,qtype:"小调终止 · 认出魔改和弦",
      prompt:`进行 <b>Am – Dm – E7 – Am</b>(A 小调)里，<b>E7</b> 扮演什么角色？`,
      play:()=>playChordSeq(minDegChords(["1","4","V7","1h"],"A")),
      options:[
        {label:"魔改的属七 V7（升了导音 G♯）", sub:"和声小调的产物", correct:true},
        {label:"自然顺阶的第 5 级", sub:"自然第5级应是 Em", correct:false},
        {label:"从别的调借来的下属", correct:false},
        {label:"主和弦的替身", correct:false},
      ],
      explain:`A 自然小调第 5 级本是 Em；E7(E G♯ B D)把 G 升成了 <b>G♯(导音)</b>——它就是和声小调的 <b>V7</b>，专职强力回家。`};
  }
  // buildv7：搭建任意小调的 V7
  const pcs=[dRoot,(dRoot+4)%12,(dRoot+7)%12,(dRoot+10)%12];
  return {kind:"build",concept,qtype:"和声小调 · 搭出 V7",
    prompt:`在键盘上搭出 <b>${mn} 小调的 V7</b>：以 <b>${dName}</b> 为根音的<b>属七和弦</b>(1 3 5 ♭7，共 4 个音，含升高的导音，不限八度)。`,
    play:()=>playSemis(fitSemis([dRoot,dRoot+4,dRoot+7,dRoot+10]),60,true),
    targetPC:pcs, rootSemi:dRoot,
    explain:`${mn} 小调的 V7 = <b>${dName}7</b>(${pcs.map(p=>sharp(NOTE_NAMES[p])).join(" ")})。其中 ${sharp(NOTE_NAMES[(dRoot+4)%12])} 就是被升高的导音。`};
}

/* ---- 第18关 小调金曲走向与鉴赏 ---- */
const MPROGS=[
  {name:"i–VI–III–VII", toks:["1","6","3","7"], mood:"暗黑、史诗、电音感(动漫/EDM 标配)", eg:"Am–F–C–G"},
  {name:"i–VII–VI–V7",  toks:["1","7","6","V7"], mood:"宿命、弗拉门戈、低音下台阶", eg:"Am–G–F–E7"},
  {name:"i–iv–V7–i",    toks:["1","4","V7","1h"], mood:"古典句号、戏剧解决", eg:"Am–Dm–E7–Am"},
  {name:"VI–VII–i",     toks:["6","7","1"], mood:"上行冲锋、燃(进副歌的助跑)", eg:"F–G–Am"},
  {name:"i–VII–VI–VII", toks:["1","7","6","7"], mood:"夜车徘徊、synthwave、到不了头", eg:"Am–G–F–G"},
  {name:"i–iv–VII–III", toks:["1","4","7","3"], mood:"五度圈、顺流而下的叙事(根音逐次降五度)", eg:"Am–Dm–G–C"},
];
function q_minprog(concept){
  const mn=rand(MKEY_LIST);
  if(concept==="prog"){
    const p=rand(MPROGS);
    const opts=shuffle([p, ...shuffle(MPROGS.filter(x=>x.name!==p.name)).slice(0,3)]) // 6 个套路里取 4 个选项
      .map(x=>({label:x.name, sub:x.mood, correct:x.name===p.name}));
    return {kind:"choice",concept,qtype:"小调走向 · 听辨认套路",
      prompt:`盲听这段小调进行(${mn} 小调)：它是哪个走向？`,
      play:()=>playChordSeq(minDegChords(p.toks, mn)),
      options:opts,
      explain:`这是 <b>${p.name}</b>(A 小调示例：${p.eg})——${p.mood}。`};
  }
  if(concept==="modehear"){
    const isMinor=Math.random()<0.5;
    let play, ans;
    if(isMinor){ const p=rand(MPROGS.filter((_,i)=>i!==2)); play=()=>playChordSeq(minDegChords(p.toks, mn)); ans=p.name; }
    else { const p=rand(POPP); play=()=>playChordSeq(kdegChords(p.degs.map(String), rand(RKEY_LIST))); ans=p.rn; }
    return {kind:"choice",concept,qtype:"听辨 · 大调套路还是小调套路",
      prompt:"盲听这段进行：它属于阳光开阔的<b>大调</b>世界，还是暗黑深沉的<b>小调</b>世界？",
      play,
      options:[
        {label:"大调世界（明亮）", sub:"如 1564、4536", correct:!isMinor},
        {label:"小调世界（暗黑）", sub:"如 i–VI–III–VII、史诗下行", correct:isMinor},
      ],
      explain: isMinor?`落点的"家"是小和弦——这是小调套路 <b>${ans}</b>。`:`落点的"家"亮堂——这是大调套路 <b>${ans}</b>。`};
  }
  if(concept==="mood"){
    const pool=[
      {kind:"maj", degs:["1","5","6","4"], label:"阳光、开阔、万能 BGM", name:"1564(大调)"},
      {kind:"maj", degs:["4","5","3","6"], label:"深情、遗憾、华语抒情", name:"4536(大调)"},
      {kind:"min", toks:["1","6","3","7"], label:"暗黑、史诗、电音感", name:"i–VI–III–VII(小调)"},
      {kind:"min", toks:["1","7","6","V7"], label:"宿命、弗拉门戈、下行", name:"史诗下行(小调)"},
    ];
    const p=rand(pool);
    return {kind:"choice",concept,qtype:"鉴赏 · 情绪配对",
      prompt:"盲听这段进行，它最贴近哪种情绪气质？",
      play:()=> p.kind==="maj" ? playChordSeq(kdegChords(p.degs, rand(RKEY_LIST))) : playChordSeq(minDegChords(p.toks, mn)),
      options:pool.map(x=>({label:x.label, correct:x===p})),
      explain:`这是 <b>${p.name}</b>：${p.label}。`};
  }
  // flip：视角翻转
  const endC=Math.random()<0.5;
  return {kind:"choice",concept,qtype:"鉴赏 · 视角翻转",
    prompt:`同一组和弦 <b>Am–F–C–G</b> 绕圈，最后乐句落回了${endC?"<b>C</b>":"<b>Am</b>"}。你的耳朵应该把它听成？`,
    play:()=>playChordSeq(SEQS[endC?"flipMaj":"flipMin"]),
    options:[
      {label:"大调的 6415（家=C，怀旧明亮）", correct:endC},
      {label:"小调的 i–VI–III–VII（家=Am，忧郁史诗）", correct:!endC},
    ],
    explain:`音一个没变，<b>落回谁、谁就是家</b>：落回 ${endC?"C → 大调 6415":"Am → 小调 i–VI–III–VII"}。这就是"关系大小调共用一批和弦"的实战体现。`};
}

/* ---- 第19关 离调借用 ---- */
// 三个借用案例的数据：iv 催泪 / ♭VII 豁达 / ♭VI 史诗
const BORROWS=[
  {name:"iv (Fm)",  chord:[5,8,12],  alien:"A♭", alienOpts:["A♭","F","C","G"], feel:"催泪、心碎",
   yes:"borrowYes", no:"borrowNo", yesTxt:"C→F→<b>Fm</b>→C，色彩在 Fm 处转暗", noTxt:"C→F→G→C 全程明亮",
   hearQ:`听这段 C 大调进行，有没有用到"催泪"的四级小和弦(iv = Fm)？`, hearYes:"用了（中间色彩突然转暗）", hearNo:"没用（全程明亮）"},
  {name:"♭VII (B♭)", chord:[-2,2,5], alien:"B♭", alienOpts:["B♭","D","F","C"], feel:"豁达、摇滚",
   yes:"bVIIyes", no:"bVIIno", yesTxt:"C→<b>B♭</b>→F→C，第二拍敞开一扇门", noTxt:"C→G→F→C 全是调内和弦",
   hearQ:`听这段 C 大调进行，有没有借用那个"豁达摇滚"的降七级(♭VII = B♭)？`, hearYes:"借了（有一拍突然敞亮、不催促）", hearNo:"没借（规规矩矩的调内进行）"},
  {name:"♭VI (A♭)", chord:[8,12,15], alien:"A♭", alienOpts:["A♭","C","F","G"], feel:"史诗、凯旋",
   yes:"bVIyes", no:"bVIno", yesTxt:"<b>A♭</b>→B♭→C，两步全踩调外、爬上主音", noTxt:"F→G→C 安稳的调内收束",
   hearQ:`听这段收束，它是调内的 IV–V–I，还是借来的"史诗上行"(♭VI–♭VII–I)？`, hearYes:"史诗上行（凯旋、异世界感）", hearNo:"调内收束（安稳正常）"},
];
function q_borrow(concept){
  const B=rand(BORROWS);
  if(concept==="alien"){
    return {kind:"choice",concept,qtype:"离调 · 揪出调外音",
      prompt:`在 <b>C 大调</b>(全白键)里借用 <b>${B.name}</b>。下列哪个音是 C 大调原本<b>没有</b>的"调外音"？`,
      play:()=>playSemis(B.chord,60,true),
      options:B.alienOpts.map(n=>({label:n,correct:n===B.alien})),
      explain:`${B.name} 里的 <b>${B.alien}</b> 不在 C 大调里——正是它带来"${B.feel}"的色彩。(借来的和弦必含降下来的 3/6/7 级音。)`};
  }
  if(concept==="hear"){
    const yes=Math.random()<0.5;
    return {kind:"choice",concept,qtype:"离调 · 听辨借用",
      prompt:B.hearQ,
      play:()=>playChordSeq(SEQS[yes?B.yes:B.no]),
      options:[{label:B.hearYes,correct:yes},{label:B.hearNo,correct:!yes}],
      explain:yes?`${B.yesTxt}——这就是 ${B.name} 的"${B.feel}"。`:`${B.noTxt}，没有借用。`};
  }
  // fill：按目标情绪选对借用和弦
  const v=Math.random();
  if(v<0.34){
    return {kind:"choice",concept,qtype:"离调 · 按情绪选和弦",
      prompt:`想让结尾"催泪、有余味"：<b>F(四级) → [ ? ] → C(一级)</b>，填哪个最戳心？`,
      play:()=>playChordSeq([[5,9,12],[0,4,7]]),
      options:shuffle([{label:"Fm（借来的 iv）",correct:true},{label:"G（调内五级）",correct:false},{label:"B♭（借来的 ♭VII）",sub:"那是豁达，不是眼泪",correct:false},{label:"Am（调内六级）",correct:false}]),
      explain:`答案是 <b>Fm</b>：F → Fm → C（4–4m–1）是"流行乐的催泪弹"。同是借用，B♭ 给的是豁达——借谁味道就是谁。`};
  }
  if(v<0.67){
    return {kind:"choice",concept,qtype:"离调 · 按情绪选和弦",
      prompt:`想要"体育场摇滚的豁达"：<b>C(一级) → [ ? ] → F(四级)</b>，循环里填哪个？`,
      play:()=>playChordSeq([[0,4,7],[5,9,12]]),
      options:shuffle([{label:"B♭（借来的 ♭VII）",correct:true},{label:"Fm（借来的 iv）",sub:"那是眼泪，不是豁达",correct:false},{label:"G（调内五级）",sub:"会变紧张想回家",correct:false},{label:"Em（调内三级）",correct:false}]),
      explain:`答案是 <b>B♭</b>：I–♭VII–IV(C→B♭→F)没有导音、不催促——豁达敞亮的摇滚国歌味。`};
  }
  return {kind:"choice",concept,qtype:"离调 · 按情绪选和弦",
    prompt:`想要"最终关卡通关"的凯旋收束：<b>[ ? ] → B♭ → C</b>，第一格填哪个？`,
    play:()=>playChordSeq([[10,14,17],[12,16,19]]),
    options:shuffle([{label:"A♭（借来的 ♭VI）",correct:true},{label:"F（调内四级）",sub:"那是安稳的 IV–V–I",correct:false},{label:"Fm（借来的 iv）",sub:"方向是变暗，不是凯旋",correct:false},{label:"Am（调内六级）",correct:false}]),
    explain:`答案是 <b>A♭</b>：♭VI–♭VII–I(A♭→B♭→C)低音逐级爬上主音——游戏/电影的"胜利公式"。`};
}

let buildSel=new Set();
function renderQuestion(){
  const isLevel = state.flow==="level";
  const p = isLevel ? moduleProgress(state.moduleId) : null;
  const panel=document.getElementById("quizpanel");
  let body="";
  if(cur.kind==="choice"){
    body = `<div class="opts" id="opts">` + cur.options.map((o,i)=>
      `<button class="opt" data-i="${i}"><span>${o.label}</span>${o.sub?`<span class="sub">${o.sub}</span>`:""}</button>`
    ).join("") + `</div>`;
  } else { // build
    buildSel=new Set(cur.preSelect||[]); // 可预选起始音
    body = `<div class="buildbar">
        <button class="submitb" id="submitBuild">提交答案</button>
        <button class="clearb" id="clearBuild">清空</button>
        <span class="selnotes" id="selnotes">已选：—</span>
      </div>`;
  }
  const qhead = isLevel
    ? `<div class="qhead"><span class="qtype">${cur.qtype}</span><div class="prog"><i style="width:${p.pct}%"></i></div><span class="cnt">掌握 ${p.done}/${p.total}</span></div>`
    : `<div class="qhead"><span class="qtype">${cur.qtype}</span></div>`;
  panel.innerHTML = `
    ${qhead}
    <div class="qprompt">${cur.prompt}</div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center">
      <button class="playbtn" id="playq">🔊 播放声音</button>
      <button class="playbtn small" id="replayq">🔁 再听一次</button>
      <button class="playbtn small" id="skipq">🎲 换一题</button>
    </div>
    ${body}
    <div class="feedback" id="fb"></div>
    <button class="playbtn next" id="nextq">下一题 →</button>
  `;
  showDock(cur.kind==="build"); // 底部悬浮键盘
  const doPlay=()=>{ cur.play(); if(cur.flashStart) startHintBlink(cur.flashStart); }; // 播放后才提示起始音
  document.getElementById("playq").onclick=doPlay;
  document.getElementById("replayq").onclick=doPlay;
  document.getElementById("skipq").onclick=()=>{ advanceQuestion(); };
  // 一律不自动播放：等用户按"播放声音 / 再听一次"再响

  if(cur.kind==="choice"){
    document.querySelectorAll("#opts .opt").forEach(b=>{
      b.onclick=()=>answerChoice(+b.dataset.i, b);
    });
  } else {
    document.getElementById("submitBuild").onclick=submitBuild;
    document.getElementById("clearBuild").onclick=()=>{ buildSel.clear(); updateBuildUI(); };
    updateBuildUI();
  }
  document.getElementById("nextq").onclick=()=>{ document.getElementById("nextq").classList.remove("show"); advanceQuestion(); };
}

function answerChoice(i, btn){
  const opt=cur.options[i];
  const wrap=document.getElementById("opts"); if(wrap) wrap.classList.add("revealsubs"); // 作答后才显示选项小字
  document.querySelectorAll("#opts .opt").forEach((b,j)=>{
    b.disabled=true;
    if(cur.options[j].correct) b.classList.add("correct");
  });
  if(!opt.correct) btn.classList.add("wrong");
  finishAnswer(opt.correct);
}

function submitBuild(){
  let correct;
  if(cur.targetMidis){ // 形状比对：音的相对关系须完全一致，但整体移高/低若干个八度也算对(题目没指定具体哪个八度)
    const sel=[...buildSel].sort((a,b)=>a-b);
    const tgt=[...cur.targetMidis].sort((a,b)=>a-b);
    if(sel.length===tgt.length && sel.length>0){
      const d=sel[0]-tgt[0];
      correct = (d%12===0) && sel.every((v,k)=>v===tgt[k]+d);
    } else correct=false;
  } else { // 按音级比对（高低八度同名音只算一次）
    const sel=[...new Set([...buildSel].map(m=>m%12))].sort((a,b)=>a-b);
    const tgt=[...new Set(cur.targetPC)].sort((a,b)=>a-b);
    correct = sel.length===tgt.length && sel.every((v,k)=>v===tgt[k]);
    // 斜杠和弦：还要求最低音(最左/最低的键)是指定 bass
    if(correct && cur.bassPc!=null){
      const lowest = Math.min(...[...buildSel]);
      if(lowest%12 !== cur.bassPc){
        correct=false; cur._bassWrong=true; // 供反馈提示
      }
    }
  }
  document.getElementById("submitBuild").disabled=true;
  document.getElementById("clearBuild").disabled=true;
  // 只保留用户按过的键(绿色选中)，不再点亮所有同音级琴键，避免满屏彩色
  finishAnswer(correct);
}

function finishAnswer(correct){
  const fb=document.getElementById("fb");
  // 斜杠和弦：最低音按错时的专门提示
  const exTxt = (!correct && cur._bassWrong) ? ('<b style="color:var(--p1)">注意！斜杠右边才是最低音(bass)——你最低/最左的那个键按错了。</b><br>'+cur.explain) : cur.explain;
  cur._bassWrong=false;
  // 训练场练习：不计分，只给反馈
  if(state.flow==="prac"){
    fb.className="feedback "+(correct?"good":"bad")+" show";
    fb.innerHTML = correct ? `<div class="t">✅ 答对了</div><div>${exTxt}</div>` : `<div class="t">❌ 看看解析</div><div>${exTxt}</div>`;
    if(correct) confetti();
    document.getElementById("nextq").classList.add("show");
    return;
  }
  // 训练场测试：记分，不影响闯关掌握度
  if(state.flow==="test"){
    const s=state.score; s.total++;
    if(correct){ s.correct++; s.streak++; s.best=Math.max(s.best,s.streak); addXp(6); confetti(); }
    else { s.streak=0; }
    // 按类别记账，供成绩单
    const cat = cur.cat || state.train.cat;
    if(cat){ const bc = s.byCat[cat] || (s.byCat[cat]={correct:0,total:0}); bc.total++; if(correct) bc.correct++; }
    if(s.byDim){ const dim=dimOf(cur); const bd = s.byDim[dim] || (s.byDim[dim]={correct:0,total:0}); bd.total++; if(correct) bd.correct++; }
    updateScoreBar();
    fb.className="feedback "+(correct?"good":"bad")+" show";
    fb.innerHTML = correct
      ? `<div class="t">✅ 正确！+6 经验</div><div>${cur.explain}</div>`
      : `<div class="t">❌ 不对</div><div>${exTxt}</div>`;
    document.getElementById("nextq").classList.add("show");
    return;
  }
  const mId=state.moduleId, concept=cur.concept, ms=state.mastery[mId];
  if(correct){
    ms[concept]=Math.min(MASTERY_TARGET, (ms[concept]||0)+1);
    addXp(10);
    fb.className="feedback good show";
    fb.innerHTML=`<div class="t">✅ 答对了！+10 经验</div><div>${exTxt}</div>`;
    confetti();
  } else {
    ms[concept]=0; // 答错重置，会更频繁回来
    fb.className="feedback bad show";
    fb.innerHTML=`<div class="t">❌ 再听一次～这个会再回来考你</div><div>${exTxt}</div>`;
  }
  // 更新进度条
  const p=moduleProgress(mId);
  document.querySelector(".qhead .prog > i").style.width=p.pct+"%";
  document.querySelector(".qhead .cnt").textContent=`掌握 ${p.done}/${p.total}`;
  document.getElementById("nextq").classList.add("show");
  if(p.pct===100){
    document.getElementById("nextq").textContent="🎉 完成本关 →";
  }
}

function seg(id, opts, cur){

function bindSeg(id, cb){
  const el=document.getElementById(id); if(!el) return;
  el.querySelectorAll("button").forEach(b=> b.onclick=()=>{
    el.querySelectorAll("button").forEach(x=>x.classList.remove("on"));
    b.classList.add("on"); cb(b.dataset.v);
  });
}
function renderTraining(){
  window.scrollTo(0,0); hideDock();

// 生成一道和弦题（forceBuild=锁定单一和弦时用搭建题）
function makeChordQuestion(cat, concept, forceBuild){
  const c=CHORDS[concept];
  const maxIv=Math.max(...c.iv);
  const root=Math.floor(Math.random()*(PIANO_HIGH-60-maxIv+1)); // 0..范围(以 C4 为基准)，保证落在键盘内
  const OPTS = cat==="triad"?TRIAD_OPTS:SEV_OPTS;
  const mode = forceBuild ? "build" : rand(["listen","color","build"]);
  if(mode==="build"){
    return {kind:"build", concept, qtype:"搭建 · "+TRAIN_CATS[cat].title,
      prompt:`在键盘上搭出 <b>${sharp(NOTE_NAMES[root%12])}</b> 为根音的 <b>${c.name}</b>（${c.jian}）。`,
      play:()=>playSemis(c.iv.map(x=>x+root),60,true),
      targetPC:c.iv.map(x=>(x+root)%12), rootSemi:root%12,
      explain:`${c.name} = ${c.jian}，半音结构 ${c.iv.join("-")}；色彩：${c.color}。`};
  }
  if(mode==="color"){
    return {kind:"choice", concept, qtype:"色彩匹配",
      prompt:"听这个和弦，它给你的感觉最接近？",
      play:()=>playSemis(c.iv.map(x=>x+root),60,true),
      options:OPTS.map(o=>({label:o.sub,sub:o.label,correct:o.t===concept})),
      explain:`这是 <b>${c.name}</b>，色彩：${c.color}。`};
  }
  return {kind:"choice", concept, qtype:"听辨 · "+TRAIN_CATS[cat].title,
    prompt:"听这个和弦，它是哪一种？",
    play:()=>playSemis(c.iv.map(x=>x+root),60,true),
    options:OPTS.map(o=>({label:o.label,sub:o.sub,correct:o.t===concept})),
    explain:`这是 <b>${c.name}</b>（${c.jian}），${c.color}。`};
}
// 音程题（4选1听辨）
function makeIntervalQuestion(concept){
  const iv=INTERVALS[concept].iv;
  const base=60+Math.floor(Math.random()*(PIANO_HIGH-60-iv+1));
  return {kind:"choice", concept, qtype:"听辨 · 音程",
    prompt:"听这两个音（先后弹出），它们是什么音程？",
    play:()=>{ ivLast={base, t:Date.now()}; playSemis([0,iv], base, true, "2n", {stack:false, gap:0.45}); },
    options:INTERVAL_OPTS.map(o=>({label:o.label,sub:o.sub,correct:o.t===concept})), // 固定左小右大

    explain:`这是 <b>${INTERVALS[concept].name}</b>（相差 ${iv} 个半音）：${INTERVALS[concept].color}。`};
}
// 调内和弦题（判断该级和弦类型）
function makeDiatonicQuestion(concept){
  const deg=+concept.slice(1); const d=DIATONIC[deg-1]; const c=CHORDS[d.type];
  return {kind:"choice", concept, qtype:"调内和弦",
    prompt:`在 <b>C 大调</b>里，第 <b>${deg}</b> 级（${NOTE_NAMES[d.root]}，${SCALE_DEG_NAME[deg]}）的三和弦是哪种？`,
    play:()=>playSemis(c.iv.map(x=>x+d.root),60,true),
    options:[ // 固定排列：大 → 小 → 减
      {label:"大三和弦",sub:"明亮（I IV V）",correct:d.type==="maj"},
      {label:"小三和弦",sub:"柔和（ii iii vi）",correct:d.type==="min"},
      {label:"减三和弦",sub:"紧张（vii°）",correct:d.type==="dim"},
    ],
    explain:`第${deg}级是 <b>${d.rn} = ${NOTE_NAMES[d.root]}${c.name}</b>。口诀：大小小大大小减。`};
}
// 按分类类型分发出题
function makeTrainQuestion(cat, concept, forceBuild){
  const t=TRAIN_CATS[cat].type;
  if(t==="chord") return makeChordQuestion(cat, concept, forceBuild);
  if(t==="interval") return makeIntervalQuestion(concept);
  if(t==="diatonic") return makeDiatonicQuestion(concept);
  return buildQuestion(cat, concept); // 其它模块直接复用其自身出题器
}
// 各模块每个计分点(概念)的中文标签/副标题——训练场可逐项锁定练习

// 选项卡上每个具体项的标题/副标题
function trainChipLabel(cat,c){
  const m=TRAIN_SPEC_LABELS[cat]; if(m&&m[c]) return m[c][0];
  const t=TRAIN_CATS[cat].type;
  if(t==="chord") return CHORDS[c].name;
  if(t==="interval") return INTERVALS[c].name;
  const deg=+c.slice(1); return `第${deg}级 ${DIATONIC[deg-1].rn}`;
}
function trainChipSub(cat,c){
  const m=TRAIN_SPEC_LABELS[cat]; if(m&&m[c]) return m[c][1];
  const t=TRAIN_CATS[cat].type;
  if(t==="chord") return CHORDS[c].mood;
  if(t==="interval") return INTERVALS[c].color.split("（")[0];
  const deg=+c.slice(1); const d=DIATONIC[deg-1]; return NOTE_NAMES[d.root]+" · "+CHORDS[d.type].name;
}
// 练习卡片描述（含要点亮的琴键与播放方式）
function practiceItem(cat, concept){
  const t=TRAIN_CATS[cat].type;
  if(t==="interval"){
    const iv=INTERVALS[concept].iv;
    const base=Math.floor(Math.random()*(PIANO_HIGH-60-iv+1));
    return {title:"音程 · 认识声音", name:INTERVALS[concept].name, jian:`相差 ${iv} 个半音`,
      meta:INTERVALS[concept].color, midis:[60+base,60+base+iv], semis:[0,iv], base:60+base, melodic:true};
  }
  if(t==="diatonic"){
    const deg=+concept.slice(1); const d=DIATONIC[deg-1]; const c=CHORDS[d.type];
    return {title:"调内和弦 · 认识声音", name:`${d.rn} = ${NOTE_NAMES[d.root]} ${c.name}`,
      jian:`第 ${deg} 级（${SCALE_DEG_NAME[deg]}）`, meta:`色彩：${c.color}`,
      midis:c.iv.map(x=>x+60+d.root), semis:c.iv.map(x=>x+d.root)};
  }
  const c=CHORDS[concept]; const maxIv=Math.max(...c.iv);
  const root=Math.floor(Math.random()*(PIANO_HIGH-60-maxIv+1));
  return {title:TRAIN_CATS[cat].title+" · 认识声音", name:`${sharp(NOTE_NAMES[root%12])} ${c.name}`,
    jian:c.jian, meta:`色彩：${c.color}<br>构成(半音)：${c.iv.join(" - ")}`,
    midis:c.iv.map(x=>x+60+root), semis:c.iv.map(x=>x+root)};
}
function pickTrainConcept(){
  const {cat,pick}=state.train;
  if(pick!=="all") return pick;
  const pool=TRAIN_CATS[cat].concepts;
  return state.weightMode==="real" ? weightedPick(pool, c=>FREQ[cat][c]||1) : rand(pool);
}

function startTest(){
  state.flow="test"; autoplay=false;
  state.score={correct:0,total:0,streak:0,best:0,byCat:{},byDim:{}};
  const {cat,pick}=state.train;
  state.testLabel = state.train.comprehensive ? "综合测验 · 全部类别混合"
    : (pick==="all" ? ("全部"+TRAIN_CATS[cat].title+"（随机）") : trainChipLabel(cat,pick));

function resumeTest(){ buildTestScreen(); renderQuestion(); }
const DIM_DESC={"听辨":"用耳朵听出和弦/音程/进行","识谱":"看符号/调号知道是什么","搭建":"在键盘上把音按出来","分析":"级数/功能/调内分析","移调":"把进行换到别的调"};
function dimOf(q){
  if(!q) return "听辨";
  if(q.kind==="build") return "搭建";
  const t=q.qtype||"";
  if(t.includes("移调")) return "移调";
  if(/罗马数字|调内和弦|功能判断|级数转和弦|揪出|填出/.test(t)) return "分析";
  if(/听辨|色彩|听音|盲听|悬空|心碎/.test(t)) return "听辨";
  return "识谱"; // 读符号/调号/级数关系等
}
function repBars(obj, labelFn){
  const rows=Object.entries(obj).map(([k,v])=>({title:labelFn(k), correct:v.correct, total:v.total, pct:v.total?Math.round(v.correct/v.total*100):0})).sort((a,b)=>a.pct-b.pct);
  if(!rows.length) return {html:`<p class="hint" style="text-align:center">还没有作答记录。</p>`, weak:null};
  const html=rows.map((r,i)=>`<div class="reprow ${i===0&&rows.length>1?'weak':''}">
       <span class="rn">${r.title}</span>
       <span class="rbar"><i style="width:${r.pct}%"></i></span>
       <span class="rp">${r.pct}% (${r.correct}/${r.total})</span>
     </div>`).join("");
  return {html, weak: rows.length>1?rows[0].title:null};
}
function renderReport(){
  window.scrollTo(0,0); hideDock();
  const s=state.score;
  const overall = s.total? Math.round(s.correct/s.total*100):0;
  const grade = overall>=90?"🌟 出色":overall>=75?"👍 不错":overall>=60?"🙂 及格":"💪 继续加油";
  const dimR = repBars(s.byDim||{}, k=>k+`<span style="font-weight:400;color:var(--muted);font-size:11px"> · ${DIM_DESC[k]||""}</span>`);
  const catR = repBars(s.byCat||{}, k=>TRAIN_CATS[k]?TRAIN_CATS[k].title:k);
  const dimWeak = dimR.weak ? `<p class="hint" style="text-align:center;margin-top:8px">最弱的能力是 <b style="color:var(--p1)">${dimR.weak}</b>——针对它多练练。</p>` : "";
  const catWeak = catR.weak ? `<p class="hint" style="text-align:center;margin-top:8px">最该加强的内容：<b style="color:var(--p1)">${catR.weak}</b>。</p>` : "";
  app.innerHTML=`
    <button class="back" id="backbtn">← 返回训练场</button>
    <div class="panel repcard">
      <div class="qtype">成绩单 · ${state.testLabel}</div>
      <div class="repbig">${overall}%</div>
      <div class="hint">共 ${s.total} 题，答对 ${s.correct} 题 · 最佳连击 ${s.best} · ${grade}</div>
    </div>
    <div class="panel">
      <div class="seclabel" style="margin-top:0">🧠 能力维度（看你是耳朵弱、还是理论弱、还是手生）</div>
      ${dimR.html}${dimWeak}
      <div class="seclabel">📚 各内容模块正确率</div>
      ${catR.html}${catWeak}
      <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:16px">
        <button class="playbtn" id="resumeBtn">继续测验 →</button>
        <button class="playbtn small" id="toTrain">返回训练场</button>
      </div>
    </div>`;
  document.getElementById("backbtn").onclick=renderTraining;
  document.getElementById("toTrain").onclick=renderTraining;
  document.getElementById("resumeBtn").onclick=()=>{ cur ? resumeTest() : (buildTestScreen(), nextTestQuestion()); };
}
function updateScoreBar(){
  const s=state.score; const el=document.getElementById("scorebar"); if(!el) return;
  const pct=s.total?Math.round(s.correct/s.total*100):0;
  el.innerHTML=`<span>答对 <b>${s.correct}/${s.total}</b>（${pct}%）</span>
    <span>连击 <b class="${s.streak>=3?'streakhot':''}">${s.streak}${s.streak>=3?' 🔥':''}</b></span>
    <span>最佳 <b>${s.best}</b></span>`;
}
// 综合测验：先随机选一个类别，再选其中一个概念
function pickComprehensive(){
  const cat = rand(Object.keys(TRAIN_CATS));
  const pool = TRAIN_CATS[cat].concepts;
  const concept = state.weightMode==="real" ? weightedPick(pool, c=>FREQ[cat][c]||1) : rand(pool);
  return {cat, concept};
}
function nextTestQuestion(){
  let q,sig,tries=0;
  do{
    let cat, concept, forceBuild;
    if(state.train.comprehensive){
      const sel=pickComprehensive(); cat=sel.cat; concept=sel.concept; forceBuild=false;
    } else {
      cat=state.train.cat; concept=pickTrainConcept();
      forceBuild = TRAIN_CATS[cat].type==="chord" && state.train.pick!=="all"; // 锁定单一和弦→搭建题
    }
    q = makeTrainQuestion(cat, concept, forceBuild);
    q.cat = cat;
    sig = cat+"|"+q.concept+"|"+q.qtype; tries++;
  } while(sig===lastSig && tries<12);
  lastSig=sig; cur=q; renderQuestion();
}

/* ---- 练习（熟悉声音，不评分） ---- */
function startPractice(){
  window.scrollTo(0,0);
  const {cat,pick}=state.train;
  const t=TRAIN_CATS[cat].type;
  // 声音类(音程/和弦/调内)用卡片式"认识声音"练习；其余模块用做题式练习(不计分)
  if(!["chord","interval","diatonic"].includes(t)){

      <div class="panel" id="quizpanel"></div>`;
    document.getElementById("backbtn").onclick=renderTraining;
    nextPracQuestion();

  }
  state.flow="practice"; autoplay=false;

    </div>
    <div class="panel" id="quizpanel"></div>`;

function nextPracQuestion(){
  let q,sig,tries=0;
  do{
    const cat=state.train.cat, concept=pickTrainConcept();
    q=makeTrainQuestion(cat, concept, false); q.cat=cat;
    sig=cat+"|"+q.concept+"|"+q.qtype; tries++;
  } while(sig===lastSig && tries<12);
  lastSig=sig; cur=q; renderQuestion();
}
function nextPractice(){
  const {cat}=state.train;
  let concept,tries=0;
  do{ concept=pickTrainConcept(); tries++; }
  while(state.train.pick==="all" && concept===lastSig && tries<12);
  lastSig=concept;
  const it=practiceItem(cat, concept);
  const panel=document.getElementById("quizpanel");
  panel.innerHTML=`
    <div class="card-study">
      <div class="qtype">${it.title}</div>
      <div class="cname">${it.name}</div>
      <div class="cjian">${it.jian}</div>
      <div class="cmeta">${it.meta}</div>
    </div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:center;margin-top:12px">

      <button class="playbtn small" id="nextp">下一个 →</button>
    </div>`;
  showDock(false); // 底部悬浮键盘
  const play=async ()=>{
    if(it.melodic) await playSemis(it.semis, it.base, true, "2n", {stack:false, gap:0.45});
    else await playSemis(it.semis, 60, true);
    lightAlong("#piano"); // 先全熄，再随声音逐个点亮，齐奏后约2秒熄灭
  };
  document.getElementById("playq").onclick=play;
  document.getElementById("nextp").onclick=nextPractice;

}
function lightChord(midis){
  document.querySelectorAll('#piano .key').forEach(k=>k.classList.remove('reveal'));

// 统一的"下一题"：训练场测试 / 训练场练习 / 闯关
function advanceQuestion(){

  else if(state.flow==="prac") nextPracQuestion();

}

   钢琴键盘
   ============================================================ */
const PIANO_LOW=48, PIANO_HIGH=84; // C3..C6 三个八度：低八度主要给演示用(低音线/远调移调)，练习题仍以 C4..C6 为主
function renderPiano(buildMode){
  // 白键列表（用于黑键定位）
  let whites=[]; for(let m=PIANO_LOW;m<=PIANO_HIGH;m++){ if(![1,3,6,8,10].includes(m%12)) whites.push(m); }
  const wpct=100/whites.length;
  // 白键
  let pianoInner="";
  whites.forEach(m=>{ const pc=m%12;
    pianoInner+=`<div class="key w" data-m="${m}" data-pc="${pc}"><span class="jp">${JIANPU[pc]}</span><span class="nm">${sharp(NOTE_NAMES[pc])}${Math.floor(m/12)-1}</span></div>`; });
  // 黑键（绝对定位骑在白键缝上）：宽≈白键的60%(物理钢琴比例)，并按 2/3 分组向组外侧微偏
  const BK_SHIFT={1:-0.12, 3:0.12, 6:-0.15, 8:0, 10:0.15}; // 单位：白键宽
  let wIdx=0;
  for(let m=PIANO_LOW;m<=PIANO_HIGH;m++){
    const pc=m%12;
    if([1,3,6,8,10].includes(pc)){
      const left = wIdx*wpct - wpct*0.30 + BK_SHIFT[pc]*wpct;
      pianoInner+=`<div class="key b" data-m="${m}" data-pc="${pc}" style="left:${left}%;width:${wpct*0.60}%"><span class="jp">${JIANPU[pc]}</span><span class="nm">${sharp(NOTE_NAMES[pc])}${Math.floor(m/12)-1}</span></div>`;
    } else { wIdx++; }
  }
  return `<div class="pianowrap">
    <div class="lbl">
      <span>${buildMode?"🖱️ 点击琴键来选择（再点取消）":"🔊 点任意键听单音 · 上排=简谱 下排=音名"}</span>
      <button class="revealb" id="revealBtn">👁 揭示刚才的音</button>
    </div>
    <div class="piano" id="piano">${pianoInner}</div>
  </div>`;
}
function bindPiano(buildMode){
  document.querySelectorAll("#piano .key").forEach(k=>{
    const m=+k.dataset.m;
    // 按下立即出声+变色
    const press=(e)=>{
      e.preventDefault();
      playMidi(m);
      k.classList.add("lit");           // 按住期间保持高亮
      k.classList.remove("hintblink");  // 点过就停止闪烁
      if(buildMode){
        if(buildSel.has(m)){ buildSel.delete(m); } else { buildSel.add(m); }
        updateBuildUI();
      }
    };
    const release=()=>{ k.classList.remove("lit"); }; // 松开才恢复
    k.onpointerdown=press;
    k.onpointerup=release;
    k.onpointerleave=release;
    k.onpointercancel=release;
  });
  const rb=document.getElementById("revealBtn");
  if(rb) rb.onclick=revealLast;
}
// 底部悬浮键盘：在所有需要键盘的界面常驻，滚动时不移动
function showDock(buildMode){
  const d=document.getElementById("kbDock");
  d.innerHTML=renderPiano(buildMode);
  d.style.display="block";
  document.body.classList.add("hasdock");
  bindPiano(buildMode);
}
function hideDock(){
  stopLoop(); // 离开教学/答题界面时停止循环播放
  const d=document.getElementById("kbDock");
  d.style.display="none"; d.innerHTML="";
  document.body.classList.remove("hasdock");
}

// 把音符时值粗略换算成点亮时长(毫秒)；齐奏(1n)亮约2秒后熄灭
function durToMs(d){ return {"8n":340,"4n":620,"2n":1000,"1n":2000}[d] || 600; }
// 跟随 lastPlayed 的时间线点亮键盘(可指定哪一个键盘容器)：先全熄，再随每个音响起点亮、到时熄灭
function lightAlong(rootSel="#piano"){
  const root=document.querySelector(rootSel); if(!root) return;
  const clearAll=()=>root.querySelectorAll('.key').forEach(k=>k.classList.remove('reveal','lit'));
  const clearHint=()=>root.querySelectorAll('.key.hint').forEach(k=>k.classList.remove('hint'));
  clearAll();
  lastPlayed.forEach((ev,idx)=>{
    const at=Math.round(ev.t*1000);
    if(ev.hint){ // 黄色"当前和弦"提示：换和弦时整组切换，不参与逐音的熄灯节奏
      setTimeout(()=>{ clearHint();
        ev.midis.forEach(m=>{ const k=root.querySelector(`.key[data-m="${m}"]`); if(k) k.classList.add('hint'); });
      }, at);
      return;
    }
    setTimeout(clearAll, at);            // 每个音/和弦响起前先全熄
    setTimeout(()=>{                      // 稍后再点亮 → 共有音也会"重新亮一下"
      ev.midis.forEach(m=>{
        const exact=root.querySelector(`.key[data-m="${m}"]`);
        const keys = exact ? [exact] : [...root.querySelectorAll(`.key[data-pc="${m%12}"]`)];
        keys.forEach(k=>k.classList.add("reveal"));
      });
    }, at+70);
    if(idx===lastPlayed.length-1) setTimeout(()=>{ clearAll(); clearHint(); }, at+70+durToMs(ev.dur)); // 末尾全部熄灭
  });
}
// 讲解区静态键盘示意图：lo..hi 范围，marks={midi:类名} 给指定键上色(sel=音阶内/绿，hint=重点/黄)
// 只标音名(不标简谱避免重叠)；黑键全部标名(此处用降号名)；整体收窄居左
const FLAT_NAMES=["C","D♭","D","E♭","E","F","G♭","G","A♭","A","B♭","B"];
function renderMiniMap(lo, hi, marks){
  let whites=[]; for(let m=lo;m<=hi;m++){ if(![1,3,6,8,10].includes(m%12)) whites.push(m); }
  const wpct=100/whites.length; let inner="";
  whites.forEach(m=>{ const pc=m%12;
    inner+=`<div class="key w ${marks[m]||""}"><span class="nm">${NOTE_NAMES[pc]}</span></div>`; });
  let wIdx=0;
  for(let m=lo;m<=hi;m++){ const pc=m%12;
    if([1,3,6,8,10].includes(pc)){
      const sh={1:-0.12,3:0.12,6:-0.15,8:0,10:0.15}[pc];
      const left=wIdx*wpct - wpct*0.30 + sh*wpct;
      inner+=`<div class="key b ${marks[m]||""}" style="left:${left}%;width:${wpct*0.60}%"><span class="nm">${FLAT_NAMES[pc]}</span></div>`;
    } else wIdx++;
  }
  return `<div class="pianowrap minipw" style="max-width:560px"><div class="piano mini">${inner}</div></div>`;
}
// 讲解区迷你键盘（C4–C6，只标简谱）
function renderMiniPiano(id){
  let whites=[]; for(let mm=PIANO_LOW; mm<=PIANO_HIGH; mm++){ if(![1,3,6,8,10].includes(mm%12)) whites.push(mm); }
  const wpct=100/whites.length;
  let inner="";
  whites.forEach(mm=>{ const pc=mm%12; inner+=`<div class="key w" data-m="${mm}" data-pc="${pc}"><span class="jp">${JIANPU[pc]}</span></div>`; });
  let wIdx=0;
  for(let mm=PIANO_LOW; mm<=PIANO_HIGH; mm++){ const pc=mm%12;
    if([1,3,6,8,10].includes(pc)){ const sh={1:-0.12,3:0.12,6:-0.15,8:0,10:0.15}[pc]; const left=wIdx*wpct - wpct*0.30 + sh*wpct; inner+=`<div class="key b" data-m="${mm}" data-pc="${pc}" style="left:${left}%;width:${wpct*0.60}%"></div>`; }
    else wIdx++; }
  return `<div class="pianowrap minipw"><div class="piano mini" id="${id}">${inner}</div></div>`;
}
// 让起始音开始忽闪提示（已被选中的不闪）
function startHintBlink(midis){
  midis.forEach(mm=>{ const k=document.querySelector(`#piano .key[data-m="${mm}"]`); if(k && !buildSel.has(mm)) k.classList.add("hintblink"); });
}
function bindMiniKeys(id){
  document.querySelectorAll(`#${id} .key`).forEach(k=>{
    const m=+k.dataset.m;
    k.onpointerdown=(e)=>{ e.preventDefault(); playMidi(m); k.classList.add("lit"); };
    const off=()=>k.classList.remove("lit");
    k.onpointerup=off; k.onpointerleave=off; k.onpointercancel=off;
  });
}
// 大调音阶"全/半"台阶条
function renderScaleStrip(){
  const jn=["1","2","3","4","5","6","7","1"], cn=["C","D","E","F","G","A","B","C"], steps=["全","全","半","全","全","全","半"];
  let h='<div class="sstrip">';
  for(let i=0;i<8;i++){
    h+=`<div class="snote" id="sn${i}"><b>${jn[i]}</b><span>${cn[i]}</span></div>`;
    if(i<7) h+=`<div class="sstep ${steps[i]==="半"?"half":""}" id="sg${i}">${steps[i]}</div>`;
  }
  return h+'</div>';
}
function animateScaleStrip(gap=400){
  for(let i=0;i<8;i++){ const sn=document.getElementById("sn"+i); if(sn) sn.classList.remove("on"); }
  for(let i=0;i<7;i++){ const sg=document.getElementById("sg"+i); if(sg) sg.classList.remove("on"); }
  for(let i=0;i<8;i++){
    setTimeout(()=>{
      const sn=document.getElementById("sn"+i); if(sn) sn.classList.add("on");
      if(i>0){ const sg=document.getElementById("sg"+(i-1)); if(sg) sg.classList.add("on"); }
    }, i*gap);
  }
  setTimeout(()=>{
    for(let i=0;i<8;i++){ const sn=document.getElementById("sn"+i); if(sn) sn.classList.remove("on"); }
    for(let i=0;i<7;i++){ const sg=document.getElementById("sg"+i); if(sg) sg.classList.remove("on"); }
  }, 8*gap+900);
}
// 找到某个 midi 对应的琴键(优先精确音高，否则按音级匹配)
function keysForMidi(m){
  const exact=document.querySelector(`#piano .key[data-m="${m}"]`);
  if(exact) return [exact];
  return [...document.querySelectorAll(`#piano .key[data-pc="${m%12}"]`)];
}
// 演示键：重放最后听到的组合，并在声音响起的同时点亮琴键
async function revealLast(){
  if(!lastPlayed.length){ toast("先播放或听一个声音吧 🎵"); return; }
  await initAudio();
  const now=Tone.now();
  lastPlayed.forEach(ev=>{ synth.triggerAttackRelease(ev.midis.map(midiToName), ev.dur, now+ev.t); }); // 重放声音
  lightAlong("#piano"); // 用统一逻辑点亮(共有音会重新亮起)
}
function updateBuildUI(){
  document.querySelectorAll("#piano .key").forEach(k=>{
    k.classList.toggle("sel", buildSel.has(+k.dataset.m));
  });
  const sel=[...buildSel].sort((a,b)=>a-b).map(m=>sharp(NOTE_NAMES[m%12])+`(${JIANPU[m%12]})`);
  const el=document.getElementById("selnotes");
  if(el) el.textContent = "已选：" + (sel.length? sel.join("  ") : "—");
}

/* ============================================================
   小特效
   ============================================================ */
function toast(msg){
  const t=document.getElementById("toast"); t.textContent=msg; t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),1800);
}
function confetti(n=16){
  const colors=["#ff7a59","#ffcf5c","#5ce6c0","#7aa7ff","#c98bff"];
  for(let i=0;i<n;i++){
    const c=document.createElement("div"); c.className="confetti";
    c.style.left=(Math.random()*100)+"vw"; c.style.background=rand(colors);
    c.style.transform=`rotate(${Math.random()*360}deg)`;
    document.body.appendChild(c);
    const dur=900+Math.random()*700;
    c.animate([{transform:`translateY(0) rotate(0)`,opacity:1},
      {transform:`translateY(${60+Math.random()*40}vh) rotate(${Math.random()*720}deg)`,opacity:0}],
      {duration:dur,easing:"cubic-bezier(.3,.6,.4,1)"});
    setTimeout(()=>c.remove(),dur);
  }
}
