<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>和弦与调式 · 互动课堂</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
<style>
  :root{
    --bg:#1a1530; --bg2:#241c45; --card:#2d2356; --card2:#372a68;
    --ink:#f4f0ff; --muted:#b3a8d9; --line:#473a7d;
    --p1:#ff7a59; --p2:#ffcf5c; --p3:#5ce6c0; --p4:#7aa7ff; --p5:#c98bff;
    --ok:#5ce6a0; --bad:#ff6b8a;
    --white:#fffdf7; --black:#2a2350;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:"PingFang SC","Microsoft YaHei","Segoe UI",system-ui,sans-serif;
    background:radial-gradient(1200px 700px at 80% -10%, #33276b 0%, var(--bg) 55%), var(--bg);
    color:var(--ink); min-height:100vh; -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:920px;margin:0 auto;padding:18px 16px 120px}
  .topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px;padding-right:108px}
  .brand{display:flex;align-items:center;gap:10px;font-weight:800;font-size:20px;letter-spacing:.5px}
  .brand .logo{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;
    background:linear-gradient(135deg,var(--p1),var(--p5));font-size:18px}
  .xp{display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--line);
    padding:7px 12px;border-radius:999px;font-weight:700;font-size:14px}
  .xp .star{color:var(--p2)}
  .hint{color:var(--muted);font-size:13px}

  /* HOME */
  .hero{background:linear-gradient(135deg,var(--card),var(--card2));border:1px solid var(--line);
    border-radius:20px;padding:20px 22px;margin-bottom:18px}
  .hero h1{margin:0 0 6px;font-size:24px}
  .hero p{margin:0;color:var(--muted);line-height:1.6;font-size:14px}
  .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
  @media(max-width:640px){.grid{grid-template-columns:1fr}}
  .lvl{position:relative;text-align:left;border:1px solid var(--line);border-radius:18px;
    padding:16px 16px 14px;cursor:pointer;color:var(--ink);overflow:hidden;
    background:var(--card);transition:transform .12s ease, box-shadow .12s ease;}
  .lvl:hover{transform:translateY(-3px);box-shadow:0 12px 30px rgba(0,0,0,.35)}
  .lvl[disabled]{cursor:not-allowed;opacity:.5;filter:grayscale(.4)}
  .lvl .num{font-size:30px;line-height:1}
  .lvl h3{margin:8px 0 4px;font-size:17px}
  .lvl .desc{color:var(--muted);font-size:12.5px;line-height:1.5;min-height:34px}
  .lvl .bar{margin-top:10px;height:8px;border-radius:99px;background:#00000030;overflow:hidden}
  .lvl .bar > i{display:block;height:100%;width:0;border-radius:99px;
    background:linear-gradient(90deg,var(--p3),var(--p4));transition:width .4s}
  .lvl .meta{display:flex;justify-content:space-between;align-items:center;margin-top:7px;font-size:11.5px;color:var(--muted)}
  .lvl .lock{position:absolute;top:14px;right:14px;font-size:18px}
  .lvl .done{position:absolute;top:12px;right:14px;font-size:20px;color:var(--p3)}
  .accent{position:absolute;inset:0 auto 0 0;width:6px}

  /* LESSON */
  .back{background:none;border:none;color:var(--muted);font-size:14px;cursor:pointer;padding:6px 0;margin-bottom:6px}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:18px 20px;margin-bottom:16px}
  .panel h2{margin:0 0 4px;font-size:20px}
  .teach{line-height:1.7;font-size:14.5px;color:#e9e3ff}
  .teach b{color:var(--p2)}
  .teach .row{display:flex;flex-wrap:wrap;gap:8px;margin:12px 0}
  .chip{display:inline-flex;align-items:center;gap:6px;background:var(--card2);border:1px solid var(--line);
    border-radius:12px;padding:9px 13px;cursor:pointer;font-size:13.5px;font-weight:600;color:var(--ink);transition:.12s}
  .chip:hover{border-color:var(--p4);transform:translateY(-1px)}
  .chip .ic{font-size:15px}
  details.note{margin-top:10px;border-top:1px dashed var(--line);padding-top:10px}
  details.note summary{cursor:pointer;color:var(--p4);font-weight:600;font-size:13.5px}

  .qhead{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px}
  .qhead .prog{flex:1;height:10px;border-radius:99px;background:#00000035;overflow:hidden}
  .qhead .prog > i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--p2),var(--p1));transition:width .4s}
  .qhead .cnt{font-size:13px;color:var(--muted);white-space:nowrap}
  .qtype{font-size:12px;color:var(--p3);font-weight:700;letter-spacing:1px;text-transform:uppercase}
  .qprompt{font-size:18px;font-weight:700;margin:6px 0 14px;line-height:1.5}
  .playbtn{display:inline-flex;align-items:center;gap:9px;background:linear-gradient(135deg,var(--p1),var(--p5));
    color:#fff;border:none;border-radius:14px;padding:13px 22px;font-size:15px;font-weight:800;cursor:pointer;
    box-shadow:0 8px 20px rgba(255,122,89,.3)}
  .playbtn:active{transform:scale(.97)}
  .playbtn.small{padding:9px 14px;font-size:13.5px;background:var(--card2);color:var(--ink);box-shadow:none;border:1px solid var(--line)}
  .opts{display:grid;grid-template-columns:repeat(2,1fr);gap:11px;margin-top:16px}
  @media(max-width:520px){.opts{grid-template-columns:1fr}}
  .opt{text-align:left;background:var(--card2);border:1.5px solid var(--line);border-radius:14px;
    padding:13px 15px;cursor:pointer;font-size:14.5px;font-weight:600;color:var(--ink);transition:.12s}
  .opt:hover{border-color:var(--p4)}
  .opt .sub{display:none;color:var(--muted);font-size:12px;font-weight:500;margin-top:3px} /* 答题前隐藏小字，避免泄露答案 */
  .opts.revealsubs .opt .sub{display:block} /* 选择答案后再显示各选项的说明 */
  .opt.correct{border-color:var(--ok);background:#1c4a3a}
  .opt.wrong{border-color:var(--bad);background:#4a1c2c}
  .opt[disabled]{cursor:default}
  .feedback{margin-top:14px;border-radius:14px;padding:13px 16px;font-size:14px;line-height:1.6;display:none}
  .feedback.show{display:block}
  .feedback.good{background:#16402f;border:1px solid var(--ok)}
  .feedback.bad{background:#421a28;border:1px solid var(--bad)}
  .feedback .t{font-weight:800;margin-bottom:3px}
  .next{margin-top:14px;display:none}
  .next.show{display:inline-flex}

  /* build */
  .buildbar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-top:14px}
  .submitb{background:linear-gradient(135deg,var(--p3),var(--p4));color:#16213a;border:none;border-radius:13px;
    padding:11px 20px;font-weight:800;font-size:14px;cursor:pointer}
  .clearb{background:var(--card2);border:1px solid var(--line);color:var(--muted);border-radius:13px;padding:11px 16px;cursor:pointer;font-size:13px}
  .selnotes{color:var(--muted);font-size:13px}

  /* PIANO */
  .pianowrap{margin-top:18px;background:var(--bg2);border:1px solid var(--line);border-radius:16px;padding:14px}
  .pianowrap .lbl{font-size:12px;color:var(--muted);margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;gap:8px}
  .revealb{background:linear-gradient(135deg,var(--p5),var(--p4));color:#fff;border:none;border-radius:10px;
    padding:7px 13px;font-size:12.5px;font-weight:800;cursor:pointer;white-space:nowrap;box-shadow:0 4px 12px rgba(201,139,255,.3)}
  .revealb:active{transform:scale(.96)}
  .revealb[disabled]{opacity:.45;cursor:not-allowed;box-shadow:none}
  /* 演示键点亮：明显的发光高亮 */
  .key.w.reveal{background:linear-gradient(180deg,#d6b3ff,#c98bff) !important;box-shadow:0 0 16px 3px #c98bff inset, 0 0 12px #c98bff}
  .key.b.reveal{background:linear-gradient(180deg,#a86bff,#7a3aff) !important;box-shadow:0 0 14px 2px #a86bff}
  /* 逐声部解决：出发音=橙(不稳定)，到达音=绿(到家) */
  .key.w.vfrom{background:linear-gradient(180deg,#ffd0bf,#ff7a59) !important;box-shadow:0 0 14px 2px #ff7a59 inset}
  .key.b.vfrom{background:linear-gradient(180deg,#ff9b7e,#e0512c) !important;box-shadow:0 0 12px 2px #ff7a59}
  .key.w.vto{background:linear-gradient(180deg,#bff0e0,#5ce6a0) !important;box-shadow:0 0 16px 3px #5ce6a0 inset}
  .key.b.vto{background:linear-gradient(180deg,#7fe3bf,#2bbf8c) !important;box-shadow:0 0 12px 2px #5ce6a0}
  /* 起始音提示：忽闪忽现，点击后才算选中 */
  @keyframes hintpulse{0%,100%{box-shadow:inset 0 0 0 0 rgba(201,139,255,0)}50%{box-shadow:inset 0 0 0 3px var(--p5), 0 0 12px var(--p5)}}
  .key.hintblink{animation:hintpulse .9s ease-in-out infinite}
  .key.w.hint{background:linear-gradient(180deg,#fff3c4,#ffd96b)}  /* 综合模式：当前和弦黄色提示(被演奏的紫色会盖过它) */
  .key.b.hint{background:linear-gradient(180deg,#caa23a,#8f6f14)}
  .piano{position:relative;height:150px;display:flex;user-select:none;touch-action:manipulation}
  .key{position:relative;flex:1;border:1px solid #0d0a1f;border-radius:0 0 7px 7px;cursor:pointer}
  .key.w{background:linear-gradient(180deg,#fffef9,#efe9df);z-index:1}
  .key.w:active,.key.w.lit{background:linear-gradient(180deg,#ffe7a8,#ffcf5c)}
  .key.w.sel{background:linear-gradient(180deg,#a8f0d8,#5ce6c0)}
  .key.b{position:absolute;top:0;width:6.2%;height:62%;background:linear-gradient(180deg,#3a3360,#1c1838);
    z-index:2;border-radius:0 0 6px 6px;border:1px solid #000}
  .key.b:active,.key.b.lit{background:linear-gradient(180deg,#ffb86b,#ff7a59)}
  .key.b.sel{background:linear-gradient(180deg,#52d6b4,#37b896)}
  .key .nm{position:absolute;bottom:6px;left:0;right:0;text-align:center;font-size:11px;font-weight:700;color:#564c7a;pointer-events:none}
  .key .jp{position:absolute;bottom:20px;left:0;right:0;text-align:center;font-size:11px;font-weight:800;color:#9a5; pointer-events:none}
  .key.b .nm{color:#cfc6ef;font-size:9px;bottom:5px}
  .key.b .jp{color:#ffd; font-size:9px; bottom:16px}

  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(40px);
    background:var(--card2);border:1px solid var(--p3);color:var(--ink);padding:13px 20px;border-radius:14px;
    font-weight:700;opacity:0;transition:.3s;z-index:50;box-shadow:0 10px 30px rgba(0,0,0,.4)}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .confetti{position:fixed;width:10px;height:14px;top:-20px;z-index:60;border-radius:2px;pointer-events:none}

  .audioNote{font-size:12px;color:var(--muted);margin-top:10px;text-align:center}

  /* 训练场入口卡 */
  .traincard{margin-top:14px;display:flex;align-items:center;gap:14px;background:linear-gradient(135deg,#3a2a66,#4a2f7a);
    border:1px solid var(--line);border-radius:18px;padding:16px 18px;cursor:pointer;width:100%;text-align:left;color:var(--ink);transition:.12s}
  .traincard:hover{transform:translateY(-2px);box-shadow:0 12px 28px rgba(0,0,0,.32)}
  .traincard .big{font-size:34px}
  .traincard h3{margin:0 0 3px;font-size:17px}
  .traincard .desc{color:var(--muted);font-size:12.5px;line-height:1.5}
  /* 分段开关 */
  .seg{display:inline-flex;background:var(--bg2);border:1px solid var(--line);border-radius:11px;padding:3px;gap:3px}
  .seg button{border:none;background:none;color:var(--muted);padding:7px 14px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer}
  .seg button.on{background:linear-gradient(135deg,var(--p4),var(--p5));color:#fff}
  .ctrlrow{display:flex;flex-wrap:wrap;gap:10px 18px;align-items:center;margin:12px 0}
  .ctrlrow .ct{font-size:12.5px;color:var(--muted);margin-right:2px}
  .seclabel{font-size:13px;font-weight:800;color:var(--p3);margin:16px 0 8px;letter-spacing:.5px}
  .pickgrid{display:flex;flex-wrap:wrap;gap:9px}
  .pick{border:1.5px solid var(--line);background:var(--card2);color:var(--ink);border-radius:12px;
    padding:11px 15px;font-size:13.5px;font-weight:700;cursor:pointer;transition:.12s}
  .pick:hover{border-color:var(--p4);transform:translateY(-1px)}
  .pick.all{border-color:var(--p3);background:#23463f}
  .pick .s{display:block;font-size:11px;font-weight:500;color:var(--muted);margin-top:2px}
  .scorebar{display:flex;gap:14px;align-items:center;font-size:13px;color:var(--muted)}
  .scorebar b{color:var(--ink)}
  .streakhot{color:var(--p1)!important}
  .card-study{text-align:center;padding:6px 4px}
  .card-study .cname{font-size:30px;font-weight:900;margin:6px 0}
  .card-study .cjian{font-size:18px;color:var(--p2);font-weight:800;letter-spacing:2px}
  .card-study .cmeta{color:var(--muted);font-size:14px;line-height:1.7;margin-top:8px}
  /* 成绩单 */
  .repcard{text-align:center}
  .repbig{font-size:46px;font-weight:900;margin:6px 0 2px;background:linear-gradient(135deg,var(--p3),var(--p4));-webkit-background-clip:text;background-clip:text;color:transparent}
  .reprow{display:flex;align-items:center;gap:10px;margin:9px 0}
  .reprow .rn{width:78px;font-weight:700;font-size:13.5px}
  .reprow .rbar{flex:1;height:14px;border-radius:99px;background:#00000035;overflow:hidden}
  .reprow .rbar>i{display:block;height:100%;border-radius:99px;background:linear-gradient(90deg,var(--p3),var(--p4));transition:width .5s}
  .reprow .rp{width:96px;text-align:right;font-size:12.5px;color:var(--muted)}
  .reprow.weak .rbar>i{background:linear-gradient(90deg,var(--bad),var(--p1))}
  /* 讲解区迷你键盘 */
  .minipw{margin-top:12px;padding:10px}
  .piano.mini{height:104px}
  .piano.mini .key.w .jp{bottom:6px;font-size:11px;color:#7a6}
  .teachhint{font-size:12px;color:var(--muted);margin:8px 2px 0}
  /* 教学用小表格 */
  .teach table.ctab{width:100%;border-collapse:collapse;font-size:12.5px;margin:10px 0;overflow-x:auto;display:block}
  .teach table.ctab th,.teach table.ctab td{border:1px solid var(--line);padding:5px 8px;text-align:left;color:#e9e3ff;white-space:nowrap}
  .teach table.ctab th{color:#16213a;background:var(--p3);font-weight:800}
  .teach table.ctab tr:nth-child(even) td{background:var(--bg2)}
  .teach table.ctab td.play{cursor:pointer;color:#fff;font-weight:700}
  .teach table.ctab td.play:hover{background:var(--p4)!important;color:#fff}
  .teach table.ctab td.play::before{content:"🔊 ";font-size:11px}
  /* 底部悬浮键盘 */
  #kbDock{position:fixed;left:0;right:0;bottom:0;z-index:40;display:none;
    padding:8px 12px 10px;background:linear-gradient(180deg, rgba(26,21,48,0), var(--bg) 38%)}
  #kbDock .pianowrap{max-width:920px;margin:0 auto;box-shadow:0 -12px 34px rgba(0,0,0,.55);padding:10px}
  #kbDock .piano{height:92px}
  #kbDock .key.w .jp{bottom:16px;font-size:11px}
  #kbDock .key.w .nm{bottom:4px;font-size:10px}
  body.hasdock .wrap{padding-bottom:200px}
  @media(max-width:640px){ #kbDock .piano{height:80px} body.hasdock .wrap{padding-bottom:172px} }
  /* 大调音阶 全/半 台阶条 */
  .sstrip{display:flex;align-items:center;gap:0;margin:8px 0 4px;overflow-x:auto;padding:8px 0 6px}
  .snote{flex:0 0 auto;min-width:34px;text-align:center;background:var(--card2);border:1.5px solid var(--line);
    border-radius:9px;padding:7px 4px;transition:.15s}
  .snote b{display:block;font-size:17px;line-height:1.1}
  .snote span{font-size:10px;color:var(--muted)}
  .snote.on{background:linear-gradient(135deg,var(--p2),var(--p1));color:#fff;border-color:transparent;transform:translateY(-3px)}
  .sstep{flex:0 0 auto;min-width:30px;text-align:center;font-size:12px;font-weight:800;color:var(--muted);transition:.15s}
  .sstep.half{color:var(--p1)}
  .sstep.on{transform:scale(1.35);color:var(--p3)}
  /* 语言切换按钮(右上角固定) */
  .langbar{position:fixed;top:10px;right:12px;z-index:999;display:flex;gap:4px}
  .langbar button{background:#241f44;border:1px solid #3a3360;color:#8f86b8;font-weight:800;font-size:12px;
    padding:5px 10px;border-radius:8px;cursor:pointer}
  .langbar button.on{background:#3a2f6e;color:#ffd96b;border-color:#6a5acd}
</style>
</head>
<body>
<div class="langbar"><button data-l="cn" class="on">CN</button><button data-l="en">EN</button></div>
<div class="wrap">
  <div class="topbar">
    <div class="brand" id="brandTxt"><span class="logo">🎹</span> 和弦与调式 · 互动课堂</div>
    <div class="xp"><span class="star">★</span> <span id="xpval">0</span> <span id="xpword">经验</span></div>
  </div>
  <div id="app"></div>
</div>
<div id="kbDock"></div>
<div class="toast" id="toast"></div>

<script>
/* ============================================================
   音乐基础数据
   ============================================================ */
const NOTE_NAMES = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
const NOTE_CN    = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
// 数字标记(以C为1号)：每个半音对应的级数写法，用于键盘上排数字行
const JIANPU = ["1","♯1","2","♯2","3","4","♯4","5","♯5","6","♯6","7"];
// 显示用：把内部音名里的 ASCII # 换成音乐升号 ♯（内部仍用 # 供 Tone.js 发声）
function sharp(s){ return (""+s).replace(/#/g,"♯"); }

// 和弦类型：半音结构 + 名称 + 色彩描述
const CHORDS = {
  maj:  {name:"大三和弦", jian:"1 3 5",  iv:[0,4,7],     color:"明亮、稳定、阳光", mood:"开心 / 明亮"},
  min:  {name:"小三和弦", jian:"1 ♭3 5", iv:[0,3,7],     color:"柔和、忧郁、内敛", mood:"忧伤 / 柔和"},
  dim:  {name:"减三和弦", jian:"1 ♭3 ♭5",iv:[0,3,6],     color:"紧张、不安、想解决", mood:"紧张 / 不安"},
  aug:  {name:"增三和弦", jian:"1 3 #5", iv:[0,4,8],     color:"悬浮、神秘、迷幻", mood:"悬浮 / 神秘"},
  maj7: {name:"大七和弦", jian:"1 3 5 7", iv:[0,4,7,11], color:"温暖、梦幻、高级感", mood:"梦幻 / 温暖"},
  dom7: {name:"属七和弦", jian:"1 3 5 ♭7",iv:[0,4,7,10], color:"想往前走、布鲁斯味、强烈解决感", mood:"想回家 / 布鲁斯"},
  min7: {name:"小七和弦", jian:"1 ♭3 5 ♭7",iv:[0,3,7,10],color:"柔和忧郁、放松、爵士", mood:"慵懒 / 柔和"},
  m7b5: {name:"半减七和弦", jian:"1 ♭3 ♭5 ♭7",iv:[0,3,6,10],color:"不稳定、阴郁、悬而未决", mood:"阴郁 / 不安"},
};

const MAJOR_SCALE = [0,2,4,5,7,9,11]; // 全全半全全全半
// C大调调内三和弦：级数 -> 根音半音 + 类型 + 罗马数字 + 功能
const DIATONIC = [
  {deg:1, root:0,  type:"maj", rn:"I",   fn:"T", fnName:"主功能",   fnFeel:"稳定·回家"},
  {deg:2, root:2,  type:"min", rn:"ii",  fn:"S", fnName:"下属功能", fnFeel:"出发·铺垫"},
  {deg:3, root:4,  type:"min", rn:"iii", fn:"T", fnName:"主功能",   fnFeel:"稳定(偏暗)"},
  {deg:4, root:5,  type:"maj", rn:"IV",  fn:"S", fnName:"下属功能", fnFeel:"出发·铺垫"},

/* ============================================================
   音频引擎 (Tone.js)
   ============================================================ */
let synth=null, audioReady=false;
async function initAudio(){
  if(audioReady) return;
  await Tone.start();
  const reverb = new Tone.Reverb({decay:1.4, wet:0.18}).toDestination();
  synth = new Tone.PolySynth(Tone.Synth, {
    oscillator:{type:"triangle"},
    envelope:{attack:0.008, decay:0.35, sustain:0.32, release:1.1}
  }).connect(reverb);
  synth.volume.value = -8;
  audioReady = true;
}
function midiToName(m){ return NOTE_NAMES[m%12] + (Math.floor(m/12)-1); }
function nameToMidi(n){ const mt=n.match(/^([A-G]#?)(-?\d+)$/); return (parseInt(mt[2])+1)*12 + NOTE_NAMES.indexOf(mt[1]); }
// 以 C4(=60) 为基准，把半音偏移转成音名
function semiToName(semi, baseMidi=60){ return midiToName(baseMidi+semi); }

// 记录"最后一次听到的组合音"，供演示键重放并点亮琴键
let lastPlayed=[]; // [{midis:[...], t:offsetSec, dur}]

// stack: arp 模式下逐个弹完后是否再把所有音叠在一起响一次(和弦用 true，音程用 false)
async function playNotes(names, dur="2n", arp=false, gap=0.8, stack=true){
  await initAudio();
  const now = Tone.now();
  const events=[];
  if(arp){
    // 相邻组成音间隔 = gap（如 0.8 秒）
    names.forEach((n,i)=>{ synth.triggerAttackRelease(n, "4n", now + i*gap);
      events.push({midis:[nameToMidi(n)], t:i*gap, dur:"4n"}); });
    if(stack){
      // 从最后一个组成音起，再过 1.2 秒才齐奏
      const tEnd = (names.length-1)*gap + 1.2;
      synth.triggerAttackRelease(names, "1n", now + tEnd);
      events.push({midis:names.map(nameToMidi), t:tEnd, dur:"1n"});
    }
  } else {
    synth.triggerAttackRelease(names, dur, now);
    events.push({midis:names.map(nameToMidi), t:0, dur});
  }
  lastPlayed=events;
}
async function playSemis(semis, baseMidi=60, arp=false, dur="2n", opts={}){
  const names = semis.map(s=>semiToName(s, baseMidi));
  // 不传 gap 时交给 playNotes 的默认值(不要再用 0.16 覆盖)
  await playNotes(names, dur, arp, opts.gap, opts.stack ?? true);
}
async function playMidi(m, dur="8n"){ await initAudio(); synth.triggerAttackRelease(midiToName(m), dur, Tone.now()); }

// 按权重抽取
function weightedPick(items, weightFn){
  const w=items.map(weightFn); const sum=w.reduce((a,b)=>a+b,0);
  let r=Math.random()*sum;
  for(let i=0;i<items.length;i++){ r-=w[i]; if(r<0) return items[i]; }
  return items[items.length-1];
}

function teachEN(mId){
  switch(mId){
    case "interval": return `
      <p>An <b>interval</b> is the "distance" between two notes, counted in <b>half steps</b>. Two adjacent keys on the piano (black keys included) are 1 half step apart.</p>
      <div class="row">
        <span class="chip" data-play="semi:0,1">🔊 Half step (1 apart)</span>
        <span class="chip" data-play="semi:0,2">🔊 Whole step (2 apart)</span>
      </div>
      <p>A chord's "color" comes mainly from <b>third</b> intervals:</p>
      <div class="row">
        <span class="chip" data-play="semi:0,4">🔊 Major 3rd (4) · bright</span>
        <span class="chip" data-play="semi:0,3">🔊 Minor 3rd (3) · melancholy</span>
      </div>
      <p>Remember this contrast: a <b>major 3rd sounds cheerful</b>, a <b>minor 3rd sounds sad</b>. It's the key to telling major and minor chords apart later.</p>

      <details class="note" open><summary><b>What does the "3" in "third" mean? — counting by letters</b></summary>
        <div style="line-height:1.8;color:#e9e3ff">
          <p>Note names use only seven letters, <b>C D E F G A B</b> (then they cycle). Interval names are simply <b>counted by letters</b>: call the starting note 1 and count along — reach the 3rd letter and it's a "<b>third</b>", the 5th letter and it's a "<b>fifth</b>".</p>
          <div class="row">
            <span class="chip" data-play="mel:0,4">🔊 Third C→E (C① D② E③)</span>
            <span class="chip" data-play="mel:0,7">🔊 Fifth C→G (C① D② E③ F④ G⑤)</span>
          </div>
          <p>Mind that these are <b>two different rulers</b>: names count <b>letters</b> (C→E reaches the 3rd letter), exact distance counts <b>half steps</b> (C→E is 4 half steps). Letter counting works from any starting note: D→F counts D, E, F — also a third.</p>
          <p><b>Two more symbols: ♭ (flat) and ♯ (sharp).</b> Written after a note name they mean lower/raise it a half step: E♭ is the black key just left of E. Here's the neat part: C→E♭ still counts C, D, E — three letters — so it's <b>still a third</b>, just one half step narrower (4→3), turning the cheerful major 3rd into the sad minor 3rd. That's why major and minor thirds share a name but not a mood:</p>
          <div class="row">
            <span class="chip" data-play="mel:0,4">🔊 Major 3rd C→E (wide, 4 half steps)</span>
            <span class="chip" data-play="mel:0,3">🔊 Minor 3rd C→E♭ (narrow, 3 half steps)</span>
          </div>
          <p style="font-size:12.5px;color:var(--muted)">Preview: level ④'s triads stack three members standing on positions 1, 3 and 5 of this count — hence their names <b>root, 3rd and 5th</b>. Now the names make sense in advance.</p>
        </div>
      </details>

      <details class="note" open><summary>Why practice only these intervals?</summary>
        <p style="color:var(--muted);font-size:13.5px;line-height:1.7">There are many intervals (4ths, 5ths, 6ths, 7ths, the tritone…). We start with just the
        <b>half step and whole step</b> (the "stairs" that build scales) and the <b>major and minor 3rds</b> (which directly decide whether a chord is bright or dark).
        In other words, we lay the foundation with <b>the few intervals that matter most for understanding chords</b>; the rest will come up naturally inside chord spellings later — no need to memorize them all now.</p>
      </details>`;
    case "scale": return `
      <p>The <b>major scale</b> is music's "ruler" — nearly every pop and classical melody comes from it. Its stair pattern is:
      <b>W W H W W W H</b> (W = whole step = 2 half steps, H = half step = 1).</p>
      <div class="row">
        <span class="chip" data-play="scaleC">🔊 Hear the C-major scale (1234567)</span>
        <span class="chip" data-play="scaleG">🔊 Hear the G-major scale</span>
      </div>
      <p>In numbers it's <b>1 2 3 4 5 6 7</b>. Note that <b>3→4</b> and <b>7→1</b> are half steps (adjacent keys); everything else is a whole step.
      This fixed stair pattern is exactly what decides which chords a key can use.</p>
      <p style="margin-bottom:2px">The "stair" between each pair of neighbors: <b>W W H W W W H</b> (tap a player above and the stairs light up in sync)</p>
      ${renderScaleStrip()}
      <p style="font-size:12.5px;color:var(--muted);margin-top:2px"><b>W</b> = skip one key (2 half steps), <b>H</b> = right next door (1 half step). The mini keyboard below lights up in sync so you can see where each step lands.</p>
      <details class="note" open><summary>Why learn only the major scale?</summary>
        <p style="color:var(--muted);font-size:13.5px;line-height:1.7">There are many scales (natural minor, harmonic minor, the modes…). We start with only the <b>major scale</b>
        because it is the "prototype ruler" of the whole tonal system — minor keys and modes can all be seen as variants of it. Master the major stairs
        and the chords built from them first, and every other scale will come quickly later.</p>
      </details>`;
    case "key": return `
      <p>Where does a "<b>key</b>" come from? Simple: <b>pick a starting note (the "tonic") and apply the major stair pattern W-W-H-W-W-W-H from it</b>. The 7 notes you land on are the notes that key may use.</p>

      <p><b>Why is C major exactly the white keys?</b> Start from <b>C</b> and walk W·W·H·W·W·W·H step by step:</p>
      <p style="line-height:1.95;color:#e9e3ff">
        C —W→ D —W→ E —H→ F —W→ G —W→ A —W→ B —H→ (back to) C<br>
        You land on <b>C D E F G A B</b> — <b>all white keys</b>, not a single black key touched. That's why "C major = the 7 white keys".
      </p>
      <div class="row"><span class="chip" data-play="majscale:0">🔊 Hear the C-major scale</span></div>

      <p><b>What if you start somewhere else?</b> The stair pattern never changes, but from another starting note you're <i>forced</i> onto black keys, or the stairs won't fit:</p>
      <p style="line-height:1.95;color:#e9e3ff">
        · From <b>G</b>: G A B C D E <b>F♯</b> — the 7th note must be raised to F♯ (plain F would make E→F only a half step, breaking the pattern).<br>
        · From <b>F</b>: F G A <b>B♭</b> C D E — the 4th note must be lowered to B♭.
      </p>
      <div class="row">
        <span class="chip" data-play="majscale:7">🔊 Hear the G-major scale</span>
        <span class="chip" data-play="majscale:5">🔊 Hear the F-major scale</span>
      </div>
      <p>The sharps/flats a key always uses are called its "<b>key signature</b>": (tap the "7 notes" cell to hear that scale)</p>
      <table class="ctab"><tr><th>Key</th><th>7 notes</th><th>Key signature (black keys)</th></tr>
        <tr><td>C major</td><td class="play" data-play="majscale:0">C D E F G A B</td><td>none (all white)</td></tr>
        <tr><td>G major</td><td class="play" data-play="majscale:7">G A B C D E F♯</td><td>1 sharp (F♯)</td></tr>
        <tr><td>D major</td><td class="play" data-play="majscale:2">D E F♯ G A B C♯</td><td>2 sharps (F♯ C♯)</td></tr>
        <tr><td>F major</td><td class="play" data-play="majscale:5">F G A B♭ C D E</td><td>1 flat (B♭)</td></tr>
        <tr><td>B♭ major</td><td class="play" data-play="majscale:10">B♭ C D E♭ F G A</td><td>2 flats (B♭ E♭)</td></tr>
      </table>
      <p style="color:var(--muted);font-size:13px">Key takeaway: every major key is <b>the same stair pattern (W W H W W W H)</b> with a different starting note (tonic) and different black keys (key signature) — which is why they all share that same "major flavor". And because the stairs match, the chord family built inside any key follows one fixed rule too (covered in the "Chords in a Key" level).</p>

      <details class="note" open><summary><b>How many major keys are there? Why list only 5?</b></summary>
        <div style="line-height:1.75;color:#e9e3ff">
          <p>There are <b>12</b> major keys — an octave has 12 half steps (C, C♯/D♭, D, D♯/E♭, E, F, F♯/G♭, G, G♯/A♭, A, A♯/B♭, B), and each one can serve as a tonic: apply W-W-H-W-W-W-H from it and you get a major key.</p>
          <p>This table picks only the <b>5 keys with the fewest sharps/flats</b> (0–2) because they're the easiest to start with. <b>The selection criterion is simply "how many sharps or flats in the key signature."</b> The other keys carry more:</p>
          <p>· Sharp direction (one more sharp each step): C(0) → G(1) → D(2) → A(3) → E(4) → B(5) → F♯(6)<br>
          · Flat direction (one more flat each step): C(0) → F(1) → B♭(2) → E♭(3) → A♭(4) → D♭(5) → G♭(6)</p>
          <p>This "arranged in a circle by number of accidentals" relationship is the <b>circle of fifths</b>. Every key works exactly the same way — more black keys just means more to memorize, so beginners drill the most common ones first. (Also, F♯ major and G♭ major are the same physical keys spelled differently — "enharmonic keys" — so strictly speaking there are 12 major keys <i>by ear</i>.)</p>
        </div>
      </details>

      <details class="note" open><summary><b>⚠ F♯ and G♭ are the same key on the piano — why isn't G major "1 flat"?</b></summary>
        <div style="line-height:1.75;color:#e9e3ff">
          <p><b>F♯ and G♭ really are the same piano key</b> (same pitch — "enharmonic"). But a key signature can't be written either way at will — the rule: in a major scale, <b>each of the seven letters A B C D E F G must appear exactly once</b>.</p>
          <p>· G major = G A B C D E <b>F♯</b> (a sharpened F) — all seven letters present ✓.<br>
          · Force it to G♭ and you get G A B C D E <b>G♭</b> — two G's and no F ✗.</p>
          <p>So G major's signature is <b>definitively "1 sharp"</b>, never written as a flat; "1 flat" belongs to a different key (<b>F major</b>). <b>Same pitch ≠ two valid spellings of a key signature.</b></p>
        </div>
      </details>

      <p style="color:var(--muted);font-size:13px">The drills below take you across several major keys: identify the key signature (how many sharps/flats), decide whether a note belongs to the key, and build an entire major scale on the keyboard. (Minor keys get their own systematic treatment from level ⑮ on.)</p>`;
    case "keymin": return `
      <p>Welcome through the <b>door to the night world</b>. For a dozen levels we've lived in the "bright world" (major keys), mastering chords, degrees, functions and progressions; from here on we enter <b>minor</b> — the next few levels replay that whole skill set in the dark world. First, meet the minor key itself.</p>
      <p>Like major, a minor key is "<b>a tonic + a fixed stair pattern</b>" — just a <b>different pattern</b>. The most basic, <b>natural minor</b>, runs: <b>W H W W H W W</b> (the half steps fall in different places).</p>
      <p>For example from <b>A</b>: A —W→ B —H→ C —W→ D —W→ E —H→ F —W→ G —W→ (back to) A, giving <b>A B C D E F G</b> (also all white keys, as it happens).</p>
      <div class="row"><span class="chip" data-play="natminor:9">🔊 Hear A natural minor</span></div>

      <p><b>Why does minor sound darker and sadder?</b> Compare major and minor built on <b>the same tonic</b> and it's obvious — the difference is mainly the 3rd note: major has a bright major 3rd there, minor lowers it to a melancholy minor 3rd, and degrees 6 and 7 usually sit lower too. Hear the pair (both from A):</p>
      <div class="row">
        <span class="chip" data-play="majscale:9">🔊 A major (bright, 3rd note C♯)</span>
        <span class="chip" data-play="natminor:9">🔊 A minor (dark, 3rd note C)</span>
      </div>

      <p><b>What is a "relative minor"?</b> There's an especially handy pairing: a certain minor key and a certain major key <b>use exactly the same 7 notes</b>, differing only in which note is the tonic (the center). <b>A minor (A B C D E F G)</b> and <b>C major (C D E F G A B)</b> are the same set of white keys — A minor just calls A "home" while C major calls C "home". Such a pair are "relative keys".</p>
      <p>The rule: <b>the relative minor's tonic = degree 6 of the major key</b>. Since both sides use the same batch of notes, they use the same black keys (accidentals) too — i.e. the <b>same key signature</b> from level ③. (Tap a cell to listen)</p>
      <table class="ctab"><tr><th>Major</th><th>Relative minor</th><th>Shared notes</th><th>Key signature</th></tr>
        <tr><td class="play" data-play="majscale:0">C major</td><td class="play" data-play="natminor:9">A minor</td><td>C D E F G A B (all white)</td><td>no accidentals</td></tr>
        <tr><td class="play" data-play="majscale:7">G major</td><td class="play" data-play="natminor:4">E minor</td><td>G A B C D E F♯</td><td>1 sharp (F♯)</td></tr>
        <tr><td class="play" data-play="majscale:5">F major</td><td class="play" data-play="natminor:2">D minor</td><td>F G A B♭ C D E</td><td>1 flat (B♭)</td></tr>
      </table>
      <p style="font-size:12.5px;color:var(--muted)">Note: listening along you'll find the two scales start at different spots (say C major from C4 to C5, A minor from A3 to A4) — <b>the octave doesn't affect whether the notes count as "the same"</b>. "Same notes" means the 7 <b>letter names</b> (C D E F G A B) match exactly; a note of the same name in any octave (C4, C5…) counts as one and the same note for key membership.</p>

      <p style="color:var(--muted);font-size:13px">Drills below: hear major vs. minor, find relative pairs, and build a minor scale on the keyboard.</p>`;
    case "triad": return `
      <p>The <b>triad</b> is the basic building block of harmony — three notes stacked up: <b>root + 3rd + 5th</b>.
      Change the middle 3rd and the color changes completely.</p>
      <div class="row">
        <span class="chip" data-play="chord:maj:0">🔊 Major triad · bright</span>
        <span class="chip" data-play="chord:min:0">🔊 Minor triad · melancholy</span>
        <span class="chip" data-play="chord:dim:0">🔊 Diminished · tense</span>
        <span class="chip" data-play="chord:aug:0">🔊 Augmented · floating</span>
      </div>
      <details class="note" open><summary>See the spelling (in half steps)</summary>
        <p style="color:var(--muted);font-size:13.5px;line-height:1.7">
        (Legend: numbers in parentheses are distances from the root in <b>half steps</b>. The three members stand on positions 1, 3 and 5 of level ①'s letter count — hence their names <b>root, 3rd and 5th</b>; ♭ = a half step down, ♯ = a half step up.)<br>
        Major triad = root + <b>major 3rd (4)</b> + perfect 5th (7) — on C: <b>C E G</b>, bright, stable, the most common.<br>
        Minor triad = the major triad with its <b>3rd lowered a half step</b> — <b>C E♭ G</b>, soft, melancholy.<br>
        Diminished = <b>both the 3rd and 5th lowered</b> (i.e. two minor 3rds stacked) — <b>C E♭ G♭</b>, tense, wants to resolve.<br>
        Augmented = the <b>5th raised a half step</b> (two major 3rds stacked) — <b>C E G♯</b>, floating, dreamlike.</p>
      </details>`;
    case "symbols": return `

      <p><b>Step 1: symbol = root + quality</b>. The capital letter in front is the <b>root</b>; the suffix behind it is the <b>quality</b>. First recall the four triads (using C):</p>

      <details class="note" open><summary><b>⚠ Easy to confuse (common traps)</b></summary>
        <div style="line-height:1.75;color:#e9e3ff">
          <p><b>1. C7 is not Cmaj7.</b> Cmaj7 = C E G <b>B</b> (major 7th); C7 = C E G <b>B♭</b> (minor 7th). Mnemonic: <b>only maj7 means the major 7th; a bare 7 means the minor 7th</b>.</p>
          <p><b>2. The m in Cm7 changes the 3rd.</b> Cm7 = minor triad + minor 7th = C <b>E♭</b> G <b>B♭</b> (m turns E→E♭; 7 turns B→B♭).</p>
          <p><b>3. m7♭5 lowers the 5th of a minor 7th chord.</b> Cm7 = C E♭ G B♭; Cm7♭5 = C E♭ <b>G♭</b> B♭ (drop the 5 a half step) — also called half-diminished, written Cø7.</p>

      <p style="color:var(--muted);font-size:13px">The drills below cycle you through: parsing symbols, building from a symbol, deriving symbols from triads, and naming what you hear. Connect <b>sound → structure → symbol</b> and you've got it.</p>`;
    case "seventh": return `
      <p>Stack one more third on top of a triad (3 notes) and you get a <b>7th chord</b> (4 notes). The extra note enriches the color — it's where the pop, jazz and blues flavors come from. Meet the four types one by one (all played from C for easy comparison).</p>

      <p style="font-size:13px;color:var(--muted)">(How to read symbols like Cmaj7, Dm7, G7 and which notes they contain was covered in the previous level, "Chord Symbols"; here we focus on the <b>sound</b>.)</p>

      <p><b>① Major 7th — maj7</b> (e.g. <b>Cmaj7</b>; spelling 1 3 5 7): warm, dreamy, relaxed, <b>no tension</b>. Often a deluxe version of "home" — pop / R&B / city-pop tonics love it.</p>
      <div class="row"><span class="chip" data-play="chord:maj7:0">🔊 Hear the major 7th (Cmaj7)</span></div>

      <p><b>② Dominant 7th — 7 / dom7</b> (e.g. <b>C7, G7</b>; spelling 1 3 5 ♭7): <b>unstable, suspended, with a strong urge to move forward</b>. It's the special one — its "resolution" gets a dedicated section below.</p>
      <div class="row"><span class="chip" data-play="chord:dom7:0">🔊 Hear the dominant 7th (C7)</span></div>

      <p><b>③ Minor 7th — m7</b> (e.g. <b>Cm7, Dm7</b>; spelling 1 ♭3 5 ♭7): soft, laid-back, wistful but not sad, relaxed. Everywhere in pop and jazz.</p>
      <div class="row">
        <span class="chip" data-play="chord:min7:0">🔊 Hear the minor 7th (Cm7)</span>
        <span class="chip" data-play="kseq:ii51">🔊 Its classic use: Dm7→G7→Cmaj7</span>
      </div>

      <p><b>④ Half-diminished 7th — m7♭5</b> (e.g. <b>Cm7♭5</b>, also written Cø; spelling 1 ♭3 ♭5 ♭7): brooding, unstable, unresolved. Common in minor keys or as a passing chord.</p>
      <div class="row"><span class="chip" data-play="chord:m7b5:0">🔊 Hear the half-diminished 7th (Cm7♭5)</span></div>

      <p style="font-size:13px;color:var(--muted)">All the <b>progression demos</b> in the boxes below can be heard in other keys: chord names on the buttons are written in C major and will change after switching keys, but the "tension → home" relationships stay identical. Each demo carries the same three buttons: switch key / loop the last progression you tapped / block·arpeggio·combo styles.</p>

      <details class="note" open><summary><b>Key idea: the dominant 7th's "tension" — what are the tonic, home, and resolution? (compare by ear)</b></summary>
        <div style="line-height:1.75;color:#e9e3ff">
          <p><b>Tonic = "home."</b> Every key has one most stable chord that sounds "finished, you may stop here" — the <b>tonic</b> (written I). In C major, home is the C chord (C E G).</p>
          <div class="row"><span class="chip" data-play="kseq:tonic">🏠 Hear the tonic C — stable, restful</span></div>
          <p><b>Resolution = tension released, touching down.</b> The dominant 7th (here G7, degree 5 of C major) is full of tension — a "question" that makes the ear <b>expect</b> an answer. When G7 moves to C (home), the tension releases at once — that's <b>resolution</b>. Compare:</p>
          <div class="row">
            <span class="chip" data-play="kseq:auth">✅ G7 → C: resolved (home, complete)</span>
            <span class="chip" data-play="kseq:hangV7">❓ G7 alone: unresolved (left hanging)</span>
          </div>
          <p><b>Reaching home vs. not reaching it.</b> Starting from the same G7, different landings feel completely different:</p>
          <div class="row">
            <span class="chip" data-play="kseq:auth">🏠 G7 → C: made it home</span>
            <span class="chip" data-play="kseq:deceptive">🚪 G7 → Am: didn't (you expected C but it turned elsewhere — surprising, unfinished)</span>
          </div>
          ${keyBar(false,true)}
          <p>You should hear it: only the landing on C gives that "finally there" solidity. That homeward pull is the soul of the dominant 7th.</p>
        </div>
      </details>

      <details class="note" open><summary><b>What is a "cadence"? Why is the dominant 7th its core?</b></summary>
        <div style="line-height:1.75;color:#e9e3ff">
          <p><b>A cadence is the "punctuation" of the last few chords in a phrase</b> — it decides whether the sentence ends with a "." or a ",". The strongest "full stop" is <b>dominant → tonic (V→I)</b>:</p>
          <div class="row">
            <span class="chip" data-play="kseq:auth">. Authentic cadence G7 → C (strong finality)</span>
            <span class="chip" data-play="kseq:plagal">. Plagal cadence F → C (the soft "Amen" ending)</span>
            <span class="chip" data-play="kseq:half">, Half cadence …→ G (stops on the dominant — sentence unfinished)</span>
          </div>
          ${keyBar(false,true)}
          <p>By comparison, <b>dominant 7th → tonic (G7→C)</b> ends most strongly and cleanly. Precisely because the dominant 7th carries that "must resolve" tension, it became <b>the core of the authentic cadence</b> — nearly every classical or pop phrase puts its period there.</p>
        </div>
      </details>

      <details class="note" open><summary><b>What is "the blues"? Why is the dominant 7th its core?</b></summary>
        <div style="line-height:1.75;color:#e9e3ff">
          <p><b>Blues</b> is a musical style (an ancestor of rock, jazz and R&B). Its signature move: make <b>all three chords I, IV, V dominant 7ths</b> (normally only degree 5 gets to be one), soaking the whole piece in that "suspended, gritty, driving" flavor. The classic skeleton is the 12-bar blues, whose core motion is <b>I7 → IV7 → V7</b>:</p>
          <div class="row"><span class="chip" data-play="kseq:blues">🔊 Hear the blues flavor: C7 → F7 → G7 → C7</span></div>
          ${keyBar(false,true)}
          <p>That "unstable yet driving" sound comes straight from the dominant 7th. Hence: the dominant 7th is the soul and core of the blues.</p>
        </div>
      </details>

      <details class="note" open><summary><b>How do these four relate to "the key"? (Roman numeral preview)</b></summary>
        <div style="line-height:1.75;color:#e9e3ff">
          <p>If you use only a major key's 7 notes and stack a 7th chord on every degree, you naturally get:<br>
          <b>Imaj7, IVmaj7</b> are major 7ths; <b>ii7, iii7, vi7</b> are minor 7ths; <b>V7</b> is the dominant 7th; <b>viiø7</b> is half-diminished.</p>

      <details class="note" open><summary>Why practice only these four 7th chords?</summary>
        <p style="color:var(--muted);font-size:13.5px;line-height:1.7">Combining triads (maj/min/aug/dim) with different 7ths actually yields quite a few types
        (diminished 7th, minor-major 7th, augmented-major 7th…). We start with these four because they are exactly <b>the 7th chords each degree of the major scale produces on its own</b> —
        the ones classical, pop and jazz reuse constantly, <b>the most common and the first worth mastering</b>; the rest are chromatic colors for later.</p>
      </details>`;
    case "diatonic": return `
      <p><b>Diatonic chords</b> are chords stacked <b>using only the notes of the key</b>. In C major the available notes are just the 7 white keys (the 8th wraps back to C):</p>
      <table class="ctab"><tr><th>Degree</th><th>1</th><th>2</th><th>3</th><th>4</th><th>5</th><th>6</th><th>7</th><th>(back to) 1</th></tr>

      <p><b>How do you "stack" a chord? — skip one note, take one, three times.</b> (This is "stacking in thirds".) Three examples:</p>
      <p style="line-height:1.85;color:#e9e3ff">
        · From <b>C</b>: C →(skip D)→ <b>E</b> →(skip F)→ <b>G</b>　gives　<b>C E G</b><br>

      <p>Do this "skip one, take one" from <b>each</b> of the 7 notes and you get the 7 diatonic triads. Tap "the three stacked notes" to hear each:</p>
      <table class="ctab"><tr><th>From degree</th><th>Root</th><th>The three stacked notes</th><th>Quality</th><th>Chord</th><th>Roman</th></tr>

        <tr><td>4</td><td>F</td><td class="play" data-play="dia:4">F A C</td><td>major</td><td>F</td><td>IV</td></tr>
        <tr><td>5</td><td>G</td><td class="play" data-play="dia:5">G B D</td><td>major</td><td>G</td><td>V</td></tr>
        <tr><td>6</td><td>A</td><td class="play" data-play="dia:6">A C E</td><td>minor</td><td>Am</td><td>vi</td></tr>
        <tr><td>7</td><td>B</td><td class="play" data-play="dia:7">B D F</td><td>diminished</td><td>Bdim</td><td>vii°</td></tr></table>

      <p><b>Why do some stacks come out "major" and others "minor"?</b> Because the white keys aren't evenly spaced (that's the major pattern W W H W W W H). Starting from different notes, the bottom third is sometimes wide, sometimes narrow — wide (major 3rd) → major chord, narrow (minor 3rd) → minor chord:</p>
      <div class="row">

      <p>String the 7 qualities together and you get the fixed formula:<br><b>MAJ min min MAJ MAJ min dim</b> (matching <b>I ii iii IV V vi vii°</b>). That is: 1, 4, 5 are major (bright pillars), 2, 3, 6 are minor (soft), 7 is diminished (tense).</p>

      <details class="note" open><summary><b>What does "MAJ-min-min-MAJ-MAJ-min-dim holds in every key" mean?</b></summary>

          <p>Why? Every major key uses the identical stair pattern (W W H W W W H), so the spacing between any two degrees is the same in every key; whether a stacked triad is major or minor depends only on those spacings — same spacings, same order of qualities. <b>The chord names change, but "which degree is major/minor/diminished" never does.</b></p>
          <p>For example, <b>degree 2 is a minor triad in every major key</b>:<br>· Degree 2 of C major = <b>Dm</b> (minor)　· Degree 2 of G major = <b>Am</b> (minor). Different names, both minor triads.</p>

            <span class="chip" data-play="notes:9,12,16">🔊 Degree 2 in G = Am (minor)</span>
          </div>
          <p>So you memorize the formula <b>once</b> and apply it directly in any key — no recounting.</p>
        </div>

      <details class="note" open><summary>Why use only C major as the example?</summary>
        <p style="color:var(--muted);font-size:13.5px;line-height:1.7">We use <b>C major</b> here because it's all white keys, no accidentals — maximally visual.

        This level stacks only <b>triads</b>; the same 7 degrees can also be stacked into the previous level's 7th chords, same principle.</p>
      </details>`;

      <p>The chords in a key each have a "job", grouped by job into three <b>functions</b> — matching a journey: <b>home → setting out → tension → coming home</b> (the three functions man the first three stations; "coming home" means arriving back at "home" — which is the tension's release). First, let's pin down the metaphor itself:</p>

      <details class="note" open><summary><b>What exactly is the "journey"? What do home, setting out and coming home refer to?</b></summary>
        <div style="line-height:1.8;color:#e9e3ff">
          <p><b>A journey = one phrase-level chord progression</b> — typically 2–8 chords, a few bars, roughly "one line of lyrics" long. It is <b>not</b> the whole song, nor a single note: a song strings many such little journeys <b>end to end</b> — the verse circles a few laps, the chorus a few more (level ⑬'s loop progressions are journeys walked on repeat), and each lap either completes the full circle "home → set out → tension → home" or deliberately stops partway.</p>
          <p>· <b>"Home" = the stability baseline set by the tonic chord</b>. Once the key is fixed, home is fixed (in C major, home = the C chord): hearing it, the ear feels "you may stop — sentence finished". It's the candidate start and end of every journey.<br>
             · <b>"Setting out" = leaving stability</b>. Moving to a subdominant-class chord sets the music "in motion" — not tense yet, but no longer at home; the sentence has a direction.<br>
             · <b>"Tension" = the bow drawn fully before the homecoming</b>. Reaching a dominant-class chord, tension peaks — its <b>source</b> is the leading tone inside the chord (a half step under the tonic, gripped hard by its pull; taught in detail below); its <b>job</b> is stretching the ear's expectation to the maximum — without this charge-up, "coming home" would be bland. The fuller the tension, the sweeter the landing.<br>
             · <b>"Coming home" = returning to the tonic, tension released</b>. The ear, held up by the dominant, relaxes the instant it lands back on I — that's the "resolution" you've been hearing all along, and the very next level (⑫ "Resolution") spells out exactly how the trip is made, voice by voice.</p>
          <p><b>Why a "journey", of all metaphors?</b> Because function describes not a chord's own color but its <b>position and sense of direction within the sentence</b> — the same chord means different things standing at the departure point versus the landing point. "Journey" captures both "where you are" and "where you're headed".</p>
          <p style="font-size:12.5px;color:var(--muted)">Note: a journey needn't always come home — deliberately stopping on the dominant (the half cadence, heard in section ③ below) acts like a comma, saving the homecoming for the next line; circling without ever closing (loop progressions) drives the emotion forward instead. Whether and when to come home is precisely the arranger's storytelling lever.</p>
        </div>

      <p>Now meet each stage's chord roster, one at a time (every chord has its own play button; names written in C major):</p>

      <p>Classic progressions simply walk among these three functions. A song from start to finish also breaks into three jobs — <b>how to open, how to keep it rolling, how to close</b>. In order. Each demo plays in the shown "current key" — <b>switch major keys anytime and re-listen</b>.</p>

      <p>The key point: <b>all three forms use the very same note names</b> (C, E, G) — the chord is still C; only the "foundation" changed (who's at the bottom). Compare in a row (watch the keyboard lights — the lowest key keeps moving):</p>
      <div class="row"><span class="chip" data-play="seq:invCmp">🔊 C: root position (from C4) → 1st inversion (from E4) → 2nd inversion (from G4)</span></div>
      <p><b>How they feel</b>: <b>root position</b> is the most solid and settled; <b>1st inversion</b> is lighter, with a lean "wanting to move forward"; <b>2nd inversion</b> is the most "suspended" — with the 5th in the bass it always seems to want one more step. Try the same on F and G:</p>
      <div class="row">
        <span class="chip" data-play="seq:invF">🔊 F: F4 A4 C5 → A4 C5 F5 → C5 F5 A5</span>
        <span class="chip" data-play="seq:invG">🔊 G: G4 B4 D5 → B4 D5 G5 → D5 G5 B5</span>
      </div>
      <p><b>What are inversions for?</b> They let you <b>choose the bass freely</b>. The next level, "Slash Chords", shows how charts use symbols like C/E to specify the bass — and in practice you mostly just play an inversion, instantly smoothing the bass line into a staircase. Real accompaniments use inversions everywhere.</p>
      <p style="color:var(--muted);font-size:13px">Drills include: recognize the form from the layout, build a given form on the keyboard, and judge purely by ear whether the lowest note is the 1, 3 or 5.</p>`;
    case "slash": return `
      <p>The last level taught <b>inversions</b>: the same notes can change their lowest member. But how does a chart tell you "use this bass here"? That's the <b>slash chord</b> notation.</p>
      <p><b>How to read it?</b> See <b>C/E</b>? Don't panic: <b>left of the slash is the chord, right of the slash is the bass (lowest note)</b>. Meaning — play the left-hand chord (C major triad) but let the right-hand note (E) be the lowest. Mnemonic: <b>chord on the left, bass on the right</b>.</p>

      <p><b>Case 1 · the requested bass is already in the chord (most common): just play an inversion.</b></p>
      <p style="line-height:1.9;color:#e9e3ff">
        E is already the 3rd of the C chord (C E G), so <b>C/E is exactly last level's "C in 1st inversion"</b> — same notes, E moved to the bottom:<br>
        ① Plain <b>C (root position)</b>: C4 E4 G4 — the lowest lit key is C4.<br>
        ② <b>C/E (1st inversion)</b>: E4 G4 C5 — still the notes C, E, G, but <b>the lowest lit key becomes E4</b>.<br>
        ③ Back to back: the chord didn't change — only the "foundation" moved from C to E: lighter, more forward-leaning.</p>
      <div class="row">
        <span class="chip" data-play="notes:0,4,7">🔊 ① C root position (C4 E4 G4)</span>
        <span class="chip" data-play="notes:4,7,12">🔊 ② C/E = 1st inversion (E4 G4 C5)</span>
        <span class="chip" data-play="seq:slashCEcmp">🔊 ③ Compare: C → C/E</span>
        <span class="chip" data-play="notes:7,12,16">🔊 C/G = 2nd inversion (G4 C5 E5)</span>
      </div>
      <p><b>What's it for?</b> One word: <b>smoothness</b>. Moving from C to F with both in root position, the bass leaps from C4 to F4 (a big jump); slip a <b>C/E</b> in between and the bass line becomes an elegant staircase C4 → E4 → F4. This "walking bassline" is a staple of pop arranging. Switch keys to hear (chord names and octaves written in C major):</p>
      <div class="row">
        <span class="chip" data-play="kseq:slashA">🔊 Root positions only: C→F (bass jumps C4 to F4)</span>
        <span class="chip" data-play="kseq:slashB">🔊 With the C/E step: C→C/E→F (bass walks C4→E4→F4)</span>
      </div>
      ${keyBar(false,true)}
      <p style="font-size:12.5px;color:var(--muted)">Side note: an in-chord bass can also be played as "triad unchanged, extra bass E4 added underneath" — both count as C/E, both correct; accompaniments more often use the inversion, whose close voicing sounds smoother.</p>

      <p><b>Case 2 · the requested bass is NOT in the chord: no inversion can produce it — keep the triad as is and add that bass underneath.</b></p>
      <p style="line-height:1.9;color:#e9e3ff">
        Take <b>C/D</b>: D isn't in the C chord (C E G has no D); no rearrangement can put D at the bottom — you can only "add below":<br>
        ① Plain <b>C</b>: C4 E4 G4 — the lowest lit key is C4.<br>
        ② <b>C/D</b>: the upper three notes <b>don't move at all</b>; a <b>bass D3 is added an octave below</b> — the lowest lit key becomes D3.<br>
        ③ Back to back: a "foreign foundation" D appears underneath — the color instantly turns hazy and floating, perfect "intro/transition" material.</p>
      <div class="row">
        <span class="chip" data-play="seq:slashCroot">🔊 ① C (C4 E4 G4)</span>
        <span class="chip" data-play="seq:slashCD">🔊 ② C/D (D3 + C4 E4 G4)</span>
        <span class="chip" data-play="seq:slashCDcmp">🔊 ③ Compare: C → C/D</span>
        <span class="chip" data-play="seq:slashFGcmp">🔊 Another pair: F (F4 A4 C5) → F/G (bass G3 added)</span>
      </div>
      ${keyBar(false,true)}
      <p style="font-size:12.5px;color:var(--muted)">"Isn't D3 awfully far below that C4?" — No: that gap is a bass's natural habitat. Low registers obey a rule of thumb — <b>the lower the register, the wider the intervals must be</b>: a 2nd hugging the bass (say E3 right on D3) turns to mud, while the gap keeps things clean. To narrow it in practice, <b>re-arrange the upper three notes into another inversion</b> (the upper structure is free):</p>
      <div class="row">
        <span class="chip" data-play="seq:slashCD">🔊 Standard: D3 + C4 E4 G4</span>
        <span class="chip" data-play="seq:slashCDv2">🔊 Practical variant: D3 + G3 C4 E4 (upper in 2nd inversion — smaller gap)</span>
      </div>
      <p><b>What does "adding a bass" do?</b> A foreign bass <b>tints</b> the chord: the upper three notes stay the same, but the overall color immediately follows the bass's character — usually turning <b>hazy, floating, expectant</b> (you just heard it in C/D). So these chords mostly serve as <b>set-up, transition, suspense</b> in songs — not as "periods".</p>
      <details class="note"><summary>Extra: what if the same hand shape moves up an octave?</summary>
        <div style="line-height:1.8;color:#e9e3ff">
          <p>Shift the variant's shape up one octave: <b>D4 + G4 C5 E5</b>. Not a single note name changed — but the role did: <b>D4 has left the bass register and no longer feels like a "foundation"; the whole chord becomes a light, airy mid-high texture</b> (guitar-register / pad-like), and the "bass + chord" layering disappears.</p>
          <div class="row">
            <span class="chip" data-play="seq:slashCDv2">🔊 Low octave: D3 + G3 C4 E4 (foundation + chord)</span>
            <span class="chip" data-play="seq:slashCDv3">🔊 Up an octave: D4 + G4 C5 E5 (one airy sheet)</span>
          </div>
          <p style="font-size:12.5px;color:var(--muted)">Takeaway: <b>register decides role</b> — the same notes an octave down are "a bass carrying a chord"; an octave up they're just a color. That's why a slash chord's bass usually needs to actually live in the bass register.</p>
        </div>
      </details>
      <details class="note"><summary>Extra: why is D the example? Wouldn't A or B work?</summary>
        <div style="line-height:1.8;color:#e9e3ff">
          <p>Try it — put <b>A</b> under C E G: A C E G… that's level ⑥'s <b>root-position Am7</b>! Put <b>B</b> under: B with C E G = <b>an inversion of Cmaj7</b>. Add A or B in the bass and the chord <b>shape-shifts</b> into a 7th chord you already know — warm or dreamy, not "foreign" at all:</p>
          <div class="row">
            <span class="chip" data-play="seq:slashAm7">🔊 Add A: A3+C4 E4 G4 (= Am7 — a warm familiar face)</span>
            <span class="chip" data-play="seq:slashCmaj7">🔊 Add B: B3+E4 G4 C5 (= Cmaj7 inverted — a dreamy familiar face)</span>
            <span class="chip" data-play="seq:slashCD">🔊 Add D: a true "alien foundation" (hazy new color)</span>
          </div>
          <p>That's why charts almost never write C/A or C/B — they'd just write Am7 or Cmaj7. <b>Only notes that can't stack into a 7th chord, like D, create the genuinely new slash color</b> — which is exactly why C/D and F/G became the classics.</p>
        </div>
      </details>
      <p><b>The most famous added bass is F/G</b> (G3 + F4 A4 C5) — hazy, rounded, suspended without the sting; a pop-ballad favorite right before the chorus:</p>
      <div class="row">
        <span class="chip" data-play="seq:slashFG">🔊 F/G alone (G3 F4 A4 C5 — hazy, no sting)</span>
        <span class="chip" data-play="seq:slashFGC">🔊 Hear it land on C (easing the door open)</span>
      </div>
      <p style="font-size:12.5px;color:var(--muted)">Why can it stand in for G7 as "the soft dominant→tonic"? Finish level ⑫ "Resolution", then come back and take it apart.</p>

      <p><b>One table to sum up both cases:</b></p>
      <table class="ctab"><tr><th>Case</th><th>Examples</th><th>How to play</th></tr>
        <tr><td>Bass <b>is</b> a chord tone</td><td>C/E, G/B, C/G</td><td>Play an <b>inversion</b> (same notes, new lowest); or keep the triad and add the bass below</td></tr>
        <tr><td>Bass is <b>not</b> a chord tone</td><td>C/D, F/G</td><td>No inversion exists — <b>keep the triad as is and add that bass underneath</b></td></tr></table>
      <p>The Canon descent is the classic "bass down the staircase" pattern: the bass walks <b>C4→B3→A3→G3→F3</b> step by step. Real songs usually <b>loop</b> it — tap once to hear, or loop it directly:</p>
      <div class="row"><span class="chip" data-play="kloopseq:canonS">🔁 Canon descent: C→G/B→Am→C/G→F (bass C4 B3 A3 G3 F3)</span></div>
      ${keyBar(false,true)}
      ${loopBar()}`;
    case "resolve": return `
      <p>This level is about one word: <b>resolution</b>. It's where everything converges — V7's tension from level ⑥, inversions and slash notation from ⑨⑩, and the leading tone from ⑪ all get assembled into one craft here. But before learning "how", the first job is understanding <b>what it is and why it exists</b>.</p>
      <p style="background:rgba(92,230,192,.09);border-left:3px solid var(--p3);padding:10px 14px;border-radius:6px"><b>Scope, up front:</b> resolution isn't G7's private property — it's what <b>every "tense chord before going home" must do</b>: V7, V, vii°, level ⑩'s F/G, the borrowed ♭VII, even minor's E7 (level ⑱). <b>Any tense chord wanting to fall back onto the stable tonic follows the same laws of resolution.</b> We use <b>G7→I as the specimen</b>: its tension is maximal (carrying both a leading tone and a tritone), so its voice motion is the most complete and easiest to hear — the ideal case for nailing the laws. Learn it and every other tense chord copies the same playbook.</p>

      <details class="note" open><summary><b>What is "resolution"? Why does music need it?</b></summary>
        <div style="line-height:1.8;color:#e9e3ff">
          <p><b>Music's engine is the alternation of tension and release.</b> Music that's always stable is a stagnant pond; music that's always tense is suffocating — hear both extremes for yourself:</p>
          <div class="row">
            <span class="chip" data-play="seq:rsStag">🔊 Always stable: the C chord on repeat (a stagnant pond, going nowhere)</span>
            <span class="chip" data-play="seq:rsTense">🔊 Always tense: E7→A7→D7→G7 (each promises home, none delivers — suffocating)</span>
          </div>
          <p>Good music <b>draws the bow fully, then lets the arrow fly</b>. An unstable note or chord (like V7) is the drawn bow: hearing it, the ear automatically <b>expects</b> a stable landing. First, feel "drawn but never released":</p>
          <div class="row">
            <span class="chip" data-play="notes:-5,-1,2,5">🔊 G7 alone (G3 B3 D4 F4), then silence (bow drawn — hanging, uncomfortable)</span>
            <span class="chip" data-play="seq:rsClose">🔊 The same G7 → C (the arrow flies — exhale)</span>
          </div>
          <p><b>Resolution is the answer to that expectation</b>: the instant an unstable note <b>lands</b> on its proper stable home and the tension releases. Its purpose is equally plain — punctuation: with resolution a phrase is "finished"; without it, the music hangs forever (level ⑪'s cadences are, at bottom, resolutions of various strengths).</p>
          <p><b>But why does a note "want" to go somewhere?</b> Because <b>the pull comes from distance</b>. When two notes sit a half step apart, the unstable one gets strongly sucked toward the stable one — the closer, the harder the pull; a whole step away and the pull slackens. Not a rule — an instinct of the ear (you compared it in level ⑪):</p>
          <div class="row">
            <span class="chip" data-play="mel:-1,0">🔊 B3 → C4 (a half step away — sucked through the door)</span>
            <span class="chip" data-play="mel:-2,0">🔊 B♭3 → C4 (a whole step — the pull goes slack)</span>
          </div>
          <p><b>The last puzzle piece: resolution happens note by note.</b> A chord isn't a blob of sound but <b>several simultaneous "voices"</b> — like singers in a small choir. Saying "play C after G7" only names the destination; the real resolving happens inside each voice — <b>every note must find its own landing</b>, and only when each one has a place to go is the "resolution" complete. Yet the roads are already drawn by the pull: notes gripped by a half step must settle onto their neighbor; ungripped notes step to the nearest chord tone or stay put. Every voice takes the shortest, smoothest path — spelled out rule by rule below.</p>
        </div>
      </details>

      <details class="note" open><summary><b>Two names to keep apart: root and tonic</b></summary>
        <div style="line-height:1.8;color:#e9e3ff">
          <p>A triad's three members are the <b>root, 3rd and 5th</b>; a 7th chord has one more member — its four are the <b>root, 3rd, 5th and 7th</b>.</p>
          <p><b>Root and tonic are two different concepts</b>: <b>the root is a chord's first note in root position</b> (the bottom one) — G7's root is G; <b>the tonic is a key's first note</b> — C major's tonic is C. Keep them apart, and the crucial sentence "the dominant's root moves to the key's tonic (G→C)" reads cleanly.</p>
        </div>
      </details>

      <p>Take C major's <b>G7 = G·B·D·F</b> (root-position stacking: G3 B3 D4 F4) resolving to the tonic — hear it once:</p>
      <div class="row">
        <span class="chip" data-play="notes:-5,-1,2,5">🔊 First hear G7 (G3 B3 D4 F4)</span>
        <span class="chip" data-play="seq:rsClose">🔊 Then the resolution (G7 → C)</span>
      </div>
      <p style="margin-bottom:4px">Let's look closely at how it resolves to C, voice by voice (<b style="color:#ff7a59">orange = departing note</b> → <b style="color:#5ce6a0">green = arrival note</b>); after the four, hear them together:</p>
      <div class="row">
        <span class="chip" data-play="vlead:0">🔊 G3→C3</span>
        <span class="chip" data-play="vlead:1">🔊 B3→C4</span>
        <span class="chip" data-play="vlead:2">🔊 D4→C4</span>
        <span class="chip" data-play="vlead:3">🔊 F4→E4</span>
        <span class="chip" data-play="vlead:chord">🎹 Full chords</span>
      </div>
      <p style="background:rgba(92,230,192,.09);border-left:3px solid var(--p3);padding:10px 14px;border-radius:6px">
        <b>The whole thing in one sentence: resolution is letting each note of G7 move to the nearest — and legal — tonic-chord tone (C·E·G).</b><br>
        G7 is the drawn bow, I is the relaxed home — each of the four notes picks a tonic tone to land on, by the shortest reasonable path, and the chord is "home". "<b>Legal</b>" carries two clauses: ① notes gripped by the half-step magnet (the tendency tones) have their direction <b>locked</b> — you can't go the wrong way just because it's closer; ② several notes <b>landing on the same tonic tone (overlap) is fully allowed</b>. The three rules below simply break "nearest + legal" into three cases — whose direction is locked, who may go nearest freely, and whose path (the bass voice) is special.
      </p>
      <p>Unpack rule by rule:</p>

      <details class="note" open><summary><b>Rule 1 · tendency tones must move — direction locked</b></summary>
        <div style="line-height:1.8;color:#e9e3ff">
          <p>G7 holds two <b>tendency tones</b> gripped by half-step magnets: <b>B (the leading tone) must rise a half step to C</b>; <b>F (the 7th) must fall a half step to E</b>. Mind the word "must" — <b>the directions are locked</b>, not a by-product of proximity:</p>
          <div class="row">
            <span class="chip" data-play="mel:-1,0">🔊 B3 → C4 (half step up)</span>
            <span class="chip" data-play="mel:5,4">🔊 F4 → E4 (half step down)</span>
            <span class="chip" data-play="mel:11,12">🔊 Any octave, same story: B4 → C5 (the leading tone always rises)</span>
          </div>
          <p><b>Why locked?</b> B and F are the tritone (the spikiest interval), and the only way to dissolve it is <b>contrary motion inward</b>: B↑ and F↓, landing together on C–E (a major third) — that's when the sting goes. <b>Send F upward too (parallel motion)</b> — B3→C4, F4→G4 — and you get the hollow perfect fifth C–G: the 3rd E is gone, so it rings empty and unresolved; the sting is gone but the sentence isn't closed either:</p>
          <div class="row">
            <span class="chip" data-play="notes:-1,5">🔊 The tritone B3+F4 (the sting)</span>
            <span class="chip" data-play="notes:0,4">🔊 ✅ Contrary motion → C4+E4 (a major third — sting gone, closes solidly)</span>
            <span class="chip" data-play="notes:0,7">🔊 ❌ F leaps up → C4+G4 (a bare fifth — hollow, unresolved)</span>
          </div>
          <p style="font-size:12.5px;color:var(--muted)">A caution: don't mis-file "the required direction" as "move nearest". The leading tone B actually has a half step on both sides (C above, B♭ below), yet only <b>rising to the tonic C</b> counts as resolution — the direction is fixed by the <b>pull</b> (toward a stable tone in the key), not by distance. Likewise the 7th F may only fall to E.</p>
        </div>
      </details>

      <details class="note" open><summary><b>Rule 2 · other upper voices: move nearest (landings may overlap)</b></summary>
        <div style="line-height:1.8;color:#e9e3ff">
          <p>Terms first: of a chord's several voices, <b>the lowest is the "bass voice" (a.k.a. the bass / lower voice); all the others are "upper voices"</b>. Take the G7 above (G3 B3 D4 F4) — G3 is the bass voice; B3, D4 and F4 are all upper voices.</p>
          <p>Upper voices gripped by the magnets (B, F) belong to rule 1; <b>the rest just move "nearest"</b> — to the closest tonic tone. In G7 that's the 5th, <b>D</b>: <b>down to C or up to E, both legal</b>. <b>A priority guideline: when the direction is free, pick the one that helps complete the tonic's three notes (C·E·G)</b> — if the other voices already supply C and G but the 3rd E is missing, D rises to E to complete the chord; absent that need, choose by register and melodic line. Hear each (<b style="color:#ff7a59">orange = depart</b> → <b style="color:#5ce6a0">green = arrive</b>):</p>
          <div class="row">
            <span class="chip" data-play="vlead:chord">🎹 Full picture: G7→C</span>
            <span class="chip" data-play="vpair:2,0">🔊 D→C (down · joins the root)</span>
            <span class="chip" data-play="vpair:2,4">🔊 D→E (up · becomes the 3rd)</span>
          </div>
          <p><b>An important addendum: landings may overlap.</b> The rules demand that <b>every note have a proper destination</b> — not that destinations differ. Two voices landing on the same note (a unison) is fully legal. Hear these two: <b>B and D both reach C4</b>, their green lights on the same key:</p>
          <div class="row">
            <span class="chip" data-play="vpair:-1,0">🔊 B→C4 (leading tone)</span>
            <span class="chip" data-play="vpair:2,0">🔊 D→C4 (5th)</span>
          </div>
          <p style="font-size:12.5px;color:var(--muted)">Both legal, both landing on C4 — a unison overlap is fully allowed. (For the overlap heard in a full chord, replay the "Full chords" button above.)</p>
        </div>
      </details>

      <details class="note"><summary>Extra: sometimes some notes don't need to move</summary>
        <div style="line-height:1.8;color:#e9e3ff">
          <p>In certain special cases, an <b>upper-voice note is already in the target chord, isn't the lowest note, and needn't move to complete the chord</b> — then it can stay still. The classic case is <b>V64 → I</b> (the <b>second inversion</b> of the dominant — the 5th, D, in the bass).</p>
          <p>The four notes are <b>D3 · G3 · B3 · D4</b>, each resolving to C (<b style="color:#ff7a59">orange = depart</b> → <b style="color:#5ce6a0">green = arrive</b>):</p>
          <div class="row">
            <span class="chip" data-play="vpair:-10,-12">🔊 D3→C3 (bass steps down)</span>
            <span class="chip" data-play="vpair:-5,-5">🔊 G3→G3 (common tone · stays put!)</span>
            <span class="chip" data-play="vpair:-1,0">🔊 B3→C4 (leading tone up)</span>
            <span class="chip" data-play="vpair:2,4">🔊 D4→E4 (5th up · supplies the 3rd)</span>
            <span class="chip" data-play="vchord:-10,-5,-1,2;-12,-5,0,4">🎹 Full picture: V64 → C</span>
          </div>
          <p><b>G3 never moves — that's "staying put".</b> The other three move as usual: the bass D3 steps to C3, the leading tone B3 slides into C4, and the other D4 rises to E4 to supply the 3rd. Landing <b>C3 G3 C4 E4</b> — a complete C major triad.</p>
        </div>
      </details>

      <details class="note" open><summary><b>Rule 3 · the bass is the exception: it may leap — a 4th up = a 5th down</b></summary>
        <div style="line-height:1.8;color:#e9e3ff">
          <p>"Move nearby" governs the upper voices; <b>the bass's job is to reach the tonic chord's root — i.e. C</b>, usually leaping to the <b>nearest C</b>. That 4th/5th leap is not just legal but the very source of cadential power. <b>G→C is a special case</b>: a 4th up (to C4) and a 5th down (to C3) both reach a nearby C, so the two directions are <b>treated as roughly equivalent</b> — choose by register and by how much weight you want:</p>
          <div class="row">
            <span class="chip" data-play="seq:rsRoot">🔊 Bass leaps a 5th down, G3→C3 (deep — the heaviest period)</span>
            <span class="chip" data-play="seq:rsRootUp">🔊 Bass leaps a 4th up, G3→C4 (lighter; lands with the 5th on the same C4 — overlap is legal)</span>
          </div>
          <p>The same G <b>leaps to C when it's the bass, stays put in an upper voice</b> — two different rules; don't merge them.</p>
          <p><b>Recap · "up or down?" comes in three grades of freedom</b>: <b>tendency tones obey the pull</b> (directions locked), <b>ordinary voices obey distance</b> (nearest either way, overlap allowed), <b>the bass always goes to the nearest C</b> (special case: G→C, 4th up = 5th down).</p>
        </div>
      </details>

      <details class="note"><summary>Extra: rules 1 and 2 merged into one sentence — the "distance field" view</summary>
        <div style="line-height:1.8;color:#e9e3ff">
          <p>This is just the precise form of the opening master rule — "<b>each note goes to the nearest, legal tonic tone</b>". The upper voices need only <b>check each note's shortest distance to a tonic-chord tone (C·E·G)</b>:</p>
          <p>· <b>Distance 0</b> (it IS a chord tone) → <b>stay put</b>: G.<br>
             · <b>A half step</b> (hugging a chord tone) → <b>must resolve onto it</b>: B→C, F→E — no direction to memorize; it points at the neighbor automatically.<br>

      <p>Welcome to the advanced class! Write songs using only one key's diatonic chords (say C major's all-white-key family) and after a while everything sounds too tame, too safe. The songs that raise goosebumps — even tears — often sit in a safe major key and <b>suddenly borrow an "alien" chord</b>. That's <b>modal interchange / borrowed chords</b>.</p>
      <p><b>What is borrowing?</b> Level ⑯ hung the address plate: C major's <b>parallel universe</b> is C minor; level ⑰ handed you the C-minor family list (Cm, D°, E♭, Fm, Gm, A♭, B♭). Borrowing means: while playing a sunny C-major song, reach into that list, "borrow" one wistful chord, then give it back. That momentary shift of light is devastatingly effective.</p>
      <details class="note" open><summary><b>Example 1 · pop's deadliest weapon: the minor four iv (the tear-jerker)</b></summary>
        <div style="line-height:1.8;color:#e9e3ff">

          </div>

            <span class="chip" data-play="kseq:borrowYes">🔊 With the tear-jerker: 1–4–4m–1 (in C: C→F→Fm→C)</span>

      <p>一个调里的和弦各有"职责"，按职责分三类<b>功能</b>——对应一段旅程：<b>家 → 出发 → 紧张 → 回家</b>(三类功能依次坐镇前三站，"回家"就是重新回到"家"——也就是紧张的释放)。先把这个比喻本身说清楚：</p>

      <details class="note" open><summary><b>"旅程"比喻的到底是什么？家、出发、回家分别指什么？</b></summary>
        <div style="line-height:1.8;color:#e9e3ff">
          <p><b>旅程 = 一个乐句级别的和弦进行</b>——通常 2~8 个和弦、几小节长，大约就是"一句歌词唱完"的那一小段。它<b>不是</b>整首歌，也不是单个音：一首歌由许多段这样的小旅程<b>首尾相接</b>组成——主歌绕几圈、副歌绕几圈(第⑬关的循环套路就是被反复走的旅程)，每一段要么走完"家→出发→紧张→回家"的整圈，要么故意停在半路。</p>
          <p>· <b>"家" = 主和弦给出的稳定基准</b>。调一确定，家就固定了(C 大调的家=C 和弦)：听到它，耳朵觉得"可以停、说完了"。它是每段旅程的起点和终点候选。<br>
             · <b>"出发" = 离开稳定</b>。换到下属类和弦，音乐"动起来"了——还不紧张，但已经不在家里，句子有了去向。<br>
             · <b>"紧张" = 回家前被拉满的弓</b>。走到属类和弦时，紧张感达到顶点——它的<b>来源</b>是和弦里的导音(紧贴主音半音之下，被狠狠吸住，本关下面专讲)；它的<b>作用</b>是把耳朵的期待拉到最满——没有这一下蓄力，"回家"就平淡无奇，紧张越足，落地越痛快。<br>
