function repBars(obj, labelFn){
  const rows=Object.entries(obj).map(([k,v])=>({title:labelFn(k), correct:v.correct, total:v.total, pct:v.total?Math.round(v.correct/v.total*100):0})).sort((a,b)=>a.pct-b.pct);
  if(!rows.length) return {html:`<p class="hint" style="text-align:center">还没有作答记录。</p>`, weak:null};
  const html=rows.map((r,i)=>`<div class="reprow ${i===0&&rows.length>1?'weak':''}">
       <span class="rn">${r.title}</span>
       <span class="rbar"><i style="width:${r.pct}%"></i></span>
       <span class="rp">${r.pct}% (${r.correct}/${r.total})</span>
     </div>`).join("");
  return {html, weak: rows.length>1?rows[0].title:null};
}

// 综合测验：先随机选一个类别，再选其中一个概念
function pickComprehensive(){
  const cat = rand(Object.keys(TRAIN_CATS));
  const pool = TRAIN_CATS[cat].concepts;
  const concept = state.weightMode==="real" ? weightedPick(pool, c=>FREQ[cat][c]||1) : rand(pool);
  return {cat, concept};
}
function nextTestQuestion(){
  let q,sig,tries=0;
  do{
    let cat, concept, forceBuild;
    if(state.train.comprehensive){
      const sel=pickComprehensive(); cat=sel.cat; concept=sel.concept; forceBuild=false;
    } else {
      cat=state.train.cat; concept=pickTrainConcept();
      forceBuild = TRAIN_CATS[cat].type==="chord" && state.train.pick!=="all"; // 锁定单一和弦→搭建题
    }
    q = makeTrainQuestion(cat, concept, forceBuild);
    q.cat = cat;
    sig = cat+"|"+q.concept+"|"+q.qtype; tries++;
  } while(sig===lastSig && tries<12);
  lastSig=sig; cur=q; renderQuestion();
}

function startPractice(keep){ // keep=true：切语言就地重绘，保留当前题目/卡片
  if(!keep) window.scrollTo(0,0);
  const {cat,pick}=state.train;

  if(!["chord","interval","diatonic"].includes(t)){

    document.getElementById("backbtn").onclick=renderTraining;

  }
  state.flow="practice"; autoplay=false;

  app.innerHTML=`
    <button class="back" id="backbtn">← ${tr("返回训练场","Back to Training")}</button>

function nextPracQuestion(){
  let q,sig,tries=0;
  do{
    const cat=state.train.cat, concept=pickTrainConcept();
    q=makeTrainQuestion(cat, concept, false); q.cat=cat;
    sig=cat+"|"+q.concept+"|"+q.qtype; tries++;
  } while(sig===lastSig && tries<12);
  lastSig=sig; cur=q; renderQuestion();
}
let curPrac=null; // 当前闪卡（切语言时就地重挂）
function nextPractice(){
  const {cat}=state.train;

}

const PIANO_LOW=48, PIANO_HIGH=84; // C3..C6 三个八度：低八度主要给演示用(低音线/远调移调)，练习题仍以 C4..C6 为主
function renderPiano(buildMode){

  let whites=[]; for(let m=PIANO_LOW;m<=PIANO_HIGH;m++){ if(![1,3,6,8,10].includes(m%12)) whites.push(m); }
  const wpct=100/whites.length;

  const BK_SHIFT={1:-0.12, 3:0.12, 6:-0.15, 8:0, 10:0.15}; // 单位：白键宽

// 把音符时值粗略换算成点亮时长(毫秒)；齐奏(1n)亮约2秒后熄灭
function durToMs(d){ return {"8n":340,"4n":620,"2n":1000,"1n":2000}[d] || 600; }
// 跟随 lastPlayed 的时间线点亮键盘(可指定哪一个键盘容器)：先全熄，再随每个音响起点亮、到时熄灭
function lightAlong(rootSel="#piano"){
  const root=document.querySelector(rootSel); if(!root) return;
  const clearAll=()=>root.querySelectorAll('.key').forEach(k=>k.classList.remove('reveal','lit','vfrom','vto'));
  const clearHint=()=>root.querySelectorAll('.key.hint').forEach(k=>k.classList.remove('hint'));
  // 取消上一轮所有待执行的亮/熄定时器，避免快速连按时旧的"熄灯"盖掉新的"点亮"
  if(root._lightTimers) root._lightTimers.forEach(clearTimeout);
  root._lightTimers=[];
  const later=(fn,ms)=>root._lightTimers.push(setTimeout(fn,ms));
  clearAll();
  lastPlayed.forEach((ev,idx)=>{
    const at=Math.round(ev.t*1000);
    if(ev.hint){ // 黄色"当前和弦"提示：换和弦时整组切换，不参与逐音的熄灯节奏
      later(()=>{ clearHint();
        ev.midis.forEach(m=>{ const k=root.querySelector(`.key[data-m="${m}"]`); if(k) k.classList.add('hint'); });
      }, at);
      return;
    }
    later(clearAll, at);                 // 每个音/和弦响起前先全熄
    later(()=>{                          // 稍后再点亮 → 共有音也会"重新亮一下"
      ev.midis.forEach(m=>{
        const exact=root.querySelector(`.key[data-m="${m}"]`);
        const keys = exact ? [exact] : [...root.querySelectorAll(`.key[data-pc="${m%12}"]`)];
        keys.forEach(k=>k.classList.add("reveal"));
      });
    }, at+70);
    if(idx===lastPlayed.length-1) later(()=>{ clearAll(); clearHint(); }, at+70+durToMs(ev.dur)); // 末尾全部熄灭
  });
}

// 逐声部演示 G7→C 的解决：每对"出发音(橙)→到达音(绿)"先后弹出，最后齐奏到达和弦
// 通用单声部演示：from(出发音·橙) → to(到达音·绿)；from===to 表示共同音原地保留
async function playVPair(from,to){
  await initAudio();
  const piano=document.querySelector("#piano");
  const clr=()=>{ if(piano) piano.querySelectorAll('.key').forEach(k=>k.classList.remove('reveal','lit','vfrom','vto')); };
  if(piano){ if(piano._lightTimers) piano._lightTimers.forEach(clearTimeout); piano._lightTimers=[]; }
  const later=(fn,ms)=>{ const id=setTimeout(fn,ms); if(piano){ piano._lightTimers=piano._lightTimers||[]; piano._lightTimers.push(id);} };
  const lite=(s,cls)=>{ if(!piano) return; const k=piano.querySelector(`.key[data-m="${60+s}"]`); if(k) k.classList.add(cls); };
  const now=Tone.now(); clr();
  const GAP=0.5;
  if(from===to){                                  // 共同音：仍弹两次，先橙(出发)后绿(到达)——同一个键，强调"不动"
    synth.triggerAttackRelease(semiToName(from,60),"4n",now);
    later(()=>{ clr(); lite(from,'vfrom'); }, 0);
    synth.triggerAttackRelease(semiToName(to,60),"4n",now+GAP);
    later(()=>{ const k=piano&&piano.querySelector(`.key[data-m="${60+to}"]`); if(k) k.classList.remove('vfrom'); lite(to,'vto'); }, Math.round(GAP*1000));
    later(clr, Math.round(GAP*1000)+1300); return;
  }
  synth.triggerAttackRelease(semiToName(from,60),"4n",now);                // 出发音(橙)
  later(()=>{ clr(); lite(from,'vfrom'); }, 0);
  synth.triggerAttackRelease(semiToName(to,60),"4n",now+GAP);              // 到达音(绿)
  later(()=>{ const k=piano&&piano.querySelector(`.key[data-m="${60+from}"]`); if(k) k.classList.remove('vfrom'); lite(to,'vto'); }, Math.round(GAP*1000));
  later(clr, Math.round(GAP*1000)+1300);
}
// 整和弦全貌：先齐奏 fromArr(橙) 再齐奏 toArr(绿)
async function playChordPair(fromArr,toArr){
  await initAudio();
  const piano=document.querySelector("#piano");
  const clr=()=>{ if(piano) piano.querySelectorAll('.key').forEach(k=>k.classList.remove('reveal','lit','vfrom','vto')); };
  if(piano){ if(piano._lightTimers) piano._lightTimers.forEach(clearTimeout); piano._lightTimers=[]; }
  const later=(fn,ms)=>{ const id=setTimeout(fn,ms); if(piano){ piano._lightTimers=piano._lightTimers||[]; piano._lightTimers.push(id);} };
  const lite=(s,cls)=>{ if(!piano) return; const k=piano.querySelector(`.key[data-m="${60+s}"]`); if(k) k.classList.add(cls); };
  const now=Tone.now(); clr();
  synth.triggerAttackRelease(fromArr.map(s=>semiToName(s,60)),"2n",now);
  later(()=>{ clr(); fromArr.forEach(s=>lite(s,'vfrom')); }, 0);
  const t=0.95;
  synth.triggerAttackRelease(toArr.map(s=>semiToName(s,60)),"1n",now+t);
  later(()=>{ clr(); toArr.forEach(s=>lite(s,'vto')); }, Math.round(t*1000));
  later(clr, Math.round(t*1000)+1600);
}
// arg = "0".."3" 播单条声部的"出发(橙)→到达(绿)"；arg="chord" 播末尾柱式齐奏
async function playVoiceLead(arg){
  await initAudio();
  const piano=document.querySelector("#piano");
  const clr=()=>{ if(piano) piano.querySelectorAll('.key').forEach(k=>k.classList.remove('reveal','lit','vfrom','vto')); };
  if(piano){ if(piano._lightTimers) piano._lightTimers.forEach(clearTimeout); piano._lightTimers=[]; }
  const later=(fn,ms)=>{ const id=setTimeout(fn,ms); if(piano){ piano._lightTimers=piano._lightTimers||[]; piano._lightTimers.push(id);} };
  const lite=(s,cls)=>{ if(!piano) return; const k=piano.querySelector(`.key[data-m="${60+s}"]`); if(k) k.classList.add(cls); };
  const unlite=(s)=>{ if(!piano) return; const k=piano.querySelector(`.key[data-m="${60+s}"]`); if(k) k.classList.remove('vfrom'); };
  const now=Tone.now();
  clr();
  if(arg==="chord"){                              // 完整和弦：先齐奏 G7(橙) 再齐奏解决和弦 C·C·E(绿)
    const g7=[-5,-1,2,5], finalCh=[-12,0,4];
    synth.triggerAttackRelease(g7.map(s=>semiToName(s,60)),"2n",now);
    later(()=>{ clr(); g7.forEach(s=>lite(s,'vfrom')); }, 0);
    const t=0.95;
    synth.triggerAttackRelease(finalCh.map(s=>semiToName(s,60)),"1n",now+t);
    later(()=>{ clr(); finalCh.forEach(s=>lite(s,'vto')); }, Math.round(t*1000));
    later(clr, Math.round(t*1000)+1600);
    return;
  }
  const pairs=[[-5,-12],[-1,0],[2,0],[5,4]];      // G3→C3 · B3→C4 · D4→C4 · F4→E4
  const [from,to]=pairs[+arg]; const GAP=0.5;
  synth.triggerAttackRelease(semiToName(from,60),"4n",now);               // 出发音(橙)
  later(()=>{ clr(); lite(from,'vfrom'); }, 0);
  synth.triggerAttackRelease(semiToName(to,60),"4n",now+GAP);             // 到达音(绿)
  later(()=>{ unlite(from); lite(to,'vto'); }, Math.round(GAP*1000));
  later(clr, Math.round(GAP*1000)+1300);
}

let scaleStripTimers=[]; // 台阶动画的待执行定时器：新一轮开始时先全部取消，避免上一轮的"熄灯"盖掉这一轮的"点亮"
function animateScaleStrip(gap=400){
  scaleStripTimers.forEach(clearTimeout); scaleStripTimers=[];
  for(let i=0;i<8;i++){ const sn=document.getElementById("sn"+i); if(sn) sn.classList.remove("on"); }
  for(let i=0;i<7;i++){ const sg=document.getElementById("sg"+i); if(sg) sg.classList.remove("on"); }

    scaleStripTimers.push(setTimeout(()=>{

      if(i>0){ const sg=document.getElementById("sg"+(i-1)); if(sg) sg.classList.add("on"); }
    }, i*gap));
  }
  scaleStripTimers.push(setTimeout(()=>{
    for(let i=0;i<8;i++){ const sn=document.getElementById("sn"+i); if(sn) sn.classList.remove("on"); }
    for(let i=0;i<7;i++){ const sg=document.getElementById("sg"+i); if(sg) sg.classList.remove("on"); }

function toast(msg){
  const t=document.getElementById("toast"); t.textContent=msg; t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),1800);
}
function confetti(n=16){
  const colors=["#ff7a59","#ffcf5c","#5ce6c0","#7aa7ff","#c98bff"];
  for(let i=0;i<n;i++){
    const c=document.createElement("div"); c.className="confetti";
    c.style.left=(Math.random()*100)+"vw"; c.style.background=rand(colors);
    c.style.transform=`rotate(${Math.random()*360}deg)`;
    document.body.appendChild(c);
    const dur=900+Math.random()*700;
    c.animate([{transform:`translateY(0) rotate(0)`,opacity:1},
      {transform:`translateY(${60+Math.random()*40}vh) rotate(${Math.random()*720}deg)`,opacity:0}],
      {duration:dur,easing:"cubic-bezier(.3,.6,.4,1)"});
    setTimeout(()=>c.remove(),dur);
  }
}
