function playProgDegs(degs){ playChordSeq(degs.map(d=>diatonicChordSemis(0,d,false))); }
function q_pop(concept){
  const p=rand(POPP);
  const play=()=>playProgDegs(p.degs);
  // 套路扩到 6 个后，选项仍取 4 个：正确项 + 随机 3 个干扰
  const pick4=(mapFn)=>shuffle([p, ...shuffle(POPP.filter(x=>x.name!==p.name)).slice(0,3)]).map(mapFn);
  if(concept==="mood"){
    return {kind:"choice",concept,qtype:tr("流行套路 · 情绪色彩","Progressions · mood"),
      prompt:tr(`套路 <b>${p.name}</b>（${p.rn}）通常表达哪种情绪色彩？`,`What mood does the progression <b>${p.name}</b> (${p.rn}) usually carry?`), play,
      options:pick4(x=>({label:tx(x.mood),correct:x.name===p.name})),
      explain:tr(`${p.name}（${p.rn}）= ${p.mood}。在 C 大调里是 ${p.c}。`,`${p.name} (${p.rn}) = ${tx(p.mood)}. In C major: ${p.c}.`)};
  }
  if(concept==="derive"){
    return {kind:"choice",concept,qtype:tr("流行套路 · 级数转和弦","Progressions · degrees→chords"),
      prompt:tr(`在 <b>C 大调</b>里，套路 <b>${p.name}</b>（${p.rn}）依次是哪四个和弦？`,`In <b>C major</b>, which four chords spell <b>${p.name}</b> (${p.rn})?`), play,
      options:pick4(x=>({label:x.c,correct:x.name===p.name})),
      explain:tr(`${p.name} 在 C 大调 = <b>${p.c}</b>。`,`${p.name} in C major = <b>${p.c}</b>.`)};
  }
  return {kind:"choice",concept,qtype:tr("流行套路 · 盲听扒谱","Progressions · blind ID"),
    prompt:tr(`听这段进行(C 大调钢琴)，它是哪个套路？`,`Listen (piano, C major) — which progression is this?`), play,
    options:pick4(x=>({label:x.name+"（"+x.rn+"）",correct:x.name===p.name})),
    explain:tr(`这是 <b>${p.name}</b>（${p.rn}）= ${p.c}，${p.mood}。`,`That's <b>${p.name}</b> (${p.rn}) = ${p.c} — ${tx(p.mood)}.`)};
}

/* ---- 第13关 挂留和弦 sus ---- */
const SUS={sus4:{iv:[0,5,7],deg:"1 4 5",repl:"四音"}, sus2:{iv:[0,2,7],deg:"1 2 5",repl:"二音"}};
function q_sus(concept){
  const root=rand([0,2,4,5,7,9]); const rn=sharp(NOTE_NAMES[root]);
  if(concept==="build"){
    const t=rand(["sus4","sus2"]); const S=SUS[t];
    return {kind:"build",concept,qtype:tr("挂留 · 在键盘上搭出","Sus · build it"),
      prompt:tr(`搭出 <b>${rn}${t}</b>（${S.deg}；把三音换成${S.repl}）。`,
                `Build <b>${rn}${t}</b> (${S.deg}; the 3rd is replaced by the ${t==="sus4"?"4th":"2nd"}).`),
      play:()=>playSemis(S.iv.map(x=>x+root),60,true),
      targetPC:S.iv.map(x=>(x+root)%12), rootSemi:root,
      explain:tr(`${rn}${t} = ${S.iv.map(x=>sharp(NOTE_NAMES[(x+root)%12])).join(" ")}（${S.deg}），没有三音，所以听起来悬空。`,
                 `${rn}${t} = ${S.iv.map(x=>sharp(NOTE_NAMES[(x+root)%12])).join(" ")} (${S.deg}) — no 3rd, hence the floating sound.`)};
  }
  if(concept==="hear"){
    const isSus=Math.random()<0.5; const iv=isSus?SUS.sus4.iv:[0,4,7];
    return {kind:"choice",concept,qtype:tr("挂留 · 悬空还是落地","Sus · floating or landed"),
      prompt:tr(`听这个和弦：它是"悬在半空(sus)"，还是"稳稳落地(普通大三和弦)"？`,
                `Listen: is this chord floating (sus) or firmly landed (a plain major triad)?`),
      play:()=>playSemis(iv.map(x=>x+root),60,true),
      options:[{label:tr("悬空感（sus）","Floating (sus)"),sub:tr("没有三音，漂浮、想解决","no 3rd — drifts, wants resolving"),correct:isSus},
               {label:tr("落地感（大三和弦）","Landed (major triad)"),sub:tr("有三音，稳定","has a 3rd — stable"),correct:!isSus}],
      explain:isSus?tr("这是 sus 和弦——缺了三音，听起来悬空。","That's a sus chord — missing its 3rd, it floats.")
                   :tr("这是普通大三和弦——有三音，稳定落地。","That's a plain major triad — the 3rd grounds it.")};
  }
  const t=rand(["sus4","sus2"]);
  return {kind:"choice",concept,qtype:tr("挂留 · 有没有三音","Sus · is there a 3rd"),
    prompt:tr(`<b>${rn}${t}</b> 里有没有"三音"(决定大小调的那个音)？`,
              `Does <b>${rn}${t}</b> contain a 3rd (the note that decides major vs minor)?`),
    play:()=>playSemis(SUS[t].iv.map(x=>x+root),60,true),
    options:[{label:tr("没有","No"),sub:tr("sus 把三音换掉了，不分大小调","sus replaces the 3rd — neither major nor minor"),correct:true},
             {label:tr("有","Yes"),correct:false}],
    explain:tr(`sus 的核心就是<b>把三音拿掉</b>，换成${SUS[t].repl}。所以 ${rn}${t} 里没有三音。`,
               `The whole point of sus is <b>removing the 3rd</b>, replacing it with the ${t==="sus4"?"4th":"2nd"} — so ${rn}${t} has no 3rd.`)};
}

/* ---- 第15关 平行宇宙的入口 ---- */
function q_parmin(concept){
  if(concept==="flat367"){
    if(Math.random()<0.5){
      return {kind:"choice",concept,qtype:tr("平行小调 · 降了哪些级","Parallel minor · which degrees drop"),
        prompt:tr(`<b>C 小调</b>相对同主音的 <b>C 大调</b>，降低了哪些级数的音？`,
                  `Compared with <b>C major</b> (same tonic), which scale degrees does <b>C minor</b> lower?`),
        play:()=>playSemis([...NAT_MINOR,12],60,true,"8n",{gap:0.4,stack:false}),
        options:[
          {label:tr("3、6、7 级","Degrees 3, 6, 7"), sub:"E→E♭ A→A♭ B→B♭", correct:true},
          {label:tr("2、6、7 级","Degrees 2, 6, 7"), correct:false},
          {label:tr("3、5、7 级","Degrees 3, 5, 7"), correct:false},
          {label:tr("只有 3 级","Only degree 3"), correct:false},
        ],
        explain:tr(`平行小调=同主音、降 <b>3、6、7</b> 级：E→E♭、A→A♭、B→B♭。三个降号让世界瞬间变暗。`,
                   `Parallel minor = same tonic, degrees <b>3, 6, 7</b> lowered: E→E♭, A→A♭, B→B♭. Three flats instantly darken the world.`)};
    }
    const deg=rand([3,6,7]), majS={3:4,6:9,7:11}[deg], minS=majS-1;
    const mj=sharp(NOTE_NAMES[majS]), mi=sharp(NOTE_NAMES[minS]);
    return {kind:"choice",concept,qtype:tr("平行小调 · 降后的音名","Parallel minor · the lowered note"),
      prompt:tr(`C 大调的第 ${deg} 级是 <b>${mj}</b>。换到 <b>C 小调</b>，它变成哪个音？`,
                `Degree ${deg} of C major is <b>${mj}</b>. In <b>C minor</b>, what does it become?`),
      play:()=>playSemis([majS,minS],60,true,"2n",{stack:false,gap:0.6}),
      options:uniqPick(["D","E♭","E","F","G","A♭","A","B♭","B"], mi, 4).map(n=>({label:n,correct:n===mi})),
      explain:tr(`C 小调把 3、6、7 级各降半音：第 ${deg} 级 ${mj} → <b>${mi}</b>。`,
                 `C minor lowers degrees 3, 6, 7 by a half step: degree ${deg} ${mj} → <b>${mi}</b>.`)};
  }
  if(concept==="relpar"){
    const v=Math.random();
    if(v<0.34){ // 关系小调
      const mn=rand(MKEY_LIST), M=MKEYS[mn];
      return {kind:"choice",concept,qtype:tr("关系/平行 · 找关系小调","Relative/parallel · find the relative minor"),
        prompt:tr(`<b>${M.rel} 大调</b>的【关系小调】(用同一批音、家搬到第 6 级)是？`,
                  `What is the <b>relative minor</b> of <b>${M.rel} major</b> (same notes, home moved to degree 6)?`),
        play:()=>playSemis(fitSemis([...NAT_MINOR,12].map(x=>x+M.root)),60,true,"8n",{gap:0.4,stack:false}),
        options:uniqPick(MKEY_LIST, mn, 4).map(n=>({label:n+tr(" 小调"," minor"),correct:n===mn})),
        explain:tr(`关系小调的主音在大调第 6 级：${M.rel} 大调的第 6 级是 ${mn}，所以是 <b>${mn} 小调</b>(同一批音，家不同)。`,
                   `The relative minor's tonic sits on degree 6: degree 6 of ${M.rel} major is ${mn}, so it's <b>${mn} minor</b> (same notes, different home).`)};
    }
    if(v<0.67){ // 平行小调
      const kn=rand(RKEY_LIST);
      const relMn = MKEY_LIST.find(m=>MKEYS[m].rel===kn);
      const opts=[{label:kn+tr(" 小调"," minor"), sub:tr("同一个主音","same tonic"), correct:true}];
      if(relMn) opts.push({label:relMn+tr(" 小调"," minor"), sub:tr("那是关系小调","that's the relative minor"), correct:false});
      shuffle(MKEY_LIST.filter(m=>m!==kn&&m!==relMn)).slice(0, relMn?2:3).forEach(n=>opts.push({label:n+tr(" 小调"," minor"),correct:false}));
      return {kind:"choice",concept,qtype:tr("关系/平行 · 找平行小调","Relative/parallel · find the parallel minor"),
        prompt:tr(`<b>${kn} 大调</b>的【平行小调】(同一个主音、降 3·6·7)是？`,
                  `What is the <b>parallel minor</b> of <b>${kn} major</b> (same tonic, degrees 3·6·7 lowered)?`),
        play:()=>playSemis(fitSemis([...NAT_MINOR,12].map(x=>x+RKEYS[kn].root)),60,true,"8n",{gap:0.4,stack:false}),
        options:opts,
        explain:tr(`平行小调=<b>同主音</b>：${kn} 大调 ↔ <b>${kn} 小调</b>。${relMn?`(${relMn} 小调是它的"关系"小调——同音不同家，别混。)`:""}`,
                   `Parallel minor = <b>same tonic</b>: ${kn} major ↔ <b>${kn} minor</b>. ${relMn?`(${relMn} minor is its relative minor — same notes, different home; don't mix them up.)`:""}`)};
    }
    const isRel=Math.random()<0.5;
    const mn=rand(MKEY_LIST), M=MKEYS[mn];
    const pairTxt = isRel ? tr(`${M.rel} 大调 与 ${mn} 小调`,`${M.rel} major and ${mn} minor`) : tr(`${M.rel} 大调 与 ${M.rel} 小调`,`${M.rel} major and ${M.rel} minor`);
    return {kind:"choice",concept,qtype:tr("关系/平行 · 判断关系","Relative/parallel · name the relationship"),
      prompt:tr(`<b>${pairTxt}</b>，它们是什么关系？`,`<b>${pairTxt}</b> — what is their relationship?`),
      options:[
        {label:tr("关系大小调","Relative keys"), sub:tr("同一批音，家不同","same notes, different home"), correct:isRel},
        {label:tr("平行大小调","Parallel keys"), sub:tr("同一个主音，音不同","same tonic, different notes"), correct:!isRel},
        {label:tr("没有特殊关系","No special relationship"), correct:false},
      ],
      explain: isRel
        ? tr(`${mn} 小调和 ${M.rel} 大调用<b>同一批音</b>(家从 ${M.rel} 搬到 ${mn})——这是<b>关系</b>大小调。`,
             `${mn} minor and ${M.rel} major share <b>the same notes</b> (home moves from ${M.rel} to ${mn}) — they are <b>relative</b> keys.`)
        : tr(`${M.rel} 小调和 ${M.rel} 大调共用<b>同一个主音 ${M.rel}</b>(但 3·6·7 降了)——这是<b>平行</b>大小调。`,
             `${M.rel} minor and ${M.rel} major share <b>the same tonic ${M.rel}</b> (with 3·6·7 lowered) — they are <b>parallel</b> keys.`)};
  }
  // pair：纯听辨 明亮世界 vs 暗夜世界
  const isMinor=Math.random()<0.5;
  if(Math.random()<0.5){ // 和弦版
    const r=rand([0,2,4,5,7,9]);
    return {kind:"choice",concept,qtype:tr("听辨 · 明亮的家还是忧郁的家","By ear · bright home or moody home"),
      prompt:tr("听这个主和弦：它来自明亮世界(大三和弦 I)，还是暗夜世界(小三和弦 i)？",
                "Listen to this tonic chord: bright world (major triad, I) or night world (minor triad, i)?"),
      play:()=>playSemis((isMinor?[0,3,7]:[0,4,7]).map(x=>x+r),60,true),
      options:[
        {label:tr("明亮的大三和弦（I）","Bright major triad (I)"), sub:tr("三音离根音 4 个半音","3rd is 4 semitones above the root"), correct:!isMinor},
        {label:tr("忧郁的小三和弦（i）","Moody minor triad (i)"), sub:tr("三音离根音 3 个半音","3rd is 3 semitones above the root"), correct:isMinor},
      ],
      explain: isMinor?tr("三音低半音——这是<b>小三和弦</b>，暗夜世界的家。","The 3rd sits a half step lower — a <b>minor triad</b>, home of the night world.")
                      :tr("三音亮堂堂——这是<b>大三和弦</b>，明亮世界的家。","A bright 3rd — a <b>major triad</b>, home of the bright world.")};
  }
  const r=rand([0,2,5,7,9]);
  return {kind:"choice",concept,qtype:tr("听辨 · 大调音阶还是小调音阶","By ear · major or minor scale"),
    prompt:tr("听这条音阶(8 个音)：它是大调还是(自然)小调？","Listen to this scale (8 notes): is it major or (natural) minor?"),
    play:()=>playSemis(fitSemis([...(isMinor?NAT_MINOR:MAJOR_SCALE),12].map(x=>x+r)),60,true,"8n",{gap:0.4,stack:false}),
    options:[
      {label:tr("大调（全全半全全全半）","Major (W W H W W W H)"), sub:tr("明亮、开阔","bright, open"), correct:!isMinor},
      {label:tr("小调（全半全全半全全）","Minor (W H W W H W W)"), sub:tr("阴郁、柔暗","dark, soft"), correct:isMinor},
    ],
    explain: isMinor?tr("第 3 个台阶就变暗了——<b>自然小调</b>。","It darkens on the 3rd step — <b>natural minor</b>.")
                    :tr("亮堂的台阶——<b>大调</b>。","Bright steps — <b>major</b>.")};
}

/* ---- 第16关 暗夜家族(小调顺阶和弦) ---- */
const ROMAN_MIN=["i","ii°","III","iv","v","VI","VII"];
const MIN_QUAL=["小三和弦","减三和弦","大三和弦","小三和弦","小三和弦","大三和弦","大三和弦"];
const MIN_SUF=["m","dim","","m","m","",""];
const CM_FAM=[ // C 小调全家(借货清单)
  {n:"Cm",s:[0,3,7]},{n:"Ddim",s:[2,5,8]},{n:"E♭",s:[3,7,10]},{n:"Fm",s:[5,8,12]},
  {n:"Gm",s:[7,10,14]},{n:"A♭",s:[8,12,15]},{n:"B♭",s:[10,14,17]},
];
function minChordName(mn,deg){ return MKEYS[mn].notes[deg-1]+MIN_SUF[deg-1]; }
function q_minfam(concept){
  const mn=rand(MKEY_LIST), M=MKEYS[mn], deg=1+Math.floor(Math.random()*7);
  const semis=minDiaChordSemis(M.root,deg,false);
  const play=()=>playSemis(fitSemis(semis),60,true);
  if(concept==="min_diatonic"){
    return {kind:"choice",concept,qtype:tr("小调顺阶 · 推性质","Minor diatonic · work out the quality"),
      prompt:tr(`在 <b>${mn} 自然小调</b>里，以第 ${deg} 级音(${M.notes[deg-1]})为根音叠出的三和弦，是哪种性质？`,
                `In <b>${mn} natural minor</b>, what is the quality of the triad stacked on degree ${deg} (${M.notes[deg-1]})?`),
      play,
      options:[ // 科班固定顺序：大→小→增→减
        {label:tx("大三和弦"), correct:MIN_QUAL[deg-1]==="大三和弦"},
        {label:tx("小三和弦"), correct:MIN_QUAL[deg-1]==="小三和弦"},
        {label:tx("增三和弦"), correct:false},
        {label:tx("减三和弦"), correct:MIN_QUAL[deg-1]==="减三和弦"},
      ],
      explain:tr(`自然小调的第 ${deg} 级是<b>${MIN_QUAL[deg-1]}</b>(${ROMAN_MIN[deg-1]} = ${minChordName(mn,deg)})。记住小调口诀：<b>小 减 大 小 小 大 大</b>。`,
                 `Degree ${deg} of natural minor is a <b>${tx(MIN_QUAL[deg-1])}</b> (${ROMAN_MIN[deg-1]} = ${minChordName(mn,deg)}). Memorize the minor pattern: <b>min dim MAJ min min MAJ MAJ</b>.`)};
  }
  if(concept==="min_roman"){
    if(Math.random()<0.5){ // 罗马数字 → 实际和弦
      const correct=minChordName(mn,deg);
      const pool=[1,2,3,4,5,6,7].map(d=>minChordName(mn,d));
      return {kind:"choice",concept,qtype:tr("小调罗马数字 · 译成和弦","Minor Roman numerals · translate to a chord"),
        prompt:tr(`在 <b>${mn} 自然小调</b>里，<b>${ROMAN_MIN[deg-1]}</b> 级对应哪个实际和弦？`,
                  `In <b>${mn} natural minor</b>, which actual chord is <b>${ROMAN_MIN[deg-1]}</b>?`),
        play,
        options:uniqPick(pool, correct, 4).map(n=>({label:n,correct:n===correct})),
        explain:tr(`${mn} 自然小调音阶为 ${M.notes.join("、")}。第 ${deg} 级音是 ${M.notes[deg-1]}，小调的 ${ROMAN_MIN[deg-1]} 级是${MIN_QUAL[deg-1]}，因此是 <b>${correct}</b>。`,
                   `The ${mn} natural minor scale is ${M.notes.join(", ")}. Degree ${deg} is ${M.notes[deg-1]}, and ${ROMAN_MIN[deg-1]} in minor is a ${tx(MIN_QUAL[deg-1])}, so it's <b>${correct}</b>.`)};
    }
    const correct=ROMAN_MIN[deg-1];
    return {kind:"choice",concept,qtype:tr("小调罗马数字 · 反查级数","Minor Roman numerals · find the degree"),
      prompt:tr(`在 <b>${mn} 小调</b>里，和弦 <b>${minChordName(mn,deg)}</b> 是第几级(罗马数字)？`,
                `In <b>${mn} minor</b>, which degree (Roman numeral) is the chord <b>${minChordName(mn,deg)}</b>?`),
      play,
      options:uniqPick(ROMAN_MIN, correct, 4).map(n=>({label:n,correct:n===correct})),
      explain:tr(`${minChordName(mn,deg)} 的根音 ${M.notes[deg-1]} 是 ${mn} 小调的第 ${deg} 个音，所以是 <b>${correct}</b>(${MIN_QUAL[deg-1]}→${correct.match(/[a-z]/)?"小写":"大写"}${deg===2?"+°":""})。`,
                 `The root of ${minChordName(mn,deg)}, ${M.notes[deg-1]}, is note ${deg} of ${mn} minor, so it's <b>${correct}</b> (${tx(MIN_QUAL[deg-1])} → ${correct.match(/[a-z]/)?"lowercase":"uppercase"}${deg===2?" + °":""}).`)};
  }
  if(concept==="build"){
    const names=semis.map(x=>sharp(NOTE_NAMES[((x%12)+12)%12]));
    return {kind:"build",concept,qtype:tr("小调顺阶 · 在键盘上搭出","Minor diatonic · build it"),
      prompt:tr(`在键盘上搭出 <b>${mn} 小调的 ${ROMAN_MIN[deg-1]} 级</b>三和弦(${minChordName(mn,deg)} = ${M.notes[deg-1]} 起隔一个取一个，共 3 个音，不限八度)。`,
                `Build the <b>${ROMAN_MIN[deg-1]} triad of ${mn} minor</b> on the keyboard (${minChordName(mn,deg)} = start on ${M.notes[deg-1]}, take every other scale note, 3 notes total, any octave).`),
      play, targetPC:semis.map(x=>((x%12)+12)%12), rootSemi:((M.root+NAT_MINOR[deg-1])%12),
      explain:tr(`${mn} 小调 ${ROMAN_MIN[deg-1]} = <b>${minChordName(mn,deg)}</b>(${names.join(" ")})，${MIN_QUAL[deg-1]}。`,
                 `${ROMAN_MIN[deg-1]} of ${mn} minor = <b>${minChordName(mn,deg)}</b> (${names.join(" ")}), a ${tx(MIN_QUAL[deg-1])}.`)};
  }
  // family：C 小调借货清单专项
  if(Math.random()<0.6){
    const d=1+Math.floor(Math.random()*7), c=CM_FAM[d-1];
    return {kind:"choice",concept,qtype:tr("借货清单 · C 小调家族","Borrow list · the C-minor family"),
      prompt:tr(`<b>C 小调</b>(C 大调的平行宇宙)的第 ${d} 级(${ROMAN_MIN[d-1]})是哪个和弦？`,
                `In <b>C minor</b> (the parallel universe of C major), which chord is degree ${d} (${ROMAN_MIN[d-1]})?`),
      play:()=>playSemis(c.s,60,true),
      options:uniqPick(CM_FAM.map(x=>x.n), c.n, 4).map(n=>({label:n,correct:n===c.n})),
      explain:tr(`C 小调音阶 C D E♭ F G A♭ B♭，套口诀"小减大小小大大"：第 ${d} 级 = <b>${c.n}</b>。这张表就是离调借用的"借货清单"。`,
                 `C-minor scale: C D E♭ F G A♭ B♭; apply "min dim MAJ min min MAJ MAJ": degree ${d} = <b>${c.n}</b>. This table is the "borrow list" used for modal borrowing.`)};
  }
  return {kind:"choice",concept,qtype:tr("借货清单 · 催泪弹溯源","Borrow list · trace the tear-jerker"),
    prompt:tr(`大调歌里那枚"催泪弹"——<b>四级小和弦 iv</b>，在 C 大调语境下借来的是哪个和弦？`,
              `That tear-jerker in major songs — the <b>minor four, iv</b> — in the key of C major, which chord is borrowed?`),
    play:()=>playSemis([5,8,12],60,true),
    options:uniqPick(CM_FAM.map(x=>x.n), "Fm", 4).map(n=>({label:n,correct:n==="Fm"})),
    explain:tr(`从平行宇宙 C 小调的清单里借第 4 级：<b>Fm</b>(F A♭ C)。第⑲关「离调借用」就靠它催泪。`,
               `Borrow degree 4 from the parallel-universe C-minor list: <b>Fm</b> (F A♭ C). Level ⑲ "Borrowed Chords" relies on it for the tears.`)};
}

/* ---- 第17关 小调的回家路 v/V7 ---- */
function q_minv(concept){
  const mn=rand(MKEY_LIST), M=MKEYS[mn];
  const dRoot=(M.root+7)%12, dName=sharp(NOTE_NAMES[dRoot]);
  if(concept==="raise7"){ // 第一步：升第 7 音 / 和声小调音阶
    const v=Math.random();
    if(v<0.25){
      return {kind:"choice",concept,qtype:tr("和声小调 · 升的是第几音","Harmonic minor · which note is raised"),
        prompt:tr(`"和声小调"是把自然小调的<b>第几个音升高半音</b>得到的？`,
                  `"Harmonic minor" is made by raising <b>which note</b> of natural minor by a half step?`),
        options:[ // 按级数从小到大固定排列
          {label:tr("第 3 音","Note 3"), correct:false},
          {label:tr("第 5 音","Note 5"), correct:false},
          {label:tr("第 6 音","Note 6"), correct:false},
          {label:tr("第 7 音","Note 7"), sub:tr("造出导音","creates the leading tone"), correct:true},
        ],
        explain:tr(`升<b>第 7 音</b>(如 A 小调的 G→G♯)，让它紧贴主音、成为导音——其余 6 个音一个不动。`,
                   `Raise <b>note 7</b> (e.g. G→G♯ in A minor) so it hugs the tonic and becomes the leading tone — the other 6 notes don't move.`)};
    }
    if(v<0.5){ // 升完之后第 7 音是谁(避开 F♯ 小调的 E♯ 拼写)
      const m2=rand(MKEY_LIST.filter(k=>k!=="F♯")), r2=MKEYS[m2].root, ltName=sharp(NOTE_NAMES[(r2+11)%12]);
      return {kind:"choice",concept,qtype:tr("和声小调 · 升完是哪个音","Harmonic minor · the raised note"),
        prompt:tr(`<b>${m2} 和声小调</b>的第 7 个音(也就是被升出来的<b>导音</b>)是哪个？`,
                  `What is the 7th note of <b>${m2} harmonic minor</b> (the raised <b>leading tone</b>)?`),
        play:()=>playSemis(fitSemis([r2+11,r2+12]),60,true,"2n",{stack:false,gap:0.6}),
        options:uniqPick(["G♯","D♯","A♯","C♯","F♯","B","E","G"], ltName, 4).map(n=>({label:n,correct:n===ltName})),
        explain:tr(`主音 ${m2} 下方半音 = <b>${ltName}</b>。自然小调只有低一个全音的第 7 音，升半音才得到它。`,
                   `A half step below the tonic ${m2} = <b>${ltName}</b>. Natural minor's 7th note sits a whole step below; raising it a half step gets you there.`)};
    }
    if(v<0.75){ // 听辨 自然 vs 和声 音阶
      const isHarm=Math.random()<0.5;
      const pat=isHarm?[0,2,3,5,7,8,11]:NAT_MINOR;
      return {kind:"choice",concept,qtype:tr("和声小调 · 音阶听辨","Harmonic minor · scale by ear"),
        prompt:tr(`听这条小调音阶(${mn} 小调，8 个音)：它是<b>自然小调</b>还是<b>和声小调</b>？注意结尾那一步。`,
                  `Listen to this minor scale (${mn} minor, 8 notes): is it <b>natural</b> or <b>harmonic</b> minor? Watch the final step.`),
        play:()=>playSemis(fitSemis([...pat,12].map(x=>x+M.root)),60,true,"8n",{gap:0.4,stack:false}),
        options:[
          {label:tr("自然小调","Natural minor"), sub:tr("结尾 全音→主音，平平地走完","ends with a flat whole step into the tonic"), correct:!isHarm},
          {label:tr("和声小调","Harmonic minor"), sub:tr("结尾 半音蹭进主音，且第6→7步格外宽(异域味)","slides a half step into the tonic; step 6→7 is extra wide (exotic)"), correct:isHarm},
        ],
        explain: isHarm?tr(`结尾是<b>半音吸进主音</b>、第 6→7 步特别宽(增二度)——这是<b>和声小调</b>。`,
                           `It gets <b>sucked into the tonic by a half step</b>, and step 6→7 is extra wide (augmented 2nd) — <b>harmonic minor</b>.`)
                       :tr(`结尾平平地隔着全音走回主音——这是<b>自然小调</b>。`,
                           `It strolls back to the tonic a whole step away — <b>natural minor</b>.`)};
    }
    // 搭建和声小调音阶
    const semis8=[0,2,3,5,7,8,11,12].map(x=>x+M.root);
    return {kind:"build",concept,qtype:tr("和声小调 · 在键盘上搭出","Harmonic minor · build it"),
      prompt:tr(`在键盘上搭出 <b>${mn} 和声小调</b>：从主音 ${mn} 到高八度共 <b>8 个音</b>——前 6 个和自然小调一样，<b>第 7 个音升高半音</b>(整体移八度也算对)。`,
                `Build <b>${mn} harmonic minor</b> on the keyboard: <b>8 notes</b> from the tonic ${mn} up an octave — the first 6 match natural minor, <b>note 7 is raised a half step</b> (shifting the whole thing an octave is fine).`),
      play:()=>playSemis(fitSemis(semis8),60,true,"8n",{gap:0.4,stack:false}),
      targetMidis:semis8.map(x=>60+x), rootSemi:M.root, flashStart:[60+M.root],
      explain:tr(`${mn} 和声小调 = 自然小调升第 7 音：${M.notes.slice(0,6).join(" ")} <b>${sharp(NOTE_NAMES[(M.root+11)%12])}</b> ${mn}。`,
                 `${mn} harmonic minor = natural minor with a raised 7th: ${M.notes.slice(0,6).join(" ")} <b>${sharp(NOTE_NAMES[(M.root+11)%12])}</b> ${mn}.`)};
  }
  if(concept==="chord5"){ // 第二步：第 5 级和弦为什么/怎么变
    const v=Math.random();
    if(v<0.34){
      return {kind:"choice",concept,qtype:tr("v→V · 为什么会变","v→V · why does it change"),
        prompt:tr(`只是升了音阶的<b>第 7 个音</b>，为什么第 5 级和弦就从小三和弦(v)变成了大三和弦(V)？`,
                  `We only raised <b>note 7</b> of the scale — why does the 5th-degree chord turn from a minor triad (v) into a major triad (V)?`),
        play:()=>playChordSeq([[4,7,11],[4,8,11]]), // Em → E：只动了中间的三音
        options:[
          {label:tr("第 7 音恰好是第 5 级和弦的三音，升它=三音升高半音","Note 7 happens to be the 3rd of the V chord; raising it raises the chord's 3rd"), sub:tr("5级和弦=第5·7·2个音叠的","the V chord stacks notes 5·7·2"), correct:true},
          {label:tr("因为根音也跟着升了","Because the root also went up"), correct:false},
          {label:tr("因为五音也跟着升了","Because the 5th also went up"), correct:false},
          {label:tr("没有真变，只是写法不同","It didn't really change — just notation"), correct:false},
        ],
        explain:tr(`第 5 级三和弦由第 <b>5、7、2</b> 个音叠成(A 小调=E G B)。被升的第 7 音正是中间的<b>三音</b>：G→G♯ 让小三度变大三度，Em→E。`,
                   `The 5th-degree triad stacks notes <b>5, 7, 2</b> (in A minor: E G B). The raised note 7 is exactly the chord's middle <b>3rd</b>: G→G♯ turns the minor 3rd major, Em→E.`)};
    }
    if(v<0.67){ // V 的构成(避开 F♯ 小调拼写)
      const m2=rand(MKEY_LIST.filter(k=>k!=="F♯")), r2=MKEYS[m2].root, b=(r2+7)%12;
      const nm=p=>sharp(NOTE_NAMES[(b+p)%12]);
      const correct=`${nm(0)} ${nm(4)} ${nm(7)}`;
      return {kind:"choice",concept,qtype:tr("v→V · 构成对比","v→V · spelling comparison"),
        prompt:tr(`<b>${m2} 和声小调</b>里，魔改后的大属和弦 <b>V</b> 由哪三个音组成？`,
                  `In <b>${m2} harmonic minor</b>, which three notes make up the upgraded major dominant <b>V</b>?`),
        play:()=>playChordSeq(minDegChords(["V"], m2)),
        options:[
          {label:correct, sub:tr("三音被升了半音","the 3rd is raised a half step"), correct:true},
          {label:`${nm(0)} ${nm(3)} ${nm(7)}`, sub:tr("这是自然的小 v","that's the natural minor v"), correct:false},
          {label:`${nm(0)} ${nm(4)} ${nm(7)} ${nm(10)}`, sub:tr("这是四个音的 V7","that's the 4-note V7"), correct:false},
          {label:`${nm(0)} ${nm(5)} ${nm(7)}`, correct:false},
        ],
        explain:tr(`V = 第 5 级大三和弦：<b>${correct}</b>(中间那个就是升出来的导音)。自然 v 则是 ${nm(0)} ${nm(3)} ${nm(7)}。`,
                   `V = the major triad on degree 5: <b>${correct}</b> (the middle note is the raised leading tone). The natural v is ${nm(0)} ${nm(3)} ${nm(7)}.`)};
    }
    const isV=Math.random()<0.5; // 单和弦听辨 v vs V：闯关阶段播"分解+柱式"(逐音听清三音)，训练场/测验只播柱式(更难)
    return {kind:"choice",concept,qtype:tr("v→V · 单和弦听辨","v→V · single chord by ear"),
      prompt:tr(`听这个 ${mn} 小调的第 5 级和弦${state.flow==="level"?"(先逐个音分解，再合奏)":""}：它是<b>自然的小 v</b>，还是<b>魔改的大 V</b>？`,
                `Listen to this 5th-degree chord in ${mn} minor${state.flow==="level"?" (notes one by one, then together)":""}: is it the <b>natural minor v</b> or the <b>upgraded major V</b>?`),
      play:()=>{ const ch=minDegChords([isV?"V":"5"], mn)[0];
        if(state.flow==="level") playSemis(ch,60,true);   // 分解后柱式，门槛友好
        else playChordSeq([ch]); },                        // 测试区：只齐奏
      options:[
        {label:tr("自然的小 v","Natural minor v"), sub:tr("柔软、暗","soft, dark"), correct:!isV},
        {label:tr("魔改的大 V","Upgraded major V"), sub:tr("明亮、紧、带劲","bright, tense, punchy"), correct:isV},
      ],
      explain: isV?tr(`三音是升过的——明亮带劲，这是<b>大 V</b>。`,`The 3rd is raised — bright and punchy: the <b>major V</b>.`)
                  :tr(`三音没升——柔软发暗，这是自然的<b>小 v</b>。`,`The 3rd isn't raised — soft and dark: the natural <b>minor v</b>.`)};
  }
  if(concept==="harmonic_resolve"){ // 原理：为什么要魔改
    return {kind:"choice",concept,qtype:tr("和声小调 · 为什么魔改","Harmonic minor · why the upgrade"),
      prompt:tr(`自然小调的第 5 级是小三和弦(v)。为什么古典与流行都常把它<b>强行改成大三和弦/属七(V、V7)</b>？`,
                `Natural minor's degree 5 is a minor triad (v). Why do classical and pop alike <b>force it into a major triad / dominant 7th (V, V7)</b>?`),
      play:()=>playChordSeq(minDegChords(["5","1h","V7","1h"], mn)), // 软/硬两种解决都向上落到高位 i
      options:[
        {label:tr("为了造出导音，获得强烈的解决/回家感","To create a leading tone and a strong sense of resolution"), sub:tr("升高第 7 音，紧贴主音","raise note 7 so it hugs the tonic"), correct:true},
        {label:tr("为了让音乐更忧郁","To make the music sadder"), correct:false},
        {label:tr("小和弦在钢琴上不好按","Minor chords are hard to finger on piano"), correct:false},
        {label:tr("乐理规定小调不能用小和弦","Theory forbids minor chords in minor keys"), correct:false},
      ],
      explain:tr(`自然 v 没有<b>导音</b>，拉不回家；升高第 7 音后 V/V7 里有了导音(还有三全音)，"句号感"立刻拉满——这就是<b>和声小调</b>的来历。`,
                 `The natural v has no <b>leading tone</b>, so it can't pull you home; raise note 7 and V/V7 gain a leading tone (plus a tritone) — instant full stop. That's where <b>harmonic minor</b> comes from.`)};
  }
  if(concept==="notation"){ // 第三步：大小写记号
    const v=Math.random();
    if(v<0.34){
      return {kind:"choice",concept,qtype:tr("记号 · V7 指谁","Notation · which chord is V7"),
        prompt:tr(`<b>${mn} 小调</b>的谱子上写着 <b>V7</b>，它指哪个和弦？`,
                  `A chart in <b>${mn} minor</b> says <b>V7</b> — which chord is that?`),
        play:()=>playChordSeq(minDegChords(["V7","1h"], mn)),
        options:uniqPick(MKEY_LIST.map(k=>sharp(NOTE_NAMES[(MKEYS[k].root+7)%12])+"7").concat([dName+"m7"]), dName+"7", 4).map(n=>({label:n,correct:n===dName+"7"})),
        explain:tr(`${mn} 小调第 5 级音是 ${dName}；<b>大写 V</b>+7 = 以它为根音的<b>属七</b>：${dName}7(含升出来的导音)。`,
                   `Degree 5 of ${mn} minor is ${dName}; <b>uppercase V</b> + 7 = the <b>dominant 7th</b> on that root: ${dName}7 (containing the raised leading tone).`)};
    }
    if(v<0.67){
      const isBig=Math.random()<0.5;
      const chordName=isBig?dName:dName+"m";
      return {kind:"choice",concept,qtype:tr("记号 · 该写大写还是小写","Notation · uppercase or lowercase"),
        prompt:tr(`在 <b>${mn} 小调</b>里出现了和弦 <b>${chordName}</b>(${isBig?"大":"小"}三和弦)。按罗马数字规则它应记作？`,
                  `The chord <b>${chordName}</b> (a ${isBig?"major":"minor"} triad) appears in <b>${mn} minor</b>. By Roman-numeral rules it's written as?`),
        play:()=>playChordSeq(minDegChords([isBig?"V":"5"], mn)),
        options:[
          {label:tr("V（大写）","V (uppercase)"), sub:tr("大写=大三和弦","uppercase = major triad"), correct:isBig},
          {label:tr("v（小写）","v (lowercase)"), sub:tr("小写=小三和弦","lowercase = minor triad"), correct:!isBig},
          {label:"VII", correct:false},
          {label:"5", correct:false},
        ],
        explain:tr(`${chordName} 是${isBig?"大":"小"}三和弦，按"大写=大、小写=小"记作 <b>${isBig?"V":"v"}</b>。${isBig?"看到大写 V 就知道：这里用了和声小调的魔改。":"小写 v 说明还是自然小调的原装货。"}`,
                   `${chordName} is a ${isBig?"major":"minor"} triad; by "uppercase = major, lowercase = minor" it's <b>${isBig?"V":"v"}</b>. ${isBig?"An uppercase V tells you the harmonic-minor upgrade is in play.":"A lowercase v means it's still natural minor's original."}`)};
    }
    return {kind:"choice",concept,qtype:tr("记号 · 大小写的含义","Notation · what case means"),
      prompt:tr(`小调谱子里把魔改后的属和弦写成<b>大写的 V</b>，为什么用大写？`,
                `In minor-key charts the upgraded dominant is written as an <b>uppercase V</b>. Why uppercase?`),
      options:[
        {label:tr("罗马数字规则：大写=大三和弦","Roman-numeral rule: uppercase = major triad"), sub:tr("它真的从小三变成了大三","it really did become major"), correct:true},
        {label:tr("因为它最重要，所以写大","Because it's the most important chord"), correct:false},
        {label:tr("因为它音量更大","Because it's louder"), correct:false},
        {label:tr("只是排版习惯","Just a typesetting habit"), correct:false},
      ],
      explain:tr(`大小写忠实反映和弦性质：升第 7 音让第 5 级<b>真的变成了大三和弦</b>，所以从小写 v 改记大写 <b>V</b>(加七度则 V7)。`,
                 `Case faithfully reflects chord quality: raising note 7 made the 5th-degree chord <b>genuinely major</b>, so lowercase v becomes uppercase <b>V</b> (add a 7th and it's V7).`)};
  }
  if(concept==="hear"){
    const useV7=Math.random()<0.5;
    return {kind:"choice",concept,qtype:tr("听辨 · 寻找最强句号","By ear · find the strongest full stop"),
      prompt:tr(`听这段小调结尾(${mn} 小调)：它用的是<b>自然的 v</b>(软)，还是<b>魔改的 V7</b>(戏剧张力·强解决)？`,
                `Listen to this minor-key ending (${mn} minor): does it use the <b>natural v</b> (soft) or the <b>upgraded V7</b> (dramatic, strong resolution)?`),
      play:()=>playChordSeq(minDegChords(useV7?["1","4","V7","1h"]:["1","4","5","1h"], mn)), // 末尾 i 在高位，引力差清晰可听
      options:[
        {label:tr("自然的 v → i","Natural v → i"), sub:tr("暗淡、没有强烈结束感","dim, weak sense of ending"), correct:!useV7},
        {label:tr("魔改的 V7 → i","Upgraded V7 → i"), sub:tr("宿命感、强烈句号","fateful, emphatic full stop"), correct:useV7},
      ],
      explain: useV7?tr(`第三个和弦里有<b>导音和三全音</b>那股"扎劲"——是 <b>V7</b>，解决到 i 干脆有力。`,
                        `The third chord has that <b>leading-tone-and-tritone</b> sting — it's <b>V7</b>, resolving to i with real punch.`)
                    :tr(`第三个和弦软软的、没有刺——是自然的 <b>v</b>，结束感弱。`,
                        `The third chord is soft, no sting — the natural <b>v</b>, with a weak sense of ending.`)};
  }
  if(concept==="cad"){
    if(Math.random()<0.5){
      return {kind:"choice",concept,qtype:tr("小调终止 · 标准句号","Minor cadence · the standard full stop"),
        prompt:tr(`古典与爵士里，<b>小调的标准终止式</b>是哪一个？`,
                  `In classical and jazz, which is the <b>standard minor-key cadence</b>?`),
        play:()=>playChordSeq(minDegChords(["1","4","V7","1h"], mn)),
        options:[
          {label:"i – iv – V7 – i", sub:tr("V7 带导音，强解决","V7 carries the leading tone — strong resolution"), correct:true},
          {label:"i – iv – v – i", sub:tr("全自然，软","all natural, soft"), correct:false},
          {label:"i – VI – III – VII", sub:tr("那是循环套路，不收尾","that's a loop, it never ends"), correct:false},
          {label:"I – IV – V – I", sub:tr("那是大调的","that's the major-key one"), correct:false},
        ],
        explain:tr(`小调标准终止 = <b>i–iv–V7–i</b>(${mn} 小调：${minChordName(mn,1)}–${minChordName(mn,4)}–${dName}7–${minChordName(mn,1)})。V7 的导音负责"句号"。`,
                   `The standard minor cadence = <b>i–iv–V7–i</b> (in ${mn} minor: ${minChordName(mn,1)}–${minChordName(mn,4)}–${dName}7–${minChordName(mn,1)}). V7's leading tone delivers the full stop.`)};
    }
    return {kind:"choice",concept,qtype:tr("小调终止 · 认出魔改和弦","Minor cadence · spot the upgraded chord"),
      prompt:tr(`进行 <b>Am – Dm – E7 – Am</b>(A 小调)里，<b>E7</b> 扮演什么角色？`,
                `In <b>Am – Dm – E7 – Am</b> (A minor), what role does <b>E7</b> play?`),
      play:()=>playChordSeq(minDegChords(["1","4","V7","1h"],"A")),
      options:[
        {label:tr("魔改的属七 V7（升了导音 G♯）","The upgraded dominant V7 (raised leading tone G♯)"), sub:tr("和声小调的产物","a product of harmonic minor"), correct:true},
        {label:tr("自然顺阶的第 5 级","The natural diatonic degree 5"), sub:tr("自然第5级应是 Em","natural degree 5 would be Em"), correct:false},
        {label:tr("从别的调借来的下属","A subdominant borrowed from another key"), correct:false},
        {label:tr("主和弦的替身","A stand-in for the tonic"), correct:false},
      ],
      explain:tr(`A 自然小调第 5 级本是 Em；E7(E G♯ B D)把 G 升成了 <b>G♯(导音)</b>——它就是和声小调的 <b>V7</b>，专职强力回家。`,
                 `Degree 5 of A natural minor would be Em; E7 (E G♯ B D) raises G to <b>G♯ (the leading tone)</b> — it's harmonic minor's <b>V7</b>, the dedicated strong way home.`)};
  }
  // buildv7：搭建任意小调的 V7
  const pcs=[dRoot,(dRoot+4)%12,(dRoot+7)%12,(dRoot+10)%12];
  return {kind:"build",concept,qtype:tr("和声小调 · 搭出 V7","Harmonic minor · build the V7"),
    prompt:tr(`在键盘上搭出 <b>${mn} 小调的 V7</b>：以 <b>${dName}</b> 为根音的<b>属七和弦</b>(1 3 5 ♭7，共 4 个音，含升高的导音，不限八度)。`,
              `Build the <b>V7 of ${mn} minor</b> on the keyboard: the <b>dominant 7th</b> rooted on <b>${dName}</b> (1 3 5 ♭7, 4 notes, including the raised leading tone, any octave).`),
    play:()=>playSemis(fitSemis([dRoot,dRoot+4,dRoot+7,dRoot+10]),60,true),
    targetPC:pcs, rootSemi:dRoot,
    explain:tr(`${mn} 小调的 V7 = <b>${dName}7</b>(${pcs.map(p=>sharp(NOTE_NAMES[p])).join(" ")})。其中 ${sharp(NOTE_NAMES[(dRoot+4)%12])} 就是被升高的导音。`,
               `V7 of ${mn} minor = <b>${dName}7</b> (${pcs.map(p=>sharp(NOTE_NAMES[p])).join(" ")}). ${sharp(NOTE_NAMES[(dRoot+4)%12])} is the raised leading tone.`)};
}

/* ---- 第18关 小调金曲走向与鉴赏 ---- */
const MPROGS=[
  {name:"i–VI–III–VII", toks:["1","6","3","7"], mood:"暗黑、史诗、电音感(动漫/EDM 标配)", eg:"Am–F–C–G"},
  {name:"i–VII–VI–V7",  toks:["1","7","6","V7"], mood:"宿命、弗拉门戈、低音下台阶", eg:"Am–G–F–E7"},
  {name:"i–iv–V7–i",    toks:["1","4","V7","1h"], mood:"古典句号、戏剧解决", eg:"Am–Dm–E7–Am"},
  {name:"VI–VII–i",     toks:["6","7","1"], mood:"上行冲锋、燃(进副歌的助跑)", eg:"F–G–Am"},
  {name:"i–VII–VI–VII", toks:["1","7","6","7"], mood:"夜车徘徊、synthwave、到不了头", eg:"Am–G–F–G"},
  {name:"i–iv–VII–III", toks:["1","4","7","3"], mood:"五度圈、顺流而下的叙事(根音逐次降五度)", eg:"Am–Dm–G–C"},
];
function q_minprog(concept){
  const mn=rand(MKEY_LIST);
  if(concept==="prog"){
    const p=rand(MPROGS);
    const opts=shuffle([p, ...shuffle(MPROGS.filter(x=>x.name!==p.name)).slice(0,3)]) // 6 个套路里取 4 个选项
      .map(x=>({label:x.name, sub:tx(x.mood), correct:x.name===p.name}));
    return {kind:"choice",concept,qtype:tr("小调走向 · 听辨认套路","Minor progressions · name it by ear"),
      prompt:tr(`盲听这段小调进行(${mn} 小调)：它是哪个走向？`,
                `Blind-listen to this minor progression (${mn} minor): which one is it?`),
      play:()=>playChordSeq(minDegChords(p.toks, mn)),
      options:opts,
      explain:tr(`这是 <b>${p.name}</b>(A 小调示例：${p.eg})——${p.mood}。`,
                 `It's <b>${p.name}</b> (A-minor example: ${p.eg}) — ${tx(p.mood)}.`)};
  }
  if(concept==="modehear"){
    const isMinor=Math.random()<0.5;
    let play, ans;
    if(isMinor){ const p=rand(MPROGS.filter((_,i)=>i!==2)); play=()=>playChordSeq(minDegChords(p.toks, mn)); ans=p.name; }
    else { const p=rand(POPP); play=()=>playChordSeq(kdegChords(p.degs.map(String), rand(RKEY_LIST))); ans=p.rn; }
    return {kind:"choice",concept,qtype:tr("听辨 · 大调套路还是小调套路","By ear · major or minor progression"),
      prompt:tr("盲听这段进行：它属于阳光开阔的<b>大调</b>世界，还是暗黑深沉的<b>小调</b>世界？",
                "Blind-listen: does this progression live in the sunny <b>major</b> world or the dark <b>minor</b> world?"),
      play,
      options:[
        {label:tr("大调世界（明亮）","Major world (bright)"), sub:tr("如 1564、4536","e.g. 1564, 4536"), correct:!isMinor},
        {label:tr("小调世界（暗黑）","Minor world (dark)"), sub:tr("如 i–VI–III–VII、史诗下行","e.g. i–VI–III–VII, the epic descent"), correct:isMinor},
      ],
      explain: isMinor?tr(`落点的"家"是小和弦——这是小调套路 <b>${ans}</b>。`,`The "home" it lands on is a minor chord — the minor progression <b>${ans}</b>.`)
                      :tr(`落点的"家"亮堂——这是大调套路 <b>${ans}</b>。`,`The "home" it lands on is bright — the major progression <b>${ans}</b>.`)};
  }
  if(concept==="mood"){
    const pool=[
      {kind:"maj", degs:["1","5","6","4"], label:tr("阳光、开阔、万能 BGM","sunny, open, all-purpose BGM"), name:tr("1564(大调)","1564 (major)")},
      {kind:"maj", degs:["4","5","3","6"], label:tr("深情、遗憾、华语抒情","tender, wistful, Mandopop ballad"), name:tr("4536(大调)","4536 (major)")},
      {kind:"min", toks:["1","6","3","7"], label:tr("暗黑、史诗、电音感","dark, epic, electronic"), name:tr("i–VI–III–VII(小调)","i–VI–III–VII (minor)")},
      {kind:"min", toks:["1","7","6","V7"], label:tr("宿命、弗拉门戈、下行","fateful, flamenco, descending"), name:tr("史诗下行(小调)","epic descent (minor)")},
    ];
    const p=rand(pool);
    return {kind:"choice",concept,qtype:tr("鉴赏 · 情绪配对","Appreciation · match the mood"),
      prompt:tr("盲听这段进行，它最贴近哪种情绪气质？","Blind-listen: which mood fits this progression best?"),
      play:()=> p.kind==="maj" ? playChordSeq(kdegChords(p.degs, rand(RKEY_LIST))) : playChordSeq(minDegChords(p.toks, mn)),
      options:pool.map(x=>({label:x.label, correct:x===p})),
      explain:tr(`这是 <b>${p.name}</b>：${p.label}。`,`That's <b>${p.name}</b>: ${p.label}.`)};
  }
  // flip：视角翻转
  const endC=Math.random()<0.5;
  return {kind:"choice",concept,qtype:tr("鉴赏 · 视角翻转","Appreciation · flip the perspective"),
    prompt:tr(`同一组和弦 <b>Am–F–C–G</b> 绕圈，最后乐句落回了${endC?"<b>C</b>":"<b>Am</b>"}。你的耳朵应该把它听成？`,
              `The same loop <b>Am–F–C–G</b> goes round, and the final phrase lands on ${endC?"<b>C</b>":"<b>Am</b>"}. Your ear should hear it as?`),
    play:()=>playChordSeq(SEQS[endC?"flipMaj":"flipMin"]),
    options:[
      {label:tr("大调的 6415（家=C，怀旧明亮）","Major 6415 (home = C, nostalgic & bright)"), correct:endC},
      {label:tr("小调的 i–VI–III–VII（家=Am，忧郁史诗）","Minor i–VI–III–VII (home = Am, brooding & epic)"), correct:!endC},
    ],
    explain:tr(`音一个没变，<b>落回谁、谁就是家</b>：落回 ${endC?"C → 大调 6415":"Am → 小调 i–VI–III–VII"}。这就是"关系大小调共用一批和弦"的实战体现。`,
               `Not a single note changed — <b>whatever it lands on is home</b>: landing on ${endC?"C → major 6415":"Am → minor i–VI–III–VII"}. This is "relative keys share the same chords" in action.`)};
}

   yes:"borrowYes", no:"borrowNo", yesTxt:"C→F→<b>Fm</b>→C，色彩在 Fm 处转暗", yesTxtEn:"C→F→<b>Fm</b>→C — the color darkens at Fm", noTxt:"C→F→G→C 全程明亮", noTxtEn:"C→F→G→C stays bright throughout",

function q_borrow(concept){
  const B=rand(BORROWS);
  if(concept==="alien"){
    return {kind:"choice",concept,qtype:tr("离调 · 揪出调外音","Borrowing · spot the out-of-key note"),
      prompt:tr(`在 <b>C 大调</b>(全白键)里借用 <b>${B.name}</b>。下列哪个音是 C 大调原本<b>没有</b>的"调外音"？`,
                `We borrow <b>${B.name}</b> into <b>C major</b> (all white keys). Which of these notes is the "alien" that C major <b>doesn't</b> have?`),
      play:()=>playSemis(B.chord,60,true),
      options:B.alienOpts.map(n=>({label:n,correct:n===B.alien})),
      explain:tr(`${B.name} 里的 <b>${B.alien}</b> 不在 C 大调里——正是它带来"${B.feel}"的色彩。(借来的和弦必含降下来的 3/6/7 级音。)`,
                 `<b>${B.alien}</b> in ${B.name} isn't in C major — it's exactly what brings the "${B.feelEn}" color. (Borrowed chords always contain a lowered 3rd/6th/7th degree.)`)};
  }
  if(concept==="hear"){
    const yes=Math.random()<0.5;
    return {kind:"choice",concept,qtype:tr("离调 · 听辨借用","Borrowing · hear it"),
      prompt:tr(B.hearQ,B.hearQEn),
      play:()=>playChordSeq(SEQS[yes?B.yes:B.no]),
      options:[{label:tr(B.hearYes,B.hearYesEn),correct:yes},{label:tr(B.hearNo,B.hearNoEn),correct:!yes}],
      explain:yes?tr(`${B.yesTxt}——这就是 ${B.name} 的"${B.feel}"。`,`${B.yesTxtEn} — that's ${B.name}'s "${B.feelEn}".`)
                 :tr(`${B.noTxt}，没有借用。`,`${B.noTxtEn} — nothing borrowed.`)};
  }
  // fill：按目标情绪选对借用和弦
  const v=Math.random();
  if(v<0.34){
    return {kind:"choice",concept,qtype:tr("离调 · 按情绪选和弦","Borrowing · pick the chord for the mood"),
      prompt:tr(`想让结尾"催泪、有余味"：<b>F(四级) → [ ? ] → C(一级)</b>，填哪个最戳心？`,
                `You want a "tearful, lingering" ending: <b>F (IV) → [ ? ] → C (I)</b> — which fill hits hardest?`),
      play:()=>playChordSeq([[5,9,12],[0,4,7]]),
      options:shuffle([{label:tr("Fm（借来的 iv）","Fm (borrowed iv)"),correct:true},
                       {label:tr("G（调内五级）","G (in-key V)"),correct:false},
                       {label:tr("B♭（借来的 ♭VII）","B♭ (borrowed ♭VII)"),sub:tr("那是豁达，不是眼泪","that's open-hearted, not tears"),correct:false},
                       {label:tr("Am（调内六级）","Am (in-key vi)"),correct:false}]),
      explain:tr(`答案是 <b>Fm</b>：F → Fm → C（4–4m–1）是"流行乐的催泪弹"。同是借用，B♭ 给的是豁达——借谁味道就是谁。`,
                 `It's <b>Fm</b>: F → Fm → C (4–4m–1) is pop music's tear-jerker. B♭ is also borrowed but gives openness — whichever chord you borrow, you get its flavor.`)};
  }
  if(v<0.67){
    return {kind:"choice",concept,qtype:tr("离调 · 按情绪选和弦","Borrowing · pick the chord for the mood"),
      prompt:tr(`想要"体育场摇滚的豁达"：<b>C(一级) → [ ? ] → F(四级)</b>，循环里填哪个？`,
                `You want "stadium-rock openness": <b>C (I) → [ ? ] → F (IV)</b> — what goes in the loop?`),
      play:()=>playChordSeq([[0,4,7],[5,9,12]]),
      options:shuffle([{label:tr("B♭（借来的 ♭VII）","B♭ (borrowed ♭VII)"),correct:true},
                       {label:tr("Fm（借来的 iv）","Fm (borrowed iv)"),sub:tr("那是眼泪，不是豁达","that's tears, not openness"),correct:false},
                       {label:tr("G（调内五级）","G (in-key V)"),sub:tr("会变紧张想回家","adds tension that wants to go home"),correct:false},
                       {label:tr("Em（调内三级）","Em (in-key iii)"),correct:false}]),
      explain:tr(`答案是 <b>B♭</b>：I–♭VII–IV(C→B♭→F)没有导音、不催促——豁达敞亮的摇滚国歌味。`,
                 `It's <b>B♭</b>: I–♭VII–IV (C→B♭→F) has no leading tone, no urgency — that wide-open rock-anthem feel.`)};
  }
  return {kind:"choice",concept,qtype:tr("离调 · 按情绪选和弦","Borrowing · pick the chord for the mood"),
    prompt:tr(`想要"最终关卡通关"的凯旋收束：<b>[ ? ] → B♭ → C</b>，第一格填哪个？`,
              `You want a "final-boss-cleared" triumphant close: <b>[ ? ] → B♭ → C</b> — what fills the first slot?`),
    play:()=>playChordSeq([[10,14,17],[12,16,19]]),
    options:shuffle([{label:tr("A♭（借来的 ♭VI）","A♭ (borrowed ♭VI)"),correct:true},
                     {label:tr("F（调内四级）","F (in-key IV)"),sub:tr("那是安稳的 IV–V–I","that's the safe IV–V–I"),correct:false},
                     {label:tr("Fm（借来的 iv）","Fm (borrowed iv)"),sub:tr("方向是变暗，不是凯旋","that turns dark, not triumphant"),correct:false},
                     {label:tr("Am（调内六级）","Am (in-key vi)"),correct:false}]),
    explain:tr(`答案是 <b>A♭</b>：♭VI–♭VII–I(A♭→B♭→C)低音逐级爬上主音——游戏/电影的"胜利公式"。`,
               `It's <b>A♭</b>: ♭VI–♭VII–I (A♭→B♭→C) climbs the bass step by step onto the tonic — the "victory formula" of games and film.`)};
}

  const panel=document.getElementById("quizpanel");
  let body="";
  if(cur.kind==="choice"){
    body = `<div class="opts" id="opts">` + cur.options.map((o,i)=>
      `<button class="opt" data-i="${i}"><span>${o.label}</span>${o.sub?`<span class="sub">${o.sub}</span>`:""}</button>`
    ).join("") + `</div>`;
  } else { // build
    buildSel=new Set(cur.preSelect||[]); // 可预选起始音
    body = `<div class="buildbar">
        <button class="submitb" id="submitBuild">${tr("提交答案","Submit")}</button>
        <button class="clearb" id="clearBuild">${tr("清空","Clear")}</button>
        <span class="selnotes" id="selnotes">${tr("已选","Selected")}：—</span>
      </div>`;
  }
  const qhead = isLevel
    ? `<div class="qhead"><span class="qtype">${cur.qtype}</span><div class="prog"><i style="width:${p.pct}%"></i></div><span class="cnt">${tr("掌握","Mastered")} ${p.done}/${p.total}</span></div>`
    : `<div class="qhead"><span class="qtype">${cur.qtype}</span></div>`;
  panel.innerHTML = `
    ${qhead}
    <div class="qprompt">${cur.prompt}</div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center">
      <button class="playbtn" id="playq">🔊 ${tr("播放声音","Play Sound")}</button>
      <button class="playbtn small" id="replayq">🔁 ${tr("再听一次","Replay")}</button>
      <button class="playbtn small" id="skipq">🎲 ${tr("换一题","New Question")}</button>
    </div>
    ${body}
    <div class="feedback" id="fb"></div>
    <button class="playbtn next" id="nextq">${tr("下一题 →","Next →")}</button>
  `;
  showDock(cur.kind==="build"); // 底部悬浮键盘
  const doPlay=()=>{ cur.play(); if(cur.flashStart) startHintBlink(cur.flashStart); }; // 播放后才提示起始音
  document.getElementById("playq").onclick=doPlay;
  document.getElementById("replayq").onclick=doPlay;
  document.getElementById("skipq").onclick=()=>{ advanceQuestion(); };
  // 一律不自动播放：等用户按"播放声音 / 再听一次"再响

  if(cur.kind==="choice"){
    document.querySelectorAll("#opts .opt").forEach(b=>{
      b.onclick=()=>answerChoice(+b.dataset.i, b);
    });
  } else {
    document.getElementById("submitBuild").onclick=submitBuild;
    document.getElementById("clearBuild").onclick=()=>{ buildSel.clear(); updateBuildUI(); };
    updateBuildUI();
  }
  document.getElementById("nextq").onclick=()=>{ document.getElementById("nextq").classList.remove("show"); advanceQuestion(); };
}

function answerChoice(i, btn){
  const opt=cur.options[i];
  const wrap=document.getElementById("opts"); if(wrap) wrap.classList.add("revealsubs"); // 作答后才显示选项小字
  document.querySelectorAll("#opts .opt").forEach((b,j)=>{
    b.disabled=true;
    if(cur.options[j].correct) b.classList.add("correct");
  });
  if(!opt.correct) btn.classList.add("wrong");
  finishAnswer(opt.correct);
}

function submitBuild(){
  let correct;
  if(cur.targetMidis){ // 形状比对：音的相对关系须完全一致，但整体移高/低若干个八度也算对(题目没指定具体哪个八度)
    const sel=[...buildSel].sort((a,b)=>a-b);
    const tgt=[...cur.targetMidis].sort((a,b)=>a-b);
    if(sel.length===tgt.length && sel.length>0){
      const d=sel[0]-tgt[0];
      correct = (d%12===0) && sel.every((v,k)=>v===tgt[k]+d);
    } else correct=false;
  } else { // 按音级比对（高低八度同名音只算一次）
    const sel=[...new Set([...buildSel].map(m=>m%12))].sort((a,b)=>a-b);
    const tgt=[...new Set(cur.targetPC)].sort((a,b)=>a-b);
    correct = sel.length===tgt.length && sel.every((v,k)=>v===tgt[k]);
    // 斜杠和弦：还要求最低音(最左/最低的键)是指定 bass
    if(correct && cur.bassPc!=null){
      const lowest = Math.min(...[...buildSel]);
      if(lowest%12 !== cur.bassPc){
        correct=false; cur._bassWrong=true; // 供反馈提示
      }
    }
  }
  document.getElementById("submitBuild").disabled=true;
  document.getElementById("clearBuild").disabled=true;
  // 只保留用户按过的键(绿色选中)，不再点亮所有同音级琴键，避免满屏彩色
  finishAnswer(correct);
}

function finishAnswer(correct){
  const fb=document.getElementById("fb");
  // 斜杠和弦：最低音按错时的专门提示
  const exTxt = (!correct && cur._bassWrong) ? ('<b style="color:var(--p1)">'+tr("注意！斜杠右边才是最低音(bass)——你最低/最左的那个键按错了。","Heads up! The note after the slash must be the LOWEST key — your bottom key was wrong.")+'</b><br>'+cur.explain) : cur.explain;
  cur._bassWrong=false;
  // 训练场练习：不计分，只给反馈
  if(state.flow==="prac"){
    fb.className="feedback "+(correct?"good":"bad")+" show";
    fb.innerHTML = correct ? `<div class="t">✅ ${tr("答对了","Correct")}</div><div>${exTxt}</div>` : `<div class="t">❌ ${tr("看看解析","See the explanation")}</div><div>${exTxt}</div>`;
    if(correct) confetti();
    document.getElementById("nextq").classList.add("show");
    return;
  }
  // 训练场测试：记分，不影响闯关掌握度
  if(state.flow==="test"){
    const s=state.score; s.total++;
    if(correct){ s.correct++; s.streak++; s.best=Math.max(s.best,s.streak); addXp(6); confetti(); }
    else { s.streak=0; }
    // 按类别记账，供成绩单
    const cat = cur.cat || state.train.cat;
    if(cat){ const bc = s.byCat[cat] || (s.byCat[cat]={correct:0,total:0}); bc.total++; if(correct) bc.correct++; }
    if(s.byDim){ const dim=dimOf(cur); const bd = s.byDim[dim] || (s.byDim[dim]={correct:0,total:0}); bd.total++; if(correct) bd.correct++; }
    updateScoreBar();
    fb.className="feedback "+(correct?"good":"bad")+" show";
    fb.innerHTML = correct
      ? `<div class="t">✅ ${tr("正确！+6 经验","Correct! +6 XP")}</div><div>${cur.explain}</div>`
      : `<div class="t">❌ ${tr("不对","Not quite")}</div><div>${exTxt}</div>`;
    document.getElementById("nextq").classList.add("show");
    return;
  }
  const mId=state.moduleId, concept=cur.concept, ms=state.mastery[mId];
  if(correct){
    ms[concept]=Math.min(MASTERY_TARGET, (ms[concept]||0)+1);
    addXp(10);
    fb.className="feedback good show";
    fb.innerHTML=`<div class="t">✅ ${tr("答对了！+10 经验","Correct! +10 XP")}</div><div>${exTxt}</div>`;
    confetti();
  } else {
    ms[concept]=0; // 答错重置，会更频繁回来
    fb.className="feedback bad show";
    fb.innerHTML=`<div class="t">❌ ${tr("再听一次～这个会再回来考你","Listen again — this one will come back")}</div><div>${exTxt}</div>`;
  }
  // 更新进度条
  const p=moduleProgress(mId);
  document.querySelector(".qhead .prog > i").style.width=p.pct+"%";
  document.querySelector(".qhead .cnt").textContent=`掌握 ${p.done}/${p.total}`;
  document.getElementById("nextq").classList.add("show");
  if(p.pct===100){
    document.getElementById("nextq").textContent="🎉 完成本关 →";
  }
}

  return `<span class="seg" id="${id}">`+opts.map(([v,l])=>`<button data-v="${v}" class="${v===cur?'on':''}">${l}</button>`).join("")+`</span>`;

function bindSeg(id, cb){

// 生成一道和弦题（forceBuild=锁定单一和弦时用搭建题）
function makeChordQuestion(cat, concept, forceBuild){
  const c=CHORDS[concept];
  const maxIv=Math.max(...c.iv);
  const root=Math.floor(Math.random()*(PIANO_HIGH-60-maxIv+1)); // 0..范围(以 C4 为基准)，保证落在键盘内
  const OPTS = cat==="triad"?TRIAD_OPTS:SEV_OPTS;
  const mode = forceBuild ? "build" : rand(["listen","color","build"]);
  if(mode==="build"){
    return {kind:"build", concept, qtype:tr("搭建 · ","Build · ")+tr(TRAIN_CATS[cat].title,CAT_EN[cat]),
      prompt:tr(`在键盘上搭出 <b>${sharp(NOTE_NAMES[root%12])}</b> 为根音的 <b>${c.name}</b>（${c.jian}）。`,
                `Build a <b>${tx(c.name)}</b> on root <b>${sharp(NOTE_NAMES[root%12])}</b> (${c.jian}).`),
      play:()=>playSemis(c.iv.map(x=>x+root),60,true),
      targetPC:c.iv.map(x=>(x+root)%12), rootSemi:root%12,
      explain:tr(`${c.name} = ${c.jian}，半音结构 ${c.iv.join("-")}；色彩：${c.color}。`,
                 `${tx(c.name)} = ${c.jian}, semitone structure ${c.iv.join("-")}; color: ${tx(c.color)}.`)};
  }
  if(mode==="color"){
    return {kind:"choice", concept, qtype:tr("色彩匹配","Color match"),
      prompt:tr("听这个和弦，它给你的感觉最接近？","Listen — which feeling fits this chord best?"),
      play:()=>playSemis(c.iv.map(x=>x+root),60,true),
      options:OPTS.map(o=>({label:tx(o.sub),sub:tx(o.label),correct:o.t===concept})),
      explain:tr(`这是 <b>${c.name}</b>，色彩：${c.color}。`,`That's a <b>${tx(c.name)}</b> — ${tx(c.color)}.`)};
  }
  return {kind:"choice", concept, qtype:tr("听辨 · ","Hearing · ")+tr(TRAIN_CATS[cat].title,CAT_EN[cat]),
    prompt:tr("听这个和弦，它是哪一种？","Listen — which chord type is this?"),
    play:()=>playSemis(c.iv.map(x=>x+root),60,true),
    options:OPTS.map(o=>({label:tx(o.label),sub:tx(o.sub),correct:o.t===concept})),
    explain:tr(`这是 <b>${c.name}</b>（${c.jian}），${c.color}。`,`That's a <b>${tx(c.name)}</b> (${c.jian}) — ${tx(c.color)}.`)};
}
// 音程题（4选1听辨）
function makeIntervalQuestion(concept){
  const iv=INTERVALS[concept].iv;
  const base=60+Math.floor(Math.random()*(PIANO_HIGH-60-iv+1));
  return {kind:"choice", concept, qtype:tr("听辨 · 音程","Hearing · intervals"),
    prompt:tr("听这两个音（先后弹出），它们是什么音程？","Listen to these two notes (played in turn) — what interval is that?"),
    play:()=>{ ivLast={base, t:Date.now()}; playSemis([0,iv], base, true, "2n", {stack:false, gap:0.45}); },
    options:INTERVAL_OPTS.map(o=>({label:tx(o.label),sub:tx(o.sub),correct:o.t===concept})), // 固定左小右大

    explain:tr(`这是 <b>${INTERVALS[concept].name}</b>（相差 ${iv} 个半音）：${INTERVALS[concept].color}。`,
               `That's a <b>${tx(INTERVALS[concept].name)}</b> (${iv} semitones): ${tx(INTERVALS[concept].color)}.`)};
}
// 调内和弦题（判断该级和弦类型）
function makeDiatonicQuestion(concept){
  const deg=+concept.slice(1); const d=DIATONIC[deg-1]; const c=CHORDS[d.type];
  return {kind:"choice", concept, qtype:tr("调内和弦","Diatonic chords"),
    prompt:tr(`在 <b>C 大调</b>里，第 <b>${deg}</b> 级（${NOTE_NAMES[d.root]}，${SCALE_DEG_NAME[deg]}）的三和弦是哪种？`,
              `In <b>C major</b>, what triad sits on degree <b>${deg}</b> (${NOTE_NAMES[d.root]})?`),
    play:()=>playSemis(c.iv.map(x=>x+d.root),60,true),
    options:[ // 固定排列：大 → 小 → 减
      {label:tx("大三和弦"),sub:tr("明亮（I IV V）","bright (I IV V)"),correct:d.type==="maj"},
      {label:tx("小三和弦"),sub:tr("柔和（ii iii vi）","soft (ii iii vi)"),correct:d.type==="min"},
      {label:tx("减三和弦"),sub:tr("紧张（vii°）","tense (vii°)"),correct:d.type==="dim"},
    ],
    explain:tr(`第${deg}级是 <b>${d.rn} = ${NOTE_NAMES[d.root]}${c.name}</b>。口诀：大小小大大小减。`,
               `Degree ${deg} is <b>${d.rn} = ${NOTE_NAMES[d.root]} ${tx(c.name)}</b>. Mnemonic: M-m-m-M-M-m-dim.`)};
}
// 按分类类型分发出题
function makeTrainQuestion(cat, concept, forceBuild){
  const t=TRAIN_CATS[cat].type;
  if(t==="chord") return makeChordQuestion(cat, concept, forceBuild);
  if(t==="interval") return concept==="degree" ? q_interval("degree") : makeIntervalQuestion(concept);
  if(t==="diatonic") return makeDiatonicQuestion(concept);
  return buildQuestion(cat, concept); // 其它模块直接复用其自身出题器
}

function trainChipLabel(cat,c){
  const m=TRAIN_SPEC_LABELS[cat]; if(m&&m[c]) return tr(m[c][0], m[c][2]);
  const t=TRAIN_CATS[cat].type;
  if(t==="chord") return tx(CHORDS[c].name);
  if(t==="interval") return tx(INTERVALS[c].name);
  const deg=+c.slice(1); return tr(`第${deg}级 ${DIATONIC[deg-1].rn}`,`Degree ${deg} ${DIATONIC[deg-1].rn}`);
}
function trainChipSub(cat,c){
  const m=TRAIN_SPEC_LABELS[cat]; if(m&&m[c]) return tr(m[c][1], m[c][3]);
  const t=TRAIN_CATS[cat].type;
  if(t==="chord") return tx(CHORDS[c].mood);
  if(t==="interval") return tx(INTERVALS[c].color.split("（")[0]);
  const deg=+c.slice(1); const d=DIATONIC[deg-1]; return NOTE_NAMES[d.root]+" · "+tx(CHORDS[d.type].name);
}

function pickTrainConcept(){
  const {cat,pick}=state.train;

  const pool=TRAIN_CATS[cat].concepts;

function dimOf(q){ // 维度判定需中英题型都能识别(英文模式下 qtype 已翻译)
  if(!q) return "听辨";
  if(q.kind==="build") return "搭建";
  const t=q.qtype||"";
  if(/移调|Transpos/i.test(t)) return "移调";
  if(/罗马数字|调内和弦|功能判断|级数转和弦|揪出|填出|Roman|Diatonic|Function|Degrees|Spot|Pick by/i.test(t)) return "分析";
  if(/听辨|色彩|听音|盲听|悬空|心碎|Hearing|Color|blind|by ear|Floating/i.test(t)) return "听辨";
  return "识谱"; // 读符号/调号/级数关系等
}
function repBars(obj, labelFn){
  const rows=Object.entries(obj).map(([k,v])=>({title:labelFn(k), correct:v.correct, total:v.total, pct:v.total?Math.round(v.correct/v.total*100):0})).sort((a,b)=>a.pct-b.pct);
  if(!rows.length) return {html:`<p class="hint" style="text-align:center">还没有作答记录。</p>`, weak:null};
  const html=rows.map((r,i)=>`<div class="reprow ${i===0&&rows.length>1?'weak':''}">
       <span class="rn">${r.title}</span>
       <span class="rbar"><i style="width:${r.pct}%"></i></span>
       <span class="rp">${r.pct}% (${r.correct}/${r.total})</span>
     </div>`).join("");
  return {html, weak: rows.length>1?rows[0].title:null};
}

// 综合测验：先随机选一个类别，再选其中一个概念
function pickComprehensive(){
  const cat = rand(Object.keys(TRAIN_CATS));
  const pool = TRAIN_CATS[cat].concepts;
  const concept = state.weightMode==="real" ? weightedPick(pool, c=>FREQ[cat][c]||1) : rand(pool);
  return {cat, concept};
}
function nextTestQuestion(){
  let q,sig,tries=0;
  do{
    let cat, concept, forceBuild;
    if(state.train.comprehensive){
      const sel=pickComprehensive(); cat=sel.cat; concept=sel.concept; forceBuild=false;
    } else {
      cat=state.train.cat; concept=pickTrainConcept();
      forceBuild = TRAIN_CATS[cat].type==="chord" && state.train.pick!=="all"; // 锁定单一和弦→搭建题
    }
    q = makeTrainQuestion(cat, concept, forceBuild);
    q.cat = cat;
    sig = cat+"|"+q.concept+"|"+q.qtype; tries++;
  } while(sig===lastSig && tries<12);
  lastSig=sig; cur=q; renderQuestion();
}

  let pianoInner="";
  whites.forEach(m=>{ const pc=m%12;
    pianoInner+=`<div class="key w" data-m="${m}" data-pc="${pc}"><span class="jp">${JIANPU[pc]}</span><span class="nm">${sharp(NOTE_NAMES[pc])}${Math.floor(m/12)-1}</span></div>`; });
  // 黑键（绝对定位骑在白键缝上）：宽≈白键的60%(物理钢琴比例)，并按 2/3 分组向组外侧微偏
  const BK_SHIFT={1:-0.12, 3:0.12, 6:-0.15, 8:0, 10:0.15}; // 单位：白键宽
  let wIdx=0;
  for(let m=PIANO_LOW;m<=PIANO_HIGH;m++){
    const pc=m%12;
    if([1,3,6,8,10].includes(pc)){
      const left = wIdx*wpct - wpct*0.30 + BK_SHIFT[pc]*wpct;
      pianoInner+=`<div class="key b" data-m="${m}" data-pc="${pc}" style="left:${left}%;width:${wpct*0.60}%"><span class="jp">${JIANPU[pc]}</span><span class="nm">${sharp(NOTE_NAMES[pc])}${Math.floor(m/12)-1}</span></div>`;
    } else { wIdx++; }
  }
  return `<div class="pianowrap">
    <div class="lbl">
      <span>${buildMode?tr("🖱️ 点击琴键来选择（再点取消）","🖱️ Click keys to select (click again to undo)"):tr("🔊 点任意键听单音 · 上排=级数 下排=音名","🔊 Tap any key · top row = degrees, bottom = note names")}</span>
      <button class="revealb" id="revealBtn">👁 ${tr("揭示刚才的音","Reveal last notes")}</button>
    </div>
    <div class="piano" id="piano">${pianoInner}</div>
  </div>`;
}
function bindPiano(buildMode){
  document.querySelectorAll("#piano .key").forEach(k=>{
    const m=+k.dataset.m;
    // 按下立即出声+变色
    const press=(e)=>{
      e.preventDefault();
      playMidi(m);
      k.classList.add("lit");           // 按住期间保持高亮
      k.classList.remove("hintblink");  // 点过就停止闪烁
      if(buildMode){
        if(buildSel.has(m)){ buildSel.delete(m); } else { buildSel.add(m); }
        updateBuildUI();
      }
    };
    const release=()=>{ k.classList.remove("lit"); }; // 松开才恢复
    k.onpointerdown=press;
    k.onpointerup=release;
    k.onpointerleave=release;
    k.onpointercancel=release;
  });
  const rb=document.getElementById("revealBtn");
  if(rb) rb.onclick=revealLast;
}
// 底部悬浮键盘：在所有需要键盘的界面常驻，滚动时不移动
function showDock(buildMode){
  const d=document.getElementById("kbDock");
  d.innerHTML=renderPiano(buildMode);
  d.style.display="block";
  document.body.classList.add("hasdock");
  bindPiano(buildMode);
}
function hideDock(){
  stopLoop(); // 离开教学/答题界面时停止循环播放
  const d=document.getElementById("kbDock");
  d.style.display="none"; d.innerHTML="";
  document.body.classList.remove("hasdock");
}

// 把音符时值粗略换算成点亮时长(毫秒)；齐奏(1n)亮约2秒后熄灭
function durToMs(d){ return {"8n":340,"4n":620,"2n":1000,"1n":2000}[d] || 600; }
// 跟随 lastPlayed 的时间线点亮键盘(可指定哪一个键盘容器)：先全熄，再随每个音响起点亮、到时熄灭
function lightAlong(rootSel="#piano"){
  const root=document.querySelector(rootSel); if(!root) return;
  const clearAll=()=>root.querySelectorAll('.key').forEach(k=>k.classList.remove('reveal','lit'));
  const clearHint=()=>root.querySelectorAll('.key.hint').forEach(k=>k.classList.remove('hint'));
  // 取消上一轮所有待执行的亮/熄定时器，避免快速连按时旧的"熄灯"盖掉新的"点亮"
  if(root._lightTimers) root._lightTimers.forEach(clearTimeout);
  root._lightTimers=[];
  const later=(fn,ms)=>root._lightTimers.push(setTimeout(fn,ms));
  clearAll();
  lastPlayed.forEach((ev,idx)=>{
    const at=Math.round(ev.t*1000);
    if(ev.hint){ // 黄色"当前和弦"提示：换和弦时整组切换，不参与逐音的熄灯节奏
      later(()=>{ clearHint();
        ev.midis.forEach(m=>{ const k=root.querySelector(`.key[data-m="${m}"]`); if(k) k.classList.add('hint'); });
      }, at);
      return;
    }
    later(clearAll, at);                 // 每个音/和弦响起前先全熄
    later(()=>{                          // 稍后再点亮 → 共有音也会"重新亮一下"
      ev.midis.forEach(m=>{
        const exact=root.querySelector(`.key[data-m="${m}"]`);
        const keys = exact ? [exact] : [...root.querySelectorAll(`.key[data-pc="${m%12}"]`)];
        keys.forEach(k=>k.classList.add("reveal"));
      });
    }, at+70);
    if(idx===lastPlayed.length-1) later(()=>{ clearAll(); clearHint(); }, at+70+durToMs(ev.dur)); // 末尾全部熄灭
  });
}
// 讲解区静态键盘示意图：lo..hi 范围，marks={midi:类名} 给指定键上色(sel=音阶内/绿，hint=重点/黄)
// 只标音名(不标数字行避免重叠)；黑键全部标名(此处用降号名)；整体收窄居左
const FLAT_NAMES=["C","D♭","D","E♭","E","F","G♭","G","A♭","A","B♭","B"];
function renderMiniMap(lo, hi, marks){
  let whites=[]; for(let m=lo;m<=hi;m++){ if(![1,3,6,8,10].includes(m%12)) whites.push(m); }
  const wpct=100/whites.length; let inner="";
  whites.forEach(m=>{ const pc=m%12;
    inner+=`<div class="key w ${marks[m]||""}"><span class="nm">${NOTE_NAMES[pc]}</span></div>`; });
  let wIdx=0;
  for(let m=lo;m<=hi;m++){ const pc=m%12;
    if([1,3,6,8,10].includes(pc)){
      const sh={1:-0.12,3:0.12,6:-0.15,8:0,10:0.15}[pc];
      const left=wIdx*wpct - wpct*0.30 + sh*wpct;
      inner+=`<div class="key b ${marks[m]||""}" style="left:${left}%;width:${wpct*0.60}%"><span class="nm">${FLAT_NAMES[pc]}</span></div>`;
    } else wIdx++;
  }
  return `<div class="pianowrap minipw" style="max-width:560px"><div class="piano mini">${inner}</div></div>`;
}
// 讲解区迷你键盘（C4–C6，只标数字行）
function renderMiniPiano(id){
  let whites=[]; for(let mm=PIANO_LOW; mm<=PIANO_HIGH; mm++){ if(![1,3,6,8,10].includes(mm%12)) whites.push(mm); }
  const wpct=100/whites.length;
  let inner="";
  whites.forEach(mm=>{ const pc=mm%12; inner+=`<div class="key w" data-m="${mm}" data-pc="${pc}"><span class="jp">${JIANPU[pc]}</span></div>`; });
  let wIdx=0;
  for(let mm=PIANO_LOW; mm<=PIANO_HIGH; mm++){ const pc=mm%12;
    if([1,3,6,8,10].includes(pc)){ const sh={1:-0.12,3:0.12,6:-0.15,8:0,10:0.15}[pc]; const left=wIdx*wpct - wpct*0.30 + sh*wpct; inner+=`<div class="key b" data-m="${mm}" data-pc="${pc}" style="left:${left}%;width:${wpct*0.60}%"></div>`; }
    else wIdx++; }
  return `<div class="pianowrap minipw"><div class="piano mini" id="${id}">${inner}</div></div>`;
}
// 让起始音开始忽闪提示（已被选中的不闪）
function startHintBlink(midis){
  midis.forEach(mm=>{ const k=document.querySelector(`#piano .key[data-m="${mm}"]`); if(k && !buildSel.has(mm)) k.classList.add("hintblink"); });
}
function bindMiniKeys(id){
  document.querySelectorAll(`#${id} .key`).forEach(k=>{
    const m=+k.dataset.m;
    k.onpointerdown=(e)=>{ e.preventDefault(); playMidi(m); k.classList.add("lit"); };
    const off=()=>k.classList.remove("lit");
    k.onpointerup=off; k.onpointerleave=off; k.onpointercancel=off;
  });
}
// 大调音阶"全/半"台阶条
function renderScaleStrip(){
  const jn=["1","2","3","4","5","6","7","1"], cn=["C","D","E","F","G","A","B","C"], steps=["全","全","半","全","全","全","半"];
  let h='<div class="sstrip">';
  for(let i=0;i<8;i++){
    h+=`<div class="snote" id="sn${i}"><b>${jn[i]}</b><span>${cn[i]}</span></div>`;
    if(i<7) h+=`<div class="sstep ${steps[i]==="半"?"half":""}" id="sg${i}">${tr(steps[i],steps[i]==="半"?"H":"W")}</div>`;
  }
  return h+'</div>';
}
let scaleStripTimers=[]; // 台阶动画的待执行定时器：新一轮开始时先全部取消，避免上一轮的"熄灯"盖掉这一轮的"点亮"
function animateScaleStrip(gap=400){
  scaleStripTimers.forEach(clearTimeout); scaleStripTimers=[];
  for(let i=0;i<8;i++){ const sn=document.getElementById("sn"+i); if(sn) sn.classList.remove("on"); }
  for(let i=0;i<7;i++){ const sg=document.getElementById("sg"+i); if(sg) sg.classList.remove("on"); }
  for(let i=0;i<8;i++){
    scaleStripTimers.push(setTimeout(()=>{
      const sn=document.getElementById("sn"+i); if(sn) sn.classList.add("on");
      if(i>0){ const sg=document.getElementById("sg"+(i-1)); if(sg) sg.classList.add("on"); }
    }, i*gap));
  }
  scaleStripTimers.push(setTimeout(()=>{
    for(let i=0;i<8;i++){ const sn=document.getElementById("sn"+i); if(sn) sn.classList.remove("on"); }
    for(let i=0;i<7;i++){ const sg=document.getElementById("sg"+i); if(sg) sg.classList.remove("on"); }
  }, 8*gap+900));
}
// 找到某个 midi 对应的琴键(优先精确音高，否则按音级匹配)
function keysForMidi(m){
  const exact=document.querySelector(`#piano .key[data-m="${m}"]`);
  if(exact) return [exact];
  return [...document.querySelectorAll(`#piano .key[data-pc="${m%12}"]`)];
}
// 演示键：重放最后听到的组合，并在声音响起的同时点亮琴键
async function revealLast(){
  if(!lastPlayed.length){ toast("先播放或听一个声音吧 🎵"); return; }
  await initAudio();
  const now=Tone.now();
  lastPlayed.forEach(ev=>{ synth.triggerAttackRelease(ev.midis.map(midiToName), ev.dur, now+ev.t); }); // 重放声音
  lightAlong("#piano"); // 用统一逻辑点亮(共有音会重新亮起)
}
function updateBuildUI(){
  document.querySelectorAll("#piano .key").forEach(k=>{
    k.classList.toggle("sel", buildSel.has(+k.dataset.m));
  });
  const sel=[...buildSel].sort((a,b)=>a-b).map(m=>sharp(NOTE_NAMES[m%12])+`(${JIANPU[m%12]})`);
  const el=document.getElementById("selnotes");
  if(el) el.textContent = tr("已选","Selected") + "：" + (sel.length? sel.join("  ") : "—");
}

   ============================================================ */
function toast(msg){
  const t=document.getElementById("toast"); t.textContent=msg; t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),1800);
}
function confetti(n=16){
  const colors=["#ff7a59","#ffcf5c","#5ce6c0","#7aa7ff","#c98bff"];
  for(let i=0;i<n;i++){
    const c=document.createElement("div"); c.className="confetti";
    c.style.left=(Math.random()*100)+"vw"; c.style.background=rand(colors);
    c.style.transform=`rotate(${Math.random()*360}deg)`;
    document.body.appendChild(c);
    const dur=900+Math.random()*700;
    c.animate([{transform:`translateY(0) rotate(0)`,opacity:1},
      {transform:`translateY(${60+Math.random()*40}vh) rotate(${Math.random()*720}deg)`,opacity:0}],
      {duration:dur,easing:"cubic-bezier(.3,.6,.4,1)"});
    setTimeout(()=>c.remove(),dur);
  }
}
