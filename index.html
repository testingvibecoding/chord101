<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>和弦与调式 · 互动课堂</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
<style>
  :root{
    --bg:#1a1530; --bg2:#241c45; --card:#2d2356; --card2:#372a68;
    --ink:#f4f0ff; --muted:#b3a8d9; --line:#473a7d;
    --p1:#ff7a59; --p2:#ffcf5c; --p3:#5ce6c0; --p4:#7aa7ff; --p5:#c98bff;
    --ok:#5ce6a0; --bad:#ff6b8a;
    --white:#fffdf7; --black:#2a2350;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:"PingFang SC","Microsoft YaHei","Segoe UI",system-ui,sans-serif;
    background:radial-gradient(1200px 700px at 80% -10%, #33276b 0%, var(--bg) 55%), var(--bg);
    color:var(--ink); min-height:100vh; -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:920px;margin:0 auto;padding:18px 16px 120px}
  .topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px}
  .brand{display:flex;align-items:center;gap:10px;font-weight:800;font-size:20px;letter-spacing:.5px}
  .brand .logo{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;
    background:linear-gradient(135deg,var(--p1),var(--p5));font-size:18px}
  .xp{display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--line);
    padding:7px 12px;border-radius:999px;font-weight:700;font-size:14px}
  .xp .star{color:var(--p2)}
  .hint{color:var(--muted);font-size:13px}

  /* HOME */
  .hero{background:linear-gradient(135deg,var(--card),var(--card2));border:1px solid var(--line);
    border-radius:20px;padding:20px 22px;margin-bottom:18px}
  .hero h1{margin:0 0 6px;font-size:24px}
  .hero p{margin:0;color:var(--muted);line-height:1.6;font-size:14px}
  .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
  @media(max-width:640px){.grid{grid-template-columns:1fr}}
  .lvl{position:relative;text-align:left;border:1px solid var(--line);border-radius:18px;
    padding:16px 16px 14px;cursor:pointer;color:var(--ink);overflow:hidden;
    background:var(--card);transition:transform .12s ease, box-shadow .12s ease;}
  .lvl:hover{transform:translateY(-3px);box-shadow:0 12px 30px rgba(0,0,0,.35)}
  .lvl[disabled]{cursor:not-allowed;opacity:.5;filter:grayscale(.4)}
  .lvl .num{font-size:30px;line-height:1}
  .lvl h3{margin:8px 0 4px;font-size:17px}
  .lvl .desc{color:var(--muted);font-size:12.5px;line-height:1.5;min-height:34px}
  .lvl .bar{margin-top:10px;height:8px;border-radius:99px;background:#00000030;overflow:hidden}
  .lvl .bar > i{display:block;height:100%;width:0;border-radius:99px;
    background:linear-gradient(90deg,var(--p3),var(--p4));transition:width .4s}
  .lvl .meta{display:flex;justify-content:space-between;align-items:center;margin-top:7px;font-size:11.5px;color:var(--muted)}
  .lvl .lock{position:absolute;top:14px;right:14px;font-size:18px}
  .lvl .done{position:absolute;top:12px;right:14px;font-size:20px;color:var(--p3)}
  .accent{position:absolute;inset:0 auto 0 0;width:6px}

  /* LESSON */
  .back{background:none;border:none;color:var(--muted);font-size:14px;cursor:pointer;padding:6px 0;margin-bottom:6px}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:18px 20px;margin-bottom:16px}
  .panel h2{margin:0 0 4px;font-size:20px}
  .teach{line-height:1.7;font-size:14.5px;color:#e9e3ff}
  .teach b{color:var(--p2)}
  .teach .row{display:flex;flex-wrap:wrap;gap:8px;margin:12px 0}
  .chip{display:inline-flex;align-items:center;gap:6px;background:var(--card2);border:1px solid var(--line);
    border-radius:12px;padding:9px 13px;cursor:pointer;font-size:13.5px;font-weight:600;color:var(--ink);transition:.12s}
  .chip:hover{border-color:var(--p4);transform:translateY(-1px)}
  .chip .ic{font-size:15px}
  details.note{margin-top:10px;border-top:1px dashed var(--line);padding-top:10px}
  details.note summary{cursor:pointer;color:var(--p4);font-weight:600;font-size:13.5px}

  .qhead{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px}
  .qhead .prog{flex:1;height:10px;border-radius:99px;background:#00000035;overflow:hidden}
  .qhead .prog > i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--p2),var(--p1));transition:width .4s}
  .qhead .cnt{font-size:13px;color:var(--muted);white-space:nowrap}
  .qtype{font-size:12px;color:var(--p3);font-weight:700;letter-spacing:1px;text-transform:uppercase}
  .qprompt{font-size:18px;font-weight:700;margin:6px 0 14px;line-height:1.5}
  .playbtn{display:inline-flex;align-items:center;gap:9px;background:linear-gradient(135deg,var(--p1),var(--p5));
    color:#fff;border:none;border-radius:14px;padding:13px 22px;font-size:15px;font-weight:800;cursor:pointer;
    box-shadow:0 8px 20px rgba(255,122,89,.3)}
  .playbtn:active{transform:scale(.97)}
  .playbtn.small{padding:9px 14px;font-size:13.5px;background:var(--card2);color:var(--ink);box-shadow:none;border:1px solid var(--line)}
  .opts{display:grid;grid-template-columns:repeat(2,1fr);gap:11px;margin-top:16px}
  @media(max-width:520px){.opts{grid-template-columns:1fr}}
  .opt{text-align:left;background:var(--card2);border:1.5px solid var(--line);border-radius:14px;
    padding:13px 15px;cursor:pointer;font-size:14.5px;font-weight:600;color:var(--ink);transition:.12s}
  .opt:hover{border-color:var(--p4)}
  .opt .sub{display:none;color:var(--muted);font-size:12px;font-weight:500;margin-top:3px} /* 答题前隐藏小字，避免泄露答案 */
  .opts.revealsubs .opt .sub{display:block} /* 选择答案后再显示各选项的说明 */
  .opt.correct{border-color:var(--ok);background:#1c4a3a}
  .opt.wrong{border-color:var(--bad);background:#4a1c2c}
  .opt[disabled]{cursor:default}
  .feedback{margin-top:14px;border-radius:14px;padding:13px 16px;font-size:14px;line-height:1.6;display:none}
  .feedback.show{display:block}
  .feedback.good{background:#16402f;border:1px solid var(--ok)}
  .feedback.bad{background:#421a28;border:1px solid var(--bad)}
  .feedback .t{font-weight:800;margin-bottom:3px}
  .next{margin-top:14px;display:none}
  .next.show{display:inline-flex}

  /* build */
  .buildbar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-top:14px}
  .submitb{background:linear-gradient(135deg,var(--p3),var(--p4));color:#16213a;border:none;border-radius:13px;
    padding:11px 20px;font-weight:800;font-size:14px;cursor:pointer}
  .clearb{background:var(--card2);border:1px solid var(--line);color:var(--muted);border-radius:13px;padding:11px 16px;cursor:pointer;font-size:13px}
  .selnotes{color:var(--muted);font-size:13px}

  /* PIANO */
  .pianowrap{margin-top:18px;background:var(--bg2);border:1px solid var(--line);border-radius:16px;padding:14px}
  .pianowrap .lbl{font-size:12px;color:var(--muted);margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;gap:8px}
  .revealb{background:linear-gradient(135deg,var(--p5),var(--p4));color:#fff;border:none;border-radius:10px;
    padding:7px 13px;font-size:12.5px;font-weight:800;cursor:pointer;white-space:nowrap;box-shadow:0 4px 12px rgba(201,139,255,.3)}
  .revealb:active{transform:scale(.96)}
  .revealb[disabled]{opacity:.45;cursor:not-allowed;box-shadow:none}
  /* 演示键点亮：明显的发光高亮 */
  .key.w.reveal{background:linear-gradient(180deg,#d6b3ff,#c98bff) !important;box-shadow:0 0 16px 3px #c98bff inset, 0 0 12px #c98bff}
  .key.b.reveal{background:linear-gradient(180deg,#a86bff,#7a3aff) !important;box-shadow:0 0 14px 2px #a86bff}
  /* 起始音提示：忽闪忽现，点击后才算选中 */
  @keyframes hintpulse{0%,100%{box-shadow:inset 0 0 0 0 rgba(201,139,255,0)}50%{box-shadow:inset 0 0 0 3px var(--p5), 0 0 12px var(--p5)}}
  .key.hintblink{animation:hintpulse .9s ease-in-out infinite}
  .key.w.hint{background:linear-gradient(180deg,#fff3c4,#ffd96b)}  /* 综合模式：当前和弦黄色提示(被演奏的紫色会盖过它) */
  .key.b.hint{background:linear-gradient(180deg,#caa23a,#8f6f14)}
  .piano{position:relative;height:150px;display:flex;user-select:none;touch-action:manipulation}
  .key{position:relative;flex:1;border:1px solid #0d0a1f;border-radius:0 0 7px 7px;cursor:pointer}
  .key.w{background:linear-gradient(180deg,#fffef9,#efe9df);z-index:1}
  .key.w:active,.key.w.lit{background:linear-gradient(180deg,#ffe7a8,#ffcf5c)}
  .key.w.sel{background:linear-gradient(180deg,#a8f0d8,#5ce6c0)}
  .key.b{position:absolute;top:0;width:6.2%;height:62%;background:linear-gradient(180deg,#3a3360,#1c1838);
    z-index:2;border-radius:0 0 6px 6px;border:1px solid #000}
  .key.b:active,.key.b.lit{background:linear-gradient(180deg,#ffb86b,#ff7a59)}
  .key.b.sel{background:linear-gradient(180deg,#52d6b4,#37b896)}
  .key .nm{position:absolute;bottom:6px;left:0;right:0;text-align:center;font-size:11px;font-weight:700;color:#564c7a;pointer-events:none}
  .key .jp{position:absolute;bottom:20px;left:0;right:0;text-align:center;font-size:11px;font-weight:800;color:#9a5; pointer-events:none}
  .key.b .nm{color:#cfc6ef;font-size:9px;bottom:5px}
  .key.b .jp{color:#ffd; font-size:9px; bottom:16px}

  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(40px);
    background:var(--card2);border:1px solid var(--p3);color:var(--ink);padding:13px 20px;border-radius:14px;
    font-weight:700;opacity:0;transition:.3s;z-index:50;box-shadow:0 10px 30px rgba(0,0,0,.4)}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .confetti{position:fixed;width:10px;height:14px;top:-20px;z-index:60;border-radius:2px;pointer-events:none}

  .audioNote{font-size:12px;color:var(--muted);margin-top:10px;text-align:center}

  /* 训练场入口卡 */
  .traincard{margin-top:14px;display:flex;align-items:center;gap:14px;background:linear-gradient(135deg,#3a2a66,#4a2f7a);
    border:1px solid var(--line);border-radius:18px;padding:16px 18px;cursor:pointer;width:100%;text-align:left;color:var(--ink);transition:.12s}
  .traincard:hover{transform:translateY(-2px);box-shadow:0 12px 28px rgba(0,0,0,.32)}
  .traincard .big{font-size:34px}
  .traincard h3{margin:0 0 3px;font-size:17px}
  .traincard .desc{color:var(--muted);font-size:12.5px;line-height:1.5}
  /* 分段开关 */
  .seg{display:inline-flex;background:var(--bg2);border:1px solid var(--line);border-radius:11px;padding:3px;gap:3px}
  .seg button{border:none;background:none;color:var(--muted);padding:7px 14px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer}
  .seg button.on{background:linear-gradient(135deg,var(--p4),var(--p5));color:#fff}
  .ctrlrow{display:flex;flex-wrap:wrap;gap:10px 18px;align-items:center;margin:12px 0}
  .ctrlrow .ct{font-size:12.5px;color:var(--muted);margin-right:2px}
  .seclabel{font-size:13px;font-weight:800;color:var(--p3);margin:16px 0 8px;letter-spacing:.5px}
  .pickgrid{display:flex;flex-wrap:wrap;gap:9px}
  .pick{border:1.5px solid var(--line);background:var(--card2);color:var(--ink);border-radius:12px;
    padding:11px 15px;font-size:13.5px;font-weight:700;cursor:pointer;transition:.12s}
  .pick:hover{border-color:var(--p4);transform:translateY(-1px)}
  .pick.all{border-color:var(--p3);background:#23463f}
  .pick .s{display:block;font-size:11px;font-weight:500;color:var(--muted);margin-top:2px}
  .scorebar{display:flex;gap:14px;align-items:center;font-size:13px;color:var(--muted)}
  .scorebar b{color:var(--ink)}
  .streakhot{color:var(--p1)!important}
  .card-study{text-align:center;padding:6px 4px}
  .card-study .cname{font-size:30px;font-weight:900;margin:6px 0}
  .card-study .cjian{font-size:18px;color:var(--p2);font-weight:800;letter-spacing:2px}
  .card-study .cmeta{color:var(--muted);font-size:14px;line-height:1.7;margin-top:8px}
  /* 成绩单 */
  .repcard{text-align:center}
  .repbig{font-size:46px;font-weight:900;margin:6px 0 2px;background:linear-gradient(135deg,var(--p3),var(--p4));-webkit-background-clip:text;background-clip:text;color:transparent}
  .reprow{display:flex;align-items:center;gap:10px;margin:9px 0}
  .reprow .rn{width:78px;font-weight:700;font-size:13.5px}
  .reprow .rbar{flex:1;height:14px;border-radius:99px;background:#00000035;overflow:hidden}
  .reprow .rbar>i{display:block;height:100%;border-radius:99px;background:linear-gradient(90deg,var(--p3),var(--p4));transition:width .5s}
  .reprow .rp{width:96px;text-align:right;font-size:12.5px;color:var(--muted)}
  .reprow.weak .rbar>i{background:linear-gradient(90deg,var(--bad),var(--p1))}
  /* 讲解区迷你键盘 */
  .minipw{margin-top:12px;padding:10px}
  .piano.mini{height:104px}
  .piano.mini .key.w .jp{bottom:6px;font-size:11px;color:#7a6}
  .teachhint{font-size:12px;color:var(--muted);margin:8px 2px 0}
  /* 教学用小表格 */
  .teach table.ctab{width:100%;border-collapse:collapse;font-size:12.5px;margin:10px 0;overflow-x:auto;display:block}
  .teach table.ctab th,.teach table.ctab td{border:1px solid var(--line);padding:5px 8px;text-align:left;color:#e9e3ff;white-space:nowrap}
  .teach table.ctab th{color:#16213a;background:var(--p3);font-weight:800}
  .teach table.ctab tr:nth-child(even) td{background:var(--bg2)}
  .teach table.ctab td.play{cursor:pointer;color:#fff;font-weight:700}
  .teach table.ctab td.play:hover{background:var(--p4)!important;color:#fff}
  .teach table.ctab td.play::before{content:"🔊 ";font-size:11px}
  /* 底部悬浮键盘 */
  #kbDock{position:fixed;left:0;right:0;bottom:0;z-index:40;display:none;
    padding:8px 12px 10px;background:linear-gradient(180deg, rgba(26,21,48,0), var(--bg) 38%)}
  #kbDock .pianowrap{max-width:920px;margin:0 auto;box-shadow:0 -12px 34px rgba(0,0,0,.55);padding:10px}
  #kbDock .piano{height:92px}
  #kbDock .key.w .jp{bottom:16px;font-size:11px}
  #kbDock .key.w .nm{bottom:4px;font-size:10px}
  body.hasdock .wrap{padding-bottom:200px}
  @media(max-width:640px){ #kbDock .piano{height:80px} body.hasdock .wrap{padding-bottom:172px} }
  /* 大调音阶 全/半 台阶条 */
  .sstrip{display:flex;align-items:center;gap:0;margin:14px 0 4px;overflow-x:auto;padding-bottom:4px}
  .snote{flex:0 0 auto;min-width:34px;text-align:center;background:var(--card2);border:1.5px solid var(--line);
    border-radius:9px;padding:7px 4px;transition:.15s}
  .snote b{display:block;font-size:17px;line-height:1.1}
  .snote span{font-size:10px;color:var(--muted)}
  .snote.on{background:linear-gradient(135deg,var(--p2),var(--p1));color:#fff;border-color:transparent;transform:translateY(-3px)}
  .sstep{flex:0 0 auto;min-width:30px;text-align:center;font-size:12px;font-weight:800;color:var(--muted);transition:.15s}
  .sstep.half{color:var(--p1)}
  .sstep.on{transform:scale(1.35);color:var(--p3)}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div class="brand"><span class="logo">🎹</span> 和弦与调式 · 互动课堂</div>
    <div class="xp"><span class="star">★</span> <span id="xpval">0</span> 经验</div>
  </div>
  <div id="app"></div>
</div>
<div id="kbDock"></div>
<div class="toast" id="toast"></div>

<script>
/* ============================================================
   音乐基础数据
   ============================================================ */
const NOTE_NAMES = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
const NOTE_CN    = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
// 简谱(以C为do)：每个半音
const JIANPU = ["1","♯1","2","♯2","3","4","♯4","5","♯5","6","♯6","7"];
// 显示用：把内部音名里的 ASCII # 换成音乐升号 ♯（内部仍用 # 供 Tone.js 发声）
function sharp(s){ return (""+s).replace(/#/g,"♯"); }

// 和弦类型：半音结构 + 名称 + 色彩描述
const CHORDS = {
  maj:  {name:"大三和弦", jian:"1 3 5",  iv:[0,4,7],     color:"明亮、稳定、阳光", mood:"开心 / 明亮"},
  min:  {name:"小三和弦", jian:"1 ♭3 5", iv:[0,3,7],     color:"柔和、忧郁、内敛", mood:"忧伤 / 柔和"},
  dim:  {name:"减三和弦", jian:"1 ♭3 ♭5",iv:[0,3,6],     color:"紧张、不安、想解决", mood:"紧张 / 不安"},
  aug:  {name:"增三和弦", jian:"1 3 #5", iv:[0,4,8],     color:"悬浮、神秘、迷幻", mood:"悬浮 / 神秘"},
  maj7: {name:"大七和弦", jian:"1 3 5 7", iv:[0,4,7,11], color:"温暖、梦幻、高级感", mood:"梦幻 / 温暖"},
  dom7: {name:"属七和弦", jian:"1 3 5 ♭7",iv:[0,4,7,10], color:"想往前走、布鲁斯味、强烈解决感", mood:"想回家 / 布鲁斯"},
  min7: {name:"小七和弦", jian:"1 ♭3 5 ♭7",iv:[0,3,7,10],color:"柔和忧郁、放松、爵士", mood:"慵懒 / 柔和"},
  m7b5: {name:"半减七和弦", jian:"1 ♭3 ♭5 ♭7",iv:[0,3,6,10],color:"不稳定、阴郁、悬而未决", mood:"阴郁 / 不安"},
};

const MAJOR_SCALE = [0,2,4,5,7,9,11]; // 全全半全全全半
// C大调调内三和弦：级数 -> 根音半音 + 类型 + 罗马数字 + 功能
const DIATONIC = [
  {deg:1, root:0,  type:"maj", rn:"I",   fn:"T", fnName:"主功能",   fnFeel:"稳定·回家"},
  {deg:2, root:2,  type:"min", rn:"ii",  fn:"S", fnName:"下属功能", fnFeel:"出发·铺垫"},
  {deg:3, root:4,  type:"min", rn:"iii", fn:"T", fnName:"主功能",   fnFeel:"稳定(偏暗)"},
  {deg:4, root:5,  type:"maj", rn:"IV",  fn:"S", fnName:"下属功能", fnFeel:"出发·铺垫"},
  {deg:5, root:7,  type:"maj", rn:"V",   fn:"D", fnName:"属功能",   fnFeel:"紧张·想回家"},
  {deg:6, root:9,  type:"min", rn:"vi",  fn:"T", fnName:"主功能",   fnFeel:"稳定(柔和)"},
  {deg:7, root:11, type:"dim", rn:"vii°",fn:"D", fnName:"属功能",   fnFeel:"最不稳定·强烈解决"},
];
const SCALE_DEG_NAME = ["","主音","上主音","中音","下属音","属音","下中音","导音"];

/* ============================================================
   音频引擎 (Tone.js)
   ============================================================ */
let synth=null, audioReady=false;
async function initAudio(){
  if(audioReady) return;
  await Tone.start();
  const reverb = new Tone.Reverb({decay:1.4, wet:0.18}).toDestination();
  synth = new Tone.PolySynth(Tone.Synth, {
    oscillator:{type:"triangle"},
    envelope:{attack:0.008, decay:0.35, sustain:0.32, release:1.1}
  }).connect(reverb);
  synth.volume.value = -8;
  audioReady = true;
}
function midiToName(m){ return NOTE_NAMES[m%12] + (Math.floor(m/12)-1); }
function nameToMidi(n){ const mt=n.match(/^([A-G]#?)(-?\d+)$/); return (parseInt(mt[2])+1)*12 + NOTE_NAMES.indexOf(mt[1]); }
// 以 C4(=60) 为基准，把半音偏移转成音名
function semiToName(semi, baseMidi=60){ return midiToName(baseMidi+semi); }

// 记录"最后一次听到的组合音"，供演示键重放并点亮琴键
let lastPlayed=[]; // [{midis:[...], t:offsetSec, dur}]

// stack: arp 模式下逐个弹完后是否再把所有音叠在一起响一次(和弦用 true，音程用 false)
async function playNotes(names, dur="2n", arp=false, gap=0.8, stack=true){
  await initAudio();
  const now = Tone.now();
  const events=[];
  if(arp){
    // 相邻组成音间隔 = gap（如 0.8 秒）
    names.forEach((n,i)=>{ synth.triggerAttackRelease(n, "4n", now + i*gap);
      events.push({midis:[nameToMidi(n)], t:i*gap, dur:"4n"}); });
    if(stack){
      // 从最后一个组成音起，再过 1.2 秒才齐奏
      const tEnd = (names.length-1)*gap + 1.2;
      synth.triggerAttackRelease(names, "1n", now + tEnd);
      events.push({midis:names.map(nameToMidi), t:tEnd, dur:"1n"});
    }
  } else {
    synth.triggerAttackRelease(names, dur, now);
    events.push({midis:names.map(nameToMidi), t:0, dur});
  }
  lastPlayed=events;
}
async function playSemis(semis, baseMidi=60, arp=false, dur="2n", opts={}){
  const names = semis.map(s=>semiToName(s, baseMidi));
  // 不传 gap 时交给 playNotes 的默认值(不要再用 0.16 覆盖)
  await playNotes(names, dur, arp, opts.gap, opts.stack ?? true);
}
async function playMidi(m, dur="8n"){ await initAudio(); synth.triggerAttackRelease(midiToName(m), dur, Tone.now()); }

// 按权重抽取
function weightedPick(items, weightFn){
  const w=items.map(weightFn); const sum=w.reduce((a,b)=>a+b,0);
  let r=Math.random()*sum;
  for(let i=0;i<items.length;i++){ r-=w[i]; if(r<0) return items[i]; }
  return items[items.length-1];
}

      <p>我们知道<b>三音(三度音)</b>决定一个和弦是"阳光大调"还是"忧郁小调"——它是和弦的"性格特征"。但如果想制造一种<b>不确定、漂浮、卖关子</b>的感觉呢？这就要用<b>挂留和弦 (Sus)</b>。</p>

            <span class="chip" data-play="notes:10,14,17">🔊 借来的 ♭VII：B♭ 大三和弦（B♭4 D5 F5）</span>
          </div>
          <p><b>第二步 · 它顶替的是大调自家的哪一格？</b>就是<b>第 7 格</b>。但 C 大调自家的第 7 级是 <b>vii° = Bdim(B D F，减三和弦)</b>——刺耳、不稳，流行乐里几乎没人直接用它。对比听(注意两者只差根音一个半音，上面 D、F 完全相同)：</p>
          <div class="row">
            <span class="chip" data-play="notes:11,14,17">🔊 自家第 7 格：Bdim（B D F，刺耳少用）</span>
            <span class="chip" data-play="notes:10,14,17">🔊 借来的第 7 格：B♭（B♭ D F，敦实好用）</span>
          </div>
          <p style="font-size:12.5px;color:var(--muted)">所以"第 7 格"在大调里几乎是空着的——这正是 ♭VII 能大行其道的原因：它填上了一个自家没人能用的位置。</p>
          <p><b>第三步 · "紧张"和"开阔"不是玄学，是构成决定的。</b>把两个和弦的音逐个对着主音 C 检查：</p>
          <table class="ctab"><tr><th>和弦</th><th>成员</th><th>和主音 C 的关系</th><th>结论</th></tr>
            <tr><td>G (G B D)</td><td><b>B</b></td><td>紧贴 C <b>半音之下 = 导音</b>，强烈想蹭进 C</td><td rowspan="2">两个音都在"够"主音——<b>结构上</b>就紧张、想回家</td></tr>
            <tr><td></td><td>D</td><td>在 C 上方一个全音，也想落回 C</td></tr>
            <tr><td>B♭ (B♭ D F)</td><td><b>B♭</b></td><td>离 C 整整一个<b>全音</b>——引力弱，不催</td><td rowspan="2">没有一个音紧贴主音——<b>结构上</b>就松弛、开阔</td></tr>
            <tr><td></td><td>F</td><td>不挨着 C，安安稳稳</td></tr></table>
          <p>核心就一条(第⑨关学的)：<b>有没有"紧贴主音半音"的导音</b>。把表里四个成员的引力逐个亲耳验证：</p>
          <div class="row">
            <span class="chip" data-play="mel:11,12">🔊 B → C（半音磁铁，被吸进门）</span>
            <span class="chip" data-play="mel:14,12">🔊 D → C（上方全音，轻轻落回）</span>
            <span class="chip" data-play="mel:10,12">🔊 B♭ → C（全音，慢慢走进门）</span>
            <span class="chip" data-play="mel:17,12">🔊 F → C（隔得远，不催不赶）</span>
          </div>
          <p>所以拿它和 V 比是<b>用途</b>上的对比，不是来源上的对应：♭VII 最常出现在"本该属和弦 V 回家"的位置——它也能稳稳走向 I，是 <b>V 的"豁达替身"</b>。同样回家，一个催促、一个散步。AB 对比(都向上落到同一个 C)：</p>
          <div class="row">
            <span class="chip" data-play="kseq:v2I">🔊 V→I（G→C，低音 B4 半音蹭进 C5，催）</span>
            <span class="chip" data-play="kseq:b72I">🔊 ♭VII→I（B♭→C，低音全音迈进 C5，松）</span>
          </div>
          <p><b>追问 · 为什么不直接借小调的"5 号"(Gm)来顶替 V？</b>问得好——清单第 5 格 <b>v = Gm(G B♭ D)</b> 当然也能借(确实有歌用，叫"小属和弦")。但对比构成就明白为什么它不是首选：</p>
          <p style="font-size:13px;line-height:1.85">
            · <b>Gm 和 G 同根</b>，只差一个音：把导音 B 抽成了 B♭。它<b>站在"催促"的位置上却不催</b>——既丢了 V 的句号感，又没带来新颜色，听感像"<b>泄了气的 V</b>"，软塌暧昧；<br>
            · <b>B♭ 干脆换了根音</b>：低音 B♭→C 全音上台阶，是一条<b>独立、成熟的回家路</b>(摇滚/民谣的标准走法)，色彩焕然一新。<br>
            一句话：<b>"同人变脸"(Gm)尴尬，"干脆换人"(B♭)痛快</b>——所以实战中顶替 V 的首选是第 7 格。三连对比，亲耳裁判：</p>
          <div class="row">
            <span class="chip" data-play="kseq:v2I">🔊 V→I：G→C（催促·句号）</span>
            <span class="chip" data-play="kseq:gm2I">🔊 借小 v→I：Gm→C（泄了气，不上不下）</span>
            <span class="chip" data-play="kseq:b72I">🔊 借 ♭VII→I：B♭→C（散步进门·痛快）</span>
          </div>
          <p><b>第四步 · 放进真歌的套路里。</b>摇滚国歌级套路 <b>I–♭VII–IV</b>(C→B♭→F)就靠它——Sweet Home Alabama、无数体育场摇滚：</p>
          <div class="row">
            <span class="chip" data-play="kseq:bVIIno">🔊 调内对照：I–V–IV–I（C→G→F→C，规规矩矩）</span>
            <span class="chip" data-play="kloopseq:bVIIyes">🔁 借 ♭VII：I–♭VII–IV–I（C→B♭→F→C，豁达摇滚）</span>
          </div>
          ${keyBar(false,true)}
          <p style="font-size:12.5px;color:var(--muted)">听点：第二拍 B♭ 落下时，音乐像突然<b>敞开了一扇门</b>——不暗也不紧，是"走出去"的感觉。这和 iv 的催泪方向完全不同：同样是借，借谁味道就是谁。</p>
        </div>
      </details>

      <details class="note" open><summary><b>例三 · 史诗上行：降六级 ♭VI（A♭）</b></summary>
        <div style="font-size:13.5px;line-height:1.8;color:#e9e3ff">
          <p>从清单第 6 格借来 <b>♭VI = A♭ 大三和弦(A♭ C E♭)</b>。注意它带了<b>两个</b>调外音(A♭ 和 E♭)，所以色彩冲击最猛——一响就有"换了世界"的错觉。先单独对比：</p>
          <div class="row">
            <span class="chip" data-play="notes:9,12,16">🔊 自家的 vi：Am（A C E，小和弦·忧郁）</span>
            <span class="chip" data-play="notes:8,12,15">🔊 借来的 ♭VI：A♭（A♭ C E♭，大和弦·异世界）</span>
          </div>
          <p>它的招牌用法是<b>史诗上行 ♭VI–♭VII–I</b>(A♭→B♭→C)：低音一格一格爬上主音，像最终关卡通关、片尾字幕升起——游戏与电影配乐的"胜利公式"(也叫"马里奥终止")。先听最纯的三连：</p>
          <div class="row">
            <span class="chip" data-play="kseq:bVIno">🔊 调内对照：IV–V–I（F→G→C，正常收束）</span>
            <span class="chip" data-play="kloopseq:bVIyes">🔁 史诗上行：♭VI–♭VII–I（A♭→B♭→C，通关！）</span>
          </div>
          <p><b>关键追问 · 为什么要"连用两个"借用和弦？</b>只把 V 换成 ♭VII 还不够——史诗感的核心是 <b>♭VI 和 ♭VII 连成台阶</b>。下面五个版本同起点(IV)同终点(I)，只改中间，逐个对比就明白：</p>
          <table class="ctab"><tr><th>版本</th><th>走法</th><th>低音线</th><th>听感诊断</th></tr>
            <tr><td>①基准</td><td>IV–V–I</td><td>F→G→C</td><td>调内，安稳但平常</td></tr>
            <tr><td>②只换一步</td><td>IV–♭VII–I</td><td>F→B♭→C</td><td>豁达了，但只有一脚踩出调外——"平"，没有累积</td></tr>
            <tr><td>③只用 ♭VI</td><td>IV–♭VI–I</td><td>F→A♭→C</td><td>色彩猛，但 A♭ 直接跳回 C，<b>缺临门那级台阶</b>，落地突兀</td></tr>
            <tr><td><b>④连用·正序</b></td><td><b>IV–♭VI–♭VII–I</b></td><td><b>F→A♭→B♭→C</b></td><td><b>两个调外和弦接成连续上行——动能一路累积到主音，凯旋！</b></td></tr>
            <tr><td>⑤连用·反序</td><td>IV–♭VII–♭VI–I</td><td>F→B♭→A♭→C</td><td>半路折返(B♭→A♭ 往下走)，势能泄掉，方向感乱</td></tr></table>
          <div class="row">
            <span class="chip" data-play="kseq:bVIno">🔊 ① IV–V–I（基准）</span>
            <span class="chip" data-play="kseq:ep47">🔊 ② IV–♭VII–I（只换一步，平）</span>
            <span class="chip" data-play="kseq:ep46">🔊 ③ IV–♭VI–I（缺台阶，突兀）</span>
            <span class="chip" data-play="kloopseq:ep4671">🔁 ④ IV–♭VI–♭VII–I（正序连用，最佳）</span>
            <span class="chip" data-play="kseq:ep4761">🔊 ⑤ IV–♭VII–♭VI–I（反序，泄气）</span>
          </div>
          ${keyBar(false,true)}
          <p><b>为什么 ④ 最好？</b>三个理由：<br>
            ① <b>低音单向上行</b>：F→A♭→B♭→C 一路向上不回头，每一步都在给"回家"蓄力——②③⑤要么没爬、要么跳级、要么折返；<br>
            ② <b>色彩统一</b>：♭VI 和 ♭VII 都来自 C 小调清单，连用等于整段"切进平行宇宙"，比单借一个更完整、更有"换了世界再凯旋归来"的叙事；<br>
            ③ <b>临门一步刚刚好</b>：最后 ♭VII→I 是低音全音迈进主音(例二学过的"散步进门")——前面攒的势能在这一步全部释放。</p>
          <p style="font-size:12.5px;color:var(--muted)">听点：对比 ③ 和 ④——只差中间多了一格 B♭，"突兀的跳跃"立刻变成"步步登顶"。台阶感就是史诗感。</p>
        </div>
      </details>

      <p><b>三个例子放在一起看：</b>同一张借货清单，借<b>第 4 格(Fm)得到眼泪</b>、借<b>第 7 格(B♭)得到豁达</b>、借<b>第 6 格(A♭)得到史诗</b>——离调借用不是一种味道，而是一整排调色盘。共同规律：①都引入了清单里的调外音(降下来的 3/6/7 级)；②都"借完就还"，最后回到大调的家；③全是<b>级数关系</b>，不挑调——换任何大调，效果一模一样。</p>`;
  }
}

/* 处理教学区里的播放按钮 */
function bindTeachPlays(root){
  root.querySelectorAll("[data-play]").forEach(el=>{
    el.onclick = async ()=>{
      const cmd = el.dataset.play;
      if(cmd.startsWith("semi:")){
        const s=cmd.slice(5).split(",").map(Number);
        // 半音/全音/大三度/小三度 + 习题共享根音：3秒内沿用上一次的根音
        const now=Date.now();
        const base = (ivLast.base!=null && now-ivLast.t<=3000) ? ivLast.base
                     : 60+Math.floor(Math.random()*(PIANO_HIGH-60-4+1)); // 用最大跨度4选根音(限 C4 以上)，沿用时不越界
        ivLast={base, t:now};
        await playSemis(s,base,true,"2n",{stack:false,gap:0.45}); }
      else if(cmd==="scaleC"){ await playSemis([...MAJOR_SCALE,12],60,true,"8n",{gap:0.4,stack:false}); animateScaleStrip(400); }
      else if(cmd==="scaleG"){ await playSemis(MAJOR_SCALE.map(x=>x+7).concat(19),60,true,"8n",{gap:0.4,stack:false}); animateScaleStrip(400); }
      else if(cmd.startsWith("chord:")){ const[,t,r]=cmd.split(":"); await playSemis(CHORDS[t].iv.map(x=>x+ +r),60,true); }
      else if(cmd.startsWith("dia:")){ const d=DIATONIC[+cmd.slice(4)-1]; await playSemis(CHORDS[d.type].iv.map(x=>x+d.root),60,true); }
      else if(cmd.startsWith("mksel:")){ // 手动选定一个小调（不发声）
        teachMinKey=cmd.slice(6);
        document.querySelectorAll(".tkNameM").forEach(n=>n.textContent=teachMinKey+" 小调");
        document.querySelectorAll(".keyMenu").forEach(mu=>{
          mu.style.display="none";
          mu.querySelectorAll(".chip").forEach(c=>{ if(c.dataset.play&&c.dataset.play.startsWith("mksel:")) c.style.borderColor = c.dataset.play==="mksel:"+teachMinKey ? "var(--p2)" : ""; });
        });
        toast("🔁 已换到 "+teachMinKey+" 小调，点套路按钮听效果");
        return;
      }
      else if(cmd==="mknat"){ // 当前小调的自然小调音阶(8音)
        const r=MKEYS[teachMinKey].root;
        await playSemis(fitSemis([...NAT_MINOR,12].map(x=>x+r)),60,true,"8n",{gap:0.4,stack:false});
      }
      else if(cmd==="mkharm"){ // 当前小调的和声小调音阶(8音，升第7音)
        const r=MKEYS[teachMinKey].root;
        await playSemis(fitSemis([0,2,3,5,7,8,11,12].map(x=>x+r)),60,true,"8n",{gap:0.4,stack:false});
      }
      else if(cmd.startsWith("mkprog:")){ // 按当前小调播放级数进行；V/V7=和声小调属和弦
        const toks=cmd.slice(7).split(",");
        if(toks.length>1 && !loopTimer) loopSpec={kind:"mdegs",toks};
        await playChordSeq(minDegChords(toks));
      }
      else if(cmd.startsWith("mkloopseq:")){ // 小调序列循环套路：记住并播放
        loopSpec={kind:"mseq",name:cmd.slice(10)};
        if(loopTimer){ toast("🔁 循环已切换，下一圈生效"); return; }
        await playChordSeq(loopChords());
      }
      else if(cmd.startsWith("mkseq:")){ // 以 A 小调为基准的序列移到当前小调播放
        const nm=cmd.slice(6);
        if(SEQS[nm].length>1 && !loopTimer) loopSpec={kind:"mseq",name:nm};
        await playChordSeq(mseqChords(nm));
      }
      else if(cmd==="kswitch"||cmd==="mkswitch"){ // 换调：弹出/收起本组的选调菜单（不发声）
        let mu=el.parentElement && el.parentElement.nextElementSibling;
        if(!(mu && mu.classList && mu.classList.contains("keyMenu"))) mu=document.querySelector(".keyMenu");
        if(mu) mu.style.display = (mu.style.display==="none" ? "" : "none");
        return;
      }
      else if(cmd.startsWith("ksel:")){ // 手动选定一个大调（不发声）；页面上所有"当前调"显示同步更新
        teachKey=cmd.slice(5);
        const K=RKEYS[teachKey];
        document.querySelectorAll(".tkName").forEach(n=>n.textContent=teachKey+" 大调");
        document.querySelectorAll(".tkMap").forEach(m=>m.textContent=`I=${triName(K,1)}　IV=${triName(K,4)}　V=${triName(K,5)}　vi=${triName(K,6)}`);
        document.querySelectorAll(".keyMenu").forEach(mu=>{
          mu.style.display="none";
          mu.querySelectorAll(".chip").forEach(c=>c.style.borderColor = c.dataset.play==="ksel:"+teachKey ? "var(--p2)" : "");
        });
        toast("🔁 已换到 "+teachKey+" 大调，点套路按钮听效果");
        return;
      }
      else if(cmd.startsWith("kprog:")){ // 按当前调播放级数进行；级数带 s 表示七和弦(如 5s = V7)；各调音型保形一致
        const toks=cmd.slice(6).split(",");
        if(toks.length>1 && !loopTimer) loopSpec={kind:"degs",toks}; // 多和弦进行自动记为"最后点的套路"
        await playChordSeq(kdegChords(toks));
      }
      else if(cmd.startsWith("kloopset:")){ // 选择级数式循环套路：记住它；若正在循环则下一圈无缝切换，否则播放一遍
        loopSpec={kind:"degs",toks:cmd.slice(9).split(",")};
        if(loopTimer){ toast("🔁 循环已切换，下一圈生效"); return; }
        await playChordSeq(loopChords());
      }
      else if(cmd.startsWith("kloopseq:")){ // 选择序列式循环套路(SEQS,自动移到当前调)：记住它
        loopSpec={kind:"seq",name:cmd.slice(9)};
        if(loopTimer){ toast("🔁 循环已切换，下一圈生效"); return; }
        await playChordSeq(loopChords());
      }
      else if(cmd.startsWith("kseq:")){ // SEQS 序列移到当前调播放；多和弦的自动记为"最后点的套路"
        const nm=cmd.slice(5);
        if(SEQS[nm].length>1 && !loopTimer) loopSpec={kind:"seq",name:nm};
        await playChordSeq(kseqChords(nm));
      }
      else if(cmd==="kloop"){ if(loopTimer) stopLoop(); else startLoop(); return; } // 循环播放开/停
      else if(cmd==="arpToggle"){ // 轮换 柱式 → 分解 → 综合（影响所有进行演示与循环，循环中下一圈生效）
        playStyle = playStyle==="block" ? "arp" : playStyle==="arp" ? "mix" : "block";
        document.querySelectorAll('[data-play="arpToggle"]').forEach(c=>c.textContent=styleLabel());
        toast(playStyle==="arp"?"🌊 已切换：分解和弦(琶音)":playStyle==="mix"?"🎼 已切换：柱式+分解综合(低音落底·上方铺开·槽尾点题)":"🎹 已切换：柱式(齐奏)");
        return;
      }
      else if(cmd.startsWith("seq:")){ const nm=cmd.slice(4);
        if(SEQS[nm].length>1 && !loopTimer) loopSpec={kind:"seq",name:nm};
        await playChordSeq(SEQS[nm]); }
      else if(cmd.startsWith("majscale:")){ const r=+cmd.slice(9); await playSemis([...MAJOR_SCALE,12].map(x=>x+r),60,true,"8n",{gap:0.4,stack:false}); } // 任意大调音阶
      else if(cmd.startsWith("natminor:")){ const r=+cmd.slice(9); await playSemis([0,2,3,5,7,8,10,12].map(x=>x+r),60,true,"8n",{gap:0.4,stack:false}); } // 自然小调音阶
      else if(cmd.startsWith("notes:")){ await playSemis(cmd.slice(6).split(",").map(Number),60,true); } // 任意一组音(末尾合奏)
      else if(cmd.startsWith("mel:")){ await playSemis(cmd.slice(4).split(",").map(Number),60,true,"2n",{stack:false,gap:0.6}); } // 纯旋律逐个弹，不合奏
      else if(cmd.startsWith("note:")){ await playSemis([+cmd.slice(5)],60,false,"2n"); } // 单个音
      else if(cmd.startsWith("prog:")){ await playProgression(cmd.slice(5)); }
      lightAlong("#piano"); // 底部悬浮键盘随声音同步点亮
    };
  });
}
// 教学用：按顺序播放一串和弦(每个和弦的音用从60起的半音表示)
const SEQS = {
  tonic:     [[0,4,7]],                                   // C 主和弦(家)
  auth:      [[7,11,14,17],[0,4,7]],                      // G7 → C 完满终止/解决/回家
  hangV7:    [[7,11,14,17]],                              // 只奏 G7：悬着没解决
  deceptive: [[7,11,14,17],[9,12,16]],                    // G7 → Am 没回到家(阻碍终止)
  half:      [[0,4,7],[7,11,14]],                         // C → G 半终止(停在属和弦)
  plagal:    [[5,9,12],[0,4,7]],                          // F → C 变格终止(阿门)
  blues:     [[0,4,7,10],[5,9,12,15],[7,11,14,17],[0,4,7,10]], // C7 F7 G7 C7 布鲁斯味
  ii51:      [[2,5,9,12],[7,11,14,17],[0,4,7,11]],        // Dm7 → G7 → Cmaj7
  // 三和弦 → 加第七音 对比
  cmaj7cmp:  [[0,4,7],[0,4,7,11]],   // C → Cmaj7 (加大七 B) = I → Imaj7
  dii7cmp:   [[2,5,9],[2,5,9,12]],   // Dm → Dm7 = ii → ii7
  dV7cmp:    [[7,11,14],[7,11,14,17]], // G → G7 = V → V7

let playStyle="block"; // 进行演示的演奏方式：block 柱式齐奏 | arp 分解和弦 | mix 柱式+分解综合
function styleLabel(){
  return playStyle==="arp" ? "🌊 分解" : playStyle==="mix" ? "🎼 综合" : "🎹 齐奏";
}
// 按当前演奏方式调度一个和弦：t=槽起点(秒)，slot=槽长，last=是否末和弦
function schedStyledChord(cs, t, slot, now, events, last){
  if(playStyle==="arp"){ // 分解：和弦音自低向高依次弹开（钢琴抒情伴奏织体）
    cs.forEach((s,j)=>{
      synth.triggerAttackRelease(semiToName(s,60), "4n", now+t+j*0.18);
      events.push({midis:[60+s], t:t+j*0.18, dur:"4n"});
    });
  } else if(playStyle==="mix"){ // 综合：低音先落并延住(柱式根基) → 上方音依次铺开(分解流动) → 槽尾整和弦轻击点题
    events.push({midis:cs.map(s=>60+s), t, dur:"2n", hint:true}); // 黄色提示：当前正在演奏的是哪个和弦
    synth.triggerAttackRelease(semiToName(cs[0],60), "2n", now+t);
    events.push({midis:[60+cs[0]], t, dur:"2n"});
    cs.slice(1).forEach((s,j)=>{
      synth.triggerAttackRelease(semiToName(s,60), "4n", now+t+0.16*(j+1));
      events.push({midis:[60+s], t:t+0.16*(j+1), dur:"4n"});
    });
    const bt=t+Math.max(slot*0.62, 0.16*cs.length);
    synth.triggerAttackRelease(cs.map(s=>semiToName(s,60)), last?"2n":"4n", now+bt);
    events.push({midis:cs.map(s=>60+s), t:bt, dur:last?"2n":"4n"});
  } else { // 柱式：整个和弦齐奏
    const dur=last?"1n":"2n";
    synth.triggerAttackRelease(cs.map(s=>semiToName(s,60)), dur, now+t);
    events.push({midis:cs.map(s=>60+s), t, dur});
  }
}
async function playChordSeq(seq){
  await initAudio(); const now=Tone.now(); const events=[]; let t=0;
  seq.forEach((cs,i)=>{
    const last=i===seq.length-1;
    const slot = playStyle==="arp" ? Math.max(0.95, cs.length*0.18+0.25) : 0.95;
    schedStyledChord(cs, t, slot, now, events, last);
    if(!last) t+=slot;
  });
  lastPlayed=events;
}
async function playProgression(kind){
  await initAudio();
  let degs = kind==="pop" ? [1,5,6,4] : [4,5,1];
  const now=Tone.now(); const events=[];
  degs.forEach((dg,i)=>{
    const d=DIATONIC[dg-1];
    const names=CHORDS[d.type].iv.map(x=>semiToName(x+d.root,60));
    synth.triggerAttackRelease(names,"2n", now + i*0.62);
    events.push({midis:names.map(nameToMidi), t:i*0.62, dur:"2n"});
  });
  lastPlayed=events;
}

function pickConcept(mId){
  const m=MODULES.find(x=>x.id===mId); const ms=state.mastery[mId];
  let concepts = m.concepts;
  // 音程关：先掌握半音/全音，再解锁大三度/小三度
  if(mId==="interval"){
    const basicsDone = ["half","whole"].every(c=>ms[c]>=MASTERY_TARGET);
    concepts = basicsDone ? m.concepts : ["half","whole"];
  }
  // 还没掌握的优先出现；都掌握后进入复习
  const notMastered = concepts.filter(c=>ms[c]<MASTERY_TARGET);
  const pool = notMastered.length? notMastered : concepts;
  // 按流行音乐使用频率加权抽取；"均匀全面"模式则等概率
  const wmap = (state.weightMode==="real") ? (FREQ[mId]||{}) : {};
  return weightedPick(pool, c => (wmap[c]||1));
}

// 整段移位通用：选"超出键盘(C3..C6，相对C4为-12..24)的音最少"的八度(平手取移动最小)，保留整段音型
function shiftSeqFit(seq){
  const all=seq.flat();
  let best=0, bestOut=Infinity;
  for(const k of [-12,0,12,24]){
    const out=all.filter(s=>s+k<-12||s+k>24).length;
    if(out<bestOut || (out===bestOut && Math.abs(k)<Math.abs(best))){ best=k; bestOut=out; }
  }
  return seq.map(ch=>ch.map(s=>s+best));
}
// 把 SEQS 里以 C 为基准的和弦序列整体移到指定大调(默认当前教学调)：整段统一移位，保留走向
function kseqChords(name, key){
  const r0=RKEYS[key||teachKey].root, off=r0>6?r0-12:r0;
  return shiftSeqFit(SEQS[name].map(ch=>ch.map(s=>s+off)));
}
// 级数套路：先按 C 调摆好"原型"音型，再整段移到当前调——任何调听到的高低走向都一样
function kdegChords(toks, key){
  const shape=toks.map(t=>diatonicChordSemis(0, parseInt(t), String(t).endsWith("s")));
  const r0=RKEYS[key||teachKey].root, off=r0>6?r0-12:r0;
  return shiftSeqFit(shape.map(ch=>ch.map(s=>s+off)));
}
/* ===== 小调教学演示引擎（与大调机制平行）===== */
let teachMinKey="A"; // 当前小调（主音名，对应 MKEYS：A E B F♯ D G）
function minDiaChordSemis(root,deg,sev){ // 在自然小调音阶上隔三度叠置
  const sc=NAT_MINOR, i=deg-1, n=sev?4:3, out=[];
  for(let k=0;k<n;k++){ const j=i+2*k; out.push(root + sc[j%7] + 12*Math.floor(j/7)); }
  return out;
}
function minOff(key){ const r0=MKEYS[key||teachMinKey].root; let off=r0-9; if(off>6)off-=12; if(off<-6)off+=12; return off; }
// 小调级数套路：A 小调原型(主音 A3) + 整段保形移调；token：1..7 自然顺阶三和弦(s后缀=七和弦)；"V"=大属三和弦；"V7"=属七(和声小调)
function minDegChords(toks, key){
  const base=-3; // A3
  const shape=toks.map(t=>{
    if(t==="V")  return [base+7, base+11, base+14];          // E G♯ B
    if(t==="V7") return [base+7, base+11, base+14, base+17]; // E G♯ B D
    if(t==="1h") return [base+12, base+15, base+19];         // 高位 i(A4 C5 E5)：让导音 G♯4 向上蹭进 A4
    return minDiaChordSemis(base, parseInt(t), String(t).endsWith("s"));
  });
  const off=minOff(key);
  return shiftSeqFit(shape.map(ch=>ch.map(s=>s+off)));
}
function mseqChords(name, key){ // 以 A 小调为基准的 SEQS 序列整段移到当前小调
  const off=minOff(key);
  return shiftSeqFit(SEQS[name].map(ch=>ch.map(s=>s+off)));
}

    <span class="chip" data-play="mkswitch">🔁 <b class="tkNameM">${teachMinKey} 小调</b> ▾</span>
    <span class="chip" data-play="kloop" style="border-color:var(--p3)">${loopTimer?"⏹ 停止":"🔄 循环"}</span>
    <span class="chip" data-play="arpToggle">${styleLabel()}</span>
  </div>
  <div class="row keyMenu" style="display:none">
    ${MKEY_LIST.map(k=>`<span class="chip" data-play="mksel:${k}"${k===teachMinKey?' style="border-color:var(--p2)"':''}>${k} 小调</span>`).join("")}
  </div>`;
}
function loopChords(){ // 当前要循环的和弦组(实时跟随当前大/小调与 loopSpec)
  if(loopSpec.kind==="seq")   return kseqChords(loopSpec.name);
  if(loopSpec.kind==="mseq")  return mseqChords(loopSpec.name);
  if(loopSpec.kind==="mdegs") return minDegChords(loopSpec.toks);
  return kdegChords(loopSpec.toks);
}
function stopLoop(){
  if(loopTimer){ clearTimeout(loopTimer); loopTimer=null; }
  document.querySelectorAll('[data-play="kloop"]').forEach(b=>b.textContent="🔄 循环");
  document.querySelectorAll('#kbDock .key').forEach(k=>k.classList.remove('hint')); // 清掉和弦黄色提示
}
async function startLoop(){
  await initAudio();
  const BEAT=0.8; // 每个和弦 0.8 秒，节奏稳定
  const tick=()=>{
    const chords=loopChords(); // 每圈现取：换套路/换调/换演奏方式都在下一圈无缝生效
    const now=Tone.now(); const events=[];
    chords.forEach((cs,i)=>schedStyledChord(cs, i*BEAT, BEAT, now, events, false));
    lastPlayed=events; lightAlong("#piano");
    loopTimer=setTimeout(tick, chords.length*BEAT*1000);
  };
  tick();
  document.querySelectorAll('[data-play="kloop"]').forEach(b=>b.textContent="⏹ 停止");
}
function nextQuestion(){
  const mId=state.moduleId;
  const p=moduleProgress(mId);
  if(p.pct===100){ return renderModuleDone(mId); }
  let q, sig, tries=0;
  do {
    q = buildQuestion(mId, pickConcept(mId));
    sig = mId+"|"+q.concept+"|"+q.qtype; // 概念+题型相同即视为同一类题
    tries++;
  } while(sig===lastSig && tries<12); // 尽量不与上一题重复(选项唯一时最多重试12次)
  lastSig=sig; cur=q;
  renderQuestion();
}

/* 生成题目对象： {kind:'choice'|'build', concept, qtype, prompt, play, options:[{label,sub,correct}], explain, target(build)} */
function buildQuestion(mId, concept){
  if(mId==="interval") return q_interval(concept);
  if(mId==="scale")    return q_scale(concept);
  if(mId==="key")      return q_key(concept);
  if(mId==="keymin")   return q_keymin(concept);
  if(mId==="triad")    return q_triad(concept);
  if(mId==="symbols")  return q_symbols(concept);
  if(mId==="seventh")  return q_seventh(concept);
  if(mId==="diatonic") return q_diatonic(concept);
  if(mId==="roman")    return q_roman(concept);
  if(mId==="transpose")return q_transpose(concept);
  if(mId==="function") return q_function(concept);
  if(mId==="inv")      return q_inv(concept);
  if(mId==="slash")    return q_slash(concept);
  if(mId==="pop")      return q_pop(concept);
  if(mId==="sus")      return q_sus(concept);
  if(mId==="parmin")   return q_parmin(concept);
  if(mId==="minfam")   return q_minfam(concept);
  if(mId==="minv")     return q_minv(concept);
  if(mId==="minprog")  return q_minprog(concept);
  if(mId==="borrow")   return q_borrow(concept);
}

/* ---- 音程 ---- */
function q_interval(concept){
  const baseMidi = 60 + (Math.random()*8|0); // 随机根音(落在键盘范围内)
  if(concept==="half"||concept==="whole"){
    const isHalf = concept==="half";
    const semis=[0, isHalf?1:2];
    return {kind:"choice", concept, qtype:"听辨 · 距离",
      prompt:"听这两个音，它们相差多少？",
      play:()=>{ ivLast={base:baseMidi, t:Date.now()}; playSemis(semis, baseMidi, true, "2n", {stack:false, gap:0.45}); },
      options:[ // 固定左小右大
        {label:"半音", sub:"挨着的两个键，差1", correct:isHalf},
        {label:"全音", sub:"中间隔1个键，差2", correct:!isHalf},
      ],
      explain: isHalf? "这是<b>半音</b>：钢琴上紧挨着的两个键。" : "这是<b>全音</b>：中间隔了一个键，等于2个半音。"};
  } else { // M3 / m3
    const isM = concept==="M3";
    const semis=[0, isM?4:3];
    return {kind:"choice", concept, qtype:"听辨 · 色彩",
      prompt:"听这个三度音程，它是明亮还是忧郁？",
      play:()=>{ ivLast={base:baseMidi, t:Date.now()}; playSemis(semis, baseMidi, true, "2n", {stack:false, gap:0.45}); },
      options:[ // 固定左小右大
        {label:"小三度", sub:"忧郁、伤感（差3半音）", correct:!isM},
        {label:"大三度", sub:"明亮、开朗（差4半音）", correct:isM},
      ],
      explain: isM? "<b>大三度</b>(4半音)：明亮开朗，是大和弦的颜色来源。" : "<b>小三度</b>(3半音)：忧郁柔和，是小和弦的颜色来源。"};
  }
}

/* ---- 大调音阶 ---- */
function q_scale(concept){
  if(concept==="hear"){
    const correct = Math.random()<0.5;
    const base=60+(Math.random()*13|0); // 随机起始调(音阶跨12半音，仍在键盘内)
    let semis;
    if(correct){ semis=[...MAJOR_SCALE,12]; }
    else { // 改一个音制造"走调"
      semis=[...MAJOR_SCALE,12];
      const i=1+(Math.random()*5|0); semis[i]+= (Math.random()<0.5?1:-1);
    }
    return {kind:"choice", concept, qtype:"听辨 · 音阶",
      prompt:"听这条音阶，它是标准的大调音阶吗？",
      play:()=>playSemis(semis,base,true,"8n",{gap:0.4,stack:false}),
      options:shuffle([
        {label:"是 · 标准大调", sub:"全全半全全全半，很顺", correct:correct},
        {label:"不是 · 有音走调了", sub:"中间某个音听起来怪", correct:!correct},
      ]),
      explain: correct? "没错，这是标准大调音阶（全全半全全全半）。" : "对，中间有个音被改动了，破坏了大调的台阶模式。"};
  }
  if(concept==="build"){ // 在 C 大调上搭（入门）
    const semisC=[...MAJOR_SCALE,12]; // C..C 共8个音
    return {kind:"build", concept, qtype:"搭建 · 音阶",
      prompt:"在键盘上点出 C 大调音阶：1 2 3 4 5 6 7，再回到高八度的 1，共 <b>8 个音</b>（全是白键）。",
      play:()=>playSemis(semisC,60,true,"8n",{gap:0.4,stack:false}),
      targetMidis: semisC.map(x=>60+x), rootSemi:0, flashStart:[60],
      explain:"C 大调 = C D E F G A B C，简谱 1 2 3 4 5 6 7 (1)，全是白键。"};
  }
  // buildAny：给定随机起始音，按 全全半全全全半 搭出大调音阶（含高八度，共8个音）
  const roots=[0,2,4,5,7,9]; // 起始音 C D E F G A（避免过多升降号）
  const root=rand(roots), rn=NOTE_NAMES[root], semis=[...MAJOR_SCALE,12].map(x=>x+root);
  return {kind:"build", concept:"buildAny", qtype:"搭建 · 任意调音阶",
    prompt:`起始音 <b>${rn}</b>（当作 do）会<b>闪烁</b>提示位置（点它才算选中）。请按 <b>全 全 半 全 全 全 半</b> 的台阶，从 ${rn} 一路点到高八度的 ${rn}，共 <b>8 个音</b>。`,
    play:()=>playSemis(semis,60,true,"8n",{gap:0.4,stack:false}),
    targetMidis: semis.map(x=>60+x), rootSemi:root, flashStart:[60+root],
    explain:`从 ${rn} 起的大调音阶 = ${sharp(semis.map(x=>NOTE_NAMES[x%12]).join(" "))}（全全半全全全半，最后回到高八度的 ${rn}）。`};
}

/* ---- 三和弦 ---- */
const TRIAD_OPTS=[ // 科班顺序：大 → 小 → 增 → 减
  {t:"maj",label:"大三和弦",sub:"明亮、稳定"},
  {t:"min",label:"小三和弦",sub:"柔和、忧郁"},
  {t:"aug",label:"增三和弦",sub:"悬浮、神秘"},
  {t:"dim",label:"减三和弦",sub:"紧张、不安"},
];
function q_triad(concept){
  const root = Math.random()*8|0;
  const mode = rand(["listen","build","color"]);
  if(mode==="build"){
    const c=CHORDS[concept];
    return {kind:"build", concept, qtype:"搭建 · 和弦",
      prompt:`搭一个<b>${c.name}</b>，根音用 <b>${NOTE_NAMES[0]}（do/1）</b>。`,
      play:()=>playSemis(c.iv,60,true),
      targetPC:c.iv.map(x=>x%12), rootSemi:0,
      explain:`${c.name} = ${c.jian}（半音结构 ${c.iv.join("-")}），颜色：${c.color}。`};
  }
  if(mode==="color"){
    const c=CHORDS[concept];
    const opts = TRIAD_OPTS.map(o=>({label:o.sub, sub:o.label, correct:o.t===concept}));
    return {kind:"choice", concept, qtype:"色彩匹配",
      prompt:"听这个和弦，它给你的感觉是？",
      play:()=>playSemis(c.iv.map(x=>x+root),60,true),
      options:opts,
      explain:`这是<b>${c.name}</b>，色彩：${c.color}。`};
  }
  // listen
  const c=CHORDS[concept];
  return {kind:"choice", concept, qtype:"听辨 · 和弦",
    prompt:"听这个和弦，它是哪种三和弦？",
    play:()=>playSemis(c.iv.map(x=>x+root),60,true),
    options:TRIAD_OPTS.map(o=>({label:o.label, sub:o.sub, correct:o.t===concept})),
    explain:`这是<b>${c.name}</b>（${c.jian}），${c.color}。`};
}

/* ---- 和弦符号（桥梁章节）---- */
const SEV_SYM = {
  maj7:{suf:"maj7", deg:"1 3 5 7",   tri:"大三和弦", add:"大七度"},
  dom7:{suf:"7",    deg:"1 3 5 ♭7",  tri:"大三和弦", add:"小七度"},
  min7:{suf:"m7",   deg:"1 ♭3 5 ♭7", tri:"小三和弦", add:"小七度"},
  m7b5:{suf:"m7♭5", deg:"1 ♭3 ♭5 ♭7",tri:"减三和弦", add:"小七度"},
};
const SEV_TYPES=["maj7","dom7","min7","m7b5"]; // 固定顺序
function symbolOf(root,type){ return NOTE_NAMES[root]+SEV_SYM[type].suf; }
function q_symbols(concept){
  const type=concept, c=CHORDS[type];
  const root=rand([0,2,4,5,7,9,11]); // 用自然音名做根音
  const sym=symbolOf(root,type);
  const mode=rand(["deg","derive","name","spell"]);
  if(mode==="deg"){
    return {kind:"choice", concept, qtype:"拆符号 · 级数",
      prompt:`和弦符号 <b>${sym}</b> 的构成级数是哪个？`,
      play:()=>playSemis(c.iv.map(x=>x+root),60,true),
      options:SEV_TYPES.map(t=>({label:SEV_SYM[t].deg, sub:SEV_SYM[t].suf+" 型", correct:t===type})),
      explain:`${sym} = ${SEV_SYM[type].tri} + ${SEV_SYM[type].add}，级数 ${SEV_SYM[type].deg}。`};
  }
  if(mode==="derive"){
    return {kind:"choice", concept, qtype:"从三和弦推符号",
      prompt:`在 <b>${NOTE_NAMES[root]} ${SEV_SYM[type].tri}</b> 上再加一个 <b>${SEV_SYM[type].add}</b>，得到的符号是？`,
      play:()=>playSemis(c.iv.map(x=>x+root),60,true),
      options:SEV_TYPES.map(t=>({label:symbolOf(root,t), sub:SEV_SYM[t].tri+" + "+SEV_SYM[t].add, correct:t===type})),
      explain:`${SEV_SYM[type].tri} + ${SEV_SYM[type].add} = ${sym}（${SEV_SYM[type].deg}）。`};
  }
  if(mode==="name"){
    return {kind:"choice", concept, qtype:"听音 → 符号",
      prompt:`听这个以 <b>${NOTE_NAMES[root]}</b> 为根音的七和弦，它的符号是哪个？`,
      play:()=>playSemis(c.iv.map(x=>x+root),60,true),
      options:SEV_TYPES.map(t=>({label:symbolOf(root,t), sub:SEV_SYM[t].deg, correct:t===type})),
      explain:`这是 <b>${sym}</b> = ${sharp(c.iv.map(x=>NOTE_NAMES[(x+root)%12]).join(" "))}（${SEV_SYM[type].deg}）。`};
  }
  // spell：按符号在键盘上搭出和弦音
  return {kind:"build", concept, qtype:"按符号搭和弦",
    prompt:`在键盘上搭出 <b>${sym}</b>（${SEV_SYM[type].tri} + ${SEV_SYM[type].add}，级数 ${SEV_SYM[type].deg}）。`,
    play:()=>playSemis(c.iv.map(x=>x+root),60,true),
    targetPC: c.iv.map(x=>(x+root)%12), rootSemi:root,
    explain:`${sym} = ${sharp(c.iv.map(x=>NOTE_NAMES[(x+root)%12]).join(" "))}（${SEV_SYM[type].deg}）。`};
}

/* ---- 调内和弦 ---- */
function q_diatonic(concept){
  const deg = +concept.slice(1); // d2..d7
  const d = DIATONIC[deg-1];
  const c = CHORDS[d.type];
  return {kind:"choice", concept, qtype:"调内和弦",
    prompt:`在 <b>C 大调</b>里，以第 <b>${deg}</b> 级（${NOTE_NAMES[d.root]}，${SCALE_DEG_NAME[deg]}）为根音叠出的三和弦，是哪种？`,
    play:()=>playSemis(c.iv.map(x=>x+d.root),60,true),
    options:[ // 科班顺序：大 → 小 → 减
      {label:"大三和弦", sub:"明亮（I IV V）", correct:d.type==="maj"},
      {label:"小三和弦", sub:"柔和（ii iii vi）", correct:d.type==="min"},
      {label:"减三和弦", sub:"紧张（vii°）", correct:d.type==="dim"},
    ],
    explain:`第${deg}级是 <b>${d.rn} = ${NOTE_NAMES[d.root]}${c.name}</b>。记住口诀：大小小大大小减。`};
}

/* ---- 罗马数字（多调）---- */
// 各大调的正确音名拼写（含升降，避免 NOTE_NAMES 只有升号导致拼错）
const RKEYS = {
  "C":{root:0,  notes:["C","D","E","F","G","A","B"]},
  "G":{root:7,  notes:["G","A","B","C","D","E","F♯"]},
  "D":{root:2,  notes:["D","E","F♯","G","A","B","C♯"]},
  "A":{root:9,  notes:["A","B","C♯","D","E","F♯","G♯"]},
  "F":{root:5,  notes:["F","G","A","B♭","C","D","E"]},
  "B♭":{root:10,notes:["B♭","C","D","E♭","F","G","A"]},
};
const RKEY_LIST=["C","G","D","A","F","B♭"];
const TRI_RN=["I","ii","iii","IV","V","vi","vii°"];
const SEV_RN=["Imaj7","ii7","iii7","IVmaj7","V7","vi7","viiø7"];
const TRI_SUF=["","m","m","","","m","dim"];
const SEV_SUF=["maj7","m7","m7","maj7","7","m7","m7♭5"];
const TRI_QN=["大三和弦","小三和弦","小三和弦","大三和弦","大三和弦","小三和弦","减三和弦"];
// 调内和弦的半音（从 keyRoot 起，按音阶隔音叠置；seventh 则四个音）
function diatonicChordSemis(keyRoot, deg, seventh){
  const idx=deg-1, offs=seventh?[0,2,4,6]:[0,2,4];
  return offs.map(o=>{ const j=idx+o; return keyRoot + MAJOR_SCALE[j%7] + 12*Math.floor(j/7); });
}
function fitSemis(s){ let a=s.slice(); while(Math.max(...a)>24) a=a.map(x=>x-12); while(Math.min(...a)<0) a=a.map(x=>x+12); return a; }
function playFit(semis){ playSemis(fitSemis(semis),60,true); }
function triNotes(K,deg){ const i=deg-1; return [K.notes[i],K.notes[(i+2)%7],K.notes[(i+4)%7]].join(" "); }
function triName(K,deg){ const i=deg-1; return K.notes[i]+TRI_SUF[i]; }
function sevName(K,deg){ const i=deg-1; return K.notes[i]+SEV_SUF[i]; }
function uniqPick(arr,correct,n){ const pool=[...new Set(arr)].filter(x=>x!==correct); return shuffle([correct,...shuffle(pool).slice(0,n-1)]); }
function uniqNums(correct,max,n){ const pool=[]; for(let i=1;i<=max;i++) if(i!==correct) pool.push(i); return shuffle([correct,...shuffle(pool).slice(0,n-1)]); }
function q_roman(concept){
  const kn=rand(RKEY_LIST), K=RKEYS[kn], d=1+(Math.random()*7|0), idx=d-1, rootName=K.notes[idx];
  if(concept==="deg"){
    if(Math.random()<0.5){
      return {kind:"choice", concept, qtype:"罗马数字 · 级数→根音",
        prompt:`在 <b>${kn} 大调</b>里，第 <b>${d}</b> 级的根音是哪个音？`,
        play:()=>playFit([K.root+MAJOR_SCALE[idx]]),
        options:uniqPick(K.notes,rootName,4).map(n=>({label:n,correct:n===rootName})),
        explain:`${kn} 大调音阶：${K.notes.join(" ")}。第 ${d} 个音是 <b>${rootName}</b>。`};
    }
    return {kind:"choice", concept, qtype:"罗马数字 · 根音→级数",
      prompt:`在 <b>${kn} 大调</b>里，<b>${rootName}</b> 是第几级？`,
      play:()=>playFit([K.root+MAJOR_SCALE[idx]]),
      options:uniqNums(d,7,4).map(n=>({label:"第 "+n+" 级",correct:n===d})),
      explain:`${kn} 大调音阶：${K.notes.join(" ")}。${rootName} 排在第 ${d} 个。`};
  }
  if(concept==="tri"){
    const rn=TRI_RN[idx];
    return {kind:"choice", concept, qtype:"罗马数字 · 三和弦",
      prompt:`在 <b>${kn} 大调</b>里，第 <b>${d}</b> 级的三和弦应写成哪个罗马数字？`,
      play:()=>playFit(diatonicChordSemis(K.root,d,false)),
      options:uniqPick(TRI_RN,rn,4).map(x=>({label:x,correct:x===rn})),
      explain:`第 ${d} 级 = ${triNotes(K,d)}（${TRI_QN[idx]}）→ <b>${rn}</b>。大写=大、小写=小、°=减。`};
  }
  if(concept==="sev"){
    const rn=SEV_RN[idx];
    return {kind:"choice", concept, qtype:"罗马数字 · 七和弦",
      prompt:`在 <b>${kn} 大调</b>里，第 <b>${d}</b> 级的七和弦罗马数字是？`,
      play:()=>playFit(diatonicChordSemis(K.root,d,true)),
      options:uniqPick(SEV_RN,rn,4).map(x=>({label:x,correct:x===rn})),
      explain:`第 ${d} 级七和弦 = <b>${sevName(K,d)}</b> → <b>${rn}</b>。`};
  }
  // trans 移调：罗马数字 → 实际和弦
  const useSev=Math.random()<0.6, rn=useSev?SEV_RN[idx]:TRI_RN[idx];
  const correctName=useSev?sevName(K,d):triName(K,d);
  const distract=[];
  for(const ok of shuffle(RKEY_LIST.filter(x=>x!==kn))){
    const nm=useSev?sevName(RKEYS[ok],d):triName(RKEYS[ok],d);
    if(nm!==correctName && !distract.includes(nm)) distract.push(nm);
    if(distract.length>=3) break;
  }
  return {kind:"choice", concept, qtype:"罗马数字 · 移调翻译",
    prompt:`在 <b>${kn} 大调</b>里，<b>${rn}</b> 对应哪个实际和弦？`,
    play:()=>playFit(diatonicChordSemis(K.root,d,useSev)),
    options:shuffle([{label:correctName,correct:true},...distract.map(n=>({label:n,correct:false}))]),
    explain:`${kn} 大调第 ${d} 级是 ${rootName}，${rn} = <b>${correctName}</b>。`};
}

/* ---- 移调翻译（独立单元）---- */
function q_transpose(concept){
  const kn=rand(RKEY_LIST), K=RKEYS[kn], d=1+(Math.random()*7|0), idx=d-1;
  const useSev=Math.random()<0.6, rn=useSev?SEV_RN[idx]:TRI_RN[idx];
  const cname=useSev?sevName(K,d):triName(K,d);
  const play=()=>playFit(diatonicChordSemis(K.root,d,useSev));
  if(concept==="r2c"){
    const distract=[];
    for(const ok of shuffle(RKEY_LIST.filter(x=>x!==kn))){ const nm=useSev?sevName(RKEYS[ok],d):triName(RKEYS[ok],d); if(nm!==cname&&!distract.includes(nm))distract.push(nm); if(distract.length>=3)break; }
    return {kind:"choice",concept,qtype:"移调 · 罗马数字→和弦",
      prompt:`在 <b>${kn} 大调</b>里，<b>${rn}</b> 对应哪个实际和弦？`, play,
      options:shuffle([{label:cname,correct:true},...distract.map(n=>({label:n,correct:false}))]),
      explain:`${kn} 大调第 ${d} 级是 ${K.notes[idx]}，${rn} = <b>${cname}</b>。`};
  }
  if(concept==="c2r"){
    const pool=(useSev?SEV_RN:TRI_RN).filter(x=>x!==rn);
    return {kind:"choice",concept,qtype:"移调 · 和弦→罗马数字",
      prompt:`在 <b>${kn} 大调</b>里，<b>${cname}</b> 是哪个罗马数字？`, play,
      options:shuffle([{label:rn,correct:true},...shuffle(pool).slice(0,3).map(x=>({label:x,correct:false}))]),
      explain:`${cname} 的根音 ${K.notes[idx]} 是 ${kn} 大调第 ${d} 级 → <b>${rn}</b>。`};
  }
  // prog 进行移调
  const prog=rand([{rn:"ii7–V7–Imaj7",degs:[2,5,1],sev:true},{rn:"I–V–vi–IV",degs:[1,5,6,4],sev:false},{rn:"vi–IV–I–V",degs:[6,4,1,5],sev:false}]);
  const chordOf=(KK,dd)=>prog.sev?sevName(KK,dd):triName(KK,dd);
  const correct=prog.degs.map(dd=>chordOf(K,dd)).join("–");
  const distract=[];
  for(const ok of shuffle(RKEY_LIST.filter(x=>x!==kn))){ const nm=prog.degs.map(dd=>chordOf(RKEYS[ok],dd)).join("–"); if(nm!==correct&&!distract.includes(nm))distract.push(nm); if(distract.length>=3)break; }
  return {kind:"choice",concept,qtype:"移调 · 进行翻译",
    prompt:`把进行 <b>${prog.rn}</b> 移到 <b>${kn} 大调</b>，依次是哪几个和弦？`,
    play:()=>playChordSeq(prog.degs.map(dd=>fitSemis(diatonicChordSemis(K.root,dd,prog.sev)))),
    options:shuffle([{label:correct,correct:true},...distract.map(n=>({label:n,correct:false}))]),
    explain:`${kn} 大调里 ${prog.rn} = <b>${correct}</b>。`};
}

/* ---- 调性与调号 ---- */
function q_key(concept){
  const kn=rand(RKEY_LIST), K=RKEYS[kn];
  const acc=K.notes.filter(n=>n.length>1); // 黑键(升降号)
  // 音阶逐个奏出(含回到高八度的主音，共8个音)，不齐奏
  const semis8=[...MAJOR_SCALE,12].map(x=>x+K.root);
  const playScale=()=>playSemis(fitSemis(semis8),60,true,"8n",{gap:0.4,stack:false});
  if(concept==="build"){
    // 在键盘上点出该大调音阶的 8 个音(全全半全全全半 = 7 个台阶 = 8 个音，含高八度)
    return {kind:"build", concept, qtype:"调性 · 在键盘上搭出这个调",
      prompt:`这是 <b>${kn} 大调</b>。从主音 ${kn} 起，按"全 全 半 全 全 全 半"一路点到高八度的 ${kn}，共 <b>8 个音</b>(主音会闪烁提示)。`,
      play:playScale,
      targetMidis: semis8.map(x=>60+x), rootSemi:K.root, flashStart:[60+K.root],
      explain:`${kn} 大调音阶 = ${K.notes.join(" ")} (${kn})，从主音到高八度共 8 个音${acc.length?("；其中 "+acc.join(" ")+" 是黑键"):"，全是白键"}。`};
  }
  if(concept==="form"){
    if(acc.length===0){
      return {kind:"choice",concept,qtype:"调性 · 调号(黑键)",
        prompt:`从 <b>${kn}</b> 起套用大调台阶"全全半全全全半"，会用到哪个黑键(升降号)？`,
        play:playScale,
        options:shuffle([{label:"一个都没有（全是白键）",correct:true},{label:"F♯",correct:false},{label:"B♭",correct:false},{label:"C♯",correct:false}]),
        explain:`${kn} 大调 = ${K.notes.join(" ")}，正好全落在白键上，所以没有升降号。`};
    }
    const correct=acc.join(" ");
    const pool=["F♯","F♯ C♯","C♯ F♯ G♯","B♭","B♭ E♭"].filter(x=>x!==correct);
    return {kind:"choice",concept,qtype:"调性 · 调号(黑键)",
      prompt:`从 <b>${kn}</b> 起套用大调台阶"全全半全全全半"，必须用到哪个(些)黑键？`,
      play:playScale,
      options:shuffle([{label:correct,correct:true},...shuffle(pool).slice(0,3).map(x=>({label:x,correct:false}))]),
      explain:`${kn} 大调 = ${K.notes.join(" ")}，其中 <b>${correct}</b> 是黑键——不升/降它，台阶就不再是"全全半全全全半"了。`};
  }
  if(concept==="member"){
    const out = acc.length? acc[0][0] : "F♯"; // 调外音：升降键的本位字母(如G大调里的F)；C大调用F♯
    const ins = shuffle(K.notes.filter(n=>n.length===1)).slice(0,3);
    return {kind:"choice",concept,qtype:"调性 · 哪个音不在调里",
      prompt:`下面哪个音 <b>不属于 ${kn} 大调</b>？`,
      play:playScale,
      options:shuffle([{label:out,correct:true},...ins.map(n=>({label:n,correct:false}))]),
      explain:`${kn} 大调 = ${K.notes.join(" ")}；<b>${out}</b> 不在其中。`};
  }
  if(concept==="sig"){
    const isSharp = acc.length && acc[0].includes("♯");
    const correct = acc.length===0?"0 个(无升降号)":(acc.length+" 个"+(isSharp?"升号":"降号"));
    const pool=["0 个(无升降号)","1 个升号","1 个降号","2 个升号","2 个降号","3 个升号"].filter(x=>x!==correct);
    return {kind:"choice",concept,qtype:"调性 · 调号数量",
      prompt:`<b>${kn} 大调</b>的调号是几个升号或降号？`,
      play:playScale,
      options:shuffle([{label:correct,correct:true},...shuffle(pool).slice(0,3).map(x=>({label:x,correct:false}))]),
      explain:`${kn} 大调 = ${K.notes.join(" ")}，${acc.length===0?"没有黑键":"含 "+acc.join(" ")}，所以调号是 ${correct}。`};
  }
  // minor 关系小调
  const rel=K.notes[5]; // 大调第6级
  const pool=["C","D","E","F","G","A","B","F♯"].filter(n=>n!==rel);
  return {kind:"choice",concept,qtype:"调性 · 关系小调",
    prompt:`<b>${kn} 大调</b>的"关系小调"(共用完全相同的音)是哪个？`,
    play:playScale,
    options:shuffle([{label:rel+" 小调",correct:true},...shuffle(pool).slice(0,3).map(n=>({label:n+" 小调",correct:false}))]),
    explain:`关系小调的主音在大调第 6 级。${kn} 大调第 6 级是 ${rel}，所以是 <b>${rel} 小调</b>——它和 ${kn} 大调用相同的 7 个音，只是以 ${rel} 为主音。`};
}

/* ---- 小调 ---- */
const NAT_MINOR=[0,2,3,5,7,8,10]; // 自然小调 全半全全半全全
const MKEYS={
  "A":{root:9, notes:["A","B","C","D","E","F","G"], rel:"C"},
  "E":{root:4, notes:["E","F♯","G","A","B","C","D"], rel:"G"},
  "B":{root:11,notes:["B","C♯","D","E","F♯","G","A"], rel:"D"},
  "F♯":{root:6,notes:["F♯","G♯","A","B","C♯","D","E"], rel:"A"},
  "D":{root:2, notes:["D","E","F","G","A","B♭","C"], rel:"F"},
  "G":{root:7, notes:["G","A","B♭","C","D","E♭","F"], rel:"B♭"},
};
const MKEY_LIST=["A","E","B","F♯","D","G"];
function q_keymin(concept){
  const mn=rand(MKEY_LIST), M=MKEYS[mn];
  const minSemis8=[...NAT_MINOR,12].map(x=>x+M.root); // 含高八度主音，共8个音
  const playMin=()=>playSemis(fitSemis(minSemis8),60,true,"8n",{gap:0.4,stack:false});
  if(concept==="dark"){
    const isMinor=Math.random()<0.5;
    const pat=isMinor?NAT_MINOR:MAJOR_SCALE;
    return {kind:"choice",concept,qtype:"小调 · 听辨 大调/小调",
      prompt:`听这条音阶(从同一个音 ${mn} 起，到高八度共 8 个音)，它是大调还是小调？`,
      play:()=>playSemis(fitSemis([...pat,12].map(x=>x+M.root)),60,true,"8n",{gap:0.4,stack:false}),
      options:[ // 固定：亮在左、暗在右
        {label:"大调", sub:"明亮（第3音是大三度）", correct:!isMinor},
        {label:"小调", sub:"忧郁、暗（第3音是小三度）", correct:isMinor},
      ],
      explain:isMinor?`这是 <b>${mn} 小调</b>——第3音是小三度，听起来暗。`:`这是 <b>${mn} 大调</b>——第3音是大三度，听起来亮。`};
  }
  if(concept==="rel"){
    if(Math.random()<0.5){
      const correct=M.rel+" 大调";
      const pool=["C","G","D","A","F","B♭","E"].filter(x=>x!==M.rel);
      return {kind:"choice",concept,qtype:"小调 · 关系大调",
        prompt:`<b>${mn} 小调</b>和哪个大调<b>用完全相同的 7 个音</b>(它的关系大调)？`,
        play:playMin,
        options:shuffle([{label:correct,correct:true},...shuffle(pool).slice(0,3).map(x=>({label:x+" 大调",correct:false}))]),
        explain:`${mn} 小调 = ${M.notes.join(" ")}，和 <b>${M.rel} 大调</b>音完全相同，只是以 ${mn} 为主音。`};
    }
    const K=RKEYS[M.rel];
    const correct=mn+" 小调";
    const pool=MKEY_LIST.filter(x=>x!==mn);
    return {kind:"choice",concept,qtype:"小调 · 关系小调",
      prompt:`<b>${M.rel} 大调</b>的关系小调是哪个？`,
      play:()=>playSemis(fitSemis(MAJOR_SCALE.map(x=>x+K.root)),60,true,"8n",{gap:0.4,stack:false}),
      options:shuffle([{label:correct,correct:true},...shuffle(pool).slice(0,3).map(x=>({label:x+" 小调",correct:false}))]),
      explain:`关系小调的主音在大调第 6 级。${M.rel} 大调第 6 级是 ${mn}，所以关系小调是 <b>${mn} 小调</b>。`};
  }
  // minbuild：在键盘上点出该自然小调的 8 个音(全半全全半全全 = 7 台阶 = 8 音，含高八度)
  return {kind:"build",concept,qtype:"小调 · 在键盘上搭出这个小调",
    prompt:`这是 <b>${mn} 小调</b>(自然小调)。从主音 ${mn} 起，按"全 半 全 全 半 全 全"一路点到高八度的 ${mn}，共 <b>8 个音</b>(主音会闪烁提示)。`,
    play:playMin,
    targetMidis:minSemis8.map(x=>60+x), rootSemi:M.root, flashStart:[60+M.root],
    explain:`${mn} 小调 = ${M.notes.join(" ")} (${mn})，从主音到高八度共 8 个音；它和关系大调 ${M.rel} 大调用相同的音。`};
}

/* ---- 和弦功能 ---- */
function q_function(concept){
  if(concept==="lead"){ // 导音专项
    const kn=rand(RKEY_LIST), K=RKEYS[kn], lt=K.notes[6], r=K.root;
    const v=Math.random();
    if(v<0.3){
      return {kind:"choice",concept,qtype:"导音 · 找出它",
        prompt:`<b>${kn} 大调</b>的"导音"(紧贴主音半音之下的第 7 级)是哪个音？`,
        play:()=>playSemis(fitSemis([r+11,r+12]),60,true,"2n",{stack:false,gap:0.6}),
        options:uniqPick(K.notes, lt, 4).map(n=>({label:n,correct:n===lt})),
        explain:`${kn} 大调音阶第 7 个音是 <b>${lt}</b>，它离主音 ${K.notes[0]} 只有半音——这就是导音。`};
    }
    if(v<0.6){
      const resolved=Math.random()<0.5;
      const semis=[...MAJOR_SCALE]; if(resolved) semis.push(12);
      return {kind:"choice",concept,qtype:"导音 · 听辨悬与落",
        prompt:`听这条上行旋律(${kn} 大调)的<b>结尾</b>：它停在了"悬着的导音"上，还是落回了主音？`,
        play:()=>playSemis(fitSemis(semis.map(x=>x+r)),60,true,"8n",{gap:0.4,stack:false}),
        options:[
          {label:"悬在导音上（话没说完，难受）", correct:!resolved},
          {label:"落回主音（到家，舒服）", correct:resolved},
        ],
        explain: resolved?`最后多走了半步、落在主音 ${K.notes[0]} 上——踏实到家。`:`最后停在导音 <b>${lt}</b> 上——耳朵被吊着，特别想再走半音回 ${K.notes[0]}。这就是导音的引力。`};
    }
    if(v<0.8){
      const correct=triName(K,5);
      return {kind:"choice",concept,qtype:"导音 · 谁带着它",
        prompt:`${kn} 大调里，下列哪个和弦<b>含有导音 ${lt}</b>(因此"有导音"、紧张想回家)？`,
        play:()=>playChordSeq(kseqChords("leadVI", kn)), // V→高位I：导音向上蹭进主音
        options:uniqPick([correct, triName(K,1), triName(K,2), triName(K,4), triName(K,6)], correct, 4).map(n=>({label:n,correct:n===correct})),
        explain:`${correct}(第 5 级) = ${triNotes(K,5)}，里面正有导音 <b>${lt}</b>——属和弦"想回家"的引力就来自它。I、ii、IV、vi 里都没有 ${lt}。`};
    }
    return {kind:"choice",concept,qtype:"导音 · 为什么有引力",
      prompt:`导音为什么有"被吸回主音"的引力？`,
      play:()=>playSemis(fitSemis([r+11,r+12]),60,true,"2n",{stack:false,gap:0.6}),
      options:[
        {label:"它离主音只有半音，紧贴家门口", sub:"半音是最强的吸引关系", correct:true},
        {label:"它是整条音阶里最高的音", correct:false},
        {label:"它弹起来最响", correct:false},
        {label:"调号规定它必须回去", correct:false},
      ],
      explain:`引力来自<b>半音的紧贴</b>：导音(${lt})到主音(${K.notes[0]})只差半音，耳朵会强烈期待它"蹭进门"。隔全音就没这股劲。`};
  }
  // 在C调内，先弹I定调，再弹一个属于该功能的和弦，判断功能
  const group = DIATONIC.filter(d=>d.fn===concept);
  const d = rand(group);
  const c = CHORDS[d.type];
  const playFn = async ()=>{
    await initAudio(); const now=Tone.now();
    const iNames=CHORDS.maj.iv.map(x=>semiToName(x,60));
    const cNames=c.iv.map(x=>semiToName(x+d.root,60));
    synth.triggerAttackRelease(iNames,"4n",now);          // 先弹I和弦定调
    synth.triggerAttackRelease(cNames,"2n",now+0.7);
    lastPlayed=[{midis:iNames.map(nameToMidi),t:0,dur:"4n"},
                {midis:cNames.map(nameToMidi),t:0.7,dur:"2n"}];
  };
  return {kind:"choice", concept, qtype:"功能判断",
    prompt:`先听到主和弦(I)定调，再听到一个和弦。第二个和弦属于哪种功能？`,
    play:playFn,
    options:[ // 固定顺序：主 T → 下属 S → 属 D
      {label:"主功能 T", sub:"稳定·有回家的安定感", correct:concept==="T"},
      {label:"下属功能 S", sub:"出发·铺垫、想往前", correct:concept==="S"},
      {label:"属功能 D", sub:"紧张·强烈想解决回家", correct:concept==="D"},
    ],
    explain:`第二个是 <b>${d.rn}（${d.fnName}）</b>，感觉：${d.fnFeel}。`};
}

/* ---- 第11关 转位 ---- */
const INV_CH=[
  {n:"C", r:0, iv:[0,4,7]}, {n:"Dm", r:2, iv:[0,3,7]}, {n:"Em", r:4, iv:[0,3,7]},
  {n:"F", r:5, iv:[0,4,7]}, {n:"G", r:7, iv:[0,4,7]}, {n:"Am", r:9, iv:[0,3,7]},
];
const INV_FORMS=[
  {label:"原位",     sub:"根音(1)在最底下"},
  {label:"第一转位", sub:"三音(3)在最底下"},
  {label:"第二转位", sub:"五音(5)在最底下"},
];
function invSemis(ch,k){ // k=0 原位 / 1 第一转位 / 2 第二转位；同一组音换最低音，紧凑排列
  const [,a,b]=ch.iv;
  const s = k===0 ? [0,a,b] : k===1 ? [a,b,12] : [b,12,12+a];
  return s.map(x=>x+ch.r);
}
function q_inv(concept){
  const ch=rand(INV_CH), k=Math.floor(Math.random()*3);
  const semis=invSemis(ch,k);
  const nn=semis.map(x=>sharp(NOTE_NAMES[x%12]));                       // 纯音名(不限八度时用)
  const no=semis.map(x=>sharp(NOTE_NAMES[x%12])+(Math.floor((60+x)/12)-1)); // 带八度(指具体键时用)
  const roles=["根音","三音","五音"];
  const play=()=>playSemis(semis,60,true);
  if(concept==="which"){
    return {kind:"choice",concept,qtype:"转位 · 认排列",
      prompt:`${ch.n} 和弦的三个音从低到高排成 <b>${no.join(" → ")}</b>（最低音是 ${nn[0]}）。这是 ${ch.n} 的哪种形态？`,
      play,
      options:INV_FORMS.map((f,i)=>({label:f.label,sub:f.sub,correct:i===k})),
      explain:`最低音 ${nn[0]} 是 ${ch.n} 的<b>${roles[k]}</b>，所以这是<b>${INV_FORMS[k].label}</b>。`};
  }
  if(concept==="ear"){
    return {kind:"choice",concept,qtype:"转位 · 听辨",
      prompt:`听这个 ${ch.n} 和弦（从最低音往上弹，再合奏）。它是什么形态？`,
      play,
      options:INV_FORMS.map((f,i)=>({label:f.label,sub:f.sub,correct:i===k})),
      explain:`最低的是 ${nn[0]}——它是 ${ch.n} 的<b>${roles[k]}</b>，所以是<b>${INV_FORMS[k].label}</b>。`};
  }
  return {kind:"build",concept,qtype:"转位 · 在键盘上搭出",
    prompt:`在键盘上搭出 <b>${ch.n} 的${INV_FORMS[k].label}</b>（${INV_FORMS[k].sub}）：例如从 <b>${no[0]}</b> 往上依次按 ${no.join("、")}。闪烁键只是位置参考——<b>整体移高/低八度(从任何一个 ${nn[0]} 开始)都算对</b>。`,
    play, targetMidis:semis.map(x=>60+x), flashStart:[60+semis[0]],
    explain:`${ch.n} 的${INV_FORMS[k].label} = ${nn.join(" ")}（最低音是${roles[k]} ${nn[0]}，例如 ${no.join(" ")}）。`};
}

/* ---- 第12关 斜杠和弦 ---- */
const SLASH=[
  // out:false 低音是和弦内音(弹转位)；out:true 低音不在和弦里(三和弦不动，底下加低音，voice 给定弹法)
  {sym:"C/E", left:"C", triad:[0,4,7], bass:4, bn:"E"},
  {sym:"G/B", left:"G", triad:[7,11,14], bass:11, bn:"B"},
  {sym:"F/A", left:"F", triad:[5,9,12], bass:9, bn:"A"},
  {sym:"C/G", left:"C", triad:[0,4,7], bass:7, bn:"G"},
  {sym:"D/F♯", left:"D", triad:[2,6,9], bass:6, bn:"F♯"},
  {sym:"Em/B", left:"Em", triad:[4,7,11], bass:11, bn:"B"},
  {sym:"C/D", left:"C", triad:[0,4,7], bass:2, bn:"D", out:true, voice:[2,12,16,19]},   // D4 + C5 E5 G5
  {sym:"F/G", left:"F", triad:[5,9,12], bass:7, bn:"G", out:true, voice:[-5,5,9,12]},   // G3 + F4 A4 C5
];
// 弹法：内音低音→转位(bass 最低，其余和弦音就近依次往上排)；外来低音→用预设的"加低音"voicing
function slashVoice(s){
  if(s.voice) return s.voice;
  const bassPc=s.bass%12;
  const rest=[...new Set(s.triad.map(x=>x%12))].filter(pc=>pc!==bassPc)
    .sort((a,b)=>(((a-bassPc)%12+12)%12)-(((b-bassPc)%12+12)%12)); // 按"在 bass 上方多高"排序
  const out=[s.bass]; let prev=s.bass;
  for(const pc of rest){ let v=pc; while(v<=prev) v+=12; out.push(v); prev=v; }
  return out; // 例：D/F♯ → [6,9,14] = F♯4 A4 D5
}
function q_slash(concept){
  const s=rand(SLASH);
  const play=()=>playChordSeq([slashVoice(s)]); // 把 bass 放在最低，且尽量全在键盘内
  const howIn =`${s.bn} 是 ${s.left} 和弦的内音——通常弹成<b>转位</b>：同一组音，把 ${s.bn} 换到最底下`;
  const howOut=`${s.bn} 不在 ${s.left} 和弦里——<b>三和弦原样不动，底下直接加低音 ${s.bn}</b>`;
  if(concept==="concept"){
    if(Math.random()<0.5){ // 含义题：按"低音在/不在和弦里"分别出，正确项写清具体做法
      const opts = s.out ? [
        {label:`弹 ${s.left} 和弦，再在底下加一个和弦外的低音 ${s.bn}`, sub:`左和弦、右低音；${s.bn} 不在 ${s.left} 里，只能"加"`, correct:true},
        {label:`把 ${s.left} 和弦里的某个音换到最底下(弹转位)`, sub:`行不通——${s.left} 和弦里没有 ${s.bn}`, correct:false},
        {label:`${s.left} 和 ${s.bn} 两个和弦叠在一起`, correct:false},
        {label:`左手弹单音，右手弹 ${s.bn} 和弦`, correct:false},
      ] : [
        {label:`还是 ${s.left} 和弦那组音，把内音 ${s.bn} 换到最底下(弹转位)`, sub:"左和弦、右低音", correct:true},
        {label:`左手弹单音，右手弹 ${s.bn} 和弦`, correct:false},
        {label:`${s.left} 和 ${s.bn} 两个和弦叠在一起`, correct:false},
        {label:`随便弹 ${s.left} 或 ${s.bn} 都行`, correct:false},
      ];
      return {kind:"choice",concept,qtype:"斜杠和弦 · 含义",
        prompt:`流行谱上看到 <b>${s.sym}</b>，它的意思是？`, play,
        options:opts,
        explain:`口诀"左和弦、右低音"：${s.sym} = 弹 ${s.left} 和弦，让 ${s.bn} 当最低音。具体弹法：${s.out?howOut:howIn}。`};
    }
    // 弹法题：内音→转位 vs 外来音→直接加低音
    return {kind:"choice",concept,qtype:"斜杠和弦 · 怎么弹",
      prompt:`实战里弹 <b>${s.sym}</b>，通常的做法是？（提示：先想 ${s.bn} 在不在 ${s.left} 和弦里）`, play,
      options:[
        {label:`弹 ${s.left} 的转位：同一组音，把 ${s.bn} 换到最底下`, sub:"适用于低音是和弦内音", correct:!s.out},
        {label:`${s.left} 三和弦原样不动，底下直接加低音 ${s.bn}`, sub:"适用于低音不在和弦里", correct:!!s.out},
        {label:`把 ${s.left} 和弦整体移到 ${s.bn} 上(移调)`, correct:false},
        {label:`只弹一个 ${s.bn} 音就行`, correct:false},
      ],
      explain:`${s.left} 和弦 = ${s.triad.map(x=>sharp(NOTE_NAMES[x%12])).join(" ")}。${s.out?howOut:howIn}。`};
  }
  if(concept==="bassname"){
    return {kind:"choice",concept,qtype:"斜杠和弦 · 最低音",
      prompt:`<b>${s.sym}</b> 的最低音(bass)是哪个音？`, play,
      options:uniqPick(["C","D","E","F","G","A","B","F♯"], s.bn, 4).map(n=>({label:n,correct:n===s.bn})),
      explain:`斜杠右边就是最低音：<b>${s.bn}</b>。`};
  }
  return {kind:"build",concept,qtype:"斜杠和弦 · 在键盘上搭出",
    prompt:`在键盘上搭出 <b>${s.sym}</b>：${s.out?`弹 ${s.left} 和弦的那几个音，并在底下<b>加上低音 ${s.bn}</b>(${s.bn} 不在和弦里，只能加)`:`弹 ${s.left} 和弦的那几个音，但要让 <b>${s.bn}</b> 成为<b>最低(最左)的音</b>`}（用哪个八度的 ${s.bn} 都可以）。`,
    play, targetPC:[...new Set([...s.triad.map(x=>x%12), s.bass%12])], bassPc:s.bass, rootSemi:s.triad[0]%12,
    explain:`${s.sym} = ${s.left} 和弦的音 ${s.triad.map(x=>sharp(NOTE_NAMES[x%12])).join(" ")}${s.out?`，底下再加低音 ${s.bn}`:`，但最低音是 ${s.bn}`}。${s.out?howOut:howIn}。`};
}

const SUS={sus4:{iv:[0,5,7],deg:"1 4 5",repl:"四音"}, sus2:{iv:[0,2,7],deg:"1 2 5",repl:"二音"}};

          {label:"2、6、7 级", correct:false},
          {label:"3、5、7 级", correct:false},
          {label:"只有 3 级", correct:false},
        ],
        explain:`平行小调=同主音、降 <b>3、6、7</b> 级：E→E♭、A→A♭、B→B♭。三个降号让世界瞬间变暗。`};
    }
    const deg=rand([3,6,7]), majS={3:4,6:9,7:11}[deg], minS=majS-1;
    const mj=sharp(NOTE_NAMES[majS]), mi=sharp(NOTE_NAMES[minS]);

      prompt:`C 大调的第 ${deg} 级是 <b>${mj}</b>。换到 <b>C 小调</b>，它变成哪个音？`,
      play:()=>playSemis([majS,minS],60,true,"2n",{stack:false,gap:0.6}),
      options:uniqPick(["D","E♭","E","F","G","A♭","A","B♭","B"], mi, 4).map(n=>({label:n,correct:n===mi})),
      explain:`C 小调把 3、6、7 级各降半音：第 ${deg} 级 ${mj} → <b>${mi}</b>。`};
  }
  if(concept==="relpar"){

      const opts=[{label:kn+" 小调", sub:"同一个主音", correct:true}];

      shuffle(MKEY_LIST.filter(m=>m!==kn&&m!==relMn)).slice(0, relMn?2:3).forEach(n=>opts.push({label:n+" 小调",correct:false}));
      return {kind:"choice",concept,qtype:"关系/平行 · 找平行小调",
        prompt:`<b>${kn} 大调</b>的【平行小调】(同一个主音、降 3·6·7)是？`,
        play:()=>playSemis(fitSemis([...NAT_MINOR,12].map(x=>x+RKEYS[kn].root)),60,true,"8n",{gap:0.4,stack:false}),

        : `${M.rel} 小调和 ${M.rel} 大调共用<b>同一个主音 ${M.rel}</b>(但 3·6·7 降了)——这是<b>平行</b>大小调。`};

  // pair：纯听辨 明亮世界 vs 暗夜世界

        {label:"忧郁的小三和弦（i）", sub:"三音离根音 3 个半音", correct:isMinor},

  }
  const r=rand([0,2,5,7,9]);
  return {kind:"choice",concept,qtype:"听辨 · 大调音阶还是小调音阶",
    prompt:"听这条音阶(8 个音)：它是大调还是(自然)小调？",
    play:()=>playSemis(fitSemis([...(isMinor?NAT_MINOR:MAJOR_SCALE),12].map(x=>x+r)),60,true,"8n",{gap:0.4,stack:false}),
    options:[
      {label:"大调（全全半全全全半）", sub:"明亮、开阔", correct:!isMinor},
      {label:"小调（全半全全半全全）", sub:"阴郁、柔暗", correct:isMinor},
    ],
    explain: isMinor?"第 3 个台阶就变暗了——<b>自然小调</b>。":"亮堂的台阶——<b>大调</b>。"};
}

/* ---- 第16关 暗夜家族(小调顺阶和弦) ---- */
const ROMAN_MIN=["i","ii°","III","iv","v","VI","VII"];
const MIN_QUAL=["小三和弦","减三和弦","大三和弦","小三和弦","小三和弦","大三和弦","大三和弦"];
const MIN_SUF=["m","dim","","m","m","",""];

        {label:"小三和弦", correct:MIN_QUAL[deg-1]==="小三和弦"},

      prompt:`在 <b>${mn} 小调</b>里，和弦 <b>${minChordName(mn,deg)}</b> 是第几级(罗马数字)？`,
      play,
      options:uniqPick(ROMAN_MIN, correct, 4).map(n=>({label:n,correct:n===correct})),
      explain:`${minChordName(mn,deg)} 的根音 ${M.notes[deg-1]} 是 ${mn} 小调的第 ${deg} 个音，所以是 <b>${correct}</b>(${MIN_QUAL[deg-1]}→${correct.match(/[a-z]/)?"小写":"大写"}${deg===2?"+°":""})。`};
