      <p><b>一张表总结两种情况：</b></p>
      <table class="ctab"><tr><th>情况</th><th>例子</th><th>怎么弹</th></tr>
        <tr><td>低音<b>是</b>和弦内音</td><td>C/E、G/B、C/G</td><td>弹<b>转位</b>(同一组音换最低音)；也可三和弦不动、底下再加低音</td></tr>
        <tr><td>低音<b>不是</b>和弦内音</td><td>C/D、F/G</td><td>没有对应的转位——<b>三和弦原样不动，底下直接加上那个低音</b></td></tr></table>
      <p>卡农式下行是最经典的"低音下台阶"套路：低音 <b>C4→B3→A3→G3→F3</b> 一级一级往下走。真歌里通常<b>循环</b>着用——点一遍听，或直接循环起来感受：</p>
      <div class="row"><span class="chip" data-play="kloopseq:canonS">🔁 卡农下行：C→G/B→Am→C/G→F（低音 C4 B3 A3 G3 F3）</span></div>
      ${keyBar(false,true)}
      ${loopBar()}`;

    case "resolve": return `
      <p>这一关只讲一个词：<b>解决 (Resolution)</b>。它是前面所有课的汇合点——⑥关的 V7 张力、⑨⑩关的转位与斜杠、⑪关的导音，都将在这里拼成一门手艺。但先别急着学"怎么做"，第一件事是搞清楚<b>它是什么、为什么存在</b>。</p>
      <p style="background:rgba(92,230,192,.09);border-left:3px solid var(--p3);padding:10px 14px;border-radius:6px"><b>先说清适用范围：</b>"解决"不是 G7 的专利，而是<b>每一个"回家前的紧张和弦"都要做的事</b>——V7、V、vii°、⑩关的 F/G、借来的 ♭VII，乃至小调的 E7（⑱关），<b>凡是想落回稳定主和弦的紧张和弦，都遵循同一套解决规律</b>。我们这一关用 <b>G7→I 当标本</b>：它的紧张做到了极致（同时含导音和三全音），声部走向最完整、最好听辨，所以最适合拿来把规律讲透。学会它，其余紧张和弦照搬即可。</p>

      <details class="note" open><summary><b>什么是"解决"？音乐为什么需要它？</b></summary>
        <div style="line-height:1.8;color:#e9e3ff">
          <p><b>音乐的发动机是"紧张与放松"的交替。</b>一直稳定的音乐像一潭死水，一直紧张的音乐让人窒息——亲耳听听这两种极端：</p>
          <div class="row">
            <span class="chip" data-play="seq:rsStag">🔊 一直稳定：C 和弦反复（一潭死水，哪儿也不去）</span>
            <span class="chip" data-play="seq:rsTense">🔊 一直紧张：E7→A7→D7→G7（每个都许诺回家，永远不兑现——窒息）</span>
          </div>
          <p>好听的音乐是<b>先把弓拉满，再把箭放出去</b>。不稳定的音或和弦（比如 V7）就是拉满的弓：耳朵听到它，会自动<b>期待</b>一个稳定的落点。先体验一次"拉满不放"：</p>
          <div class="row">
            <span class="chip" data-play="notes:-5,-1,2,5">🔊 只奏 G7（G3 B3 D4 F4），然后停住（弓拉满，悬着难受）</span>
            <span class="chip" data-play="seq:rsClose">🔊 同一个 G7 → C（箭放出去了，松一口气）</span>
          </div>
          <p><b>"解决"就是给这个期待一个答案</b>：不稳定的音<b>落到</b>它该去的稳定位置、张力释放的那一瞬间。它的目的也很直白——给音乐画"标点"：有解决，一句话才算"说完"；没有解决，音乐永远悬在半空（⑪关的终止式，本质全是各种力度的解决）。</p>
          <p><b>那为什么音会"想去"某个地方？</b>因为<b>引力来自距离</b>。两个音只差半音时，不稳定的那个会被强烈地"吸"向稳定的那个——离得越近，拽得越狠；隔一个全音，引力就弱得多。这不是规定，是耳朵的本能（⑪关亲耳比过）：</p>
          <div class="row">
            <span class="chip" data-play="mel:-1,0">🔊 B3 → C4（半音紧贴，被吸进门）</span>
            <span class="chip" data-play="mel:-2,0">🔊 B♭3 → C4（隔全音，引力松弛）</span>
          </div>
          <p><b>最后一块拼图：解决是"逐个音"完成的。</b>一个和弦不是一团声音，而是<b>几个同时发声的"声部"</b>——像合唱队里的几个人。说"V7 后面接个 C"只报了目的地的名字；真正的解决发生在每个声部里——<b>每个音都要有自己的着落</b>，给每个音找到去处，这个过程才叫完成了"解决"。而路其实早被引力画好了：被半音拽住的音必须就近落位，没被拽的音就近挪一步或原地不动。每个声部都走最短、最顺的路——下面逐条讲清。</p>
        </div>
      </details>

      <details class="note" open><summary><b>先分清两个称呼：根音与主音</b></summary>
        <div style="line-height:1.8;color:#e9e3ff">
          <p>三和弦的三个成员叫<b>根音、三音、五音</b>；七和弦多一个成员，四个分别叫<b>根音、三音、五音、七音</b>。</p>
          <p><b>根音和主音是两个不同的概念</b>：<b>根音是一个和弦原位时的第一个音</b>(最底下那个)——G7 的根音是 G；<b>主音是一个调的第一个音</b>——C 大调的主音是 C。分清它们，"属和弦的根音走向调的主音(G→C)"这句关键话才说得清。</p>
        </div>
      </details>

      <p>以 C 大调的 <b>G7 = G·B·D·F</b>（原位叠置：G3 B3 D4 F4）解决到主和弦为例，先听一遍：</p>
      <div class="row">
        <span class="chip" data-play="notes:-5,-1,2,5">🔊 先听 G7（G3 B3 D4 F4）</span>
        <span class="chip" data-play="seq:rsClose">🔊 再听解决（G7 → C）</span>
      </div>
      <p style="margin-bottom:4px">让我们仔细看看它是如何逐声部解决到 C 的（<b style="color:#ff7a59">橙=出发音</b> → <b style="color:#5ce6a0">绿=到达音</b>），点完四条再听齐奏：</p>
      <div class="row">
        <span class="chip" data-play="vlead:0">🔊 G3→C3</span>
        <span class="chip" data-play="vlead:1">🔊 B3→C4</span>
        <span class="chip" data-play="vlead:2">🔊 D4→C4</span>
        <span class="chip" data-play="vlead:3">🔊 F4→E4</span>
        <span class="chip" data-play="vlead:chord">🎹 完整和弦</span>
      </div>
      <p style="background:rgba(92,230,192,.09);border-left:3px solid var(--p3);padding:10px 14px;border-radius:6px">
        <b>一句话总纲：解决，就是让 G7 的每个音，各自走到最近、又合规的那个 I 和弦内音（C·E·G）上。</b><br>
        G7 是绷紧的弓、I 是放松的家——四个音各自挑一个 I 的内音落脚，走最短的合理路线，整个和弦就"到家"了。"<b>合规</b>"有两层意思：① 被半音磁铁拽住的音（倾向音）方向是<b>锁死</b>的，不能图近走反了；② 几个音<b>落到同一个内音上（重叠）完全允许</b>。下面三条规则，就是把"最近 + 合规"这件事拆成三种情形讲清——谁方向被锁死、谁可以就近随意、谁（低声部）走法特殊。
      </p>
      <p>逐条拆：</p>

      <details class="note" open><summary><b>规则一 · 倾向音必走——方向锁死</b></summary>
        <div style="line-height:1.8;color:#e9e3ff">
          <p>G7 里有两个被半音磁铁拽住的<b>倾向音</b>：<b>B(导音)必须半音上行到 C</b>；<b>F(七音)必须半音下行到 E</b>。注意"必须"二字——<b>方向是锁死的</b>，不是就近的副产品：</p>
          <div class="row">
            <span class="chip" data-play="mel:-1,0">🔊 B3 → C4（半音上）</span>
            <span class="chip" data-play="mel:5,4">🔊 F4 → E4（半音下）</span>
            <span class="chip" data-play="mel:11,12">🔊 换个八度照样：B4 → C5（导音永远上行）</span>
          </div>
          <p><b>方向为什么锁死？</b>B 和 F 正是那对三全音（最刺的音程），化解的唯一办法是<b>两根刺反向收拢</b>：B↑、F↓，一起落到 C–E（大三度），刺才消失。<b>若让 F 也往上走（同向）</b>，B3→C4、F4→G4，得到的是空洞的纯五度 C–G——三音 E 没了，反而"空、悬"，刺虽然没了但句子也没收住：</p>
          <div class="row">
            <span class="chip" data-play="notes:-1,5">🔊 三全音 B3+F4（刺）</span>
            <span class="chip" data-play="notes:0,4">🔊 ✅ 反向收拢 → C4+E4（落到大三度，刺消失·收得稳）</span>
            <span class="chip" data-play="notes:0,7">🔊 ❌ F 反跳上行 → C4+G4（纯五度，空、悬·没收住）</span>
          </div>
          <p style="font-size:12.5px;color:var(--muted)">提醒：别把"必须的方向"误记成"就近走"。导音 B 两边其实都贴着半音（上是 C、下是 B♭），可只有<b>上行到主音 C</b> 才算解决——方向是被<b>引力</b>定死的（朝调内稳定音走），不是被距离定的。同理七音 F 只许下行到 E。</p>
        </div>
      </details>

      <details class="note" open><summary><b>规则二 · 其余上声部：就近走（落点可以重叠）</b></summary>
        <div style="line-height:1.8;color:#e9e3ff">
          <p>先说清称呼：和弦的几个声部里，<b>最低的那个叫"低声部"（也叫低音、下声部），其余的都叫"上声部"</b>。以上面的 G7（G3 B3 D4 F4）为例——G3 是低声部，B3、D4、F4 三个都是上声部。</p>
          <p>上声部里被磁铁拽住的（B、F）归规则一管；<b>剩下的只须"就近"</b>——走到最近的那个 I 内音。G7 里这样的音就是五音 <b>D</b>：<b>下行到 C 或上行到 E 都合法</b>。<b>补充原则：方向可选时，优先选能补齐主和弦三个音（C·E·G）的那个</b>——若别的声部已凑出 C、G、还缺三音 E，D 就上行到 E 把和弦补完整；没有这个需要时，再看音域和旋律走向。逐个听（<b style="color:#ff7a59">橙=出发</b> → <b style="color:#5ce6a0">绿=到达</b>）：</p>
          <div class="row">
            <span class="chip" data-play="vlead:chord">🎹 全貌：完整和弦 G7→C</span>
            <span class="chip" data-play="vpair:2,0">🔊 D→C（下行·并入根音）</span>
            <span class="chip" data-play="vpair:2,4">🔊 D→E（上行·成为三音）</span>
          </div>
          <p><b>重要补充：落点可以重叠。</b>规则要求的是"<b>每个音都有合规的去处</b>"，并不要求"去处各不相同"——两个声部落到同一个音（同度）完全合法。逐个听这两条：<b>B 和 D 都走到 C4</b>，绿灯落在同一个键上：</p>
          <div class="row">
            <span class="chip" data-play="vpair:-1,0">🔊 B→C4（导音）</span>
            <span class="chip" data-play="vpair:2,0">🔊 D→C4（五音）</span>
          </div>
          <p style="font-size:12.5px;color:var(--muted)">两条都合规、都落 C4——同度重叠完全允许。（密集 G7 整体齐奏的重叠效果，可回上面"完整和弦"按钮再听。）</p>
        </div>
      </details>

      <details class="note"><summary>拓展：有时候有些音不需要动</summary>
        <div style="line-height:1.8;color:#e9e3ff">
          <p>有些特殊情况下，<b>上声部的音本来就在目标和弦里，又不是最低音，又不必为补全主和弦而挪动它</b>，那么就可以不动。最经典的例子是 <b>V64 → I</b>（属和弦的<b>第二转位</b>，低音是五音 D）。</p>
          <p>四个音符是 <b>D3 · G3 · B3 · D4</b>，逐个解决到 C（<b style="color:#ff7a59">橙=出发</b> → <b style="color:#5ce6a0">绿=到达</b>）：</p>
          <div class="row">
            <span class="chip" data-play="vpair:-10,-12">🔊 D3→C3（低音级进下行）</span>
            <span class="chip" data-play="vpair:-5,-5">🔊 G3→G3（共同音·原地不走！）</span>
            <span class="chip" data-play="vpair:-1,0">🔊 B3→C4（导音上行）</span>
            <span class="chip" data-play="vpair:2,4">🔊 D4→E4（五音上行·补出三音）</span>
            <span class="chip" data-play="vchord:-10,-5,-1,2;-12,-5,0,4">🎹 全貌：V64 → C</span>
          </div>
          <p><b>G3 从头到尾一动不动——这就是"不走"。</b>其余三条照常走：低音 D3 级进落 C3、导音 B3 蹭进 C4、另一个 D4 上行到 E4 补出三音。落点 <b>C3 G3 C4 E4</b> 是完整的 C 大三和弦。</p>
        </div>
      </details>

      <details class="note" open><summary><b>规则三 · 低音例外：可以跳——上四度 = 下五度</b></summary>
        <div style="line-height:1.8;color:#e9e3ff">
          <p>"就近走"管的是上方声部；<b>低音的职责是走到主和弦 I 的根音——也就是 C</b>，通常跳去<b>最近的那个 C</b>。这一步的四五度跳进不但合法，还是终止式力量的来源。<b>G→C 是个特例</b>：上跳四度（到 C4）和下跳五度（到 C3）都能够到 C、距离又接近，这时两个方向<b>近似认为等价</b>，选哪边看音域和想要的分量：</p>
          <div class="row">
            <span class="chip" data-play="seq:rsRoot">🔊 低音下跳五度 G3→C3（沉、句号最重）</span>
            <span class="chip" data-play="seq:rsRootUp">🔊 低音上跳四度 G3→C4（轻一些；与五音同落 C4——重叠合法）</span>
          </div>
          <p>同一个 G，<b>当低音时跳到 C、在上声部时保留</b>——是两条不同的规则，别混。</p>
          <p><b>小结 · "上行还是下行"的自由度分三个等级</b>：<b>倾向音听引力的</b>（方向锁死）、<b>普通声部听距离的</b>（就近随意、可重叠）、<b>低音一律去最近的 C</b>（特例：G→C 上四下五等价）。</p>
        </div>
      </details>

      <details class="note"><summary>拓展：把规则一和规则二合成一句话——"距离场"统一视角</summary>
        <div style="line-height:1.8;color:#e9e3ff">
          <p>这其实就是开头那句总纲——"<b>每个音走到最近、又合规的 I 内音</b>"——的精确版。上方声部只须<b>看每个音到 I 和弦内音（C·E·G）的最短距离</b>：</p>
          <p>· <b>距离 0</b>（自己就是内音）→ <b>原地保留</b>：G。<br>
             · <b>半音</b>（紧贴着某个内音）→ <b>必须就近解决到它</b>：B→C、F→E——方向不用背，自动朝着那个邻居。<br>
             · <b>全音</b>（两边的内音等距）→ <b>任选就近，优先补齐和弦缺的音</b>：D→C 或 D→E，哪个能把 C·E·G 补完整就走哪个。</p>
          <div class="row"><span class="chip" data-play="seq:rsRoot">🔊 用这一条重听标准解决：每个音都落到离它最近的内音上</span></div>
          <p style="font-size:12.5px;color:var(--muted)">"导音必上、七音必下、三全音反向收拢"全是这条距离规则的推论。加上低音那条（走根音，上四=下五），整个解决就两句话。适用范围：V7→I 的精确总结；更复杂的和弦（如减七）两侧可能都有半音内音，到时再补判据。</p>
        </div>
      </details>

      <details class="note" open><summary><b>原位 G7 → C：解决出来为什么是 C·C·C·E？</b></summary>
        <div style="line-height:1.8;color:#e9e3ff">
          <p>把三条规则同时套上（原位叠置 G3 B3 D4 F4）：</p>
          <table class="ctab"><tr><th>G7 的音</th><th>身份</th><th>去向</th></tr>
            <tr><td>G3（低音）</td><td>根音</td><td>跳到 <b>C3</b>（规则三）</td></tr>
            <tr><td>B3</td><td>三音=导音</td><td>半音蹭进 <b>C4</b>（规则一）</td></tr>
            <tr><td>D4</td><td>五音</td><td>就近落 <b>C4</b>——与导音的落点<b>重叠</b>，合法（规则二）</td></tr>
            <tr><td>F4</td><td>七音</td><td>半音落 <b>E4</b>（规则一）</td></tr></table>
          <p>结果是 <b>C3·C4·C4·E4</b>——三个 C 加一个 E（其中两个声部重叠在 C4），<b>没有 G（省五音）</b>。这不是少弹了，而是四个声部各就各位的自然结果；听感反而最"关得严"：</p>
          <div class="row">
            <span class="chip" data-play="seq:rsClose">🔊 标准解决：G7 → C·C·C·E（B3、D4 同落 C4）</span>
            <span class="chip" data-play="seq:rsRoot">🔊 摊开排列版（四条路各占一键，键盘上看得最清）</span>
            <span class="chip" data-play="seq:rsBadG">🔊 反例：F 不落 E 反跳 G（空、悬）</span>
          </div>
          ${loopStyleBar()}
        </div>
      </details>

      <details class="note" open><summary><b>四个转位各自解决到哪？（本关高光）</b></summary>
        <div style="line-height:1.8;color:#e9e3ff">
          <p>换转位=换低音，但总纲不变——<b>每个音还是各走到最近、又合规的那个 I 内音</b>。于是每个形态的落点都被<b>唯一地决定</b>：</p>

/* 处理教学区里的播放按钮 */
function bindTeachPlays(root){
  root.querySelectorAll("[data-play]").forEach(el=>{
    el.onclick = async ()=>{
      const cmd = el.dataset.play;
      if(cmd.startsWith("semi:")){
        const s=cmd.slice(5).split(",").map(Number);
        // 半音/全音/大三度/小三度 + 习题共享根音：3秒内沿用上一次的根音
        const now=Date.now();
        const base = (ivLast.base!=null && now-ivLast.t<=3000) ? ivLast.base
                     : 60+Math.floor(Math.random()*(PIANO_HIGH-60-4+1)); // 用最大跨度4选根音(限 C4 以上)，沿用时不越界
        ivLast={base, t:now};
        await playSemis(s,base,true,"2n",{stack:false,gap:0.45}); }
      else if(cmd==="scaleC"){ await playSemis([...MAJOR_SCALE,12],60,true,"8n",{gap:0.4,stack:false}); animateScaleStrip(400); }
      else if(cmd==="scaleG"){ await playSemis(MAJOR_SCALE.map(x=>x+7).concat(19),60,true,"8n",{gap:0.4,stack:false}); animateScaleStrip(400); }
      else if(cmd.startsWith("chord:")){ const[,t,r]=cmd.split(":"); await playSemis(CHORDS[t].iv.map(x=>x+ +r),60,true); }
      else if(cmd.startsWith("dia:")){ const d=DIATONIC[+cmd.slice(4)-1]; await playSemis(CHORDS[d.type].iv.map(x=>x+d.root),60,true); }
      else if(cmd.startsWith("mksel:")){ // 手动选定一个小调（不发声）
        teachMinKey=cmd.slice(6);
        document.querySelectorAll(".tkNameM").forEach(n=>n.textContent=teachMinKey+" "+tr("小调","minor"));
        document.querySelectorAll(".keyMenu").forEach(mu=>{
          mu.style.display="none";
          mu.querySelectorAll(".chip").forEach(c=>{ if(c.dataset.play&&c.dataset.play.startsWith("mksel:")) c.style.borderColor = c.dataset.play==="mksel:"+teachMinKey ? "var(--p2)" : ""; });
        });
        toast(tr("🔁 已换到 "+teachMinKey+" 小调，点套路按钮听效果","🔁 Switched to "+teachMinKey+" minor — tap any progression"));
        return;
      }
      else if(cmd==="mknat"){ // 当前小调的自然小调音阶(8音)
        const r=MKEYS[teachMinKey].root;
        await playSemis(fitSemis([...NAT_MINOR,12].map(x=>x+r)),60,true,"8n",{gap:0.4,stack:false});
      }
      else if(cmd==="mkharm"){ // 当前小调的和声小调音阶(8音，升第7音)
        const r=MKEYS[teachMinKey].root;
        await playSemis(fitSemis([0,2,3,5,7,8,11,12].map(x=>x+r)),60,true,"8n",{gap:0.4,stack:false});
      }
      else if(cmd.startsWith("mkprog:")){ // 按当前小调播放级数进行；V/V7=和声小调属和弦
        const toks=cmd.slice(7).split(",");
        if(toks.length>1 && !loopTimer) loopSpec={kind:"mdegs",toks};
        await playChordSeq(minDegChords(toks));
      }
      else if(cmd.startsWith("mkloopseq:")){ // 小调序列循环套路：记住并播放
        loopSpec={kind:"mseq",name:cmd.slice(10)};
        if(loopTimer){ toast(tr("🔁 循环已切换，下一圈生效","🔁 Loop switched — takes effect next cycle")); return; }
        await playChordSeq(loopChords());
      }
      else if(cmd.startsWith("mkseq:")){ // 以 A 小调为基准的序列移到当前小调播放
        const nm=cmd.slice(6);
        if(SEQS[nm].length>1 && !loopTimer) loopSpec={kind:"mseq",name:nm};
        await playChordSeq(mseqChords(nm));
      }
      else if(cmd==="kswitch"||cmd==="mkswitch"){ // 换调：弹出/收起本组的选调菜单（不发声）
        let mu=el.parentElement && el.parentElement.nextElementSibling;
        if(!(mu && mu.classList && mu.classList.contains("keyMenu"))) mu=document.querySelector(".keyMenu");
        if(mu) mu.style.display = (mu.style.display==="none" ? "" : "none");
        return;
      }
      else if(cmd.startsWith("ksel:")){ // 手动选定一个大调（不发声）；页面上所有"当前调"显示同步更新
        teachKey=cmd.slice(5);
        const K=RKEYS[teachKey];
        document.querySelectorAll(".tkName").forEach(n=>n.textContent=teachKey+" "+tr("大调","major"));
        document.querySelectorAll(".tkMap").forEach(m=>m.textContent=`I=${triName(K,1)}　IV=${triName(K,4)}　V=${triName(K,5)}　vi=${triName(K,6)}`);
        document.querySelectorAll(".keyMenu").forEach(mu=>{
          mu.style.display="none";
          mu.querySelectorAll(".chip").forEach(c=>c.style.borderColor = c.dataset.play==="ksel:"+teachKey ? "var(--p2)" : "");
        });
        toast(tr("🔁 已换到 "+teachKey+" 大调，点套路按钮听效果","🔁 Switched to "+teachKey+" major — tap any progression"));
        return;
      }
      else if(cmd.startsWith("kprog:")){ // 按当前调播放级数进行；级数带 s 表示七和弦(如 5s = V7)；各调音型保形一致
        const toks=cmd.slice(6).split(",");
        if(toks.length>1 && !loopTimer) loopSpec={kind:"degs",toks}; // 多和弦进行自动记为"最后点的套路"
        await playChordSeq(kdegChords(toks));
      }
      else if(cmd.startsWith("kloopset:")){ // 选择级数式循环套路：记住它；若正在循环则下一圈无缝切换，否则播放一遍
        loopSpec={kind:"degs",toks:cmd.slice(9).split(",")};
        if(loopTimer){ toast(tr("🔁 循环已切换，下一圈生效","🔁 Loop switched — takes effect next cycle")); return; }
        await playChordSeq(loopChords());
      }
      else if(cmd.startsWith("kloopseq:")){ // 选择序列式循环套路(SEQS,自动移到当前调)：记住它
        loopSpec={kind:"seq",name:cmd.slice(9)};
        if(loopTimer){ toast(tr("🔁 循环已切换，下一圈生效","🔁 Loop switched — takes effect next cycle")); return; }
        await playChordSeq(loopChords());
      }
      else if(cmd.startsWith("kseq:")){ // SEQS 序列移到当前调播放；多和弦的自动记为"最后点的套路"
        const nm=cmd.slice(5);
        if(SEQS[nm].length>1 && !loopTimer) loopSpec={kind:"seq",name:nm};
        await playChordSeq(kseqChords(nm));
      }
      else if(cmd==="kloop"){ if(loopTimer) stopLoop(); else startLoop(); return; } // 循环播放开/停
      else if(cmd==="arpToggle"){ // 轮换 柱式 → 分解 → 综合（影响所有进行演示与循环，循环中下一圈生效）
        playStyle = playStyle==="block" ? "arp" : playStyle==="arp" ? "mix" : "block";
        document.querySelectorAll('[data-play="arpToggle"]').forEach(c=>c.textContent=styleLabel());
        toast(playStyle==="arp"?tr("🌊 已切换：分解和弦(琶音)","🌊 Switched: arpeggiated"):playStyle==="mix"?tr("🎼 已切换：柱式+分解综合(低音落底·上方铺开·槽尾点题)","🎼 Switched: combo (bass lands, top unfolds, block accent)"):tr("🎹 已切换：柱式(齐奏)","🎹 Switched: block chords"));
        return;
      }
      else if(cmd.startsWith("vlead:")){ await playVoiceLead(cmd.slice(6)); return; } // 逐声部解决：自己点灯，不走末尾 lightAlong
      else if(cmd.startsWith("vpair:")){ const[a,b]=cmd.slice(6).split(",").map(Number); await playVPair(a,b); return; } // 单声部出发→到达(橙→绿)
      else if(cmd.startsWith("vchord:")){ const[a,b]=cmd.slice(7).split(";").map(x=>x.split(",").map(Number)); await playChordPair(a,b); return; } // 整和弦全貌(橙→绿)
      else if(cmd.startsWith("seq:")){ const nm=cmd.slice(4);
        if(SEQS[nm].length>1 && !loopTimer) loopSpec={kind:"seq",name:nm};
        await playChordSeq(SEQS[nm]); }
      else if(cmd.startsWith("majscale:")){ const r=+cmd.slice(9); await playSemis([...MAJOR_SCALE,12].map(x=>x+r),60,true,"8n",{gap:0.4,stack:false}); } // 任意大调音阶
      else if(cmd.startsWith("natminor:")){ const r=+cmd.slice(9); await playSemis([0,2,3,5,7,8,10,12].map(x=>x+r),60,true,"8n",{gap:0.4,stack:false}); } // 自然小调音阶
      else if(cmd.startsWith("notes:")){ await playSemis(cmd.slice(6).split(",").map(Number),60,true); } // 任意一组音(末尾合奏)
      else if(cmd.startsWith("mel:")){ await playSemis(cmd.slice(4).split(",").map(Number),60,true,"2n",{stack:false,gap:0.6}); } // 纯旋律逐个弹，不合奏
      else if(cmd.startsWith("note:")){ await playSemis([+cmd.slice(5)],60,false,"2n"); } // 单个音
      else if(cmd.startsWith("prog:")){ await playProgression(cmd.slice(5)); }
      lightAlong("#piano"); // 底部悬浮键盘随声音同步点亮
    };
  });
}

  flipMin: [[9,12,16],[5,9,12],[0,4,7],[7,11,14],[9,12,16]],  // 同组和弦，最后落回 Am —— 家=Am，听成 i–VI–III–VII

let playStyle="block"; // 进行演示的演奏方式：block 柱式齐奏 | arp 分解和弦 | mix 柱式+分解综合
function styleLabel(){
  return playStyle==="arp" ? tr("🌊 分解","🌊 Arpeggio") : playStyle==="mix" ? tr("🎼 综合","🎼 Combo") : tr("🎹 齐奏","🎹 Block");
}
// 按当前演奏方式调度一个和弦：t=槽起点(秒)，slot=槽长，last=是否末和弦
function schedStyledChord(cs, t, slot, now, events, last){
  if(playStyle==="arp"){ // 分解：和弦音自低向高依次弹开（钢琴抒情伴奏织体）
    cs.forEach((s,j)=>{
      synth.triggerAttackRelease(semiToName(s,60), "4n", now+t+j*0.18);
      events.push({midis:[60+s], t:t+j*0.18, dur:"4n"});
    });
  } else if(playStyle==="mix"){ // 综合：低音先落并延住(柱式根基) → 上方音依次铺开(分解流动) → 槽尾整和弦轻击点题
    events.push({midis:cs.map(s=>60+s), t, dur:"2n", hint:true}); // 黄色提示：当前正在演奏的是哪个和弦
    synth.triggerAttackRelease(semiToName(cs[0],60), "2n", now+t);
    events.push({midis:[60+cs[0]], t, dur:"2n"});
    cs.slice(1).forEach((s,j)=>{
      synth.triggerAttackRelease(semiToName(s,60), "4n", now+t+0.16*(j+1));
      events.push({midis:[60+s], t:t+0.16*(j+1), dur:"4n"});
    });
    const bt=t+Math.max(slot*0.62, 0.16*cs.length);
    synth.triggerAttackRelease(cs.map(s=>semiToName(s,60)), last?"2n":"4n", now+bt);
    events.push({midis:cs.map(s=>60+s), t:bt, dur:last?"2n":"4n"});
  } else { // 柱式：整个和弦齐奏
    const dur=last?"1n":"2n";
    synth.triggerAttackRelease(cs.map(s=>semiToName(s,60)), dur, now+t);
    events.push({midis:cs.map(s=>60+s), t, dur});
  }
}
async function playChordSeq(seq){
  await initAudio(); const now=Tone.now(); const events=[]; let t=0;
  seq.forEach((cs,i)=>{
    const last=i===seq.length-1;
    const slot = playStyle==="arp" ? Math.max(0.95, cs.length*0.18+0.25) : 0.95;
    schedStyledChord(cs, t, slot, now, events, last);
    if(!last) t+=slot;
  });
  lastPlayed=events;
}
async function playProgression(kind){
  await initAudio();
  let degs = kind==="pop" ? [1,5,6,4] : [4,5,1];
  const now=Tone.now(); const events=[];
  degs.forEach((dg,i)=>{
    const d=DIATONIC[dg-1];
    const names=CHORDS[d.type].iv.map(x=>semiToName(x+d.root,60));
    synth.triggerAttackRelease(names,"2n", now + i*0.62);
    events.push({midis:names.map(nameToMidi), t:i*0.62, dur:"2n"});
  });
  lastPlayed=events;
}

function pickConcept(mId){
  const m=MODULES.find(x=>x.id===mId); const ms=state.mastery[mId];
  let concepts = m.concepts;
  // 音程关：先掌握半音/全音，再解锁大三度/小三度
  if(mId==="interval"){
    const basicsDone = ["half","whole"].every(c=>ms[c]>=MASTERY_TARGET);
    concepts = basicsDone ? m.concepts : ["half","whole"];
  }
  // 还没掌握的优先出现；都掌握后进入复习
  const notMastered = concepts.filter(c=>ms[c]<MASTERY_TARGET);
  const pool = notMastered.length? notMastered : concepts;
  // 按流行音乐使用频率加权抽取；"均匀全面"模式则等概率
  const wmap = (state.weightMode==="real") ? (FREQ[mId]||{}) : {};
  return weightedPick(pool, c => (wmap[c]||1));
}

let lastSig=null; // 上一题的特征，用于避免连续重复
let autoplay=true; // 进入模块/训练时设为 false，等用户按播放键；之后换题自动播放
let ivLast={base:null, t:0}; // 音程根音连续：习题与顶部教学按钮共享；3秒内沿用同一根音
let teachKey="C"; // 教学演示用的当前大调（可一键切换听效果）
let loopTimer=null, loopSpec={kind:"degs",toks:["1","5","6","4"]}; // 循环播放：定时器 + 最后选择的套路(级数式或固定序列式)
// 整段移位通用：选"超出键盘(C3..C6，相对C4为-12..24)的音最少"的八度(平手取移动最小)，保留整段音型
function shiftSeqFit(seq){
  const all=seq.flat();
  let best=0, bestOut=Infinity;
  for(const k of [-12,0,12,24]){
    const out=all.filter(s=>s+k<-12||s+k>24).length;
    if(out<bestOut || (out===bestOut && Math.abs(k)<Math.abs(best))){ best=k; bestOut=out; }
  }
  return seq.map(ch=>ch.map(s=>s+best));
}
// 把 SEQS 里以 C 为基准的和弦序列整体移到指定大调(默认当前教学调)：整段统一移位，保留走向
function kseqChords(name, key){
  const r0=RKEYS[key||teachKey].root, off=r0>6?r0-12:r0;
  return shiftSeqFit(SEQS[name].map(ch=>ch.map(s=>s+off)));
}
// 级数套路：先按 C 调摆好"原型"音型，再整段移到当前调——任何调听到的高低走向都一样
function kdegChords(toks, key){
  const shape=toks.map(t=>diatonicChordSemis(0, parseInt(t), String(t).endsWith("s")));
  const r0=RKEYS[key||teachKey].root, off=r0>6?r0-12:r0;
  return shiftSeqFit(shape.map(ch=>ch.map(s=>s+off)));
}
/* ===== 小调教学演示引擎（与大调机制平行）===== */
let teachMinKey="A"; // 当前小调（主音名，对应 MKEYS：A E B F♯ D G）
function minDiaChordSemis(root,deg,sev){ // 在自然小调音阶上隔三度叠置
  const sc=NAT_MINOR, i=deg-1, n=sev?4:3, out=[];
  for(let k=0;k<n;k++){ const j=i+2*k; out.push(root + sc[j%7] + 12*Math.floor(j/7)); }
  return out;
}
function minOff(key){ const r0=MKEYS[key||teachMinKey].root; let off=r0-9; if(off>6)off-=12; if(off<-6)off+=12; return off; }
// 小调级数套路：A 小调原型(主音 A3) + 整段保形移调；token：1..7 自然顺阶三和弦(s后缀=七和弦)；"V"=大属三和弦；"V7"=属七(和声小调)
function minDegChords(toks, key){
  const base=-3; // A3
  const shape=toks.map(t=>{
    if(t==="V")  return [base+7, base+11, base+14];          // E G♯ B
    if(t==="V7") return [base+7, base+11, base+14, base+17]; // E G♯ B D
    if(t==="1h") return [base+12, base+15, base+19];         // 高位 i(A4 C5 E5)：让导音 G♯4 向上蹭进 A4
    return minDiaChordSemis(base, parseInt(t), String(t).endsWith("s"));
  });
  const off=minOff(key);
  return shiftSeqFit(shape.map(ch=>ch.map(s=>s+off)));
}
function mseqChords(name, key){ // 以 A 小调为基准的 SEQS 序列整段移到当前小调
  const off=minOff(key);
  return shiftSeqFit(SEQS[name].map(ch=>ch.map(s=>s+off)));
}
function mKeyBar(){ // 小调版三按钮控制条：换小调 / 循环 / 演奏方式

}
function loopChords(){ // 当前要循环的和弦组(实时跟随当前大/小调与 loopSpec)
  if(loopSpec.kind==="seq")   return kseqChords(loopSpec.name);
  if(loopSpec.kind==="mseq")  return mseqChords(loopSpec.name);

function stopLoop(){
  if(loopTimer){ clearTimeout(loopTimer); loopTimer=null; }
  document.querySelectorAll('[data-play="kloop"]').forEach(b=>b.textContent=tr("🔄 循环","🔄 Loop"));

}
async function startLoop(){
  await initAudio();
  const BEAT=0.8; // 每个和弦 0.8 秒，节奏稳定
  const tick=()=>{
    const chords=loopChords(); // 每圈现取：换套路/换调/换演奏方式都在下一圈无缝生效
    const now=Tone.now(); const events=[];
    chords.forEach((cs,i)=>schedStyledChord(cs, i*BEAT, BEAT, now, events, false));
    lastPlayed=events; lightAlong("#piano");
    loopTimer=setTimeout(tick, chords.length*BEAT*1000);
  };
  tick();
  document.querySelectorAll('[data-play="kloop"]').forEach(b=>b.textContent=tr("⏹ 停止","⏹ Stop"));
}
function nextQuestion(){
  const mId=state.moduleId;

  } while(sig===lastSig && tries<12); // 尽量不与上一题重复(选项唯一时最多重试12次)

}

/* 生成题目对象： {kind:'choice'|'build', concept, qtype, prompt, play, options:[{label,sub,correct}], explain, target(build)} */
function buildQuestion(mId, concept){

  if(mId==="scale")    return q_scale(concept);

  if(mId==="keymin")   return q_keymin(concept);

  if(mId==="seventh")  return q_seventh(concept);

  if(mId==="transpose")return q_transpose(concept);
  if(mId==="function") return q_function(concept);
  if(mId==="inv")      return q_inv(concept);
  if(mId==="slash")    return q_slash(concept);
  if(mId==="resolve")  return q_resolve(concept);
  if(mId==="pop")      return q_pop(concept);
  if(mId==="sus")      return q_sus(concept);
  if(mId==="parmin")   return q_parmin(concept);

/* ---- 音程 ---- */
function q_interval(concept){
  const baseMidi = 60 + (Math.random()*8|0); // 随机根音(落在键盘范围内)
  if(concept==="half"||concept==="whole"){
    const isHalf = concept==="half";
    const semis=[0, isHalf?1:2];
    return {kind:"choice", concept, qtype:tr("听辨 · 距离","Hearing · distance"),
      prompt:tr("听这两个音，它们相差多少？","Listen to the two notes — how far apart are they?"),
      play:()=>{ ivLast={base:baseMidi, t:Date.now()}; playSemis(semis, baseMidi, true, "2n", {stack:false, gap:0.45}); },
      options:[ // 固定左小右大
        {label:tr("半音","Half step"), sub:tr("挨着的两个键，差1","adjacent keys, 1 apart"), correct:isHalf},
        {label:tr("全音","Whole step"), sub:tr("中间隔1个键，差2","one key skipped, 2 apart"), correct:!isHalf},
      ],
      explain: isHalf? tr("这是<b>半音</b>——键盘上紧挨着的两个键（黑键也算一个键），距离=1。判断依据：两个音几乎\"贴\"在一起，像同一个音被轻轻推了一下；全音则能听出明显迈了一步。半音是音乐里最小的距离单位，后面所有音程都用它来数。","That's a <b>half step</b> — two adjacent keys on the keyboard (black keys count), distance = 1. The tell: the two notes nearly \"touch\", like one note nudged slightly; a whole step sounds like a clear stride. The half step is music's smallest unit of distance — every later interval is counted in it.")
                     : tr("这是<b>全音</b>——中间隔了一个键，等于 2 个半音。判断依据：两个音之间能听出明显\"迈一步\"的间隔；半音则贴得几乎分不开。大调音阶的\"全全半…\"台阶就由它和半音搭成。","That's a <b>whole step</b> — one key skipped, equal to 2 half steps. The tell: you hear a clear \"stride\" between the notes; a half step clings too close to separate. The major scale's W-W-H staircase is built from these two.")};
  } else if(concept==="degree"){ // 度数=按字母数；♭/♯=升降半音
    const LET=["C","D","E","F","G","A","B"];
    const v=Math.random();
    if(v<0.3){ // 任意起点按字母数
      const st=Math.random()*7|0, n=2+(Math.random()*4|0); // 数到第2..5个
      const seq=Array.from({length:n},(_,i)=>LET[(st+i)%7]);
      const ans=seq[n-1];
      return {kind:"choice", concept, qtype:tr("度数 · 按字母数","Interval names · count letters"),
        prompt:tr(`只看字母(不管升降)：从 <b>${LET[st]}</b> 数起(${LET[st]}=第1个)，<b>第 ${n} 个字母</b>是？`,
                  `Letters only (ignore accidentals): counting from <b>${LET[st]}</b> (${LET[st]} = 1st), which is the <b>${n}th letter</b>?`),
        options:uniqPick(LET, ans, 4).map(x=>({label:x,correct:x===ans})),
        explain:tr(`${seq.join("、")}——第 ${n} 个是 <b>${ans}</b>。字母到 B 后绕回 C 继续。这正是"${n===3?"三度":n+"度"}"名字的数法。`,
                   `${seq.join(", ")} — the ${n}th is <b>${ans}</b>. After B the letters wrap to C. This is exactly how interval names like "third" are counted.`)};
    }
    if(v<0.55){ // 三度/五度名字的来历
      const is3=Math.random()<0.5;
      return {kind:"choice", concept, qtype:tr("度数 · 名字的来历","Interval names · where they come from"),
        prompt:tr(`C→${is3?"E":"G"} 叫"${is3?"三":"五"}度"，名字里的"${is3?"三":"五"}"指什么？`,
                  `C→${is3?"E":"G"} is called a "${is3?"third":"fifth"}" — what does the "${is3?"3":"5"}" refer to?`),
        play:()=>playSemis([0,is3?4:7],60,true,"2n",{stack:false,gap:0.45}),
        options:shuffle([
          {label:tr(`按字母数，${is3?"E":"G"} 是第 ${is3?3:5} 个`,`Counting letters, ${is3?"E":"G"} is the ${is3?"3rd":"5th"}`), sub:tr(`C${is3?" D E":" D E F G"}`,`C${is3?" D E":" D E F G"}`), correct:true},
          {label:tr(`两个音相差 ${is3?3:5} 个半音`,`The notes are ${is3?3:5} semitones apart`), sub:tr(`其实相差 ${is3?4:7} 个半音`,`actually ${is3?4:7} semitones`), correct:false},
          {label:tr(`要按 ${is3?3:5} 次琴键`,`You press ${is3?3:5} keys`), correct:false},
        ]),
        explain:tr(`"度"按<b>字母</b>数：C① D② ${is3?"E③":"E③ F④ G⑤"}，所以叫${is3?"三":"五"}度；精确宽度才用<b>半音</b>数(${is3?4:7} 个)。两把尺子别混。`,
                   `"Degrees" count <b>letters</b>: C① D② ${is3?"E③":"E③ F④ G⑤"} — hence "${is3?"third":"fifth"}"; exact width uses <b>half steps</b> (${is3?4:7}). Two different rulers.`)};
    }
    if(v<0.8){ // ♭/♯ 指哪个键
      const P=[["E♭","E",tr("E 左边的黑键","the black key left of E"),[3,4]],["B♭","B",tr("B 左边的黑键","the black key left of B"),[10,11]],
               ["A♭","A",tr("A 左边的黑键","the black key left of A"),[8,9]],["F♯","F",tr("F 右边的黑键","the black key right of F"),[6,5]]];
      const p=P[Math.random()*4|0]; const isFlat=p[0].includes("♭");
      return {kind:"choice", concept, qtype:tr("记号 · ♭ 和 ♯","Accidentals · ♭ and ♯"),
        prompt:tr(`记号 <b>${p[0]}</b> 指键盘上的哪个键？`,`Which key does <b>${p[0]}</b> mean on the keyboard?`),
        play:()=>playSemis([p[3][1],p[3][0]],60,true,"2n",{stack:false,gap:0.5}),
        options:shuffle([
          {label:p[2], correct:true},
          {label:isFlat?tr(`${p[1]} 右边的键`,`the key right of ${p[1]}`):tr(`${p[1]} 左边的键`,`the key left of ${p[1]}`), correct:false},
          {label:tr(`${p[1]} 本身`,`${p[1]} itself`), sub:tr("那是不加记号的写法","that's the plain note"), correct:false},
        ]),
        explain:tr(`♭=降半音(往左一个键)，♯=升半音(往右一个键)：<b>${p[0]}</b> 就是 ${p[2]}。`,
                   `♭ = a half step down (one key left), ♯ = a half step up (one key right): <b>${p[0]}</b> is ${p[2]}.`)};
    }
    // 同名不同宽：C→E 与 C→E♭
    return {kind:"choice", concept, qtype:tr("度数 · 同名不同宽","Interval names · same name, different width"),
      prompt:tr(`C→E 叫三度。那 <b>C→E♭</b> 还叫"三度"吗？`,`C→E is a third. Is <b>C→E♭</b> still called a "third"?`),
      play:()=>playSemis([0,4,0,3],60,true,"2n",{stack:false,gap:0.45}),
      options:shuffle([
        {label:tr("还叫三度，只是窄了半音(小三度)","Yes — still a third, just a half step narrower (minor 3rd)"), sub:tr("字母仍是 C D E 三个","the letters are still C D E"), correct:true},
        {label:tr("不叫了，变成二度","No — it becomes a second"), correct:false},
        {label:tr("不确定，要看调","It depends on the key"), correct:false},
      ]),
      explain:tr(`名字按字母数：C→E♭ 仍跨 C、D、E 三个字母，<b>仍是三度</b>；宽度从 4 半音缩到 3，所以从"大"三度变"小"三度——开朗变伤感。`,
                 `Names count letters: C→E♭ still spans C, D, E — <b>still a third</b>; its width shrinks from 4 half steps to 3, so the "major" third turns "minor" — cheerful turns sad.`)};
  } else { // M3 / m3
    const isM = concept==="M3";
    const semis=[0, isM?4:3];
    return {kind:"choice", concept, qtype:tr("听辨 · 色彩","Hearing · color"),
      prompt:tr("听这个三度音程，它是明亮还是忧郁？","Listen to this third — bright or sad?"),
      play:()=>{ ivLast={base:baseMidi, t:Date.now()}; playSemis(semis, baseMidi, true, "2n", {stack:false, gap:0.45}); },
      options:[ // 固定左小右大
        {label:tr("小三度","Minor third"), sub:tr("忧郁、伤感（差3半音）","sad (3 semitones)"), correct:!isM},
        {label:tr("大三度","Major third"), sub:tr("明亮、开朗（差4半音）","bright (4 semitones)"), correct:isM},
      ],
      explain: isM? tr("这是<b>大三度</b>（相差 4 个半音，如 C→E）。判断依据：宽的那一档三度，听感<b>明亮、开朗、向外打开</b>。它正是大三和弦\"阳光\"的来源——三和弦的中间那一格用它，整个和弦就亮。和小三度只差 1 个半音，但情绪整个翻面。","That's a <b>major third</b> (4 half steps apart, like C→E). The tell: the wider of the two thirds — <b>bright, cheerful, opening outward</b>. It's exactly where the major chord's sunshine comes from: put it in a triad's middle slot and the whole chord lights up. Only 1 half step wider than the minor third, yet the mood flips entirely.")
                  : tr("这是<b>小三度</b>（相差 3 个半音，如 C→E♭）。判断依据：窄的那一档三度，听感<b>忧郁、柔和、往里收</b>。它正是小三和弦\"伤感\"的来源——三和弦的中间那一格用它，整个和弦就暗。和大三度只差 1 个半音，但情绪整个翻面。","That's a <b>minor third</b> (3 half steps apart, like C→E♭). The tell: the narrower of the two thirds — <b>sad, soft, folding inward</b>. It's exactly where the minor chord's melancholy comes from: put it in a triad's middle slot and the whole chord darkens. Only 1 half step narrower than the major third, yet the mood flips entirely.")};
  }
}

/* ---- 大调音阶 ---- */
function q_scale(concept){
  if(concept==="hear"){
    const correct = Math.random()<0.5;
    const base=60+(Math.random()*13|0); // 随机起始调(音阶跨12半音，仍在键盘内)
    let semis;
    if(correct){ semis=[...MAJOR_SCALE,12]; }
    else { // 改一个音制造"走调"
      semis=[...MAJOR_SCALE,12];
      const i=1+(Math.random()*5|0); semis[i]+= (Math.random()<0.5?1:-1);
    }
    return {kind:"choice", concept, qtype:tr("听辨 · 音阶","Hearing · scale"),
      prompt:tr("听这条音阶，它是标准的大调音阶吗？","Listen — is this a proper major scale?"),
      play:()=>playSemis(semis,base,true,"8n",{gap:0.4,stack:false}),
      options:shuffle([
        {label:tr("是 · 标准大调","Yes · proper major"), sub:tr("全全半全全全半，很顺","W-W-H-W-W-W-H, smooth"), correct:correct},
        {label:tr("不是 · 有音走调了","No · a note is off"), sub:tr("中间某个音听起来怪","something sounds wrong"), correct:!correct},
      ]),
      explain: correct? tr("没错，这是标准大调音阶。判断依据：八个音一路走完，每一步都落在\"全全半全全全半\"的台阶上——尤其第 3→4 步和第 7→8 步是贴着走的半音，其余都是稳稳的全音，听感顺滑没有\"硌\"的地方。","Right — a proper major scale. The tell: all eight notes land exactly on the W-W-H-W-W-W-H staircase — steps 3→4 and 7→8 hug as half steps, the rest stride as whole steps, so nothing \"snags\" on the way up.")
                      : tr("对，中间有个音被改动了。判断依据：标准大调每一步都该落在\"全全半全全全半\"上，而这条音阶里有一步迈大了或迈小了——你耳朵\"硌\"了一下的那个位置，就是被改动的音。","Right — one note was altered. The tell: a proper major scale lands every step on W-W-H-W-W-W-H, but here one stride is too wide or too narrow — the spot where your ear \"snagged\" is exactly the altered note.")};
  }
  if(concept==="build"){ // 在 C 大调上搭（入门）
    const semisC=[...MAJOR_SCALE,12]; // C..C 共8个音
    return {kind:"build", concept, qtype:tr("搭建 · 音阶","Build · scale"),
      prompt:tr("在键盘上点出 C 大调音阶：1 2 3 4 5 6 7，再回到高八度的 1，共 <b>8 个音</b>（全是白键）。","Tap out the C major scale: 1-2-3-4-5-6-7 and back to 1 an octave up — <b>8 notes</b>, all white keys."),
      play:()=>playSemis(semisC,60,true,"8n",{gap:0.4,stack:false}),
      targetMidis: semisC.map(x=>60+x), rootSemi:0, flashStart:[60],
      explain:tr("C 大调 = C D E F G A B C，级数 1 2 3 4 5 6 7 (1)，全是白键。","C major = C D E F G A B C — degrees 1 to 7, all white keys.")};
  }
  // buildAny：给定随机起始音，按 全全半全全全半 搭出大调音阶（含高八度，共8个音）
  const roots=[0,2,4,5,7,9]; // 起始音 C D E F G A（避免过多升降号）
  const root=rand(roots), rn=NOTE_NAMES[root], semis=[...MAJOR_SCALE,12].map(x=>x+root);
  return {kind:"build", concept:"buildAny", qtype:tr("搭建 · 任意调音阶","Build · scale in any key"),
    prompt:tr(`起始音 <b>${rn}</b>（当作 1 号）会<b>闪烁</b>提示位置（点它才算选中）。请按 <b>全 全 半 全 全 全 半</b> 的台阶，从 ${rn} 一路点到高八度的 ${rn}，共 <b>8 个音</b>。`,
              `The starting note <b>${rn}</b> (your “do”) will <b>blink</b> as a hint (tap it to select). Follow <b>W-W-H-W-W-W-H</b> from ${rn} up to the higher ${rn} — <b>8 notes</b>.`),
    play:()=>playSemis(semis,60,true,"8n",{gap:0.4,stack:false}),
    targetMidis: semis.map(x=>60+x), rootSemi:root, flashStart:[60+root],
    explain:tr(`从 ${rn} 起的大调音阶 = ${sharp(semis.map(x=>NOTE_NAMES[x%12]).join(" "))}（全全半全全全半，最后回到高八度的 ${rn}）。`,
               `The major scale from ${rn} = ${sharp(semis.map(x=>NOTE_NAMES[x%12]).join(" "))} (W-W-H-W-W-W-H, ending on the higher ${rn}).`)};
}

/* ---- 三和弦 ---- */
const TRIAD_OPTS=[ // 科班顺序：大 → 小 → 增 → 减
  {t:"maj",label:"大三和弦",sub:"明亮、稳定"},
  {t:"min",label:"小三和弦",sub:"柔和、忧郁"},
  {t:"aug",label:"增三和弦",sub:"悬浮、神秘"},
  {t:"dim",label:"减三和弦",sub:"紧张、不安"},
];
function q_triad(concept){
  const root = Math.random()*8|0;
  const mode = rand(["listen","build","color"]);
  if(mode==="build"){
    const c=CHORDS[concept];
    return {kind:"build", concept, qtype:tr("搭建 · 和弦","Build · chord"),
      prompt:tr(`搭一个<b>${c.name}</b>，根音用 <b>${NOTE_NAMES[0]}</b>。`,`Build a <b>${tx(c.name)}</b> with root <b>${NOTE_NAMES[0]}</b>.`),
      play:()=>playSemis(c.iv,60,true),
      targetPC:c.iv.map(x=>x%12), rootSemi:0,
      explain:tr(`${c.name} = ${c.jian}，与根音的半音距离是 ${c.iv.join("-")}。搭法：先按根音 C，再数半音放三音和五音——中间那格(三音)定亮暗，顶上那格(五音)定稳不稳。色彩：${c.color}。`,
                 `${tx(c.name)} = ${c.jian}; half-step distances from the root: ${c.iv.join("-")}. To build: place root C, then count half steps for the 3rd and 5th — the middle slot (3rd) sets bright/dark, the top slot (5th) sets stable/unstable. Color: ${tx(c.color)}.`)};
  }
  if(mode==="color"){
    const c=CHORDS[concept];
    const opts = TRIAD_OPTS.map(o=>({label:tx(o.sub), sub:tx(o.label), correct:o.t===concept}));
    return {kind:"choice", concept, qtype:tr("色彩匹配","Color match"),
      prompt:tr("听这个和弦，它给你的感觉是？","Listen — what feeling does this chord give you?"),
      play:()=>playSemis(c.iv.map(x=>x+root),60,true),
      options:opts,
      explain:tr(`这是<b>${c.name}</b>（${c.jian}），色彩：${c.color}。判断要点：先听<b>中间的三音</b>——隔 4 个半音亮、隔 3 个半音暗；再听<b>顶上的五音</b>——纯五度(7)稳、降五度(6)发紧、升五度(8)发飘。四种三和弦就是这两格的组合。`,
                 `That's a <b>${tx(c.name)}</b> (${c.jian}) — ${tx(c.color)}. How to judge: first the <b>middle 3rd</b> — 4 half steps = bright, 3 = dark; then the <b>top 5th</b> — perfect (7) = stable, lowered (6) = tense, raised (8) = floating. The four triads are just combinations of those two slots.`)};
  }
  // listen
  const c=CHORDS[concept];
  return {kind:"choice", concept, qtype:tr("听辨 · 和弦","Hearing · chord"),
    prompt:tr("听这个和弦，它是哪种三和弦？","Listen — which triad type is this?"),
    play:()=>playSemis(c.iv.map(x=>x+root),60,true),
    options:TRIAD_OPTS.map(o=>({label:tx(o.label), sub:tx(o.sub), correct:o.t===concept})),
    explain:tr(`这是<b>${c.name}</b>（${c.jian}），${c.color}。判断要点：先听<b>中间的三音</b>——隔 4 个半音亮、隔 3 个半音暗；再听<b>顶上的五音</b>——纯五度(7)稳、降五度(6)发紧、升五度(8)发飘。`,
               `That's a <b>${tx(c.name)}</b> (${c.jian}) — ${tx(c.color)}. How to judge: first the <b>middle 3rd</b> — 4 half steps = bright, 3 = dark; then the <b>top 5th</b> — perfect (7) = stable, lowered (6) = tense, raised (8) = floating.`)};
}

/* ---- 七和弦 ---- */

  {t:"maj7",label:"大七和弦",sub:"梦幻、温暖"},
  {t:"dom7",label:"属七和弦",sub:"想往前走、布鲁斯"},
  {t:"min7",label:"小七和弦",sub:"慵懒、柔和"},
  {t:"m7b5",label:"半减七和弦",sub:"阴郁、不安"},
];
function q_seventh(concept){
  const root=Math.random()*6|0;
  const c=CHORDS[concept];
  const mode = rand(["listen","color"]);
  if(mode==="color"){
    return {kind:"choice", concept, qtype:tr("色彩匹配","Color match"),
      prompt:tr("听这个七和弦，最贴近哪种感觉？","Listen to this 7th chord — which feeling fits best?"),
      play:()=>playSemis(c.iv.map(x=>x+root),60,true),

      explain:tr(`这是<b>${c.name}</b>（${c.jian}），色彩：${c.color}。判断要点：七和弦=底部三和弦+顶上的七度，两层分开听——底亮+大七=梦幻温暖(maj7)；底亮+小七=悬着想走(属七)；底暗+小七=慵懒柔和(m7)；底紧+小七=阴郁不安(m7♭5)。`,
                 `That's a <b>${tx(c.name)}</b> (${c.jian}) — ${tx(c.color)}. How to judge: a 7th chord = base triad + the 7th on top; listen in two layers — bright base + major 7th = dreamy (maj7); bright + minor 7th = suspended, driving (dom7); dark + minor 7th = mellow (m7); tense base + minor 7th = uneasy (m7♭5).`)};
  }
  return {kind:"choice", concept, qtype:tr("听辨 · 七和弦","Hearing · 7th chords"),

    play:()=>playSemis(c.iv.map(x=>x+root),60,true),
    options:SEV_OPTS.map(o=>({label:tx(o.label), sub:tx(o.sub), correct:o.t===concept})),
    explain:tr(`这是<b>${c.name}</b>（${c.jian}），${c.color}。判断要点：分两层听——先听<b>底部三和弦</b>的亮/暗/紧，再听<b>顶上的七度</b>是融进去的(大七)还是悬着的(小七)。底亮+大七=maj7，底亮+小七=属七，底暗+小七=m7，底紧+小七=m7♭5。`,
               `That's a <b>${tx(c.name)}</b> (${c.jian}) — ${tx(c.color)}. How to judge: listen in two layers — the <b>base triad</b> (bright/dark/tense) first, then whether the <b>7th on top</b> melts in (major 7th) or hangs (minor 7th). Bright+maj7 = maj7; bright+min7 = dominant; dark+min7 = m7; tense+min7 = m7♭5.`)};
}

/* ---- 和弦符号（桥梁章节）---- */
const SEV_SYM = {
  maj7:{suf:"maj7", deg:"1 3 5 7",   tri:"大三和弦", add:"大七度"},
  dom7:{suf:"7",    deg:"1 3 5 ♭7",  tri:"大三和弦", add:"小七度"},
  min7:{suf:"m7",   deg:"1 ♭3 5 ♭7", tri:"小三和弦", add:"小七度"},
  m7b5:{suf:"m7♭5", deg:"1 ♭3 ♭5 ♭7",tri:"减三和弦", add:"小七度"},
};
const SEV_TYPES=["maj7","dom7","min7","m7b5"]; // 固定顺序
function symbolOf(root,type){ return NOTE_NAMES[root]+SEV_SYM[type].suf; }
function q_symbols(concept){
  const type=concept, c=CHORDS[type];
  const root=rand([0,2,4,5,7,9,11]); // 用自然音名做根音
  const sym=symbolOf(root,type);
  const mode=rand(["deg","derive","name","spell"]);
  if(mode==="deg"){
    return {kind:"choice", concept, qtype:tr("拆符号 · 级数","Symbols · degrees"),
      prompt:tr(`和弦符号 <b>${sym}</b> 的构成级数是哪个？`,`Which degree formula matches the symbol <b>${sym}</b>?`),
      play:()=>playSemis(c.iv.map(x=>x+root),60,true),
      options:SEV_TYPES.map(t=>({label:SEV_SYM[t].deg, sub:SEV_SYM[t].suf+tr(" 型"," type"), correct:t===type})),
      explain:tr(`读符号四步链：拆成根音和后缀 → 后缀译成"${SEV_SYM[type].tri} + ${SEV_SYM[type].add}" → 成员 ${SEV_SYM[type].deg} → 写出音。最容易踩的坑：单写 7 默认是<b>小</b>七度，maj7 才是大七度。所以 ${sym} = ${SEV_SYM[type].tri} + ${SEV_SYM[type].add}。`,
                 `The four-step reading chain: split into root + suffix → translate the suffix as "${tx(SEV_SYM[type].tri)} + ${tx(SEV_SYM[type].add)}" → members ${SEV_SYM[type].deg} → spell the notes. The classic trap: a bare 7 means the <b>minor</b> 7th; only maj7 means major. So ${sym} = ${tx(SEV_SYM[type].tri)} + ${tx(SEV_SYM[type].add)}.`)};
  }
  if(mode==="derive"){
    return {kind:"choice", concept, qtype:tr("从三和弦推符号","Triad → symbol"),
      prompt:tr(`在 <b>${NOTE_NAMES[root]} ${SEV_SYM[type].tri}</b> 上再加一个 <b>${SEV_SYM[type].add}</b>，得到的符号是？`,
                `Add a <b>${tx(SEV_SYM[type].add)}</b> on top of <b>${NOTE_NAMES[root]} ${tx(SEV_SYM[type].tri)}</b> — what symbol do you get?`),
      play:()=>playSemis(c.iv.map(x=>x+root),60,true),
      options:SEV_TYPES.map(t=>({label:symbolOf(root,t), sub:tx(SEV_SYM[t].tri)+" + "+tx(SEV_SYM[t].add), correct:t===type})),
      explain:tr(`${SEV_SYM[type].tri} + ${SEV_SYM[type].add} = ${sym}（${SEV_SYM[type].deg}）。`,
                 `${tx(SEV_SYM[type].tri)} + ${tx(SEV_SYM[type].add)} = ${sym} (${SEV_SYM[type].deg}).`)};
  }
  if(mode==="name"){
    return {kind:"choice", concept, qtype:tr("听音 → 符号","Hear → symbol"),
      prompt:tr(`听这个以 <b>${NOTE_NAMES[root]}</b> 为根音的七和弦，它的符号是哪个？`,
                `Listen to this 7th chord rooted on <b>${NOTE_NAMES[root]}</b> — which symbol is it?`),
      play:()=>playSemis(c.iv.map(x=>x+root),60,true),
      options:SEV_TYPES.map(t=>({label:symbolOf(root,t), sub:SEV_SYM[t].deg, correct:t===type})),
      explain:tr(`这是 <b>${sym}</b> = ${sharp(c.iv.map(x=>NOTE_NAMES[(x+root)%12]).join(" "))}（${SEV_SYM[type].deg}）。`,
                 `That's <b>${sym}</b> = ${sharp(c.iv.map(x=>NOTE_NAMES[(x+root)%12]).join(" "))} (${SEV_SYM[type].deg}).`)};
  }
  // spell：按符号在键盘上搭出和弦音
  return {kind:"build", concept, qtype:tr("按符号搭和弦","Build from symbol"),
    prompt:tr(`在键盘上搭出 <b>${sym}</b>（${SEV_SYM[type].tri} + ${SEV_SYM[type].add}，级数 ${SEV_SYM[type].deg}）。`,
              `Build <b>${sym}</b> on the keyboard (${tx(SEV_SYM[type].tri)} + ${tx(SEV_SYM[type].add)}; degrees ${SEV_SYM[type].deg}).`),
    play:()=>playSemis(c.iv.map(x=>x+root),60,true),
    targetPC: c.iv.map(x=>(x+root)%12), rootSemi:root,
    explain:tr(`${sym} = ${sharp(c.iv.map(x=>NOTE_NAMES[(x+root)%12]).join(" "))}（${SEV_SYM[type].deg}）。`,
               `${sym} = ${sharp(c.iv.map(x=>NOTE_NAMES[(x+root)%12]).join(" "))} (${SEV_SYM[type].deg}).`)};
}

/* ---- 调内和弦 ---- */
function q_diatonic(concept){
  const deg = +concept.slice(1); // d2..d7
  const d = DIATONIC[deg-1];
  const c = CHORDS[d.type];
  return {kind:"choice", concept, qtype:tr("调内和弦","Diatonic chords"),
    prompt:tr(`在 <b>C 大调</b>里，以第 <b>${deg}</b> 级（${NOTE_NAMES[d.root]}，${SCALE_DEG_NAME[deg]}）为根音叠出的三和弦，是哪种？`,
              `In <b>C major</b>, the triad stacked on degree <b>${deg}</b> (${NOTE_NAMES[d.root]}) is which type?`),
    play:()=>playSemis(c.iv.map(x=>x+d.root),60,true),
    options:[ // 科班顺序：大 → 小 → 减
      {label:tr("大三和弦","Major triad"), sub:tr("明亮（I IV V）","bright (I IV V)"), correct:d.type==="maj"},
      {label:tr("小三和弦","Minor triad"), sub:tr("柔和（ii iii vi）","soft (ii iii vi)"), correct:d.type==="min"},
      {label:tr("减三和弦","Diminished triad"), sub:tr("紧张（vii°）","tense (vii°)"), correct:d.type==="dim"},
    ],
    explain:tr(`第${deg}级是 <b>${d.rn} = ${NOTE_NAMES[d.root]}${c.name}</b>。验证方法：从 ${NOTE_NAMES[d.root]} 起"隔一个取一个"得到三个音，再数最下面那段三度——4 个半音是大、3 个是小、两个 3 叠加是减。这不是规定，是白键间距（全全半全全全半）造成的必然，因此口诀<b>大小小大大小减</b>在任何大调都成立。`,
               `Degree ${deg} is <b>${d.rn} = ${NOTE_NAMES[d.root]} ${tx(c.name)}</b>. To verify: from ${NOTE_NAMES[d.root]} take every other note, then count the bottom third — 4 half steps = major, 3 = minor, two 3s stacked = diminished. Not a decree but the inevitable result of the white keys' spacing (W-W-H-W-W-W-H), which is why <b>M-m-m-M-M-m-dim</b> holds in every major key.`)};
}

/* ---- 罗马数字（多调）---- */
// 各大调的正确音名拼写（含升降，避免 NOTE_NAMES 只有升号导致拼错）
const RKEYS = {
  "C":{root:0,  notes:["C","D","E","F","G","A","B"]},
  "G":{root:7,  notes:["G","A","B","C","D","E","F♯"]},
  "D":{root:2,  notes:["D","E","F♯","G","A","B","C♯"]},
  "A":{root:9,  notes:["A","B","C♯","D","E","F♯","G♯"]},
  "F":{root:5,  notes:["F","G","A","B♭","C","D","E"]},
  "B♭":{root:10,notes:["B♭","C","D","E♭","F","G","A"]},
};
const RKEY_LIST=["C","G","D","A","F","B♭"];
const TRI_RN=["I","ii","iii","IV","V","vi","vii°"];
const SEV_RN=["Imaj7","ii7","iii7","IVmaj7","V7","vi7","viiø7"];
const TRI_SUF=["","m","m","","","m","dim"];
const SEV_SUF=["maj7","m7","m7","maj7","7","m7","m7♭5"];
const TRI_QN=["大三和弦","小三和弦","小三和弦","大三和弦","大三和弦","小三和弦","减三和弦"];
// 调内和弦的半音（从 keyRoot 起，按音阶隔音叠置；seventh 则四个音）
function diatonicChordSemis(keyRoot, deg, seventh){
  const idx=deg-1, offs=seventh?[0,2,4,6]:[0,2,4];
  return offs.map(o=>{ const j=idx+o; return keyRoot + MAJOR_SCALE[j%7] + 12*Math.floor(j/7); });
}
function fitSemis(s){ let a=s.slice(); while(Math.max(...a)>24) a=a.map(x=>x-12); while(Math.min(...a)<0) a=a.map(x=>x+12); return a; }
function playFit(semis){ playSemis(fitSemis(semis),60,true); }
function triNotes(K,deg){ const i=deg-1; return [K.notes[i],K.notes[(i+2)%7],K.notes[(i+4)%7]].join(" "); }
function triName(K,deg){ const i=deg-1; return K.notes[i]+TRI_SUF[i]; }
function sevName(K,deg){ const i=deg-1; return K.notes[i]+SEV_SUF[i]; }
function uniqPick(arr,correct,n){ const pool=[...new Set(arr)].filter(x=>x!==correct); return shuffle([correct,...shuffle(pool).slice(0,n-1)]); }
function uniqNums(correct,max,n){ const pool=[]; for(let i=1;i<=max;i++) if(i!==correct) pool.push(i); return shuffle([correct,...shuffle(pool).slice(0,n-1)]); }
function q_roman(concept){
  const kn=rand(RKEY_LIST), K=RKEYS[kn], d=1+(Math.random()*7|0), idx=d-1, rootName=K.notes[idx];
  if(concept==="deg"){
    if(Math.random()<0.5){
      return {kind:"choice", concept, qtype:tr("罗马数字 · 级数→根音","Roman · degree→note"),
        prompt:tr(`在 <b>${kn} 大调</b>里，第 <b>${d}</b> 级的根音是哪个音？`,`In <b>${kn} major</b>, what is the root of degree <b>${d}</b>?`),
        play:()=>playFit([K.root+MAJOR_SCALE[idx]]),
        options:uniqPick(K.notes,rootName,4).map(n=>({label:n,correct:n===rootName})),
        explain:tr(`${kn} 大调音阶：${K.notes.join(" ")}。第 ${d} 个音是 <b>${rootName}</b>。`,
                   `${kn} major scale: ${K.notes.join(" ")}. Note ${d} is <b>${rootName}</b>.`)};
    }
    return {kind:"choice", concept, qtype:tr("罗马数字 · 根音→级数","Roman · note→degree"),
      prompt:tr(`在 <b>${kn} 大调</b>里，<b>${rootName}</b> 是第几级？`,`In <b>${kn} major</b>, which degree is <b>${rootName}</b>?`),
      play:()=>playFit([K.root+MAJOR_SCALE[idx]]),
      options:uniqNums(d,7,4).map(n=>({label:tr("第 "+n+" 级","Degree "+n),correct:n===d})),
      explain:tr(`${kn} 大调音阶：${K.notes.join(" ")}。${rootName} 排在第 ${d} 个。`,
                 `${kn} major scale: ${K.notes.join(" ")}. ${rootName} is number ${d}.`)};
  }
  if(concept==="tri"){
    const rn=TRI_RN[idx];
    return {kind:"choice", concept, qtype:tr("罗马数字 · 三和弦","Roman · triads"),
      prompt:tr(`在 <b>${kn} 大调</b>里，第 <b>${d}</b> 级的三和弦应写成哪个罗马数字？`,
                `In <b>${kn} major</b>, how is the degree-<b>${d}</b> triad written in Roman numerals?`),
      play:()=>playFit(diatonicChordSemis(K.root,d,false)),
      options:uniqPick(TRI_RN,rn,4).map(x=>({label:x,correct:x===rn})),
      explain:tr(`第 ${d} 级 = ${triNotes(K,d)}（${TRI_QN[idx]}）→ <b>${rn}</b>。大写=大、小写=小、°=减。`,
                 `Degree ${d} = ${triNotes(K,d)} → <b>${rn}</b>. Uppercase=major, lowercase=minor, °=diminished.`)};
  }
  if(concept==="sev"){
    const rn=SEV_RN[idx];
    return {kind:"choice", concept, qtype:tr("罗马数字 · 七和弦","Roman · 7th chords"),
      prompt:tr(`在 <b>${kn} 大调</b>里，第 <b>${d}</b> 级的七和弦罗马数字是？`,
                `In <b>${kn} major</b>, what's the Roman numeral for the degree-<b>${d}</b> 7th chord?`),
      play:()=>playFit(diatonicChordSemis(K.root,d,true)),
      options:uniqPick(SEV_RN,rn,4).map(x=>({label:x,correct:x===rn})),
      explain:tr(`第 ${d} 级七和弦 = <b>${sevName(K,d)}</b> → <b>${rn}</b>。`,
                 `The degree-${d} 7th chord = <b>${sevName(K,d)}</b> → <b>${rn}</b>.`)};
  }
  // trans 移调：罗马数字 → 实际和弦
  const useSev=Math.random()<0.6, rn=useSev?SEV_RN[idx]:TRI_RN[idx];
  const correctName=useSev?sevName(K,d):triName(K,d);
  const distract=[];
  for(const ok of shuffle(RKEY_LIST.filter(x=>x!==kn))){
    const nm=useSev?sevName(RKEYS[ok],d):triName(RKEYS[ok],d);
    if(nm!==correctName && !distract.includes(nm)) distract.push(nm);
    if(distract.length>=3) break;
  }
  return {kind:"choice", concept, qtype:tr("罗马数字 · 移调翻译","Roman · transposition"),
    prompt:tr(`在 <b>${kn} 大调</b>里，<b>${rn}</b> 对应哪个实际和弦？`,`In <b>${kn} major</b>, which real chord is <b>${rn}</b>?`),
    play:()=>playFit(diatonicChordSemis(K.root,d,useSev)),
    options:shuffle([{label:correctName,correct:true},...distract.map(n=>({label:n,correct:false}))]),
    explain:tr(`${kn} 大调第 ${d} 级是 ${rootName}，${rn} = <b>${correctName}</b>。`,
               `${kn} major's degree ${d} is ${rootName}, so ${rn} = <b>${correctName}</b>.`)};
}

/* ---- 移调翻译（独立单元）---- */
function q_transpose(concept){
  const kn=rand(RKEY_LIST), K=RKEYS[kn], d=1+(Math.random()*7|0), idx=d-1;
  const useSev=Math.random()<0.6, rn=useSev?SEV_RN[idx]:TRI_RN[idx];
  const cname=useSev?sevName(K,d):triName(K,d);
  const play=()=>playFit(diatonicChordSemis(K.root,d,useSev));
  if(concept==="r2c"){
    const distract=[];
    for(const ok of shuffle(RKEY_LIST.filter(x=>x!==kn))){ const nm=useSev?sevName(RKEYS[ok],d):triName(RKEYS[ok],d); if(nm!==cname&&!distract.includes(nm))distract.push(nm); if(distract.length>=3)break; }
    return {kind:"choice",concept,qtype:tr("移调 · 罗马数字→和弦","Transposition · Roman→chord"),
      prompt:tr(`在 <b>${kn} 大调</b>里，<b>${rn}</b> 对应哪个实际和弦？`,`In <b>${kn} major</b>, which real chord is <b>${rn}</b>?`), play,
      options:shuffle([{label:cname,correct:true},...distract.map(n=>({label:n,correct:false}))]),
      explain:tr(`翻译三步：① 写出 ${kn} 大调音阶 ${K.notes.join(" ")}；② 数到第 ${d} 级 → 根音 ${K.notes[idx]}；③ 性质由罗马数字的大小写自带（大写大、小写小、°减）。所以 ${rn} = <b>${cname}</b>。换任何调都是同样三步，只换第①步那条音阶。`,
                 `Three translation steps: ① write the ${kn}-major scale ${K.notes.join(" ")}; ② count to degree ${d} → root ${K.notes[idx]}; ③ the quality comes packaged in the numeral's case (upper = major, lower = minor, ° = diminished). So ${rn} = <b>${cname}</b>. Any key works the same — only the scale in step ① changes.`)};
  }
  if(concept==="c2r"){
    const pool=(useSev?SEV_RN:TRI_RN).filter(x=>x!==rn);
    return {kind:"choice",concept,qtype:tr("移调 · 和弦→罗马数字","Transposition · chord→Roman"),
      prompt:tr(`在 <b>${kn} 大调</b>里，<b>${cname}</b> 是哪个罗马数字？`,`In <b>${kn} major</b>, what Roman numeral is <b>${cname}</b>?`), play,
      options:shuffle([{label:rn,correct:true},...shuffle(pool).slice(0,3).map(x=>({label:x,correct:false}))]),
      explain:tr(`反向翻译三步：① 取 ${cname} 的根音 ${K.notes[idx]}；② 在 ${kn} 大调音阶 ${K.notes.join(" ")} 里数它排第几 → 第 ${d} 级；③ 按和弦性质定大小写。所以是 <b>${rn}</b>。`,
                 `Reverse-translate in three steps: ① take ${cname}'s root, ${K.notes[idx]}; ② count its position in the ${kn}-major scale ${K.notes.join(" ")} → degree ${d}; ③ set the case from the chord's quality. Hence <b>${rn}</b>.`)};
  }
  // prog 进行移调
  const prog=rand([{rn:"ii7–V7–Imaj7",degs:[2,5,1],sev:true},{rn:"I–V–vi–IV",degs:[1,5,6,4],sev:false},{rn:"vi–IV–I–V",degs:[6,4,1,5],sev:false}]);
  const chordOf=(KK,dd)=>prog.sev?sevName(KK,dd):triName(KK,dd);
  const correct=prog.degs.map(dd=>chordOf(K,dd)).join("–");
  const distract=[];
  for(const ok of shuffle(RKEY_LIST.filter(x=>x!==kn))){ const nm=prog.degs.map(dd=>chordOf(RKEYS[ok],dd)).join("–"); if(nm!==correct&&!distract.includes(nm))distract.push(nm); if(distract.length>=3)break; }
  return {kind:"choice",concept,qtype:tr("移调 · 进行翻译","Transposition · progressions"),
    prompt:tr(`把进行 <b>${prog.rn}</b> 移到 <b>${kn} 大调</b>，依次是哪几个和弦？`,
              `Move the progression <b>${prog.rn}</b> into <b>${kn} major</b> — which chords, in order?`),
    play:()=>playChordSeq(prog.degs.map(dd=>fitSemis(diatonicChordSemis(K.root,dd,prog.sev)))),
    options:shuffle([{label:correct,correct:true},...distract.map(n=>({label:n,correct:false}))]),
    explain:tr(`${kn} 大调里 ${prog.rn} = <b>${correct}</b>。做法：在 ${kn} 大调音阶（${K.notes.join(" ")}）上逐个数级数、写出对应调内和弦——<b>级数不变，音名全换</b>，这就是移调的全部秘密。干扰项都是同一进行在别的调里的样子，亲耳听低音线走向是否和题目一致即可排除。`,
               `In ${kn} major, ${prog.rn} = <b>${correct}</b>. Method: count each degree along the ${kn}-major scale (${K.notes.join(" ")}) and write its diatonic chord — <b>degrees stay put, note names all change</b>; that's the whole secret of transposing. The distractors are the same progression in other keys — check whether the bass line matches what you heard.`)};
}

/* ---- 调性与调号 ---- */
function q_key(concept){
  const kn=rand(RKEY_LIST), K=RKEYS[kn];
  const acc=K.notes.filter(n=>n.length>1); // 黑键(升降号)
  // 音阶逐个奏出(含回到高八度的主音，共8个音)，不齐奏
  const semis8=[...MAJOR_SCALE,12].map(x=>x+K.root);
  const playScale=()=>playSemis(fitSemis(semis8),60,true,"8n",{gap:0.4,stack:false});
  if(concept==="build"){
    // 在键盘上点出该大调音阶的 8 个音(全全半全全全半 = 7 个台阶 = 8 个音，含高八度)
    return {kind:"build", concept, qtype:tr("调性 · 在键盘上搭出这个调","Keys · build this key"),
      prompt:tr(`这是 <b>${kn} 大调</b>。从主音 ${kn} 起，按"全 全 半 全 全 全 半"一路点到高八度的 ${kn}，共 <b>8 个音</b>(主音会闪烁提示)。`,
                `This is <b>${kn} major</b>. From the tonic ${kn}, follow W-W-H-W-W-W-H up to the higher ${kn} — <b>8 notes</b> (the tonic blinks as a hint).`),
      play:playScale,
      targetMidis: semis8.map(x=>60+x), rootSemi:K.root, flashStart:[60+K.root],
      explain:tr(`${kn} 大调音阶 = ${K.notes.join(" ")} (${kn})，从主音到高八度共 8 个音${acc.length?("；其中 "+acc.join(" ")+" 是黑键"):"，全是白键"}。`,
                 `${kn} major = ${K.notes.join(" ")} (${kn}), 8 notes tonic-to-tonic${acc.length?("; "+acc.join(" ")+" are black keys"):" — all white keys"}.`)};
  }
  if(concept==="form"){
    if(acc.length===0){
      return {kind:"choice",concept,qtype:tr("调性 · 调号(黑键)","Keys · signature (black keys)"),
        prompt:tr(`从 <b>${kn}</b> 起套用大调台阶"全全半全全全半"，会用到哪个黑键(升降号)？`,
                  `Starting from <b>${kn}</b> with W-W-H-W-W-W-H, which black key (accidental) is needed?`),
        play:playScale,
        options:shuffle([{label:tr("一个都没有（全是白键）","None — all white keys"),correct:true},{label:"F♯",correct:false},{label:"B♭",correct:false},{label:"C♯",correct:false}]),
        explain:tr(`${kn} 大调 = ${K.notes.join(" ")}，正好全落在白键上，所以没有升降号。`,
                   `${kn} major = ${K.notes.join(" ")} — it lands entirely on white keys, so no accidentals.`)};
    }
    const correct=acc.join(" ");
    const pool=["F♯","F♯ C♯","C♯ F♯ G♯","B♭","B♭ E♭"].filter(x=>x!==correct);
    return {kind:"choice",concept,qtype:tr("调性 · 调号(黑键)","Keys · signature (black keys)"),
      prompt:tr(`从 <b>${kn}</b> 起套用大调台阶"全全半全全全半"，必须用到哪个(些)黑键？`,
                `Starting from <b>${kn}</b> with W-W-H-W-W-W-H, which black key(s) are required?`),
      play:playScale,
      options:shuffle([{label:correct,correct:true},...shuffle(pool).slice(0,3).map(x=>({label:x,correct:false}))]),
      explain:tr(`${kn} 大调 = ${K.notes.join(" ")}，其中 <b>${correct}</b> 是黑键——不升/降它，台阶就不再是"全全半全全全半"了。`,
                 `${kn} major = ${K.notes.join(" ")}; <b>${correct}</b> is on black keys — without it the step pattern breaks.`)};
  }
  if(concept==="member"){
    const out = acc.length? acc[0][0] : "F♯"; // 调外音：升降键的本位字母(如G大调里的F)；C大调用F♯
    const ins = shuffle(K.notes.filter(n=>n.length===1)).slice(0,3);
    return {kind:"choice",concept,qtype:tr("调性 · 哪个音不在调里","Keys · which note is outside"),
      prompt:tr(`下面哪个音 <b>不属于 ${kn} 大调</b>？`,`Which of these notes is <b>NOT in ${kn} major</b>?`),
      play:playScale,
      options:shuffle([{label:out,correct:true},...ins.map(n=>({label:n,correct:false}))]),
      explain:tr(`判断方法：写出 ${kn} 大调的 7 个音 ${K.notes.join(" ")}（从主音 ${kn} 套"全全半全全全半"得到），逐一比对——<b>${out}</b> 不在名单里。一个音"在不在调内"，看的就是它是否落在这条台阶上。`,`Method: write out ${kn} major's 7 notes, ${K.notes.join(" ")} (apply W-W-H-W-W-W-H from the tonic ${kn}), and check the list — <b>${out}</b> isn't on it. Whether a note "belongs to the key" is exactly whether it lands on that staircase.`)};
  }
  if(concept==="sig"){
    const isSharp = acc.length && acc[0].includes("♯");
    const correct = acc.length===0?tr("0 个(无升降号)","0 (no accidentals)"):(acc.length+tr(" 个"," ")+(isSharp?tr("升号","sharp(s)"):tr("降号","flat(s)")));
    const pool=[tr("0 个(无升降号)","0 (no accidentals)"),tr("1 个升号","1 sharp"),tr("1 个降号","1 flat"),tr("2 个升号","2 sharps"),tr("2 个降号","2 flats"),tr("3 个升号","3 sharps")].filter(x=>x!==correct);
    return {kind:"choice",concept,qtype:tr("调性 · 调号数量","Keys · how many accidentals"),
      prompt:tr(`<b>${kn} 大调</b>的调号是几个升号或降号？`,`How many sharps or flats does <b>${kn} major</b> have?`),
      play:playScale,
      options:shuffle([{label:correct,correct:true},...shuffle(pool).slice(0,3).map(x=>({label:x,correct:false}))]),
      explain:tr(`${kn} 大调 = ${K.notes.join(" ")}，${acc.length===0?"没有黑键":"含 "+acc.join(" ")}，所以调号是 ${correct}。`,
                 `${kn} major = ${K.notes.join(" ")}, ${acc.length===0?"no black keys":"contains "+acc.join(" ")} — so the signature is ${correct}.`)};
  }
  // minor 关系小调
  const rel=K.notes[5]; // 大调第6级
  const pool=["C","D","E","F","G","A","B","F♯"].filter(n=>n!==rel);
  return {kind:"choice",concept,qtype:tr("调性 · 关系小调","Keys · relative minor"),
    prompt:tr(`<b>${kn} 大调</b>的"关系小调"(共用完全相同的音)是哪个？`,`Which is the <b>relative minor</b> of ${kn} major (same exact notes)?`),
    play:playScale,
    options:shuffle([{label:rel+tr(" 小调"," minor"),correct:true},...shuffle(pool).slice(0,3).map(n=>({label:n+tr(" 小调"," minor"),correct:false}))]),
    explain:tr(`关系小调的主音在大调第 6 级。${kn} 大调第 6 级是 ${rel}，所以是 <b>${rel} 小调</b>——它和 ${kn} 大调用相同的 7 个音，只是以 ${rel} 为主音。`,
               `The relative minor's tonic is the major key's 6th degree. ${kn} major's 6th is ${rel}, so it's <b>${rel} minor</b> — same 7 notes, home moved to ${rel}.`)};
}

/* ---- 小调 ---- */
const NAT_MINOR=[0,2,3,5,7,8,10]; // 自然小调 全半全全半全全
const MKEYS={
  "A":{root:9, notes:["A","B","C","D","E","F","G"], rel:"C"},
  "E":{root:4, notes:["E","F♯","G","A","B","C","D"], rel:"G"},
  "B":{root:11,notes:["B","C♯","D","E","F♯","G","A"], rel:"D"},
  "F♯":{root:6,notes:["F♯","G♯","A","B","C♯","D","E"], rel:"A"},
  "D":{root:2, notes:["D","E","F","G","A","B♭","C"], rel:"F"},
  "G":{root:7, notes:["G","A","B♭","C","D","E♭","F"], rel:"B♭"},

const MKEY_LIST=["A","E","B","F♯","D","G"];

      options:[ // 固定：亮在左、暗在右
        {label:tr("大调","Major"), sub:tr("明亮（第3音是大三度）","bright (3rd is a major third)"), correct:!isMinor},

                     :tr(`这是 <b>${mn} 大调</b>。判断依据在<b>第 3 个音</b>：它离主音是大三度（4 个半音），开头三步一路敞亮；6、7 级也站在高位。听不准时，盯住开头三个音的"亮/暗"最可靠。`,`That's <b>${mn} major</b>. The tell sits on <b>note 3</b>: a major third (4 half steps) above the tonic, so the first three steps stride out bright; the 6th and 7th stand high too. When unsure, judge the first three notes' bright/dark — the most reliable spot.`)};
  }
  if(concept==="rel"){
    if(Math.random()<0.5){

        explain:tr(`${mn} 小调 = ${M.notes.join(" ")}，和 <b>${M.rel} 大调</b>音完全相同，只是以 ${mn} 为主音。`,

              `This is <b>${mn} (natural) minor</b>. From the tonic ${mn}, follow W-H-W-W-H-W-W up to the higher ${mn} — <b>8 notes</b> (tonic blinks).`),
    play:playMin,
    targetMidis:minSemis8.map(x=>60+x), rootSemi:M.root, flashStart:[60+M.root],
    explain:tr(`${mn} 小调 = ${M.notes.join(" ")} (${mn})，从主音到高八度共 8 个音；它和关系大调 ${M.rel} 大调用相同的音。`,
               `${mn} minor = ${M.notes.join(" ")} (${mn}), 8 notes tonic-to-tonic; it shares its notes with ${M.rel} major.`)};

/* ---- 和弦功能 ---- */
function q_function(concept){
  if(concept==="lead"){ // 导音专项
    const kn=rand(RKEY_LIST), K=RKEYS[kn], lt=K.notes[6], r=K.root;
    const v=Math.random();
    if(v<0.3){
      return {kind:"choice",concept,qtype:tr("导音 · 找出它","Leading tone · find it"),
        prompt:tr(`<b>${kn} 大调</b>的"导音"(紧贴主音半音之下的第 7 级)是哪个音？`,
                  `What is the <b>leading tone</b> of ${kn} major (degree 7, a half step below the tonic)?`),
        play:()=>playSemis(fitSemis([r+11,r+12]),60,true,"2n",{stack:false,gap:0.6}),
        options:uniqPick(K.notes, lt, 4).map(n=>({label:n,correct:n===lt})),
        explain:tr(`${kn} 大调音阶第 7 个音是 <b>${lt}</b>，它离主音 ${K.notes[0]} 只有半音——这就是导音。`,
                   `${kn} major's 7th note is <b>${lt}</b>, just a half step below the tonic ${K.notes[0]} — that's the leading tone.`)};
    }
    if(v<0.6){
      const resolved=Math.random()<0.5;
      const semis=[...MAJOR_SCALE]; if(resolved) semis.push(12);
      return {kind:"choice",concept,qtype:tr("导音 · 听辨悬与落","Leading tone · hang or land"),
        prompt:tr(`听这条上行旋律(${kn} 大调)的<b>结尾</b>：它停在了"悬着的导音"上，还是落回了主音？`,
                  `Listen to the <b>ending</b> of this rising line (${kn} major): does it hang on the leading tone, or land on the tonic?`),
        play:()=>playSemis(fitSemis(semis.map(x=>x+r)),60,true,"8n",{gap:0.4,stack:false}),
        options:[
          {label:tr("悬在导音上（话没说完，难受）","Hangs on the leading tone (unfinished, itchy)"), correct:!resolved},
          {label:tr("落回主音（到家，舒服）","Lands on the tonic (home, settled)"), correct:resolved},
        ],
        explain: resolved?tr(`最后多走了半步、落在主音 ${K.notes[0]} 上——踏实到家。`,`It took the last half step onto the tonic ${K.notes[0]} — safely home.`)
                         :tr(`最后停在导音 <b>${lt}</b> 上——耳朵被吊着，特别想再走半音回 ${K.notes[0]}。这就是导音的引力。`,
                             `It stopped on the leading tone <b>${lt}</b> — your ear is left hanging, craving that half step to ${K.notes[0]}. That's the pull.`)};
    }
    if(v<0.8){
      const correct=triName(K,5);
      return {kind:"choice",concept,qtype:tr("导音 · 谁带着它","Leading tone · who carries it"),
        prompt:tr(`${kn} 大调里，下列哪个和弦<b>含有导音 ${lt}</b>(因此"有导音"、紧张想回家)？`,
                  `In ${kn} major, which chord <b>contains the leading tone ${lt}</b> (and therefore pulls home)?`),
        play:()=>playChordSeq(kseqChords("leadVI", kn)), // V→高位I：导音向上蹭进主音
        options:uniqPick([correct, triName(K,1), triName(K,2), triName(K,4), triName(K,6)], correct, 4).map(n=>({label:n,correct:n===correct})),
        explain:tr(`${correct}(第 5 级) = ${triNotes(K,5)}，里面正有导音 <b>${lt}</b>——属和弦"想回家"的引力就来自它。I、ii、IV、vi 里都没有 ${lt}。`,
                   `${correct} (degree 5) = ${triNotes(K,5)} — it carries the leading tone <b>${lt}</b>, the source of the dominant's homeward pull. I, ii, IV, vi don't contain ${lt}.`)};
    }
    return {kind:"choice",concept,qtype:tr("导音 · 为什么有引力","Leading tone · why the pull"),
      prompt:tr(`导音为什么有"被吸回主音"的引力？`,`Why does the leading tone feel pulled into the tonic?`),
      play:()=>playSemis(fitSemis([r+11,r+12]),60,true,"2n",{stack:false,gap:0.6}),
      options:[
        {label:tr("它离主音只有半音，紧贴家门口","It's only a half step from the tonic — right at the door"), sub:tr("半音是最强的吸引关系","the half step is the strongest pull"), correct:true},
        {label:tr("它是整条音阶里最高的音","It's the highest note of the scale"), correct:false},
        {label:tr("它弹起来最响","It's played the loudest"), correct:false},
        {label:tr("调号规定它必须回去","The key signature says it must"), correct:false},
      ],
      explain:tr(`引力来自<b>半音的紧贴</b>：导音(${lt})到主音(${K.notes[0]})只差半音，耳朵会强烈期待它"蹭进门"。隔全音就没这股劲。`,
                 `The pull comes from the <b>half-step closeness</b>: ${lt} is one semitone below ${K.notes[0]}, so the ear expects it to slip inside. A whole step has no such magnetism.`)};
  }
  // 在C调内，先弹I定调，再弹一个属于该功能的和弦，判断功能
  const group = DIATONIC.filter(d=>d.fn===concept);
  const d = rand(group);
  const c = CHORDS[d.type];
  const playFn = async ()=>{
    await initAudio(); const now=Tone.now();
    const iNames=CHORDS.maj.iv.map(x=>semiToName(x,60));
    const cNames=c.iv.map(x=>semiToName(x+d.root,60));
    synth.triggerAttackRelease(iNames,"4n",now);          // 先弹I和弦定调
    synth.triggerAttackRelease(cNames,"2n",now+0.7);
    lastPlayed=[{midis:iNames.map(nameToMidi),t:0,dur:"4n"},
                {midis:cNames.map(nameToMidi),t:0.7,dur:"2n"}];
  };
  return {kind:"choice", concept, qtype:tr("功能判断","Function ID"),
    prompt:tr(`先听到主和弦(I)定调，再听到一个和弦。第二个和弦属于哪种功能？`,
              `You'll hear the tonic (I) first to set the key, then another chord. What function is the second chord?`),
    play:playFn,
    options:[ // 固定顺序：主 T → 下属 S → 属 D
      {label:tr("主功能 T","Tonic T"), sub:tr("稳定·有回家的安定感","stable · feels like home"), correct:concept==="T"},
      {label:tr("下属功能 S","Subdominant S"), sub:tr("出发·铺垫、想往前","departure · wants to move on"), correct:concept==="S"},
      {label:tr("属功能 D","Dominant D"), sub:tr("紧张·强烈想解决回家","tense · strongly pulls home"), correct:concept==="D"},
    ],
    explain:tr(`第二个是 <b>${d.rn}（${d.fnName}）</b>，感觉：${d.fnFeel}。判断方法：拿它和开头的 I 比——和 I 一样\"能停下\"的是主功能；\"已经动身但不催\"的是下属；\"揪着耳朵非要回 I\"（含导音）的是属。功能听的是它<b>相对家的去向感</b>，不是音色。`,
               `The second chord is <b>${d.rn}</b> (${tx(d.fnName)}) — feel: ${tx(d.fnFeel)}. How to judge: compare it against the opening I — if it could \"stop\" like I, it's tonic; if it has \"set out but isn't urging\", subdominant; if it \"grabs your ear and demands I\" (it carries the leading tone), dominant. Function is about a chord's <b>sense of direction relative to home</b>, not its tone color.`)};
}

/* ---- 第11关 转位 ---- */
const INV_CH=[
  {n:"C", r:0, iv:[0,4,7]}, {n:"Dm", r:2, iv:[0,3,7]}, {n:"Em", r:4, iv:[0,3,7]},
  {n:"F", r:5, iv:[0,4,7]}, {n:"G", r:7, iv:[0,4,7]}, {n:"Am", r:9, iv:[0,3,7]},
];
const INV_FORMS=[
  {label:"原位",     sub:"根音(1)在最底下"},
  {label:"第一转位", sub:"三音(3)在最底下"},
  {label:"第二转位", sub:"五音(5)在最底下"},
];
function invSemis(ch,k){ // k=0 原位 / 1 第一转位 / 2 第二转位；同一组音换最低音，紧凑排列
  const [,a,b]=ch.iv;
  const s = k===0 ? [0,a,b] : k===1 ? [a,b,12] : [b,12,12+a];
  return s.map(x=>x+ch.r);
}
function q_inv(concept){
  const ch=rand(INV_CH), k=Math.floor(Math.random()*3);
  const semis=invSemis(ch,k);
  const nn=semis.map(x=>sharp(NOTE_NAMES[x%12]));                       // 纯音名(不限八度时用)
  const no=semis.map(x=>sharp(NOTE_NAMES[x%12])+(Math.floor((60+x)/12)-1)); // 带八度(指具体键时用)
  const roles=["根音","三音","五音"];
  const play=()=>playSemis(semis,60,true);
  if(concept==="which"){
    return {kind:"choice",concept,qtype:tr("转位 · 认排列","Inversions · name the layout"),
      prompt:tr(`${ch.n} 和弦的三个音从低到高排成 <b>${no.join(" → ")}</b>（最低音是 ${nn[0]}）。这是 ${ch.n} 的哪种形态？`,
                `The notes of ${ch.n} are stacked <b>${no.join(" → ")}</b> (lowest: ${nn[0]}). Which form of ${ch.n} is this?`),
      play,
      options:INV_FORMS.map((f,i)=>({label:tx(f.label),sub:tx(f.sub),correct:i===k})),
      explain:tr(`最低音 ${nn[0]} 是 ${ch.n} 的<b>${roles[k]}</b>，所以这是<b>${INV_FORMS[k].label}</b>。`,
                 `The bottom note ${nn[0]} is ${ch.n}'s <b>${tx(roles[k])}</b>, so this is <b>${tx(INV_FORMS[k].label)}</b>.`)};
  }
  if(concept==="ear"){
    return {kind:"choice",concept,qtype:tr("转位 · 听辨","Inversions · by ear"),
      prompt:tr(`听这个 ${ch.n} 和弦（从最低音往上弹，再合奏）。它是什么形态？`,
                `Listen to this ${ch.n} chord (played bottom-up, then together). Which form is it?`),
      play,
      options:INV_FORMS.map((f,i)=>({label:tx(f.label),sub:tx(f.sub),correct:i===k})),
      explain:tr(`最低的是 ${nn[0]}——它是 ${ch.n} 的<b>${roles[k]}</b>，所以是<b>${INV_FORMS[k].label}</b>。听辨把手：原位"坐得最稳"；第一转位轻、有点想往前走；第二转位最悬（低音是五音，总想再挪一步）。拿不准就盯最低那个音，数它是和弦的 1、3 还是 5。`,
                 `The bottom note is ${nn[0]} — ${ch.n}'s <b>${tx(roles[k])}</b>, so it's <b>${tx(INV_FORMS[k].label)}</b>. Listening handles: root position "sits" steadiest; 1st inversion is lighter, leaning forward; 2nd inversion hangs most (5th in the bass always wants one more step). When unsure, lock onto the lowest note and count whether it's the chord's 1, 3 or 5.`)};
  }
  return {kind:"build",concept,qtype:tr("转位 · 在键盘上搭出","Inversions · build it"),
    prompt:tr(`在键盘上搭出 <b>${ch.n} 的${INV_FORMS[k].label}</b>（${INV_FORMS[k].sub}）：例如从 <b>${no[0]}</b> 往上依次按 ${no.join("、")}。闪烁键只是位置参考——<b>整体移高/低八度(从任何一个 ${nn[0]} 开始)都算对</b>。`,
              `Build <b>${ch.n}'s ${tx(INV_FORMS[k].label)}</b> (${tx(INV_FORMS[k].sub)}): e.g. from <b>${no[0]}</b> upward, press ${no.join(", ")}. The blinking key is only a hint — <b>any octave (starting on any ${nn[0]}) counts</b>.`),
    play, targetMidis:semis.map(x=>60+x), flashStart:[60+semis[0]],
    explain:tr(`${ch.n} 的${INV_FORMS[k].label} = ${nn.join(" ")}（最低音是${roles[k]} ${nn[0]}，例如 ${no.join(" ")}）。`,
               `${ch.n}'s ${tx(INV_FORMS[k].label)} = ${nn.join(" ")} (bottom = ${tx(roles[k])} ${nn[0]}, e.g. ${no.join(" ")}).`)};
}

/* ---- 第12关 斜杠和弦 ---- */
const SLASH=[
  // out:false 低音是和弦内音(弹转位)；out:true 低音不在和弦里(三和弦不动，底下加低音，voice 给定弹法)
  {sym:"C/E", left:"C", triad:[0,4,7], bass:4, bn:"E"},
  {sym:"G/B", left:"G", triad:[7,11,14], bass:11, bn:"B"},
  {sym:"F/A", left:"F", triad:[5,9,12], bass:9, bn:"A"},
  {sym:"C/G", left:"C", triad:[0,4,7], bass:7, bn:"G"},
  {sym:"D/F♯", left:"D", triad:[2,6,9], bass:6, bn:"F♯"},
  {sym:"Em/B", left:"Em", triad:[4,7,11], bass:11, bn:"B"},
  {sym:"C/D", left:"C", triad:[0,4,7], bass:2, bn:"D", out:true, voice:[-10,0,4,7]},   // D3 + C4 E4 G4
  {sym:"F/G", left:"F", triad:[5,9,12], bass:7, bn:"G", out:true, voice:[-5,5,9,12]},   // G3 + F4 A4 C5
];
// 弹法：内音低音→转位(bass 最低，其余和弦音就近依次往上排)；外来低音→用预设的"加低音"voicing
function slashVoice(s){
  if(s.voice) return s.voice;
  const bassPc=s.bass%12;
  const rest=[...new Set(s.triad.map(x=>x%12))].filter(pc=>pc!==bassPc)
    .sort((a,b)=>(((a-bassPc)%12+12)%12)-(((b-bassPc)%12+12)%12)); // 按"在 bass 上方多高"排序
  const out=[s.bass]; let prev=s.bass;
  for(const pc of rest){ let v=pc; while(v<=prev) v+=12; out.push(v); prev=v; }
  return out; // 例：D/F♯ → [6,9,14] = F♯4 A4 D5
}
function q_slash(concept){
  const s=rand(SLASH);
  const play=()=>playChordSeq([slashVoice(s)]); // 把 bass 放在最低，且尽量全在键盘内
  const howIn =tr(`${s.bn} 是 ${s.left} 和弦的内音——通常弹成<b>转位</b>：同一组音，把 ${s.bn} 换到最底下`,
                  `${s.bn} is a chord tone of ${s.left} — usually played as an <b>inversion</b>: same notes, ${s.bn} moved to the bottom`);
  const howOut=tr(`${s.bn} 不在 ${s.left} 和弦里——<b>三和弦原样不动，底下直接加低音 ${s.bn}</b>`,
                  `${s.bn} is NOT in the ${s.left} chord — <b>keep the triad as is and simply add ${s.bn} below</b>`);
  if(concept==="concept"){
    if(Math.random()<0.5){ // 含义题：按"低音在/不在和弦里"分别出，正确项写清具体做法
      const opts = s.out ? [
        {label:tr(`弹 ${s.left} 和弦，再在底下加一个和弦外的低音 ${s.bn}`,`Play the ${s.left} chord and add the outside bass ${s.bn} below`), sub:tr(`左和弦、右低音；${s.bn} 不在 ${s.left} 里，只能"加"`,`chord left, bass right; ${s.bn} isn't in ${s.left}, so it must be added`), correct:true},
        {label:tr(`把 ${s.left} 和弦里的某个音换到最底下(弹转位)`,`Move one of ${s.left}'s own notes to the bottom (an inversion)`), sub:tr(`行不通——${s.left} 和弦里没有 ${s.bn}`,`impossible — ${s.left} doesn't contain ${s.bn}`), correct:false},
        {label:tr(`${s.left} 和 ${s.bn} 两个和弦叠在一起`,`Stack the chords ${s.left} and ${s.bn} together`), correct:false},
        {label:tr(`左手弹单音，右手弹 ${s.bn} 和弦`,`Left hand single note, right hand a ${s.bn} chord`), correct:false},
      ] : [
        {label:tr(`还是 ${s.left} 和弦那组音，把内音 ${s.bn} 换到最底下(弹转位)`,`Same ${s.left} notes, with the chord tone ${s.bn} moved to the bottom (an inversion)`), sub:tr("左和弦、右低音","chord left, bass right"), correct:true},
        {label:tr(`左手弹单音，右手弹 ${s.bn} 和弦`,`Left hand single note, right hand a ${s.bn} chord`), correct:false},
        {label:tr(`${s.left} 和 ${s.bn} 两个和弦叠在一起`,`Stack the chords ${s.left} and ${s.bn} together`), correct:false},
        {label:tr(`随便弹 ${s.left} 或 ${s.bn} 都行`,`Play either ${s.left} or ${s.bn}, whatever`), correct:false},
      ];
      return {kind:"choice",concept,qtype:tr("斜杠和弦 · 含义","Slash chords · meaning"),
        prompt:tr(`流行谱上看到 <b>${s.sym}</b>，它的意思是？`,`A pop chart shows <b>${s.sym}</b> — what does it mean?`), play,
        options:opts,
        explain:tr(`口诀"左和弦、右低音"：${s.sym} = 弹 ${s.left} 和弦，让 ${s.bn} 当最低音。具体弹法：`,
                   `Rule: “chord left, bass right” — ${s.sym} = play ${s.left} with ${s.bn} as the lowest note. In practice: `)+(s.out?howOut:howIn)+tr("。",".")};
    }
    // 弹法题：内音→转位 vs 外来音→直接加低音
    return {kind:"choice",concept,qtype:tr("斜杠和弦 · 怎么弹","Slash chords · how to play"),
      prompt:tr(`实战里弹 <b>${s.sym}</b>，通常的做法是？（提示：先想 ${s.bn} 在不在 ${s.left} 和弦里）`,
                `In practice, how is <b>${s.sym}</b> usually played? (Hint: is ${s.bn} inside the ${s.left} chord?)`), play,
      options:[
        {label:tr(`弹 ${s.left} 的转位：同一组音，把 ${s.bn} 换到最底下`,`Play ${s.left}'s inversion: same notes, ${s.bn} at the bottom`), sub:tr("适用于低音是和弦内音","when the bass is a chord tone"), correct:!s.out},
        {label:tr(`${s.left} 三和弦原样不动，底下直接加低音 ${s.bn}`,`Keep the ${s.left} triad and just add the bass ${s.bn} below`), sub:tr("适用于低音不在和弦里","when the bass is outside the chord"), correct:!!s.out},
        {label:tr(`把 ${s.left} 和弦整体移到 ${s.bn} 上(移调)`,`Transpose the whole ${s.left} chord onto ${s.bn}`), correct:false},
        {label:tr(`只弹一个 ${s.bn} 音就行`,`Just play the single note ${s.bn}`), correct:false},
      ],
      explain:tr(`${s.left} 和弦 = ${s.triad.map(x=>sharp(NOTE_NAMES[x%12])).join(" ")}。`,
                 `The ${s.left} chord = ${s.triad.map(x=>sharp(NOTE_NAMES[x%12])).join(" ")}. `)+(s.out?howOut:howIn)+tr("。",".")};
  }
  if(concept==="bassname"){
    return {kind:"choice",concept,qtype:tr("斜杠和弦 · 最低音","Slash chords · the bass"),
      prompt:tr(`<b>${s.sym}</b> 的最低音(bass)是哪个音？`,`What is the bass (lowest note) of <b>${s.sym}</b>?`), play,
      options:uniqPick(["C","D","E","F","G","A","B","F♯"], s.bn, 4).map(n=>({label:n,correct:n===s.bn})),
      explain:tr(`读法口诀"左和弦、右低音"：${s.sym} 里斜杠<b>左边的 ${s.left}</b> 告诉你弹哪个和弦，<b>右边的 ${s.bn}</b> 指定谁当最低音——所以答案是 <b>${s.bn}</b>。注意别拿左边的根音 ${s.left[0]} 当答案：斜杠记号存在的意义恰恰是"低音不再是根音"。`,`The mnemonic is "chord left, bass right": in ${s.sym}, the <b>${s.left}</b> left of the slash names the chord, while the <b>${s.bn}</b> on the right appoints the lowest note — so the answer is <b>${s.bn}</b>. Don't grab the root ${s.left[0]} from the left side: the whole point of slash notation is that the bass is no longer the root.`)};
  }
  return {kind:"build",concept,qtype:tr("斜杠和弦 · 在键盘上搭出","Slash chords · build it"),
    prompt:tr(`在键盘上搭出 <b>${s.sym}</b>：${s.out?`弹 ${s.left} 和弦的那几个音，并在底下<b>加上低音 ${s.bn}</b>(${s.bn} 不在和弦里，只能加)`:`弹 ${s.left} 和弦的那几个音，但要让 <b>${s.bn}</b> 成为<b>最低(最左)的音</b>`}（用哪个八度的 ${s.bn} 都可以）。`,
              `Build <b>${s.sym}</b>: ${s.out?`play the notes of ${s.left} and <b>add the bass ${s.bn} below</b> (${s.bn} isn't in the chord, so it must be added)`:`play the notes of ${s.left}, with <b>${s.bn}</b> as the <b>lowest key</b>`} (any octave of ${s.bn} is fine).`),
    play, targetPC:[...new Set([...s.triad.map(x=>x%12), s.bass%12])], bassPc:s.bass, rootSemi:s.triad[0]%12,
    explain:tr(`${s.sym} = ${s.left} 和弦的音 ${s.triad.map(x=>sharp(NOTE_NAMES[x%12])).join(" ")}${s.out?`，底下再加低音 ${s.bn}`:`，但最低音是 ${s.bn}`}。`,
               `${s.sym} = the notes of ${s.left} (${s.triad.map(x=>sharp(NOTE_NAMES[x%12])).join(" ")})${s.out?`, plus the bass ${s.bn} below`:`, with ${s.bn} as the bass`}. `)+(s.out?howOut:howIn)+tr("。",".")};
}

const RS_INV=[ // 四种 V7 形态 → 解决目标（教学与出题共用；det=逐声部讲解）
  {sym:"G7",   inv:"原位",   invEn:"root position", seq:"rsRoot", to:"C（原位）",  toEn:"C (root position)", toSym:"C",   bass:"G→C(跳进)", bassEn:"G→C (leap)",
   det:"逐声部看（G3·D4·F4·B4）：低音 G3 走根音<b>下跳到 C3</b>（规则三；上跳到 C4 同样合法——只会与五音的落点重叠，而重叠并不违规，这里选下跳是要句号最重、四条路也全错开看得清）；五音 D4 就近落 C4（规则二）；七音 F4 半音落 E4（规则一）；导音 B4 半音蹭进 C5（规则一）。落点 C3·C4·E4·C5——三个 C 加一个 E，省五音。C3 听着很低，但那正是低音区的家。",
   detEn:"Voice by voice (G3·D4·F4·B4): the bass G3 takes the root leap <b>down to C3</b> (rule 3; leaping up to C4 is equally legal — it merely overlaps the 5th's landing, and overlapping breaks no rule. Down is chosen here for the heaviest period, and so all four paths stay visibly separate); the 5th D4 settles on C4 (rule 2); the 7th F4 falls a half step to E4 (rule 1); the leading tone B4 slides into C5 (rule 1). Landing: C3·C4·E4·C5 — three C's plus one E, 5th omitted. C3 sounds deep, but that's exactly where a bass lives."},
  {sym:"G7/B", inv:"第一转位", invEn:"1st inversion", seq:"rs65",   to:"C（完整原位）", toEn:"C (complete, root position)", toSym:"C",   bass:"B→C(半音)", bassEn:"B→C (half step)",
   det:"逐声部看（B3·D4·F4·G4）：低音 B3 是导音，半音上行到 C4（规则一兼低音）；五音 D4 就近落 C4（与导音重叠，合法）；七音 F4 半音落 E4（规则一）；G4 是共同音，原地保留（规则二）。没有一个声部跳进，落点 C4·E4·G4——完整的原位 C。",
   detEn:"Voice by voice (B3·D4·F4·G4): the bass B3 is the leading tone and rises a half step to C4 (rule 1, in the bass); the 5th D4 settles on C4 (overlapping the leading tone — legal); the 7th F4 falls to E4 (rule 1); G4 is the common tone and stays (rule 2). Not a single leap — landing C4·E4·G4, a complete root-position C."},
  {sym:"G7/D", inv:"第二转位", invEn:"2nd inversion", seq:"rs43",   to:"C（完整原位）", toEn:"C (complete, root position)", toSym:"C",   bass:"D→C(级进)", bassEn:"D→C (step)",
   det:"逐声部看（D4·G4·B4·F5）：低音 D4 级进落到 C4（规则二，低音此时走的就是最近的主音）；G4 共同音保留（规则二）；导音 B4 半音上 C5（规则一）；七音 F5 半音落 E5（规则一）。落点 C4·G4·C5·E5——完整的原位 C。",
   detEn:"Voice by voice (D4·G4·B4·F5): the bass D4 steps down to C4 (rule 2 — here the nearest tonic IS the bass's target); G4 the common tone stays (rule 2); the leading tone B4 rises to C5 (rule 1); the 7th F5 falls to E5 (rule 1). Landing C4·G4·C5·E5 — a complete root-position C."},
  {sym:"G7/F", inv:"第三转位", invEn:"3rd inversion", seq:"rs42",   to:"C/E（第一转位 I6）", toEn:"C/E (1st-inversion tonic, I6)", toSym:"C/E", bass:"F→E(半音)", bassEn:"F→E (half step)",
